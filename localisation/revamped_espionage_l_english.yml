 # ACTOR SUCCESS — 4 variants each (unchanged text)
 revamped_espionage.105.t: "Operation Successful"
 revamped_espionage.105.d1: "Our agent tampered with the general's saddle before battle. The fall was fatal."
 revamped_espionage.105.d2: "A poisoned dart from the treeline felled a general of [From.GetName] during a march."
 revamped_espionage.105.d3: "Our operative bribed the general's bodyguard. The deed was done quietly in the night."
 revamped_espionage.105.d4: "Our agent challenged the general to a friendly duel. It was not friendly."
 revamped_espionage.105.a: "Excellent."
 revamped_espionage.106.t: "Operation Failed"
 revamped_espionage.106.d1: "Our operative was caught attempting to sabotage the general's equipment."
 revamped_espionage.106.d2: "The general's bodyguard proved too vigilant. Our assassin was forced to flee."
 revamped_espionage.106.d3: "A tip-off from a double agent exposed our plot against [From.GetName]'s general."
 revamped_espionage.106.d4: "Our assassin challenged the general to a duel to get close. He lost. Badly."
 revamped_espionage.106.a: "A shame."
 revamped_espionage.107.t: "Operation Successful"
 revamped_espionage.107.d1: "Our man aboard the flagship loosened a cannon during rough seas. The admiral was crushed."
 revamped_espionage.107.d2: "A hired crewman pushed the admiral overboard during a storm. The body was never recovered."
 revamped_espionage.107.d3: "Our agent sabotaged the admiral's longboat. He drowned during a routine fleet inspection."
 revamped_espionage.107.d4: "Our operative convinced the admiral to demonstrate a cannonball dive. From the crow's nest."
 revamped_espionage.107.a: "Excellent."
 revamped_espionage.108.t: "Operation Failed"
 revamped_espionage.108.d1: "Our man aboard the ship was identified and thrown in the brig before acting."
 revamped_espionage.108.d2: "The admiral changed ships at the last moment. Our sabotage struck an empty vessel."
 revamped_espionage.108.d3: "Rough seas prevented our agent from carrying out the plan. The admiral lives."
 revamped_espionage.108.d4: "Our operative got seasick before reaching the admiral's ship and had to be rescued by fishermen."
 revamped_espionage.108.a: "A shame."
 revamped_espionage.109.t: "Operation Successful"
 revamped_espionage.109.d1: "Our agent poisoned the advisor's ink — the toxin absorbed through the skin over days."
 revamped_espionage.109.d2: "A staged robbery in a dark alley claimed the life of an advisor of [From.GetName]."
 revamped_espionage.109.d3: "Our operative tampered with the advisor's medicine. The death appeared entirely natural."
 revamped_espionage.109.d4: "The advisor opened a book our agent left on his desk. It was, regrettably, his last chapter."
 revamped_espionage.109.a: "Excellent."
 revamped_espionage.109.tt: "An advisor of [From.GetName] has been killed and monarch points lost."
 revamped_espionage.110.t: "Operation Failed"
 revamped_espionage.110.d1: "The advisor cancelled the meeting at the last moment. Our agent had to abort."
 revamped_espionage.110.d2: "Palace security detected our operative and raised the alarm."
 revamped_espionage.110.d3: "The poisoned gift was intercepted by the advisor's servants before delivery."
 revamped_espionage.110.d4: "Our agent delivered the poisoned letter to the wrong advisor. The Minister of Parks is mildly ill."
 revamped_espionage.110.a: "A shame."
 revamped_espionage.111.t: "Operation Successful"
 revamped_espionage.111.d1: "Our agents have siezed an entire state in [From.GetName]. Armed terrorist now march through the region."
 revamped_espionage.111.d2: "Gold and weapons have been distributed across [From.GetName]. A state has fallen to chaos and terrorists have taken up arms."
 revamped_espionage.111.d3: "Shipments of weapons and manifestoes have been distributed across [From.GetName]. The local population has taken up arms."
 revamped_espionage.111.d4: "Our agents started a bar argument about 9-11 in [From.GetName]. Planes arrived and two towers fell. It escalated beyond expectations."
 revamped_espionage.111.a: "Excellent."
 revamped_espionage.112.t: "Operation Failed"
 revamped_espionage.112.d1: "Local authorities discovered our weapon caches and arrested the ringleaders."
 revamped_espionage.112.d2: "The population proved too loyal — the terrorist were driven out of town."
 revamped_espionage.112.d3: "A rival spy network exposed our agents before the cell could take root."
 revamped_espionage.112.d4: "The hired terrorist decided to drink instead of fight."
 revamped_espionage.112.a: "A shame."
 revamped_espionage.113.t: "Operation Successful"
 revamped_espionage.113.d1: "Our agents tunneled into the vault under cover of construction work. The gold is ours."
 revamped_espionage.113.d2: "Forged documents and a corrupt clerk gave our agents access to [From.GetName]'s coffers."
 revamped_espionage.113.d3: "Our operatives intercepted a tax shipment bound for [From.GetName]'s capital."
 revamped_espionage.113.d4: "Our agent won the treasury clerk's trust over months of friendship, then cleaned out the vault on a Tuesday."
 revamped_espionage.113.a: "Excellent."
 revamped_espionage.113.tt: "We have siphoned [From.GetTreasuryGainAmount] from [From.GetName]'s treasury."
 revamped_espionage.114.t: "Operation Failed"
 revamped_espionage.114.d1: "The tunnel was discovered by treasury guards during a routine patrol."
 revamped_espionage.114.d2: "Our forged documents were spotted as fakes by a sharp-eyed clerk."
 revamped_espionage.114.d3: "The corrupt intermediary betrayed our agents and pocketed the bribe."
 revamped_espionage.114.d4: "Our tunnel came up in the royal latrine instead of the treasury. The infiltrator surrendered immediately."
 revamped_espionage.114.a: "A shame."
 revamped_espionage.115.t: "Operation Successful"
 revamped_espionage.115.d1: "Our saboteurs ignited the gunpowder stores. The fortress collapsed in a spectacular explosion."
 revamped_espionage.115.d2: "Agents posing as laborers weakened the foundations over weeks. The fortress crumbled overnight."
 revamped_espionage.115.d3: "Carefully placed charges brought down the walls of a border fortress in [From.GetName]."
 revamped_espionage.115.d4: "Our saboteur accidentally sneezed near the gunpowder stores. The fortress did the rest."
