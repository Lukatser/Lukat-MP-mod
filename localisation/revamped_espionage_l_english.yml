 # RESOLUTION DESCRIPTIONS — all 4 variants per action (unchanged text from v11b)
 revamped_espionage.33.t: "Covert Operation"
 revamped_espionage.33.d1: "A foreign agent posing as a camp follower was caught near our general's tent with a concealed dagger."
 revamped_espionage.33.d2: "Our general's horse was found to have been poisoned before a planned ride."
 revamped_espionage.33.d3: "A sabotaged musket was discovered among our general's personal arms."
 revamped_espionage.33.d4: "Someone replaced our general's battle map with one that leads off a cliff."
 revamped_espionage.33.a: "What happened?"
 revamped_espionage.33.b: "We know who's behind this!"
 revamped_espionage.34.t: "Covert Operation"
 revamped_espionage.34.d1: "A crew member aboard the flagship was caught tampering with the rigging above the quarterdeck."
 revamped_espionage.34.d2: "A hired sailor attempted to push our admiral overboard during a storm."
 revamped_espionage.34.d3: "Our admiral's longboat was found sabotaged — the hull had been deliberately weakened to sink."
 revamped_espionage.34.d4: "The admiral's favorite parrot was trained to untie knots. Specifically, the knots holding the mast."
 revamped_espionage.34.a: "What happened?"
 revamped_espionage.34.b: "We know who's behind this!"
 revamped_espionage.35.t: "Covert Operation"
 revamped_espionage.35.d1: "A mysterious package delivered to our advisor's study contained a spring-loaded poisoned needle."
 revamped_espionage.35.d2: "Our advisor's carriage was sabotaged — the axle had been deliberately weakened to snap."
 revamped_espionage.35.d3: "A foreign agent posing as a scholar attempted to strangle our advisor during a private consultation."
 revamped_espionage.35.d4: "Our advisor's new quill pen was rigged to explode. Fortunately, he was using a pencil."
 revamped_espionage.35.a: "What happened?"
 revamped_espionage.35.b: "We know who's behind this!"
 revamped_espionage.36.t: "Covert Operation"
 revamped_espionage.36.d1: "Crates of foreign pamphlets, weapons, and gold coins have been discovered in a rural pub. An entire region has risen up against out regime and armed terrorist roam the countryside."
 revamped_espionage.36.d2: "A network of foreign-funded facilitators has roused up an entire state to try and secede. Armed terrorist now march through the region."
 revamped_espionage.36.d3: "Shipments of weapons and manifestoes have been distributed across a province. The local population has taken up arms."
 revamped_espionage.36.d4: "Foreign coins were found stuffed inside bread at the capital market. The local populace has been swayed and is now out for your blood."
 revamped_espionage.36.a: "What happened?"
 revamped_espionage.36.b: "We know who's behind this!"
 revamped_espionage.37.t: "Covert Operation"
 revamped_espionage.37.d1: "Guards discovered a tunnel being dug beneath the royal treasury from an adjacent building."
 revamped_espionage.37.d2: "A treasury clerk was caught forging withdrawal documents to siphon funds to a foreign agent."
 revamped_espionage.37.d3: "Counterfeit seals of the royal exchequer were found in a dockside warehouse."
 revamped_espionage.37.d4: "A guard caught a man in a black mask tiptoeing out of the treasury with a comically large sack."
 revamped_espionage.37.a: "What happened?"
 revamped_espionage.37.b: "We know who's behind this!"
 revamped_espionage.38.t: "Covert Operation"
 revamped_espionage.38.d1: "Saboteurs were discovered near the powder stores with slow-burning fuses."
 revamped_espionage.38.d2: "Workers hired to repair a fortress wall were found to be foreign agents weakening the foundations."
 revamped_espionage.38.d3: "A series of small explosions rocked a border fortress — charges had been planted in the gunpowder storage."
 revamped_espionage.38.d4: "Someone left a lit candle next to the gunpowder stores. Subtle."
 revamped_espionage.38.a: "What happened?"
 revamped_espionage.38.b: "We know who's behind this!"

