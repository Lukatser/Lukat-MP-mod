 revamped_espionage.115.tt: "A fortress in [From.GetName] has been destroyed."
 revamped_espionage.116.t: "Operation Failed"
 revamped_espionage.116.d1: "Our saboteurs were caught planting charges and executed on the spot."
 revamped_espionage.116.d2: "The garrison commander discovered the weakened foundations during an inspection."
 revamped_espionage.116.d3: "Rain soaked the fuses before detonation. The fortress stands untouched."
 revamped_espionage.116.d4: "Our saboteur lit the fuse, then realized he was standing on it."
 revamped_espionage.116.a: "A shame."

