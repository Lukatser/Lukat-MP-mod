 # ALLIANCE INCIDENT RESOLUTION
 revamped_espionage.39.d1: "A sealed dispatch, bearing what appears to be our royal seal, has been delivered to one of our allies. Its contents accuse us of negotiating a separate peace behind their back. The wax was not stamped by our hand."
 revamped_espionage.39.d2: "A courier was intercepted on the road between our capitals carrying letters in our name, promising our ally's territory to a third power in exchange for a commercial treaty. The letters are masterful forgeries. The damage to our reputation is entirely real."
 revamped_espionage.39.d3: "A man arrested for pickpocketing in our ally's capital was found carrying a detailed account of their garrison strengths and fortress positions. He claims a [Root.GetAdjective] officer paid him for the report. He is lying. Someone else paid him."
 revamped_espionage.39.d4: "Our ally has received a painting depicting their monarch shaking hands with our ruler above a caption reading 'signed in secret.' It is remarkably well-executed for slander. Our ambassador insists we do not employ artists."
 revamped_espionage.117.d: "Our agents have successfully planted false evidence between [From.GetName] and one of their allies. Their diplomatic relationship is now severely strained."
 revamped_espionage.118.t: "Operation Failed"
 revamped_espionage.118.d: "Our fabricated evidence was not convincing enough. The alliance between [From.GetName] and their ally remains intact."
 revamped_espionage.118.a: "A shame."
