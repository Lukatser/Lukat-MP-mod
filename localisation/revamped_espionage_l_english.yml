 # GREAT PROJECTS
 fortress_of_luxembourg: "The Grand Fortress of Luxembourg"
 fortress_of_luxembourg_desc: "Rising atop sheer cliffs, the Fortress of Luxembourg stands among the most formidable strongholds in Europe. Expanded over generations, its walls, bastions, and subterranean galleries command vital routes between rival powers. Known as the “Gibraltar of the North,” it embodies the art of modern fortification, blending natural defenses with cutting-edge military design. Its garrison can withstand prolonged sieges, projecting strength far beyond its size. Control of the fortress ensures dominance over the surrounding region, making it a prize fiercely contested by Europe’s great powers."
 hohenzollern_castle: "Hohenzollern Castle"
 hohenzollern_castle_desc: "Perched high upon the Swabian Alps, Hohenzollern Castle stands as the ancestral seat of a rising dynasty. Its commanding position and imposing walls symbolize both noble prestige and enduring authority. Though less vast than the great fortresses of empires, it serves as a powerful center of regional control and dynastic legitimacy. From its heights, loyal retainers guard the surrounding lands, while its halls preserve the lineage and ambition of its rulers. The castle inspires unity among subjects and strengthens the influence of its noble house."
 rock_of_gibraltar: "the Rock of Gibraltar"
 rock_of_gibraltar_desc: "Towering above the narrow strait that binds the Mediterranean Sea to the Atlantic Ocean, the Rock of Gibraltar stands as a natural fortress of immense strategic value. Its steep cliffs and commanding height allow its holders to watch and control the passage of ships between continents. Fortified with artillery and guarded by a vigilant garrison, it serves as both shield and gatekeeper of maritime trade. Whoever commands the Rock holds sway over one of the world’s most vital chokepoints."