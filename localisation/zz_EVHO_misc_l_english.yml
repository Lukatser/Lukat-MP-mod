cb_total_war_of_annexation:0 "Decisive War of Annexation"
cb_total_war_of_annexation_desc:0 "Out of some kind of joint desperation to achieve their goals, two states engage in a deadly struggle, and if victory is acheived for one side, the other will likely become merely a page on someone else's history book."
mutual_annexation_war_superiority:0 "Show Superiority"
mutual_annexation_war_superiority_desc:0 "Demonstrating our military superiority over our enemies will ensure we can enforce our will at the negotiation table."
TOTAL_WAR_NAME:0 "$ORDER$$FIRST$-$SECOND$ Decisive War"

cb_crush_rebellion:0 "Crush Rebellion"
cb_crush_rebellion_desc:0 "This territory is rightfully ours, and those who claim the land is rightfully theirs instead or rightfully belongs to the people who live on it are deluded. We will put an end this rebellion in one swift stroke!"
crush_rebellion_superiority:0 "Show Superiority"
crush_rebellion_superiority_desc:0 "Demonstrating our military superiority over our enemies will ensure we can enforce our will at the negotiation table."
CRUSH_REBELLION_NAME:0 "$ORDER$$FIRST$ attempt to crush $SECOND$ Rebellion"

cb_cut_down_to_size:0 "Cut Down to Size"
cb_cut_down_to_size_desc:0 "Our enemy only seems to grow in power as of late. We must crush this growing threat while it is still within our power to do so!"
superiority_cut_down_to_size:0 "Show Superiority"
superiority_cut_down_to_size_desc:0 "Demonstrating our military superiority over our enemies will ensure we can enforce our will at the negotiation table."
CUT_DOWN_TO_SIZE_NAME:0 "$ORDER$$FIRST$ Attempt to Cut $SECOND$ Down to Size"


the_anarchy_disaster:0 "The Great Anarchy"
desc_the_anarchy_disaster:0 "At last, the golden age of Mughal rule in India has come to an end. The authority of the emperor outside of the gates of Delhi is rapidly waning, seeing the rise of new powers in the vacuum left beind."
had_disaster_for_ten_years:0 "Had disaster for at least 10 years."

indian_rebellion_disaster:0 "Indian Rebellion"
desc_indian_rebellion_disaster:0 "Tensions between the native Indians and Company authorities have reached boiling point. Beginning as just a minor Seopy mutiny in the north of the country, this rebellion will soon spread and become a serious threat to British rule in the subcontinent."

