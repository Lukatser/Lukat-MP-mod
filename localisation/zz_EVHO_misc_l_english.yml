 estate_nobles_evho_placate_local_religious_seperatists:0 "Placate Regional Religious Seperatism"
 estate_nobles_evho_placate_local_religious_seperatists_desc:0 "There are regions whose faiths are so ingrained in their culture and are so distinct from our own ways that the local nobility will never be satisfied under your rule while there is a chance you may at any time enforce your ways upon them. By granting them a degree of autonomy in their religious practices we can ensure they do not give us any unecessary headaches."
 estate_nobles_evho_placate_local_religious_seperatists_effect_tooltip:0 "Every owned province with the modifier §YReligious Seperatism§!:\nLocal Missionary Strength: §R-100%§!\nLocal Religious Unity Contribution: §G-100%§!\n§GRemove Modifier§! §YReligious Seperatism§!"
 estate_nobles_evho_placate_local_religious_seperatists_revoke_effect_tooltip:0 "The modifier '§YLocal Religious Seperatists Placated§!' is removed from any owned province that has it. Adds §YReligious Seperatism§! to these provinces."
 estate_nobles_evho_placated_religious_seperatists_mod:0 "Placated Religious Seperatism"
 desc_estate_nobles_evho_placated_religious_seperatists_mod:0 "This state has granted local autonomy in matters of faith on account of its traditional religion being diametrically opposed to that of its overlord."
 estate_church_evho_right_to_inquisition_in_seperatist_regions:0 "Grant Inquisition Rights in Seperatist Regions"
 estate_church_evho_right_to_inquisition_in_seperatist_regions_desc:0 "There are regions whose faiths are so ingrained in their culture and are so distinct from our own ways that the local nobility will never be satisfied under your rule while there is a chance you may at any time enforce your ways upon them. By granting the Church the right to militarize the faith in these regions, we may be able to root out this heathen nobility, and replace them with those of the true faith."
 estate_church_evho_right_to_inquisition_in_seperatist_regions_effect_tooltip:0 "Every owned province with the modifier §YReligious Seperatism§!:\nLocal Missionary Strength: §G+0.05%§!\nLocal Unrest: §R+10§!\n§GRemove Modifier§! §YReligious Seperatism§!"
 estate_church_evho_right_to_inquisition_in_seperatist_regions_revoke_effect_tooltip:0 "The modifier '§YInquisition Against Religious Seperatists§!' is removed from any owned province that has it. Adds §YReligious Seperatism§! to these provinces."
 estate_church_evho_right_to_inquisition_mod:0 "Inquisition Against Religious Seperatists"
 desc_estate_church_evho_right_to_inquisition_mod:0 "This state has been turned in part over to the hands of the Faith in order to mobilize it against the resident heathen nobility."
