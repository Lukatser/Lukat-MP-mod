 #Decisions
 make_washington_capital_title:0 "Move Capital to Washington"
 make_washington_capital_desc:0 "On July 9, 1790, Congress passed the Residence Act, which approved the creation of a national capital on the Potomac River. The exact location was to be selected by President George Washington, who signed the bill into law on July 16. Formed from land donated by the states of Maryland and Virginia, the initial shape of the federal district was a square measuring 10 miles (16 km) on each side, totaling 100 square miles (259 km2)."
 call_overlord_into_war_title:0 "Call the mother country into a conflict"
 call_overlord_into_war_desc:0 ""
 make_turku_capital_title:0 "Expansion of Turku"
 make_turku_capital_desc:0 "During the Middle Ages, Turku was the seat of the Bishop of Turku (a title later upgraded to Archbishop of Turku), covering then the eastern half of the Kingdom of Sweden (most of the present-day Finland) until the 17th century. Even if Turku had no official capital status, both the short-lived institutions of Dukes and Governors-General of Finland usually had their Finnish residences there."
 make_helsinki_capital_title:0 "A New Finnish Capital, Helsinki"
 make_helsinki_capital_desc:0 "Emperor Alexander I of Russia moved the Finnish capital from Turku to Helsinki on 8 April 1812 to reduce Swedish influence in Finland, and to bring the capital closer to Saint Petersburg."
 join_coalition_war_against_succession_crisis_title:0 "Join the Great War of Succession"
 join_coalition_war_against_succession_crisis_desc:0 "There is a war in Europe among the great powers currently at play to end a personal union between two nations whose might apart is each a force to be reckoned with, but who have now joined in a Permanent Alliance. To the other great powers of the continent this is an existential threat, and must be countered with all available force."
 join_great_northern_war_title:0 "Join the Great Northern War"
 join_major_war_defending_against_revolutionary_title:0 "Join in Defense against the Revolution"
 join_major_war_defending_against_revolutionary_desc:0 "A nation in Europe is threatened by Revolutionary forces, and as a Great Power it is our duty to defend against this threat to Tradition and Monarchy."
 german_truce_join_war_against_revolutionary_title:0 "Break the Truce with the Revolutionary"
 german_truce_join_war_against_revolutionary_desc:0 "We were forced into a treaty preventing us from attacking the Leader of the Revolution some time ago, and for a time we felt it best to adhere to this treaty. Now, however, seems to be a good time to strike a crushing blow against them!"
 join_coalition_war_against_revolutionary_title:0 "Join the Coalition"
 join_coalition_war_against_revolutionary_desc:0 "There is a Coalition formed in Europe of Great Powers attempting to put an end to the Revolution once and for all. It is in our interest to join them!"
 join_coalition_war_against_revolutionary_permanent_allies_title:0 "Betray the Revolutionary "Ally""
 join_coalition_war_against_revolutionary_permanent_allies_desc:0 "The Revolutionary Government forced us into a treaty that made us allies of their regime essencially against our will, to prevent us from joining any more coalitions against them. However, a power who remained at war with the Revolutionary seems to have struck them a killing blow, and if all the powers of Europe band together, we may be able to finally destroy them!"

