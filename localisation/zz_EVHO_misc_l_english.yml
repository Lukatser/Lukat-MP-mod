cnt_maratha_forts:0 "Maratha Forts"
cnt_maratha_forts_desc:0 "The lands of the Carnatic contain many former Maratha fortifications, which we can use for our own defence should a foreign power invade our core territories."
cnt_coromandel_trade:0 "Harness the Coromandel Trades"
cnt_coromandel_trade_desc:0 "The Coromandel is a rich coastal region of India famous for its lucrative trades from all across the known world. Let us use our position on this coast to levy tariffs on goods and secure part of this wealth for ourselves."
cnt_resist_succession:0 "Securing the Succession"
cnt_resist_succession_desc:0 "Disputes over succession are always troubling, but they are especially so when neighbouring powers are eying your land and will use even the slightest unrest in your country to annex it. We must remain vigilent and ensure we never lack an heir."
cnt_defend_against_europe:0 "Resist European Hegemony"
cnt_defend_against_europe_desc:0 "Both the British and the French would like a piece, if not all, of our Sultanate. Invasion is inevitable, so we must prepare our troops to fight for their families and homeland."
cnt_princely_state:0 "A Princely State"
cnt_princely_state_desc:0 "Eventually the Sultanate of the Carnatic would end up as a Princely State under the British East India Company. We can use this position to secure extra privileges from our worried masters, constantly threatened by a pan-Indian revolt."
cnt_merchant_trades:0 "The Merchant Trades"
cnt_merchant_trades_desc:0 "Many merchants from across the world visit our shores to make commerce and profit. An investment in a proper merchant navy would serve to protect these visitors from the pirates who plague the Bay of Bengal."
cnt_diverse_rule:0 "Diverse Rule"
cnt_diverse_rule_desc:0 "Southern India, like elsewhere on the subcontinent, is very diverse and difficult for a culturally isolationist state to rule. We must be open to all of our subjects if we wish to stay masters of this region."

eic_benefits_tooltip:0 "The §YHonorable East India Company§! has its own unique §Yideas§!, §Ymissions§!, and abilities that may aid §Y[Root.GetName]§! in conquering India much faster than usual."
never_eic_again_tooltip:0 "Go back.\n§YThe Company can be created at a later date through the decision.§!"
eic_hindusthan_and_bengal_farmlands_province_gets_dev_cost_tooltip:0 "Every owned farmlands province in the §YHindusthan§! and §YBengal§! regions gets §G-15.0%§! local development cost and §G-10.0%§! local construction cost until the end of the game."
eic_every_burma_province_gets_production_tooltip:0 "Every owned province in the §YBurma§! region gains §G+1§! base production."
eic_has_defeated_indian_rebellion_or_no_separatism_tooltip:0 "Either:\n - Has defeated the §YIndian Rebellion§!.\n - Own 200 provinces in the §YIndia§! superregion with no separatism."
eic_may_open_factories_in_foreign_provinces_tooltip:0 "Enables the opening of §YFactories§! in other nations' provinces, increasing your own trade power in their nodes and their income."
eic_has_overthrown_us:0 "Current ruler was installed militarily by §Y[Root.GetName]§!."
eic_10_reasons_for_doctrine_of_lapse_tooltip:0 "Gain §G+10§! reasons to accept §YDoctrine of Lapse§!."
