establish_factory_action_title:0 "Establish Factory"
establish_factory_action_desc:0 "Send out envoys to attempt to garner permission to establish a factory in their country. If they accept, their capital gains production and trade bonuses and their overall trade efficiency increases, and we get §G+25§! trade power in their home node."
establish_factory_action_tooltip:0 "Send out envoys to attempt to garner permission to establish a factory in their country."
establish_factory_action_dialog:0 "§Y[Root.GetName]§! wishes to establish a Factory in our capital city.\nIf we accept, §Y[From.Capital.GetName] gets §G+25.0%§! local goods produced modifier, §G+25.0%§! local production efficiency, §G+2§! provincial trade power and §R+2.00§! local unrest, and §Y[Root.GetName]§! receives §G+5.0%§! trade efficiency until the Factory is closed. In return, they get §Y+25§! trade power in our home trade node.\n\nDo we accept this deal?"
