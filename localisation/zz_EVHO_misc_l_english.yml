 end_core_eyalet_autonomy_evho_dipact_desc:1 "Inform the Governor of §Y[From.GetName]§! that the autonomy of his administrative region is at an end. They will either accept their lower status and the region will be §YIntegrated§! into the Empire, or he will rebel, his administration will be crushed, and we will be free to annex their lands in the resulting war."
