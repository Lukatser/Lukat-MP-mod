 evholeaders.1.t:0 "A Clear Favorite for the Succession"
 evholeaders.1.d:0 "Sultan, among your many children, one simply stands out above the rest. He is rapidly making friends in court. Despite his quiet demeanor and thin frame he shows a keen mind for both war and administration. Declare him your heir?"
 evholeaders.1.a:0 "Seems to be the obvious choice"
 evholeaders.1.b:0 "I shall pick another, one more worthy."
 evholeaders.2.t:0 "Reign of Süleyman the Magnificent"
 evholeaders.2.d:0 "Known as Süleyman the Magnificent but also, especially among Muslims, as Süleyman the Just and Süleyman the Lawgiver, Ottoman power reached its zenith and became a world power under his rule. His rule represented one of the most just and orderly periods of Ottoman history. Like most rulers of the time, he was on the one hand ruthless in dealing with those he regarded as a threat to his own plans for success, but on the other hand, unlike many, he had a profound concern for justice. He codified the law to guard against corruption, which he was determined to root out. Many Muslims regard him as an example of the ideal or model ruler. Although the empire continued to expand for a century after his death, this period was followed by a very long decline mainly due to his successors' indifference toward good governance. On the borders of his empire, territorial expansion and hostility with competing powers meant that life was unstable, but for many within the empire, including minorities, the reality was a Pax Ottomanica. Süleyman can properly be regarded as one of history's more humane rulers who had a dual sense of obligation and responsibility to God and to society."
 evholeaders.2.a:0 "Alhamdulillah!"
 evholeaders.3.t:0 "An Heir"
 evholeaders.3.d:0 "You look upon this child, and ponder that he should rule one day. You know not why, but you are sure that this child will be destined for great things should he remain at your side."
 evholeaders.3.a:0 "Clearly he shall rule on after I."
 evholeaders.3.b:0 "No, I must name another."
 evholeaders.4.t:0 "Charles V's Union with [charles_v_secondary_title_tag.GetName]"
 evholeaders.4.d:0 "Our marital and diplomatic efforts seem to have paid us back in kind, our new king has been rewarded with a grand and powerful new holding, the Kingdom of [charles_v_secondary_title_tag.GetName]."
 evholeaders.4.a:0 "Glory to our house."
 evholeaders.5.t:0 "[charles_v_secondary_title_tag.GetAdjective] Lands Lost"
 evholeaders.5.d:0 "Following the end of the rule of Charles V, Our king no longer personally holds the kingdom in [charles_v_secondary_title_tag.GetName]. Our kin shall rule on in his stead."
 evholeaders.5.a:0 "Good things do not last."
 evholeaders.7.t:0 "Louis the Great, the Sun King"
 evholeaders.7.d:0 "Sun King, French Louis le Grand, Louis le Grand Monarque, or le Roi Soleil, (born September 5, 1638, Saint-Germain-en-Laye, France—died September 1, 1715, Versailles, France), king of France (1643–1715) who ruled his country, principally from his great palace at Versailles, during one of its most brilliant periods and who remains the symbol of absolute monarchy of the classical age. Internationally, in a series of wars between 1667 and 1697, he extended France’s eastern borders at the expense of the Habsburgs and then, in the War of the Spanish Succession (1701–14), engaged a hostile European coalition in order to secure the Spanish throne for his grandson."
 evholeaders.7.a:0 "Glory to the King."
 evholeaders.8.t:0 "Vasa Petitions for the Crown"
 evholeaders.8.d:0 "A powerful noble who was instrumental in gaining us independence from the Danish yolk has petitioned his fellow nobility in Sweden for the crown and has enough support to warrant his coronation to the new title. Should we take on this new lord and dynasty?"
 evholeaders.8.a:0 "But of course!"
 evholeaders.8.b:0 "No, our current lord shall reign on"
 evholeaders.10.t:0 "Reign of Ivan the Terrible"
 evholeaders.10.d:0 "Ivan the Terrible, Russian Ivan Grozny, byname of Ivan Vasilyevich, also called Ivan IV, grand prince of Moscow and the first to be proclaimed tsar of Russia. His reign saw the completion of the construction of a centrally administered Russian state and the creation of an empire that included non-Slav states. Ivan engaged in prolonged and largely unsuccessful wars against Sweden and Poland, and, in seeking to impose military discipline and a centralized administration, he instituted a reign of terror against the hereditary nobility. In 1581, Ivan beat his pregnant daughter-in-law, Yelena Sheremeteva, for wearing immodest clothing, which may have caused a miscarriage. His second son, also named Ivan, upon learning of that, engaged in a heated argument with his father, which resulted in Ivan striking his son in the head with his pointed staff and fatally wounding him."
 evholeaders.10.a:0 "Send in the Oprichnina!"
 evholeaders.12.t:0 "King Henry's Fickle Heart"
 evholeaders.12.d:0 "In common parlance, the wives of Henry VIII were the six queens consort wedded to Henry between 1509 and his death in 1547. In legal terms, King Henry VIII of England had only three wives, because three of his marriages were annulled by the Church of England. However, he was never granted an annulment by the Pope, as he desired, for Catherine of Aragon, his first wife. Annulments declare that a true marriage never took place, unlike a divorce, in which a married couple end their union. Along with his six wives, Henry took several mistresses."
 evholeaders.12.a:0 "A male heir perchance?"
 evholeaders.13.t:0 "A Female Heir"
 evholeaders.13.d:0 "Sire, your consort has born of your loins a child who will one day rule your realm. The child is female."
 evholeaders.13.a:0 "Why am I forsaken so..."
 evholeaders.14.t:0 "Reign of Bloody Mary"
 evholeaders.14.d:0 "Mary I (18 February 1516 – 17 November 1558), also known as Mary Tudor, and as "Bloody Mary" by her Protestant opponents, was Queen of England and Ireland from July 1553 until her death in 1558. She is best known for her vigorous attempt to reverse the English Reformation, which had begun during the reign of her father, Henry VIII. Her attempt to restore to the Church the property confiscated in the previous two reigns was largely thwarted by Parliament, but during her five-year reign, Mary had over 280 religious dissenters burned at the stake in the Marian persecutions."
 evholeaders.14.a:0 "Long Live the Queen."
 evholeaders.16.t:0 "Mission to End English Heresy"
 evholeaders.16.d:0 "By the grace of God and well placed dynastic policies on our part the family of your lord managed to, for a time, be the non-sovereign King of England, which despite its flirtations with heretical thought and seperation from the papacy was well on its way to once again being a paragon of Catholicism. Now, however, it is well and truly a Protestant cesspool. It's false Lords and Ladies sit upon thrones of lies in holdings which find their legitimacy in the words and actions of heretics. We must liberate England from its squalor."
 evholeaders.16.a:0 "Prepare the Armada!"
 evholeaders.17.t:0 "The Virgin Queen, Elizabeth"
 evholeaders.17.d:0 "Elizabeth I was Queen of England and Ireland from 17 November 1558 until her death in 1603. Sometimes called the Virgin Queen, Gloriana or Good Queen Bess, Elizabeth was the last of the five monarchs of the House of Tudor. Daughter of Henry VIII and his second wife, Anne Boleyn, she displayed precocious seriousness as a child and received the rigorous education normally reserved for male heirs. Her situation was precarious during the reigns of her half brother Edward VI and her half sister Mary I. After Sir Thomas Wyatt’s rebellion in 1554, she was imprisoned but later released. Her accession to the throne on Mary’s death was greeted with public jubilation. She assembled a core of experienced advisers, including William Cecil and Francis Walsingham, but she zealously retained her power to make final decisions. Important events of her reign included the restoration of England to Protestantism; the execution of Mary, Queen of Scots; and England’s defeat of the Spanish Armada. She lived under constant threat of conspiracies by British Catholics. Over time she became known as the Virgin Queen, wedded to her kingdom. Many important suitors came forward, and she showed signs of romantic attachment to the earl of Leicester, but she remained single, perhaps because she was unwilling to compromise her power. She had another suitor, the 2nd earl of Essex, executed in 1601 for treason. Though her later years saw an economic decline and disastrous military efforts to subdue the Irish, her reign had already seen England’s emergence as a world power and her presence had helped unify the nation against foreign enemies. Highly intelligent and strong-willed, Elizabeth inspired ardent expressions of loyalty, and her reign saw a brilliant flourishing in the arts, especially literature and music. After her death, she was succeeded by James I."
 evholeaders.17.a:0 "God Save the Queen!"
 evholeaders.19.t:0 "The Union of the Crowns"
 evholeaders.19.d:0 "The Union of the Crowns was the accession of James VI of Scotland to the throne of the Kingdom of England as James I and the consequential unification for some purposes (such as overseas diplomacy) of the two realms under a single monarch on 24 March 1603. The Union of the Crowns followed the death of James's cousin, Elizabeth I of England, the last monarch of the Tudor dynasty."
 evholeaders.19.a:0 "God Save the King."
 evholeaders.23.t:0 "Polish Election of Augustus II"
 evholeaders.23.d:0 "Following the death of Polish King John III Sobieski and having converted to Catholicism, Augustus won election as King of the Polish–Lithuanian Commonwealth in 1697 with the backing of Imperial Russia and Austria, which financed him through the banker Berend Lehmann. At the time, some questioned the legality of Augustus' elevation, since another candidate, François Louis, Prince of Conti, had received more votes. Each candidate, Conti and Augustus, was proclaimed as king by a different ecclesiastical authority: (the Primate Michaŀ Radziejowski proclaimed Conti and the bishop of Kujawy, Stanisław Dąmbski proclaimed Augustus, with Jacob Heinrich von Flemming swearing to the pacta conventa as Augustus's proxy). However, Augustus hurried to the Commonwealth with a Saxon army, while Conti stayed in France for two months."
 evholeaders.23.a:0 "How Presigious."
 evholeaders.26.t:0 "Peter the Great"
 evholeaders.26.d:0 "Peter the Great was a Russian czar in the late 17th century who is best known for his extensive reforms in an attempt to establish Russia as a great nation. He created a strong navy, reorganized his army according to Western standards, secularized schools, administered greater control over the reactionary Orthodox Church and introduced new administrative and territorial divisions of the country. Peter focused on the development of science and recruited several experts to educate his people about technological advancements. He concentrated on developing commerce and industry and created a gentrified bourgeoisie population. Mirroring Western culture, he modernized the Russian alphabet, introduced the Julian calendar and established the first Russian newspaper. Peter acquired territory in Estonia, Latvia and Finland; and through several wars with Turkey in the south, he secured access to the Black Sea. In 1709, he defeated the Swedish army by purposely directing their troops to the city of Poltava, in the midst of an unbearable Russian winter. In 1712, Peter established the city of St. Petersburg on the Neva River and moved the capital there from its former location in Moscow. Shortly after, St. Petersburg was deemed Russia's "window to Europe.""
 evholeaders.26.a:0 "Hail, Emperor of all the Russias!"
 evholeaders.277.t:0 "The Gottorp Fury"
 evholeaders.277.d:0 "The young prince was like his father in many ways. He had the same untiring energy, the same stubborn will. He was also impatient with the niceties of diplomacy and preferred direct talk and action to courtly innuendoes. His father's hopes that the boy would be eased into the duties of kingship were thwarted on April 5, 1697, by Charles XI's death. Before the end of the year he was crowned, and the adolescent prematurely became the man. The first few years of Charles's reign were remarkable for their levity. The teenaged king enjoyed culture, parties, food, drink, and hunting—and often mixed all of these in flights of decadence. Together with a following of young people, in the summer of 1698 the King and his friend the Duke of Holstein-Gottorp galloped through Stockholm, yanking hats and wigs off people's heads. They threw out furniture from the palace windows and cherry pits at the king's ministers. Popular discontentment grew with the king's and duke's excesses. One Sunday three pastors in Stockholm churches held sermons with the theme "Woe thee, o land, when thy king is a child".  During one drunken night a bear was killed when it fell through a window to the palace yard after having been forced to drink wine. Charles was quite drunk, and after this incident vowed never to drink strong alcohol again. He famously kept the vow, with a few exceptions, to the end of his days."
 evholeaders.277.a:0 "Let's pray the other powers don't think any less of us..."
 evholeaders.28.t:0 "Charles the Victorious"
 evholeaders.28.d:0 "Charles XII of Sweden was the king of Sweden from 1697 to 1718. He was the second child and the first son of Charles XI of Sweden and Ulrika Eleonora of Denmark. Charles XII spent his childhood amidst luxury. As a child, he was a keen observer of the political and military matters of his kingdom, while preparing to rule the kingdom someday. His father passed away in 1697. Hence, Charles XII inherited the throne of Sweden. He was 15 years old when he took charge after a 7-month rule by a caretaker government. In 1700, he faced his first big challenge as a king when Sweden was attacked by three neighborhood kingdoms, who wished to take advantage of a weakened country and a young and inexperienced king. The war that resulted was known as the Great Northern War. However, Charles exhibited great military prowess and emerged victorious in several battles despite his forces being severely outnumbered. He claimed victory for his Empire in the name of Sweden and God, and survived to see the end of the war, despite leading it personally and nearly being killed on the battlefield on several occasions. He was hailed by the historians as a great military commander and an able politician."
 evholeaders.28.a:0 "March home, Karolinen!"
 evholeaders.29.t:0 "George I von Hanover"
 evholeaders.29.d:0 "Born in Hanover to Ernest Augustus and Sophia of Hanover, George inherited the titles and lands of the Duchy of Brunswick-Lüneburg from his father and uncles. A succession of European wars expanded his German domains during his lifetime; he was ratified as prince-elector of Hanover in 1708. After the deaths in 1714 of his mother, and his second cousin Anne, Queen of Great Britain, George ascended the British throne as Anne's closest living Protestant relative under the Act of Settlement 1701. Jacobites attempted, but failed, to depose George and replace him with James Francis Edward Stuart, Anne's Catholic half-brother."
 evholeaders.29.a:0 "Long Live the King."
 evholeaders.31.t:0 "Frederick the Great"
 evholeaders.31.d:0 "Frederick II also known as 'Frederick the Great' was a powerful and influential King of Prussia whose reign witnessed several military victories expanding the territories of Prussia. 'Der Alte Fritz' (meaning 'Old Fritz') as often called by the people of Prussia, he was successful in reorganizing the Prussian army. His leadership not only made Prussia a prominent military power but also one of the greatest states in Europe. He succeeded in the ‘Seven Years’ War’ overcoming great odds. An advocate of enlightened absolutism, he reformed the civil, bureaucratic and judicial system and pursued different religious policies in Prussia though remained prejudiced about the Jews. His reign saw appointments of senior bureaucrats and judges even if they were not of noble origin. He claimed several territories of Poland during the ‘First Partition of Poland’. He remained an icon for the Nazis who glorified him as a great German leader pre-Hitler. He was a great patron of art and architecture but also imposed laws to censor the press. His reign saw construction of several buildings including Berlin State Opera and the palace of Sanssouci among others. A great music lover, he could play the transverse flute and composed several sonatas and symphonies. As he was issueless, his nephew Frederick William II succeeded him."
 evholeaders.31.a:0 "Vivat Victoria!"
 evholeaders.32001.t:0 "Ascencion of [Root.Monarch.GetName]"
 evholeaders.32001.d:0 "The succession of the Tsar to the throne went forward without scandal, as did his marriage to the daughter of minor nobility in Germany, who has learnt Russian and converted to the true faith."
 evholeaders.32001.a:0 "God, Save the Tsar!"
 evholeaders.33.t:0 "Reign of Peter III"
 evholeaders.33.d:0 "Peter, who was mentally feeble and extremely pro-Prussian, not only alienated the affections of his wife soon after their marriage but also failed to gain the favour of politically powerful court cliques. His popularity diminished further after he succeeded Elizabeth and, reversing her foreign policy, made peace with Prussia and withdrew from the Seven Years’ War (1756–63), formed an alliance with Prussia, and prepared to engage Russia in a war against Denmark to help his native Holstein gain control of Schleswig. Even when he relieved the gentry of their obligation to serve the state (March 1, 1762), he did not gain supporters. When he offended the Russian Orthodox Church by trying to force it to adopt Lutheran religious practices and also alienated the imperial guards by making their service requirements more severe and threatening to disband them, Catherine, who suspected that he was planning to divorce her, conspired with her lover Grigory Grigoryevich Orlov and other members of the guard to overthrow him."
 evholeaders.33.a:0 "God Save the Tsar?"
 evholeaders.34.t:0 "Overthrow of Tsar Peter"
 evholeaders.34.d:0 "Peter was officially overthrown on June 28, 1762 when Catherine and Orlov mounted a coup, leading 14,000 soldiers on horseback to the Winter Palace and forcing Peter to sign abdication paperwork. He was immediately jailed. What is known is that Peter died shortly after being overthrown and jailed, around July 17, 1762. It's widely believed that he was assassinated behind bars, and that Alexei Orlov, Grigory's brother, was the killer. What remains most unclear is whether Catherine herself was aware of any assassination plot–or indeed whether she ordered it–there's even some evidence that Peter committed suicide. But across Europe, Catherine was generally blamed nonetheless."
 evholeaders.34.a:0 "Good Riddance!"
 evholeaders.35.t:0 "Catherine the Great"
 evholeaders.35.d:0 "During Catherine the Great’s reign, Russia was expanding rapidly due to both diplomacy and conquest; as a result of this expansion, Russian borders spread as far as the Black Sea and Central Europe. Catherine the Great strongly supported both modernization and westernization, an endeavor started by her husband prior to his death. Catherine was also a great proponent of the Enlightenment in Europe, and she promoted the education of Russian citizens. As Catherine aged, she became more conservative in her rule. She continued to rely heavily on the nobility, however, and initiated reforms that would give the nobility more power and control of their lands and the serfs that worked them. As a result, a number of rebellions by serfs occurred during this time period, but the end result was further restrictions on the rights of the serfs and a more diminished status. After her death, her son, Paul, took the throne."
 evholeaders.35.a:0 "Slavnaya Tsaritsa!"
 evholeaders.36.t:0 "George Washington"
 evholeaders.36.d:0 "George Washington (1732-99) was commander in chief of the Continental Army during the American Revolutionary War (1775-83) and served two terms as the first U.S. president, from 1789 to 1797. The son of a prosperous planter, Washington was raised in colonial Virginia. As a young man, he worked as a surveyor then fought in the French and Indian War (1754-63). During the American Revolution, he led the colonial forces to victory over the British and became a national hero. In 1787, he was elected president of the convention that wrote the U.S. Constitution. Two years later, Washington became America’s first president. Realizing that the way he handled the job would impact how future presidents approached the position, he handed down a legacy of strength, integrity and national purpose. Less than three years after leaving office, he died at his Virginia plantation, Mount Vernon, at age 67."
 evholeaders.36.a:0 "Truly, the Greatest Character of the age!"
 evholeaders.39.t:0 "Caliph Selim the Stern"
 evholeaders.39.d:0 "Selim I, also known as Selim the Grim or Selim the Resolute, was the Sultan of the Ottoman Empire from 1512 to 1520. Selim's conquest of the Middle Eastern heartlands of the Muslim world, and particularly his assumption of the role of guardian of the pilgrimage routes to Mecca and Medina, established the Ottoman Empire as the pre-eminent Muslim state. His conquests dramatically shifted the empire's geographical and cultural center of gravity away from the Balkans and toward the Middle East. By the eighteenth century, Selim's conquest of the Mamluk Sultanate had come to be romanticized as the moment when the Ottomans seized leadership over the rest of the Muslim world, and consequently Selim is popularly remembered as the first legitimate Ottoman Caliph, although stories of an official transfer of the caliphal office from the Mamluk Abbasid dynasty to the Ottomans were a later invention."
 evholeaders.39.a:0 "Alhamdulillah!"