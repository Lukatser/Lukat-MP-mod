 flavor_rh.10063.RHtit:0 "The Anschluss of Austria"
 flavor_rh.10063.RHdesc:0 "Austria has lost its wars and is fairly weak compared to the almighty German empire. Our troops have marched and occupied Austria in peace while crowds cheered them on. Austria is finally part of the Empire."
 flavor_rh.10063.RHans1:0 "Wünderbar"
 
