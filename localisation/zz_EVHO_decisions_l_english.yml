l_english:
 anglo_french_nation_eng_title:0 "Form the Dual Monarchy"
 anglo_french_nation_eng_desc:0 "At the conculsion of the Hundred Years War and with France in English control, the lords put a proposition to unite the crowns of the two historic nations."
 anglo_french_nation_fra_title:0 "Form the Dual Monarchy"
 anglo_french_nation_fra_desc:0 "At the conculsion of the Hundred Years War and with French expansion into the British Isles, a decision was made to unite the two great nations into one union."
 anglo_french_nation_eng_diplomatically_title:0 "Form the Dual Monarchy Diplomatically"
 anglo_french_nation_eng_diplomatically_desc:0 "At the conculsion of the Hundred Years War and with the French Kingdom firmly under English grasp, the lords put a proposition to unite the crowns of the two historic nations."
 anglo_french_nation_fra_diplomatically_title:0 "Form the Dual Monarchy Diplomatically"
 anglo_french_nation_fra_diplomatically_desc:0 "At the conculsion of the Hundred Years War and with the English Kingdom firmly under French grasp, the lords put a proposition to unite the crowns of the two historic nations."

 proclaim_an_empire_title:0 "Proclaim an Empire"
 proclaim_an_empire_desc:0 "The power of our state grants us the right to proclaim ourselves to be an Empire, equal in rank the the Holy Roman or Roman of Antiquity."

 cb_purge_traitors:0 "Purge traitors"
 cb_purge_traitors_desc:0 "The traitors of the Revolution must be purged!"

 act_of_union_title:0 "Act of Union"
 act_of_union_desc:0 "With Ireland under our control, it would be best to unite the crowns of Ireland and Great Britain so that the entire British isles are under one crown."

 benelux_nation_title:0 "Form Leo Belgicus"
 benelux_nation_desc:0 "To become a global power we must reunite the Dutch, Frisian, Flemish and Walloons and work together for victory!"
 
 belgium_nation_title:0 "Form Belgium"
 belgium_nation_desc:0 "Eendracht maakt macht! L'union fait la force! The Flemish and Walloons have to unite to stand a chance against future threats and enemies."
 
 iberian_nation_title:0 "Form Iberia"
 iberian_nation_desc:0 "Iberia united will dominate the world trade thus it is in our interest to form this mighty nation to sustain world domination for as long as possible."
 
 bolivia_nation_title:0 "Form Bolivian Nation"
 bolivia_nation_desc:0 "The time has come to shake off the last remains of our colonial past. We must form a proper nation and solidify our claims to this region."
 
 ecuador_nation_title:0 "Form Ecuadorian Nation"
 ecuador_nation_desc:0 "The time has come to shake off the last remains of our colonial past. We must form a proper nation and solidify our claims to this region."
 
 uss_nation_title:0 "Form United States of South America Nation"
 uss_nation_desc:0 "The dream of a united South America has been present ever since the Latin American independence movement. We should be the ones united South America."
 
 yugoslavian_nation_title:0 "Form Illyroslavia"
 yugoslavian_nation_desc:0 "The South Slavs of the Kingdom known since before Roman times as Illyria shall unite into a new Great Kingdom!"

 belarus_nation_title:0 "Form White Ruthenia"
 belarus_nation_desc:0 "The north of Old Ruthenia, also known as White Ruthenia, must unite and form a nation that is built around the identity of the region and its people."
 
 north_german_nation_title:0 "Form North German Confederation"
 north_german_nation_desc:0 "We should secure a home for the german people, forming a strong conderation would be a good decision to this idea."
 
 south_german_nation_title:0 "Form South German Confederation"
 south_german_nation_desc:0 "We should secure a home for the german people, forming a strong conderation would be a good decision to this idea."
 
 toggle_colonial_restrictions_on_title:0 "Toggle Settler Restrictions On"
 toggle_colonial_restrictions_on_desc:0 "Turn on the settler restrictions for §Y$COUNTRY$§!. §GThis restores the settings to default.§! §RNOTE: This decision will disappear after 1500.§!"
 
 toggle_colonial_restrictions_off_title:0 "Toggle Settler Restrictions Off"
 toggle_colonial_restrictions_off_desc:0 "Turn off the settler restrictions for §Y$COUNTRY$§!. Helpful whenever you want to rule as an ahistorical colonial empire but you want the AI to stay historical. §RNOTE: This decision will disappear after 1500 and does not affect the age restrictions.§!"
 
 toggle_expel_restrictions_off_title:0 "Toggle Expel Minorities for AI Restrictions Off"
 toggle_expel_restrictions_off_desc:0 "Turn off the expel minorities restrictions for AI. Helpful whenever you want to AI to be more ahistorical. §RNOTE: This decision will disappear after 1500.§!"
 
 toggle_expel_restrictions_on_title:0 "Toggle Expel Minorities for AI Restrictions On"
 toggle_expel_restrictions_on_desc:0 "Turn on the expel minorities restrictions for AI. §GThis restores the settings to default.§! §RNOTE: This decision will disappear after 1500.§!"
 
 drain_amsterdam_title:0 "Impoldering of Holland"
 drain_amsterdam_desc:0 "Spend some money to start the impoldering of Holland which takes some years and provides us with more development and building slots."
 
 german_silesia_title:0 "Ostsiedlung of Silesia & Lusatia"
 german_silesia_desc:0 ""We shall start imposing a number of Germanization policies. Settling German speaking ethnic groups in Silesia & Lusatia will greatly benefit us in extending the German core mainland."
