 #Maharlikan Mission 1
 MHK_our_neighbors_to_the_south_title:0 "Our Neighbors to the South"
 MHK_our_neighbors_to_the_south_desc:0 "With our army build up and prepared, we can begin our invasion of our southern neighbor, The Kingdoms of Brunei and Kutai."
 MHK_java_claim_title:0 "Claim Java"
 MHK_java_claim_desc:0 "With the fall of Brunei and Kutai, we have zero contest in claiming the Javanese Islands."
 MHK_push_into_malaya_title:0 "Push into Malaya"
 MHK_push_into_malaya_desc:0 "After our successful invasion of Java, we can now easily push to the Malayan Peninsula and West Indonesia."
 MHK_solidify_rule_over_malaya_title:0 "Our Rule over Malaya"
 MHK_solidify_rule_over_malaya_desc:0 "With most, if not all of the states conquered by us, We can easily solidify our rule over Malaya and Indonesia."
 MHK_unite_sea_title:0 "Unite Southeast Asia"
 MHK_unite_sea_desc:0 "Conquest after conquest, we now rule the entire southeast of asia; A great achievement for our nation."
 MHK_discover_europe_title:0 "Europe Discovered"
 MHK_discover_europe_desc:0 "Our ships have discovered distance land filled with interesting culture, language, and traditions. We can learn from these people."
 MHK_center_of_religion_title:0 "Center of Religion"
 MHK_center_of_religion_desc:0 "Not only should we be enlightened but we should also be united through faith."
 MHK_land_of_churches_title:0 "Land of Churches"
 MHK_land_of_churches_desc:0 "We shall build churches to satisfy our people and our clergymen."
 #Maharlikan Mission 2
 MHK_gather_the_troops_title:0 "Gather the Troops"
 MHK_gather_the_troops_desc:0 "The first step in building our nation is good military. We must first make a large army."
 MHK_our_neighbors_to_the_west_title:0 "Our Neighbors to the West"
 MHK_our_neighbors_to_the_west_desc:0 "With our army build up and prepared, we can begin our invasion of our western neighbor, The Kingdoms of Champa and Dai Viet."
 MHK_into_khmer_title:0 "Into Khmer"
 MHK_into_khmer_desc:0 "With our successful invasion of the Tonkin Area, We can now prepare our push for our inland expansion on Khmer."
 MHK_siamese_expansion_title:0 "Siamese Expansion"
 MHK_siamese_expansion_desc:0 "We can push more into the Siam."
 MHK_solidify_rule_over_indo_china_title:0 "Our Rule over Indochina"
 MHK_solidify_rule_over_indo_china_desc:0 "With most, if not all of the states conquered by us, We can easily solidify our rule over Indochina."
 MHK_border_the_mongols_title:0 "Border the Mongols"
 MHK_border_the_mongols_desc:0 "As the current dynasty is now in shambles, we can try and subjugate the Mongol Hordes in the north."
 MHK_papuan_control_title:0 "Papuan Control"
 MHK_papuan_control_desc:0 "Our Control on the islands of Papua can help us colonize nearby islands."
 MHK_colony_in_oceania_title:0 "Colony in Oceania"
 MHK_colony_in_oceania_desc:0 "Our Colonies in Oceania helps us administrate longer distant colonies."
 MHK_develop_luzon_title:0 "Develop Luzon"
 MHK_develop_luzon_desc:0 "As we develop our capital, we shall also develop the nearby cities. We can alleviate the cost by asking the people to help at the cost of tax cuts."
 MHK_center_of_culture_title:0 "Center of Culture"
 MHK_center_of_culture_desc:0 "Not only should we be enlightened but we should also understand the nations surrounding us."
 #Maharlikan Mission 3
 MHK_land_in_canton_title:0 "Land In Canton"
 MHK_land_in_canton_desc:0 "Our successful colonization of Taiwan pave the way for a land invasion into China."
 MHK_inland_expansion_title:0 "Inland Expansion"
 MHK_inland_expansion_desc:0 "After Successful Sieges in Canton, we can push even further inward."
 MHK_long_march_title:0 "The Long March North"
 MHK_long_march_desc:0 "The capital of China, Beijing, is north of from our control. We can make the march north while conquering the surrounding provinces."
 MHK_claim_the_mandate_title:0 "Claim the Mandate"
 MHK_claim_the_mandate_desc:0 "With China in our control we can claim their Mandate as the new Emperor of China."
 MHK_eastern_asian_hegemon_title:0 "Oriental Hegemon"
 MHK_eastern_asian_hegemon_desc:0 "With the Power in Asia Centralized in our hands, we can claim victorious in our conquest."
 MHK_maharlikan_explorers_title:0 "$COUNTRY$ Explorers"
 MHK_maharlikan_explorers_desc:0 "With the newly formed Nation of ours, there are possibilties of an eastern expansion. We should allocate some resource into this matter."
 MHK_colonial_ventures_title:0 "Colonial Ventures"
 MHK_colonial_ventures_desc:0 "Our colonies in the pacific have proven fruitful and successful. Receive extra benefits from them."
 MHK_south_of_new_maharlika_title:0 "South of New $COUNTRY$"
 MHK_south_of_new_maharlika_desc:0 "The bountiful land in the new world is yet to be discovered by our explorers. We should increase our prominence by expanding southward."
 MHK_develop_the_capital_title:0 "Develop the Capital"
 MHK_develop_the_capital_desc:0 "To become a world power, we must develop $CAPITAL_CITY$ first."
 MHK_develop_visayas_title:0 "Develop Visayas"
 MHK_develop_visayas_desc:0 "As we develop our capital, we shall also develop the nearby cities. We can alleviate the cost by asking the people to help at the cost of tax cuts."
 MHK_enlightenment_title:0 "$COUNTRY$ Enlightenment"
 MHK_enlightenment_desc:0 "Our rule should not only be absolute but also enlightened."
 MHK_center_of_trade_title:0 "Center of Trade"
 MHK_center_of_trade_desc:0 "With our rule becoming more prominent in asia, so is our trade with outsiders."
 MHK_global_dominance_title:0 "Global Dominance"
 MHK_global_dominance_desc:0 "Our traders have proven worthy of their skills. We now have the most power trade in the world; More prosperous compared to the Europeans."
 #Maharlikan Mission 4
 MHK_maharlikan_navy_title:0 "$COUNTRY$ Navy"
 MHK_maharlikan_navy_desc:0 "A large navy is needed for the invasion of surrounding islands."
 MHK_foothold_in_taiwan_title:0 "Foothold in Taiwan"
 MHK_foothold_in_taiwan_desc:0 "We should invest in colonizing the island of Taiwan so we can prepare an invasion of China in the future."
 MHK_korean_annexation_title:0 "Korean Annexation"
 MHK_korean_annexation_desc:0 "After Controlling the island of Kyushu and Okinawa, We can plan an invasion of the Korean Peninsula."
 MHK_xinan_region_title:0 "Xinan Fronteir"
 MHK_xinan_region_desc:0 "With most of inland China in our hands we can expand more into the Xinan Region."
 MHK_midway_there_title:0 "Midway There"
 MHK_midway_there_desc:0 "hehe Pun..."
 MHK_new_maharlika_title:0 "New $COUNTRY$"
 MHK_new_maharlika_desc:0 "We have reached a new world. Full of Mystery and other interesting things. We should invest our time and resource in this area."
 MHK_develop_mindanao_title:0 "Develop Mindanao"
 MHK_develop_mindanao_desc:0 "As we develop our capital, we shall also develop the nearby cities. We can alleviate the cost by asking the people to help at the cost of tax cuts."
 MHK_center_of_glory_title:0 "Center of Glory"
 MHK_center_of_glory_desc:0 "Our Military is small compared to our European Counterparts, we should do something about that."
 #Maharlikan Mission 5
 MHK_claim_kyushu_title:0 "Claim Kyushu"
 MHK_claim_kyushu_desc:0 "Our successful colonization of Taiwan helps us invade the Kyushu and Okinawa."
 MHK_japanese_occupation_title:0 "Japanese Occupation"
 MHK_japanese_occupation_title:0 "We can push north to Capture Kyoto and the rule of the Shogun."
 MHK_manchu_tribes_title:0 "Manchu Tribes"
 MHK_manchu_tribes_desc:0 "With our control of Korea, we can push further to the Manchurian Region."
 MHK_cold_north_title:0 "The Cold North"
 MHK_cold_north_desc:0 "The bountiful land in the new world is yet to be discovered by our explorers. We should increase our prominence by expanding southward."
 MHK_center_of_science_title:0 "Center of Science"
 MHK_center_of_science_desc:0 "We should be revitalize our ways with research and reasoning."
 MHK_maharlikan_universities_title:0 "$COUNTRY$ Universities"
 MHK_maharlikan_universities_desc:0 "We must build universities to encourage and improve our people in research."
 
 #Philippine Mission
 PHI_expand_upward_title:0 "Expand Northward"
 PHI_expand_upward_desc:0 "After uniting our land into one nation, we should set our foreign policy. The Chinese in the north is powerful but divided. We could settle on the island near them and plan an attack."
 PHI_control_southern_china_title:0 "Control Southern China"
 PHI_control_southern_china_desc:0 "We have completed settling on the island. We must strike now and get a foothold on the chinese mainland."
 PHI_secure_southern_china_title:0 "Secure Southern China"
 PHI_secure_southern_china_desc:0 "We have successfully secured a foot hold on the mainland. We must push the chinese out and secure the region for our gain."
 PHI_march_to_the_west_title:0 "March to the West"
 PHI_march_to_the_west_desc:0 "Before marching to Beijing, we should control the western territory to prevent any suprise attack from them."
 PHI_march_to_beijing_title:0 "March to Beijing"
 PHI_march_to_beijing_desc:0 "After conquering the south and the west, marching to the capital, Beijing, should be easy. We might be able to to conquer the northern regions of Manchuria as well.
 PHI_emperor_of_china_title:0 "Emperor of China"
 PHI_emperor_of_china_desc:0 "With the successful acquisitions and integration of Northern China, Southern China, and Xinan to our realm, We can state our power and authority that we are the Emperor of China!"
 PHI_rise_of_epe_title:0 "Rise of the Eastern Pacific Empire"
 PHI_rise_of_epe_desc:0 "We have conquered, incorporated, and unified vass amount of lands from the Koreans, Japanese and Chinese in the north, to the Malay, Indonesians, and Indochinese in the west. We must rise up and proclaim the new Eastern Pacific Empire!"
 PHI_bolster_troops_title:0 "Expand the Army"
 PHI_bolster_troops_desc:0 "We have united our lands but our army is weaker compared to other nations. We must increase our forces to catch up."
 PHI_expand_to_borneo_title:0 "Expand into Borneo"
 PHI_expand_to_borneo_desc:0 "Now is the time to crush the savages in the island of Borneo. We must act swift so we can incorporate these lands into our empire."
 PHI_into_java_title:0 "Expand into Java"
 PHI_into_java_desc:0 "After completing our conquest in Borneo, we have enough strenght to further increase our reach into Java and the rest of Indonesia!"
 PHI_conquest_of_indochina_title:0 "Conquest of Indochina"
 PHI_conquest_of_indochina_desc:0 "After our successful invasion of Malaya and Indonesia, we set another foothold into contenental Asia. We can expand our way right next to the fertile lands of Indochina!"
 PHI_emperor_of_sea_title:0 "Emperor of South East Asia"
 PHI_emperor_of_sea_desc:0 "With the successful acquisitions and integration of Indonesia, Indochina, and Malaya to our realm, We can state our power and authority that we are the Emperor of South East Asia!"
 PHI_into_malaya_title:0 "Expand into Malaya"
 PHI_into_malaya_desc:0 "Malaya is a strategic point and a foothold for our army we must take action and conquer it."
 PHI_secure_malaya_title:0 "Secure Malaya"
 PHI_secure_malaya_desc:0 "We must further expand in Malaya to further increase our control in the channel and increase our foothold in Asia."
 PHI_explore_eastward_title:0 "Explore Eastward"
 PHI_explore_eastward_desc:0 "With the Eastern Oriental occupied by a variety of people and culture, we must move east hopefully finding new things other than what exist in our known world."
 PHI_new_philippines_title:0 "Bagong Pilipinas"
 PHI_new_philippines_desc:0 "With the discovery, colonization, and expansion of our men to a new world, what could we expect from this entirely new world..."
 PHI_build_ships_title:0 "Expand the Navy"
 PHI_build_ships_desc:0 "Other than the army, the navy also needs and upgrade."
 PHI_explore_mollucas_title:0 "Explore the Moluccas"
 PHI_explore_mollucas_desc:0 "The Moluccas are unknown to most people so we can expand our empire there easily."
 PHI_explore_oceania_title:0 "Explore Oceania"
 PHI_explore_oceania_desc:0 "More lands have been found and could be incorporated to our empire."
 PHI_secure_japan_title:0 "Secure Japan"
 PHI_secure_japan_desc:0 "Japan is a good strategic point when it comes to controlling trade and naval bases. We must conquer them and establish a naval supremacy in the area."
 PHI_secure_korea_title:0 "Secure Korea"
 PHI_secure_korea_desc:0 "Conquest of Korea can give us better control over the area and foothold north of asia."
 PHI_emperor_of_ea_title:0 "Emperor of East Asia"
 PHI_emperor_of_ea_desc:0 "With the successful acquisitions and integration of Japan and Korea to our realm, We can state our power and authority that we are the Emperor of East Asia!
 dom_evho_fra_louisiana_title:0 "Mississippi Company"
 dom_evho_fra_louisiana_desc:0 "We should establish a monopoly company to trade on behalf of [Root.GetName] along the Mississippi River."
 dom_fra_louisiana_colony_title:0 "Colonize Louisiana"
 dom_fra_louisiana_colony_desc:0 "Colonize Louisiana"
 dom_fra_ohio_colony_title:0 "Colonize Ohio"
 dom_fra_ohio_colony_desc:0 "Colonize Ohio"
 dom_fra_second_colonial_empire_title:0 "Defy Tordesillas"
 dom_fra_second_colonial_empire_desc:0 "Not only will our ambitions spit in the face of Spanish dominance of the Americas, but also Portuguese dominance of the maritime old world!"
 dom_fra_france_discovers_the_carribean_title:1 "Colonial Expansion"
 dom_fra_france_discovers_the_carribean_desc:1 "The glory of France demands that we are the greatest nation in Christendom. Our explorers are seeking royal patronage to go voyages of discovery in the East."
 dom_fra_india_expansion_title:0 "French East Indies"
 dom_fra_india_expansion_desc:0 "The riches of India are a tempting prize indeed. If we could establish a foothold along the coast, we could dominate trade in the region."
 dom_evho_conquer_haiti_title:0 "Unite French Antillies"
 dom_evho_conquer_haiti_desc:0 "With this foothold, we will unite the island the Spanish call Hispaniola into the French Antillies"
 dom_fra_discovers_indochina_title:0 "Discover Indochina"
 dom_fra_discovers_indochina_desc:0 "Discover Indochina"
 dom_fra_indochina_title:0 "French Indochina"
 dom_fra_indochina_desc:0 "The wealth of Indochina is all but untapped by European nations. Let us be the first to establish a presence in the region."
 dom_fra_caledonia_colony_title:0 "Colonize Caledonia & Vanuatu"
 dom_fra_caledonia_colony_desc:0 "We should expand our power and influnece in oceania by colonizing the valuable islands of Caledonia and Vanuatu."
 dom_fra_syria_colony_title:0 "Colonize Syria"
 dom_fra_syria_colony_desc:0 "Colonize Syria"
 dom_fra_mali_colony_title:0 "Invade Mali"
 dom_fra_mali_colony_desc:0 "Invade Mali"
 dom_fra_expand_mali_title:0 "Expand Occidentale Française"
 dom_fra_expand_mali_desc:0 "Expand Occidentale Française"
 dom_fra_morocco_colony_title:0 "Seize Morocco"
 dom_fra_morocco_colony_desc:0 "Seize Morocco"
 dom_fra_american_independence_title:0 "American Independence"
 dom_fra_american_independence_desc:0 "We should support the independence of colonies belonging to our rivals. We would surely benefit from a reputation as defenders of liberty."
 dom_fra_algeria_coast_title:0 "Seize Coastal Algeria"
 dom_fra_algeria_coast_desc:0 "We shall put an end to the Barbary pirates living in Algeria, who for centuries had been capturing Christians to hold as slaves, or else convert."
 dom_fra_algeria_conquest_title:0 "Expand Algeria"
 dom_fra_algeria_conquest_desc:0 "While already having control over the Algerian coast, we can take advantage over this situation and integrate the remain parts as well as civilizing the local population for our civilizing mission."
 dom_fra_madagascar_colony_title:0 "Colonize Madagascar"
 dom_fra_madagascar_colony_desc:0 "Colonize Madagascar"
 dom_fra_tunis_colony_title:0 "Conquer Tunis"
 dom_fra_tunis_colony_desc:0 "Conquer Tunis"
 dom_fra_louisiana_expansion_title:0 "Expand Louisiana"
 dom_fra_louisiana_expansion_desc:0 "Expand Louisiana"
 dom_fra_native_relations_title:0 "Trade with the Natives"
 dom_fra_native_relations_desc:0 "The battle for dominance over the Ohio fur trade cannot be won through military force alone. We must establish a trading relationship with the Native Americans living in the region to secure the interests of the [Root.GetAdjective] treasury."
 EVHO_dom_mos_rus_corner_the_dragon_title:0 "Corner the Dragon"
 EVHO_dom_mos_rus_corner_the_dragon_desc:0 "Lithuania, and by extention, Poland, have been a terror upon the Rus' and the people of Eastern Europe and the Orthodox faith for centuries. Before the holy Archangel St. Michael can finally slay this beast, he must grant us the strength to push it back from the very heart of Russia: Moskva."
 EVHO_ruled_by_mehmed_ii_tt:0 "Ruled by Mehmed Fatih"
 POR_has_owned_mallaca_for_ten_years_evho_tooltip:0 "It has been 10 years since the acquisition of Melaka"