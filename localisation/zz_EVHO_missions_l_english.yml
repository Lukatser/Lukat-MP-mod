#Column One
 swe_centralize_sweden_title:0 "Centralize Sweden"
 swe_centralize_sweden_desc:0 "Sweden has been left rather chaotic and decentralized since leaving the Kalmar Union. Centralizing our country is critical and will prove to be highly beneficial."
 swe_extensive_tax_reform_title:0 "Extensive Tax Reforms"
 swe_extensive_tax_reform_desc:0 "Taxation in Sweden has long been inefficient and widely viewed to be unfair by our peasantry class. There has been call for reforms that would improve crown revenue and also satisfy the peasantry class as it would be largely viewed as much fairer."
 swe_allotment_system_title:0 "Allotment System"
 swe_allotment_system_desc:0 "This would allow us to gain an edge on many of our European rivals. The Allotment System will allow us to quickly and efficiently raise, organize, equip and train regiments for war."
 swe_absolute_monarchy_title:0 "Swedish Absolutism"
 swe_absolute_monarchy_desc:0 "Power should belong to the monarch and not the privy council."
 swe_construct_baltic_fleet_title:0 "Construct Baltic Fleet"
 swe_construct_baltic_fleet_desc:0 "The coastline of Sweden has long been under threat by rival fleets of rivaling Baltic powers. With our independence secured, we can now construct a mighty fleet worthy of rivaling that of the Danes and Hanseatic League."
 swe_vinland_title:0 "Expedition to Vinland"
 swe_vinland_desc:0 "Sagas from the Viking age tell of explorers who sailed to the far west and found a land they named to be Vinland."
 swe_new_world_title:0 "Swedish New World"
 swe_new_world_desc:0 ""
 swe_ivory_coast_title:0 "Expedition to the Gold Coast"
 swe_ivory_coast_desc:0 "Having reaped the rewards of the successful expedition to Vinland, another expedition is being proposed for the construction of a trade port situated along the Gold Coast in Africa."
#Column Two
 swe_innovative_warfare_title:0 "Military Reforms"
 swe_innovative_warfare_desc:0 "Sweden has long relied on it's military might to survive and initiate conquests. With the recent mass adoption of Tercios, we should look to counter this with our own new army doctrine and military reforms so we can have supremacy on the battlefield."
 swe_carolean_regiments_title:0 "Carolean Regiments"
 swe_carolean_regiments_desc:0 "Caroleans were soldiers of the Swedish kings Charles XI and Charles XII. The tactics of Caroleans differed from those of Western European soldiers in their greater reliance upon pikes, rapiers, bayonets, and offensive strategy, which helped them to be victorious, even when greatly outnumbered, in many important Swedish battles. The Carolean army is regarded as one of the most effective military forces of their time."
 swe_neva_title:0 "Cold Port at Neva"
 swe_neva_desc:0 "In the East lies the gateway of trade from the Baltic into the vast lands of Russia. Seizing control of this port will ensure that Russia is prevented from contesting our influence on Baltic trade while also providing a secure border."
 swe_humiliate_russia_title:0 "Humiliate Russia"
 swe_humiliate_russia_desc:0 "The Russians have long been a great threat to our nation. It's time for us to assemble our armies and march onto Moscow to bring down the Tsar of Russia."
 swe_subjucate_poland_title:0 "Subjucate the Commonwealth"
 swe_subjucate_poland_desc:0 "Sweden has enemies on many fronts, seizing the Polish Crown would help secure our currently tentative position."
 swe_vasa_flagship_title:0 "Launch the Vasa Flagship"
 swe_vasa_flagship_desc:0 "Every fleet must have it's own flagship. Let's us construct and launch a mighty warship to lead our navy to victory."
 swe_marine_doctrine_title:0 "Create Marine Regiments"
 swe_marine_doctrine_desc:0 "The maritime powers of Europe are beginning to adopt the usage of marine regiments for both overseas conquest and for amphibious assaults."
#Column Three
 swe_liberation_title:0 "Liberation of Sweden"
 swe_liberation_desc:0 "Since the founding of the Kalmar Union, independence settlement among our people has been strong. Sweden was not destined to remain as a subject. The noblemen of Sweden propose we begin negotiations with the ruler of Denmark."
 swe_liberation_war_mission_title:0 "Liberation of Sweden"
 swe_liberation_war_mission_desc:0 "Since the founding of the Kalmar Union, independence settlement among our people has been strong. Sweden was not destined to remain as a subject. The noblemen of Sweden propose we begin negotiations with the ruler of Denmark."
 swe_kalmar_title:0 "Dissolve the Kalmar Union"
 swe_kalmar_desc:0 "With our independence secured, we can begin reforming our country and initiating conquests into our neighbours."
 swe_livionia_title:0 "Fall of the Livonians"
 swe_livionia_desc:0 "The Holy Orders situated within the Baltic region have long been troublesum. Seizing the lands of Livonia would secure us valuable trading ports and a buffer zone to protect mainland Sweden."
 swe_baltic_title:0 "Seize Baltic Ports"
 swe_baltic_desc:0 "Livonia has fallen, now the strategically important and valuable ports of Danzig and Memel are left exposed to our conquest. These ports are critical for any nation that wishes to control the Baltic region."
 swe_pomerania_title:0 "Swedish Pomerania"
 swe_pomerania_desc:0 "If a hostile power were to establish a foothold on the Southern shore of the Baltic, Sweden would be in great danger. It is better that we tether our horses to the enemy's fence, than he to ours."
 swe_hanseatic_league_title:0 "Destroy the Hansa"
 swe_hanseatic_league_desc:0 "The Hanseatic League has long been a thorn in our side and a threat to our power and influence. It is time that we dealt with them."
#Column Four
 swe_uppsala_university_title:0 "Uppsala University"
 swe_uppsala_university_desc:0 "The University rose to pronounced significance during the rise of Sweden as a great power at the end of the 16th century. Uppsala has an important place in Swedish national culture, identity and for the Swedish establishment: in historiography, literature, politics, and music."
 swe_enlightenment_title:0 "Swedish Enlightenment"
 swe_enlightenment_desc:0 "The Age of Liberty was a half-century-long period of parliamentary governance and increasing civil rights, beginning with Charles XII's death in 1718 and ending with Gustav III's self-coup in 1772."
 swe_gotland_title:0 "Liberate Gotland"
 swe_gotland_desc:0 "Gotland has long been a important strategic location within the Baltic region that was taken from us many years ago. It's time we reclaim what is rightfully ours and unite all Swedes."
 swe_skaneland_title:0 "Secure the Skaneland"
 swe_skaneland_desc:0 "The Danish King's control of Scania allows him to put unacceptable taxes on Swedish shipping through his control of the Sound Toll. We must wrest this province from him for the good of Sweden."
 swe_norway_title:0 "Conquer Norway"
 swe_norway_desc:0 "With the Kalmar Union no more the Kingdom of Norway has been cast adrift in a hostile world friendless. It is our duty as a good neighbor to put them under our protection."
 swe_king_in_the_north_title:0 "One King in the North"
 swe_king_in_the_north_desc:0 "There can only be one King in the North, previously that was Denmark but now Sweden will rise to rule all of Scandinavia."
 swe_proclaim_hegemony_title:0 "A Swedish Empire"
 swe_proclaim_hegemony_desc:0 "Many centuries and years of struggle has led to the founding of the Swedish Empire. None can stand before us during this golden age of Swedish might and power. Ave, Dominium Maris Baltici."
#Column Five
 swe_fund_resistence_title:0 "Dalaskogen Mine"
 swe_fund_resistence_desc:0 "Falun Mine is a mine in Dalaskogen, Sweden, that has operated since the 10th century. It produces much of Europe's copper and can help fund our wars."
 swe_dalaskogan_mines_title:0 "Expand Dalaskogen"
 swe_dalaskogan_mines_desc:0 "Technological developments at the Falun Mine has now paved the way for future expansion and increased output and export of copper."
 swe_lutherans_title:0 "Support the Lutherans"
 swe_lutherans_desc:0 "The Roman church is losing it's control and influence over Europe with the recent rise of Lutheranism. It's time we too depart from Rome and begin confiscating Church property and wealth."
 swe_dacke_wars_title:0 "The Dacke Feud"
 swe_dacke_wars_desc:0 "Dacke and his followers are dissatisfied with the heavy tax burden, the introduction of Lutheranism, and the confiscation of Church property. Nils Dacke and his pathetic rebellion needs to be crushed."
 swe_church_of_sweden_title:0 "Church of Sweden"
 swe_church_of_sweden_desc:0 "Many of those within Sweden have embraced the Protestant Reformation. The opportunity has now arised to officially establish the church of Sweden."
