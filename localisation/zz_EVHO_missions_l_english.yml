 dom_eng_rb_take_gibraltar_desc:0 "Sieze the mouth of the Mediteranean from the Spaniards and the Moors."
 dom_eng_rb_take_delta_title:0 "City of Alexandria"
 dom_eng_rb_take_delta_desc:0 "It is only fitting that the crown jewel of the first great imperial conqueror of Western History should be held by the modern era's greatest Empire."
 dom_eng_rb_take_bahari_title:0 "Egyptian Authority"
 dom_eng_rb_take_bahari_desc:0 "As have many a mighty empire of the annals of history before us, ours now is the undesputed authority in the lands of Egypt."
 dom_gbr_rb_india_landgrab_title:0 "The Bengal Presidency"
 dom_gbr_rb_india_landgrab_desc:0 "Originally began as little more than a manned station for trade at the mouth of the Bengal river delta, through contracts with the waning and frankly unept power structures of the region has seen the influence of this office grow. It is now a prime base from which private or national interests can exert influence over the Indian Subcontinent."

