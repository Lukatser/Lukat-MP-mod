l_english:
 ae_gamerule_title: "Encyclopædium: Game Rules"
 ae_gamerule_desc: "Select which game rules will apply throughout the game. Hover over each option for a detailled explanation. To confirm, scroll down and press the respective button. You will §RNOT§! be able to change the selected game rules later in the game."
 
 ae_gamerule_colonization_on: "Historical Colonization: §GON§!"
 ae_gamerule_colonization_ai: "Historical Colonization: §YAI-Only§!"
 ae_gamerule_colonization_off: "Historical Colonization: §ROFF§!"
 
 ae_gamerule_historical_expansion_on: "Historical Expansion: §GON§!"
 ae_gamerule_historical_expansion_ai: "Historical Expansion: §YAI-Only§!"
 ae_gamerule_historical_expansion_off: "Historical Expansion: §ROFF§!"
 
 ae_gamerule_restricted_expansion_on: "Expansion Restrictions: §GON§!"
 ae_gamerule_restricted_expansion_ai: "Expansion Restrictions: §YAI-Only§!"
 ae_gamerule_restricted_expansion_off: "Expansion Restrictions: §ROFF§!"
 
 ae_gamerule_exclaves_on: "Cede Exclaves to adjacent Vassals: §GON§!"
 ae_gamerule_exclaves_ai: "Cede Exclaves to adjacent Vassals: §YAI-Only§!"
 ae_gamerule_exclaves_off: "Cede Exclaves to adjacent Vassals: §ROFF§!"
 
 ae_gamerule_formables_on: "Historical Formables: §GON§!"
 ae_gamerule_formables_ai: "Historical Formables: §YAI-Only§!"
 ae_gamerule_formables_off: "Historical Formables: §ROFF§!"

 ae_gamerule_unions_on: "Historical Unions: §GON§!"
 ae_gamerule_unions_ai: "Historical Unions: §YAI-Only§!"
 ae_gamerule_unions_off: "Historical Unions: §ROFF§!"
 
 ae_gamerule_dynasties_on: "Historical Dynasties: §GON§!"
 ae_gamerule_dynasties_ai: "Historical Dynasties: §YAI-Only§!"
 ae_gamerule_dynasties_off: "Historical Dynasties: §ROFF§!"
 
 ae_gamerule_reformation_on: "Historical Protestant Reformation: §GON§!"
 ae_gamerule_reformation_ai: "Historical Protestant Reformation: §YAI-Only§!"
 ae_gamerule_reformation_off: "Historical Protestant Reformation: §ROFF§!"
 
 ae_gamerule_institutions_on: "§gHistorical Technology Spread: ON§!"
 ae_gamerule_institutions_ai: "§gHistorical Technology Spread: AI-Only§!"
 ae_gamerule_institutions_off: "§gHistorical Technology Spread: OFF§!"
 
