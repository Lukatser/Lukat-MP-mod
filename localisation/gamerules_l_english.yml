 ae_gamerule_hre_ai: "Historical HRE: §YAI-Only§!"
 ae_gamerule_hre_off: "Historical HRE: §ROFF§!"




 
 ae_gamerule_check_desc: "These are the game rules that have been selected and which apply throughout the game. Hover over each option for a detailled explanation. To confirm, scroll down and press the respective button. You are §RNOT§! able to change the game rules anymore."
 ae_gamerule_ok: "Exit"
 ae_gamerule_confirm: "Confirm"
 ae_gamerule_confirm_tt: "Make sure you've chosen the wished options. You will §RNOT§! be able to revise your selection later."
 
 
 ae_gamerule_colonization_on_tt: "Colonization will be restricted by culture groupings, colonial region, and date (or diplomatic technology). Minor colonies (e.g. New Amsterdam or Fort Christina) will be created dynamically."
 ae_gamerule_colonization_ai_tt: "Colonial restrictions and dynamic colony creation will only be applied to §YAI-led§! countries."
 ae_gamerule_colonization_off_tt: "No changes to vanilla colonization mechanics."
 
 ae_gamerule_historical_expansion_on_tt: "Historical border changes and country partitions will take place even if the player is active in the relevant region §R(NOT RECOMMENDED, can end your campaign prematurely!)§!"
 ae_gamerule_historical_expansion_ai_tt: "Some historical border changes (e.g. the Truce of Andrusiv) as well as country partitions (e.g. of Hungary) will take place in the player is not active in the relevant region."
 ae_gamerule_historical_expansion_off_tt: "No changes to vanilla expansion mechanics."

 ae_gamerule_restricted_expansion_on_tt: "Certain nations will be prevented from expanding into particular regions (e.g. Europeans won't be able to expand into the African interior). Some minor nations (e.g. Brandenburg or Crimea) will be forcefully kept on the map until it's their time to shine."
 ae_gamerule_restricted_expansion_ai_tt: "Certain AI nations will be prevented from expanding into particular regions (e.g. Europeans won't be able to expand into the African interior). Some minor nations (e.g. Brandenburg or Crimea) will be forcefully kept on the map until it's their time to shine - unless it's the player who conquers them."
 ae_gamerule_restricted_expansion_off_tt: "No changes to vanilla interior expansion mechanics."
 
 ae_gamerule_exclaves_on_tt: "All nations will cede most of their subject-adjacent exclaves to the respective subject nation."
 ae_gamerule_exclaves_ai_tt: "AI-led nations will cede most of their subject-adjacent exclaves to the respective subject nation."
 ae_gamerule_exclaves_off_tt: "No changes to vanilla exclave mechanics."
 
 ae_gamerule_formables_on_tt: "Prominent formable nations (Persia, Mughals, Qing, the Netherlands etc.) will be forced to appear, even if the player is present in the relevant region §R(NOT RECOMMENDED, can end your campaign prematurely!)§!" 
 ae_gamerule_formables_ai_tt: "Prominent formable nations (Persia, Mughals, Qing, the Netherlands etc.) will be forced to appear, even if the vanilla prerequisites are not fulfilled, given the player is not present in the relevant region."
 ae_gamerule_formables_off_tt: "Prominent formable nations (Persia, Mughals, Qing, the Netherlands etc.) will §RNOT§! be forced to appear and will only do it dynamically."
 
 ae_gamerule_unions_on_tt: "Historical personal unions (e.g. England-Scotland or Austria-Hungary) will be forced to appear, even if the player is present in the relevant region §R(NOT RECOMMENDED, can end your campaign prematurely!)§!"
 ae_gamerule_unions_ai_tt: "Historical personal unions (e.g. England-Scotland or Austria-Hungary) will be forced to appear, even if the vanilla prerequisites are not fulfilled, given the player is not present in the relevant region."
 ae_gamerule_unions_off_tt: "Historical personal unions (e.g. England-Scotland or Austria-Hungary) will §RNOT§! be forced to appear and will only do it dynamically."
 
 ae_gamerule_dynasties_on_tt: "Prominent dynasties will be forced to stay in power in their respective countries, unless replaced by the player's dynasty."
 ae_gamerule_dynasties_ai_tt: "In AI-led countries, prominent dynasties will be forced to stay in power in their respective countries, unless replaced by the player's dynasty."
 ae_gamerule_dynasties_off_tt: "No changes to vanilla dynasty mechanics."
 
 ae_gamerule_reformation_on_tt: "The Protestant Reformation will generally follow the historical path."
 ae_gamerule_reformation_ai_tt: "The Protestant Reformation will generally follow the historical path outside of player-controlled countries."
 ae_gamerule_reformation_off_tt: "No changes to vanilla Reformation mechanics."
 
 ae_gamerule_hre_on_tt: "The development of the HRE will generally follow the historical path."
 ae_gamerule_hre_ai_tt: "The development of the HRE will generally follow the historical path, unless the player is active in the respective region."
 ae_gamerule_hre_off_tt: "No major changes to vanilla HRE mechanics."
 
 ae_gamerule_institutions_on_tt: "WIP: §gThe spread of instititions will favor Western European countries first and foremost outside of player-controlled nations.§!"
 ae_gamerule_institutions_ai_tt: "WIP: §gThe spread of instititions will favor Western European countries first and foremost.§!"
 ae_gamerule_institutions_off_tt: "WIP: §gNo major changes to vanilla institution mechanics.§!"