l_english:
 professional_ideas:0 "Professional Ideas"
 aki_professional_army:0 "Professional Army"
 aki_professional_army_desc:0 "A professional army is a road to success, isn't it? Drilled army absolutely is!"
 aki_educated_army:0 "Educated Army"
 aki_educated_army_desc:0 "Army education is very important. Every soldier must know our former achievements!"
 aki_line_warfare:0 "Line Warfare"
 aki_line_warfare_desc:0 "The line formation showed its high efficiency during 18th and 19th centuries wars."
 aki_militarized_society:0 "Militarized Society"
 aki_militarized_society_desc:0 "Why won't we just give a rifle to every citizen?"
 aki_organized_siege:0 "Organized Siege"
 aki_organized_siege_desc:0 "Bad discipline during siege is even worse than bad discipline during battle!"
 aki_supply_lines:0 "Supply Lines"
 aki_supply_lines_desc:0 "Supply lines can provide supply to an army, even if it is far away from homeland."
 aki_never_surrender:0 "Never Surrender!"
 aki_never_surrender_desc:0 "Even if we've took high casualties, it's not the end! We have to quickly regroup and push the enemy out!"
 
 intercontinental_wars_ideas:0 "Intercontinental Warfare Ideas"
 aki_disembark_ships:0 "Disembark Ships"
 aki_disembark_ships_desc:0 "War between continents often needs a naval invasion. If we provide benefits to transport ship producers, we can request transport ships cheaper."
 aki_intercontinental_fleet:0 "Intercontinental Fleet"
 aki_intercontinental_fleet_desc:0 "Upgrading fleet navigation system, we can greatly reduce time, needed to navigate through large sea spaces."
 aki_quick_landing:0 "Quick Landing"
 aki_quick_landing_desc:0 "Disciplined and speed is the most valuable part of naval invasion."
 aki_big_navy:0 "Big Navy"
 aki_big_navy_desc:0 "A large navy force is necessary to manage all our overseas domain."
 aki_ship_building_techniques:0 "Ship Building Techniques"
 aki_ship_building_techniques_desc:0 "Using newest technologies, we have achieved reduced fleet costs without harming quality."
 aki_open_seas_warfare:0 "Open Seas Warfare"
 aki_open_seas_warfare_desc:0 "Limiting rations and dedicating more space for supply, we can greatly increase time that fleet can spend at sea."
 aki_drydocks:0 "Drydocks"
 aki_drydocks_desc:0 "Drydocks are widely used in the world, and providing every port at least with one of them will be a wise decision."
 
 conquest_ideas:0 "Conquest Ideas"
 aki_coring:0 "Coring"
 aki_coring_desc:0 "Cheaper integration of newly conquered lands will help our bureucratic apparatus a lot."
 aki_conquest_zeal:0 "Conquest Zeal"
 aki_conquest_zeal_desc:0 "Our people will never be happy with what they have now. They want more, and we can fulfill their demand."
 aki_justified_conquest:0 "Justified Conquest"
 aki_justified_conquest_desc:0 "It's not that easy to convince someone, that this land is your rightfully, but not impossible..."
 aki_talented_diplomats:0 "Talented Diplomats"
 aki_talented_diplomats_desc:0 "These people know, how to justify demands."
 aki_eviction_of_peoples:0 "Eviction of Peoples"
 aki_eviction_of_peoples_desc:0 "Minorities are a huge problem... sure they are. And we have a solution."
 aki_bureucratic_reform:0 "Bureucratic Reform"
 aki_bureucratic_reform_desc:0 "Effective and large bureucracy machine is one of the most valuable things, governing an empire."
 aki_cheap_garrison:0 "Cheap Garrisons"
 aki_cheap_garrison_desc:0 "Accepting anyone to serve in a fort garrison will, of course, have a negative impact to our defensive ability, but a very positive impact to our wallet."
 
