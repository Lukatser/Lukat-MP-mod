 PCI_continental_trade:0 "Trade in the Americas"
 PCI_continental_trade_desc:0 "Trade between fellow countries in the Americas is very profitable."
 PCI_manufacturing_center:0 "Raw Material Manufacturing"
 PCI_manufacturing_center_desc:0 "The manufacturing of raw materials to be sold to the old world is the primary industry of the New World in the eighteenth century."
 PCI_new_frontiers:0 "The Frontier"
 PCI_new_frontiers_desc:0 "There are frontiers yet to be explored or settled that the nations of the New World feel destined to control."
 PCI_liberty_heroes:0 "Revolutionary Heroes"
 PCI_liberty_heroes_desc:0 "Heroes of the struggle against the Mother Country remain to serve the fledgeling nation."
 PCI_founding_fathers:0 "Founders of the Nation"
 PCI_founding_fathers_desc:0 "Those who lead the struggle for independence against the Mother Country still serve the nation and recieve a lot of respect from the people."
 PCI_heroes_of_the_revolution:0 "Colonial Neglect Legacy"
 PCI_heroes_of_the_revolution_desc:0 "During this nation's time as a colony it was left to its own devices many times, and forced to solve its problems nearly or totally alone. Now the people who live here are hardy."
 PCI_freedom_of_religion:0 "Old World Religious Freedom"
 PCI_freedom_of_religion_desc:0 "Freedom of Religion for those of faiths familliar to the Old World is a cornerstone of many nations in the New World. This rarely extended to the Natives."

 glorious_explorers:0 "Fame to Explorers"
 glorious_explorers_desc:0 "Those from the colony who go forth and explore into the unknown return to be wreathed in glory by their fellow colonists."

