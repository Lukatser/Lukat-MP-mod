funny.1.t: "Please Don't"
funny.1.d: "John Universalis would tell you not to dev admin, make use of your points in a better way, like expanding infrastructure or increasing stability. Developming mil or dip is much much better, if you do this again..."
funny.1.1: "Now you can think about your life choices"
funny.2.t: "You didn't listen"
funny.2.d: "Seems like you continued deving admin anyway and completely ignored everything I said, but hey now it's not my fault when this happens to you. Remember that I warned you before."
funny.2.1: "This should make you learn your lesson."
