 disaster_fee_crisis_of_the_mughal_empire.1600.t:0 "Rebellion of the Durrani Empire"
 disaster_fee_crisis_of_the_mughal_empire.1600.desc:0 "Both a place of origin for many of the nobility of the Empire, and a backwater run by wayward and unruly tribes, Governorship of the region of Afghanistan and Balochistan has unified under the rulership of a noble of the house Durrani, who has proclaimed a new Empire for himself in the region and is now rising in rebellion against us!"
 disaster_fee_crisis_of_the_mughal_empire.1600.a:0 "A backwater, maybe, but a backwater in service to our Empire!"
 disaster_fee_crisis_of_the_mughal_empire.1601.t:0 "The Hyderabad Rebellion"
 disaster_fee_crisis_of_the_mughal_empire.1601.desc:0 "This region was one of great potential, and our empire has seen as much since it arrived and brought it into the spotlight. Since then it has remained a vital center of commerse in India, its beauty well renowned, and its lords and governors fattened and wealthy. Now, they have taken all that we have given them, and intend to use it as a base of power to grow their own ambitions, the first of which is apparently the destruction of the very Empire from which it has spawned."
 disaster_fee_crisis_of_the_mughal_empire.1601.a:0 "After all we've done for them?!"
 disaster_fee_crisis_of_the_mughal_empire.1602.t:0 "Rise of the Empire of Marathas"
 disaster_fee_crisis_of_the_mughal_empire.1602.desc:0 "The South has historically been a thorn in the side of the Empire, and now that legacy rears its head in full force. A powerful new rebel faction in this era of catastrophe for the empire has emerged in the form of the Marathas. They will likely pose the most serious threat out of all the enemies that currently seek to tear India apart."
 disaster_fee_crisis_of_the_mughal_empire.1602.a:0 "We will not be replaced! India is ours!"
 disaster_fee_crisis_of_the_mughal_empire.1603.t:0 "Rebellion of the Nawabs of Bengal"
 disaster_fee_crisis_of_the_mughal_empire.1603.desc:0 "A disperate and motley lot, the assembled nobles of the Bengal region, who have chafed at our rule for some time due to percieved restrictions on trade, have banded together in opposition to the Empire. They will be a difficult force for our realm to overcome."
 disaster_fee_crisis_of_the_mughal_empire.1603.a:0 "Excellent, yet another problem. Wonderful."
