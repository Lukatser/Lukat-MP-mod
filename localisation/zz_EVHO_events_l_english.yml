 EVHO_misc_events.100.da:0 "Revolutions and rebellions have been a constant feature of the history of the late modern age. Examples abound from the “Glorious” and the “Industrial” to the French and the American Revolutions; from the Haitian to the Greek Revolution and the Revolutions of 1848. As moments of rupture and radical change, revolutions accelerate historical time, challenge existing hierarchies and mark the advent of new social, political and cultural formations and constellations; they unite and divide. Revolutions also constitute critical processes for the reconfiguration of conceptions of Europe. Ideas about Europe can be discovered at the intersection of political discourses, structures of power, geopolitical perspectives and identity projects. The history of modern revolutions offers a prime opportunity to re-examine and re-think European historical realities and recover the making of ideas about Europe in the modern age; revolutions have been central to discussions about Europe’s pasts and futures, and have shaped the continent’s political and cultural heritage."
