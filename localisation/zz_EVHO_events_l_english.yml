 flavor_rh.10071.RHtit1:0 "The Carolinas Purchase"
 flavor_rh.10071.RHdesc1:0 "Our advisors came up with an idea; selling the Carolinas for 500 ducats to the Germans to make sure that it will not fall into American hands. Considering that the lands are not worth a lot, we could make a nice profit."
 flavor_rh.10071.RHans1:0 "Yes, sounds like a plan"
 flavor_rh.10071.RHans2:0 "No, we do not want to negotiate with the Spanish"
 
 flavor_rh.10072.RHtit1:0 "The Carolinas Purchase"
 flavor_rh.10072.RHdesc1:0 "The Spanish have offered us to give them 500 ducats for the Carolinas."
 flavor_rh.10072.RHans1:0 "Yes, it's a great deal"
 flavor_rh.10072.RHans2:0 "No, it's not worth it"
 
 flavor_rh.fall_of_indian_empire.t:0 "Collapse of the [Root.GetAdjective] Empire"
 flavor_rh.fall_of_indian_empire.d:0 "Having become incredibly overextended in the Indian Subcontinent, a land famously diverse in Religions, Philosophies, Cultures, and Creeds, This once mighty great Empire of India has collapsed on itself, into many bickering provinces, and the former rulers of the land have been reduced to a rump state in the center of the region."
 flavor_rh.fall_of_indian_empire.a:0 "Calamity!"

