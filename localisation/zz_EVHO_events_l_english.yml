 jap_take_malaysia_title:0 "Secure Malaysia"
 jap_take_malaysia_desc:0 "Malaysia is vital to protect our possessions, additionally it is very important trade region which requires the protection of the Japanese Empire from foreign cruel overlords which have their eyes on these precious lands."
 jap_take_oceania_title:0 "Secure Oceania"
