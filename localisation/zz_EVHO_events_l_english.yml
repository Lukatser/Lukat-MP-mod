 #Partition of Hungary
 AE_events_HUN_partition.100.t:0 "Collapse of the Hungarian monarchy"
 AE_events_HUN_partition.100.d:0 "Following a decisive defeat at the battle of Mohács by the Turks the Hungarian monarchy entered a period of rapid decline. The eventual result of this was the country being partitioned between Austria and the Ottoman Turks."
 AE_events_HUN_partition.100.a:0 "At least we may stand to gain from this."
 AE_events_HUN_partition.100.b:0 "Excellent."
 AE_events_HUN_partition.100.c:0 "The Turks advance ever further."
 
 AE_events_HUN_partition.106.t:0 "Death of [BOH.Monarch.GetName] at Mohacs"
 AE_events_HUN_partition.106.d:0 "When Vladislas’ only son Louis was killed at the Battle of Mohács in 1526 ending the Jagiellon dynasty rule in Bohemia, a convention of Bohemian nobles elected his brother-in-law, the Habsburg archduke Ferdinand I of Austria, as the new king of the Bohemian crown lands. Together with the Archduchy of Austria “hereditary lands” and the Hungarian kingdom, they formed the Habsburg Monarchy, which in the following centuries grew out of the Holy Roman Empire into a separate European power."
 AE_events_HUN_partition.106.a:0 "Oh no!"
 AE_events_HUN_partition.106.b:0 "Oh yes!"
 
 #Charles V
 AE_events_HAB_union.100.t:0 "Charles V - Spanish Prelude"
 AE_events_HAB_union.100.d:0 "Charles was born in the County of Flanders to Philip the Handsome of the Austrian House of Habsburg (son of Maximilian I, Holy Roman Emperor, and Mary of Burgundy) and Joanna of the Spanish House of Trastámara (daughter of Isabella I of Castile and Ferdinand II of Aragon). The ultimate heir of his four grandparents, he inherited all of his family dominions at a young age. After the death of Philip in 1506, he inherited the Burgundian Netherlands, originally held by his paternal grandmother Mary. In 1516, he became co-monarch of Spain with his mother Joanna, and as such he was the first king of Spain to inherit the country as dynastically unified by the Catholic Monarchs, his maternal grandparents. The Spanish possessions at his accession also included the Castilian West Indies and the Aragonese Kingdoms of Naples, Sicily and Sardinia. At the death of his paternal grandfather Maximilian in 1519, he inherited Austria and was elected to succeed him as Holy Roman Emperor. He adopted the Imperial name of Charles V as his main title, and styled himself as a new Charlemagne."
