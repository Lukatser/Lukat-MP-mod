 EVHO_ottoman_events_2.6.a.tooltip:0 "Moldavian cores will be returned."
 EVHO_ottoman_events_2.19.t:0 "The Ottoman Invasion of Wallachia"
 EVHO_ottoman_events_2.19.d:0 "The Ottoman Empire has declared war on Wallachia, and the coming war is sure to bring profound devastation to the cities and the countryside. However, there is one small prospect of hope for defending our small country - the mighty Kingdom of Hungary to our north. If we can negotiate successfully with the Hungarians and accept their suzerainty, then they might engage themselves in our war, bringing military aid that could turn back the forces of the Turks."
 EVHO_ottoman_events_2.19.a:0 "Let us call on the aid of Hungary!"
 EVHO_ottoman_events_2.19.a.tooltip:0 "Wallachia will potentially become a march of Hungary."
 EVHO_ottoman_events_2.19.b:0 "We can fight this conflict alone."
 EVHO_ottoman_events_2.20.t:0 "The Wallachians Plead for Help"
 EVHO_ottoman_events_2.20.d:0 "Once again, the forces of the Ottoman Empire have invaded Wallachia, spreading terror, destruction, and confusion in every direction they go. However, dignitaries from Wallachia have now arrived in Hungary, and they have made us a compelling offer - if we join their war in order to fight back Ottoman forces, then Wallachia will accept our suzerainty. Nonetheless, necessity for security from the Ottoman Turks may dictate that we must defend Wallachia."
 EVHO_ottoman_events_2.20.a:0 "We must aid our Christian brothers."
 EVHO_ottoman_events_2.20.a.tooltip:0 "Hungary will be forced to go to war with the Ottomans."
 EVHO_ottoman_events_2.20.b:0 "We do not have the ability to protect Wallachia."
 EVHO_ottoman_events_2.21.t:0 "The Hungarians Defend Wallachia"
 EVHO_ottoman_events_2.21.d:0 "The Hungarians, recognizing the gravity of the threat posed by the Ottoman Empire, have agreed to intervene in our war. It is to be hoped that with their aid, we can finally drive the Turkish menace from our borders and hopefully extinguish them as a threat to Europe."
 EVHO_ottoman_events_2.21.a:0 "We are grateful for this protection."
 EVHO_ottoman_events_2.22.t:0 "The Hungarians Abandon Wallachia"
 EVHO_ottoman_events_2.22.d:0 "The Hungarians, explaining that their military resources are spent elsewhere, have refused to intervene in our war. It is suspected that they are currently fearful of and reluctant to fight the Turkish menace. Wallachia will have to stand alone."
 EVHO_ottoman_events_2.22.a:0 "The cowards!"
 EVHO_ottoman_events_2.23.t:0 "The Hungarians Intervene in Wallachia"
 EVHO_ottoman_events_2.23.d:0 "In a surprising turn of events, the Kingdom of Hungary is now intervening to defend Wallachia from our incursions, with the King of Hungary proclaiming the need to maintain the unity of the Christian world against us. As a result, Hungary has joined our war and is now apparently the suzerain of Wallachia."
 EVHO_ottoman_events_2.23.a:0 "The fools! They only rush to their deaths!"
 defended_wallachia:0 "Defended Wallachia"
 abandoned_wallachia:0 "Abandoned Wallachia"
 EVHO_ottoman_events_2.24.t:0 "Fear in the Ranks"
 EVHO_ottoman_events_2.24.d:0 "$MONARCHTITLE$ $MONARCH$ has always been reputed for being a harsh and stern ruler of Wallachia, but now the soldiers have begun to see a whole new side to that personality. As a result of the now ensuing conflict with the Ottomans, $MONARCHTITLE$ $MONARCH$'s strict discipine of the soldiers has deeply intensfied, almost to the degree that the Wallachian soldiers are being treated with cruelty. Although some have deserted the army and protested our $MONARCHTITLE$, the majority of our soldiers have now steeled themselves to fight even harder, acknowledging the extreme danger posed by the Ottoman threat."
 EVHO_ottoman_events_2.24.a:0 "Fear is the best motivator."
 fear_in_the_ranks:0 "Fear in the Ranks"
 desc_fear_in_the_ranks:0 "As a result of the war with the Ottomans, our monarch has imposed extremely harsh discipline upon the armies, preparing them for all the grueling hardships that are yet to come."
 EVHO_ottoman_events_2.25.t:0 "Aid to Wallachia"
 EVHO_ottoman_events_2.25.d:0 "Recently, our Romanian brothers in Wallachia were invaded by the likes of the Ottoman Empire, who are now laying waste and pillage to their lands. If Wallachia falls to the Ottoman menace, we will inevitably be next. We can help prevent this, however, by sending military aid to Wallachia."
 EVHO_ottoman_events_2.25.a:0 "Let us help the Wallachians!"
 EVHO_ottoman_events_2.25.b:0 "We cannot afford to provide aid right now."
 EVHO_ottoman_events_2.26.t:0 "Moldavia Sends Aid"
 EVHO_ottoman_events_2.26.d:0 "The people of Moldavia, cognizant of our ongoing conflict with the Ottoman Empire, have decided to send us military aid! We have received men and arms to help us in continuing our war. Of course, we will make good use of Moldavia's gifts to help ensure safety for all the Christian world."
 EVHO_ottoman_events_2.26.a:0 "The Moldavians are a truly gracious people."
 moldavia_sent_aid:0 "Sent Aid"
 EVHO_ottoman_events_2.27.t:0 "The Wallachian Lands"
 EVHO_ottoman_events_2.27.d:0 "In the time before the subjugation of Wallachia, we seized some of their country's lands for ourselves, placing it under the direct administration of the Sublime Porte. However, now that Wallachia is a loyal subject of the Ottoman Empire, it may be time to return these lands to their rightful owenrs."
 EVHO_ottoman_events_2.27.a:0 "Return these provinces to Wallachia."
 EVHO_ottoman_events_2.27.b:0 "The Wallachians are unfit to rule these lands."
 EVHO_ottoman_events_2.27.a.tooltip:0 "All Ottoman provinces with Wallachian cores and Romanian culture will be returned to Wallachia."
 EVHO_ottoman_events_2.28.t:0 "The Ottomans Return the Wallachian Lands"
 EVHO_ottoman_events_2.28.d:0 "Our overlords in the Ottoman Empire have decided that it would be fitting to return the lands of Wallachia to us, acknowledging that we have become their loyal subjects. It is also possible that the Ottomans wanted to lessen the administrative burden on their bureaucracy. In any case, native rule has returned to these lands of Wallachia once again."
 EVHO_ottoman_events_2.28.a:0 "What wise overlords!"
 EVHO_ottoman_events_2.29.t:0 "The Ottomans Keep the Wallachian Lands"
 EVHO_ottoman_events_2.29.d:0 "In an absolutely outrageous decision, the Ottoman Empire has opted to keep its occupied Wallachian lands for itself! The Ottomans apparently do not see it fit to return our native lands to us, and the people of the country are angry."
 EVHO_ottoman_events_2.29.a:0 "What a travesty!"
 returned_wallachia:0 "Returned Wallachian Provinces"
 kept_wallachia:0 "Kept Wallachian Provinces"
 EVHO_ottoman_events_2.30.t:0 "Il Ridotto"
 EVHO_ottoman_events_2.30.d:0 "Il Ridotto was the quintessential and original European casino, a government-owned building that formalised gambling and exessive money loss in Venice in 1638. It was established once the Great Council gave up on preventing people from playing for money during the Carnivale. Eventually, people from all across Europe would come to Venice to test their luck, and hopefully make a quick fortune. While the wing of the San Moisè Palace was supposedly open to the public, only nobles could afford the high stakes played with there. While money flowed freely for more than a century, gambling was outlawed and Il Ridotto was closed in 1774."
 EVHO_ottoman_events_2.30.a:0 "We can take advantage of this!"
 EVHO_ottoman_events_2.31.t:0 "Conflict with the Transylvanian Saxons"
 EVHO_ottoman_events_2.31.d:0 "For a long time now, the Transylvanian Saxons of Hungary have supported pretenders to the Wallachian throne opposed to $MONARCHTITLE$ $MONARCH$. They have continually refused our calls to cease their support of our enemies, perhaps feeling all too safe and secure under the authority of the Kingdom of Hungary. It is perhaps time that we do something about this situation."
 EVHO_ottoman_events_2.31.a:0 "No, we should leave them alone."
 EVHO_ottoman_events_2.31.b:0 "IMPALE THEM ALL!"
 EVHO_ottoman_events_2.32.t:0 "The Impalement of the Transylvanian Saxons"
 EVHO_ottoman_events_2.32.d:0 "Along an entire stretch of road in the traditional lands of the Transylvanian Saxons, rows upon rows of impaled corpses can be found, with pikes stuck through their chests and grimacing looks of pain plastered upon their faces. The Saxons angered the ruler of Wallachia by supporting a pretender to the Wallachian throne, but little did they know that he would respond by impaling an entire Saxon village. Great devastation has been caused in the area, and we may have to respond to the barbarity of the Wallachians."
 EVHO_ottoman_events_2.32.a:0 "What is this evil?"
 impaled_saxons:0 "Impaled the Saxons"
 EVHO_ottoman_events_2.33.t:0 "A Wattasid Vizier"
 EVHO_ottoman_events_2.33.d:0 "Although Morocco is officially governed by the Marinid dynasty and Sultan Abdalhaqq II, in reality the country has been under the control of another dynasty, the Wattasids, for many years. Abdalhaqq's father, the previous sultan, died in an assassination after outrage against his inability to retake the city of Ceuta from Portuguese invaders led by Henry the Navigator in 1420. Although the Marinids were able to keep their hold on power, Abdalhaqq II became the new sultan, despite only being one year old. As a result, Abu Zakariya Yahya was selected as Abdalhaqq's vizier, and has maintained real control of the country ever since.\n\nEven though the public was extremely suspicious of Abu Zakariya Yahya, he has more than proved his worth throughout his reign. Despite not being able to retake the city of Ceuta, Abu Zakariya Yahya managed to encircle and force the surrender of a large Portuguese army camp outside Tangier in 1437, greatly restoring the morale of the Moroccan population after years of anarchy. As a result, Abu Zakariya Yahya and his family, the Wattasids, have become incredibly popular among the people, who no longer care about the increasingly irrelevant and powerless Marinid sultan."
 EVHO_ottoman_events_2.33.a:0 "But can Wattasids rule Morocco forever?"
 EVHO_ottoman_events_2.33.a.tooltip:0 "After the death of Abu Zakariya Yahya, Morocco may witness a fierce dynastic struggle between the Wattasid and Marinid dynasties."
 ipe_flavor_mor.5.d:0 "The great Wattasid vizier Abu Zakariya Yahya has died. Remembered well for his military victories against the Portuguese after the loss of Ceuta by the previous Marinid sultan, the Moroccan population was greatly supportive of Abu Zakariya Yahya's reign, even though he was only supposed to serve in capacity as Sultan Abdalhaqq II's childhood regent. Nonetheless, Abu Zakariya Yahya's popularity was so great that the Moroccan population is willing to accept the governance of yet another Wattasid vizier, this time the nephew of Abu Yahya Zakariya. While we can allow the Wattasids to continue governing Morocco, doing so could deeply embitter $MONARCHTITLE$ $MONARCH$, who may not want to cede power forever."
 ipe_flavor_mor.5.a:0 "There is no harm in appointing another Wattasid vizier."
 ipe_flavor_mor.5.a.tooltip:0 "It is possible that the Marinids will return with a vengeance to retake control of the Moroccan throne."
 ipe_flavor_mor.5.b:0 "We need the Marinid dynasty."
 ipe_flavor_mor.6.t:0 "The Return of the Marinids"
 ipe_flavor_mor.6.d:0 "Previously, we had relegated the Marinid sultan of Morocco to a role of irrelevance, forcing him to take a backseat to the Wattasid viziers who are now governing the country, continuing the legacy of Abu Zakariya Yahya. However, in a stunning turn of events, the Marinids have managed a successful coup, launching a campaign of mass murder against the Wattasid dynasty. The Marinids and their allies have taken up arms and slain the vast majority of the Wattasids, including $MONARCHTITLE$ $MONARCH$, while the other remaining Wattasids have fled into hiding. Although fresh blood flows in the rivers, it seems definite that the Marinids will now rule Morocco in not just name, but reality.."
 ipe_flavor_mor.6.a:0 "The horror!"
 ipe_flavor_mor.7.t:0 "Wattasid Revolt"
 ipe_flavor_mor.8.t:0 "The Cementing of Wattasid Power"
 ipe_flavor_mor.8.d:0 "After having governed Morocco for decades, it appears that the Wattasid dynasty has now finally secured complete control over Morocco, rendering all dynastic competitors irrelevant, including the Marinids. With the Marinid power unlikely to ever return to Morocco, it is time for $MONARCH$ to proclaim himself as the true ruler of all Morocco, and not just the vizier of a useless Sultan."
 ipe_flavor_mor.8.a:0 "It is the rise of a dynasty."
 EVHO_ottoman_events_2.34.t:0 "Earthquake in Constantinople"
 EVHO_ottoman_events_2.34.d:0 "In the capital of Constantinople, a great calamity has taken place. A large earthquake has caused savage destruction to the city, destroying many of its buildings and killing thousands of people, even causing a tsunami to wash up on the shores of the Bosporus. It will be extremely expensive to repair the damage, but at the same time, $MONARCHTITLE$ $MONARCH$'s life is currently at risk should he stay in the capital, as the aftershocks are continuing and may go on for several months. However, if $MONARCHTITLE$ $MONARCH$ leaves the capital, other members of the Osmanoglu dynasty may see it as an opportunity for themselves to seize the throne in the $MONARCHTITLE$'s moment of weakness."
 EVHO_ottoman_events_2.34.a:0 "We should leave the capital."
 EVHO_ottoman_events_2.34.b:0 "God will protect us!"
 EVHO_ottoman_events_2.35.t:0 "Manuel Palaiologos"
 EVHO_ottoman_events_2.35.d:0 "Following the fall of the Byzantine Empire and Constantinople to the Ottomans, the last Byzantine Emperor's son Manuel Palaiologos fled abroad, living in Rome, trying to sell his titles to the Pope in order to acquire funds large enough to maintain his personal retinue. However, the Pope continually lowballed Manuel Palaiologos, leading him to look elsewhere for payment. In a stunning and surprising move though, Manuel has now returned to Constantinople, presenting himself graciously before $MONARCHTITLE$ $MONARCH$, offering to renounce his rights to Constantinople and the Byzantine Empire. It would greatly benefit the legitimacy of our dynasty if we were to treat Manuel Palaiologos well where his supposed Christian allies did not."
 EVHO_ottoman_events_2.35.a:0 "Let us welcome Manuel Palaiologos!"
 EVHO_ottoman_events_2.35.b:0 "Pay no attention to the heir of a dead nation."
 EVHO_ottoman_events_2.36.t:0 "The Ambition of Cem"
 EVHO_ottoman_events_2.36.d:0 "For many years, the brother to $MONARCHTITLE$ $MONARCH$, Cem, was the favorite to take over the Ottoman throne and lead the country. Cem has always been in a relatively powerful position, governing many of the lands in Anatolia on behalf of the $MONARCHTITLE$, but now that $MONARCH$ has become the $MONARCHTITLE$ of the Ottoman Empire, Cem has decided to definitively respond in revolt. Unless we deal with Cem quickly, the Ottoman Empire may soon find itself in ruins."
 EVHO_ottoman_events_2.36.a:0 "This is unacceptable!"
 EVHO_ottoman_events_2.36.a.tooltip:0 "If control of the capital is lost to Cem, your empire will be instantly made a part of his and you will lose the game. Defend the capital with your life."
 EVHO_ottoman_events_2.37.t:0 "The Fall of Cem"
 EVHO_ottoman_events_2.37.d:0 "After much grueling fighting against the forces of Cem Osmanoglu, we have finally defeated him and retaken the lands of Anatolia. While Cem is not dead, having fled for faraway lands, the empire can now thoroughly enjoy the respite of peace."
 EVHO_ottoman_events_2.37.a:0 "All is well."
 EVHO_ottoman_events_2.38.t:0 "The Ottoman Succession"
 EVHO_ottoman_events_2.38.d:0 "After much grueling fighting against the forces of the false Ottoman Sultan, we have finally taken over the empire on behalf of $MONARCHTITLE$ $MONARCH$. It is only right that the correct ruler of the empire now take his throne, and all opposition will inevitably be executed."
 EVHO_ottoman_events_2.38.a:0 "I am Sultan now!"
 EVHO_ottoman_events_2.39.t:0 "Sultan Cem in Rhodes"
 EVHO_ottoman_events_2.39.d:0 "Following a difficult and failed war of succession against his brother, the Ottoman Sultan, Cem Osmanoglu has fled his former realms and arrived here in the lands of the Knights Hospitaller. He seeks protection and refuge from our common Ottoman enemy, and states that he would be an excellent asset for our conflicts with the current Sultan. But his loyalty is nonetheless questionable, and we cannot just give in to the demands of an infidel. What should we do with Cem?"
 EVHO_ottoman_events_2.39.a:0 "Ransom him off to the Ottomans."
 EVHO_ottoman_events_2.39.b:0 "Execute this traitor."
 executed_cem:0 "Executed Cem"
 EVHO_ottoman_events_2.40.t:0 "Sultan Cem in Rhodes"
 EVHO_ottoman_events_2.40.d:0 "The Knights Hospitaller now tell us that Cem, the former pretender for the Ottoman throne, managed to escape our empire alive and arrive in their territories. The Knights are now ransoming off Cem, threatening to free him and allow him to wreak further havoc in our country if we do not pay them a large ransom. What our enemies would do with this money we do not know, but the risk of Cem going free is perhaps too great."
 EVHO_ottoman_events_2.40.a:0 "Pay the ransom. Cem is a threat."
 EVHO_ottoman_events_2.40.b:0 "We do not deal with infidels!"
 EVHO_ottoman_events_2.41.t:0 "The Ottomans Pay the Knights"
 EVHO_ottoman_events_2.41.d:0 "Having received our demands for ransom, the Ottomans have agreed to our stipulation that they pay us if we are to keep Cem, the pretender to their throne, imprisoned. We will keep Cep locked in a dungeon until the end of his days, and uphold our part of this bargain."
 EVHO_ottoman_events_2.41.a:0 "So much money!"
 EVHO_ottoman_events_2.42.t:0 "The Ottomans Deny the Knights"
 EVHO_ottoman_events_2.42.d:0 "The Ottomans have refused to pay us a ransom to keep Cem, the pretender to their throne, imprisoned. Seeing that we have no reason to keep an infidel so dangerous to our greatest enemy, we may as well free Cem and watch him commit to further destruction of our foes."
 EVHO_ottoman_events_2.42.a:0 "Sounds excellent!"
 EVHO_ottoman_events_2.43.t:0 "The Return of Cem"
 EVHO_ottoman_events_2.43.d:0 "Previously, we defeated the armies of Cem Osmanoglu, a pretender to the Ottoman throne, and he thus fled to the lands of the Knights Hospitaller, seeking refuge and even assistance to reclaim his throne. We refused to pay the Knights a ransom to keep him imprisoned, and as a result Cem has finally returned to our territory, stirring up a new rebellion against us. If the Ottoman throne is to remain strong, these rebels must be crushed!"
 EVHO_ottoman_events_2.43.a:0 "Death to Cem!"
 EVHO_ottoman_events_2.44.t:0 "The Ottoman Throne"
 EVHO_ottoman_events_2.44.d:0 "Although we have briefly experienced the lull of peace, is time that we strike the Ottoman Empire again in order to seize the throne for $MONARCHTITLE$ $MONARCH$. We will go to war!"
 EVHO_ottoman_events_2.44.a:0 "To arms!"
 EVHO_ottoman_events_2.45.t:0 "The Pretenders Declare War!"
 EVHO_ottoman_events_2.45.d:0 "The pretenders to the Ottoman throne, based in the Eyalet of Rûm, have declared war in yet another bid to seize control of the country for themselves. This time we will vanquish them once and for all!"
 EVHO_ottoman_events_2.45.a:0 "They will not escape this time!"
 EVHO_ottoman_events_2.46.t:0 "The Question of Ottoman Succession"
 EVHO_ottoman_events_2.46.d:0 "For centuries, the policy regarding the succession to the leadership of the Ottoman Empire has been that the son of the $MONARCHTITLE$ to reach the capital first would be crowned his successor. However, this policy often led to dramatic and bloody civil wars, throwing the realm into chaos and disarray. Now, $MONARCHTITLE$ $MONARCH$ is beginning to grow old, and his sons are beginning to ponder and even quarrel over the subject of the succession. $MONARCHTITLE$ $MONARCH$ could discourage their squabbling, but making them compete for the throne of the Empire could be fruitful for securing a strong successor to $MONARCHTITLE$ $MONARCH$."
 EVHO_ottoman_events_2.46.a:0 "Let us put an end to the old ways of the succession."
 EVHO_ottoman_events_2.46.b:0 "They should claim the throne by blood."
 EVHO_ottoman_events_2.46.b.tooltip:0 "Choosing this option will rapidly accelerate the Ottoman Empire's progress toward the Ottoman Civil War disaster, making it fire in less than two years. In order to fully annex the Mamluks in one war, it is necessary to undergo and emerge triumphant from this extremely dangerous disaster."
 ottoman_succession_crisis:0 "Ottoman Succession Crisis"
 desc_ottoman_succession_crisis:0 "With the Padishah having proclaimed that the succession to the Ottoman Empire can only be secured by blood, his sons are now plotting furiously in order to make good their designs on the throne."
 EVHO_ottoman_events_2.48.t:0 "Revolt in Egypt"
 EVHO_ottoman_events_2.48.d:0 "Our governor in Egypt, apparently resentful over not having received the government posting he wanted, has seized control of the Cairo Citadel and begun to strike coins in his own name. Having overwhelmed the local Ottoman garrisons, he has declared himself the new Sultan of Egypt, independent from our control. It appears we now have a major uprising on our hands in Egypt."
 EVHO_ottoman_events_2.48.a:0 "Kill him!"
 EVHO_ottoman_events_2.48.a.tooltip:0 "The Mamluks have risen up in revolt. In order to crush their revolt, it is necessary to occupy the Mamluk capital at Cairo during this war."
 EVHO_ottoman_events_2.49.t:0 "Egyptian Revolt Crushed"
 EVHO_ottoman_events_2.49.d:0 "After much arduous fighting, we have finally retaken control of the unforgiving lands of Egypt, and executed all those responsible for orchestrating the recent rebellion against us. While Egypt is an unruly and difficult province to govern, it is well that we have once again taken control of it for the Ottoman Empire. It is to be hoped that we will not face future insurrections in the region."
 EVHO_ottoman_events_2.49.a:0 "All is well."
 EVHO_ottoman_events_2.50.t:0 "The Mamluks of Egpyt"
 EVHO_ottoman_events_2.50.d:0 "We have conquered provinces in Egypt, but are quickly coming to find that administration of the area is rather difficult because of the deeply entrenched mamluk ruling class, which continually impedes the efforts of our governors to impose control upon the area. The population is largely accepting of their mamluk rulers, and it seems that there is little we can do to try and change the situation in the region. For now, the mamluks still reign supreme in Egypt."
 EVHO_ottoman_events_2.50.a:0 "Unfortuante."
 EVHO_ottoman_events_2.51.t:0 "Mamluk Influences Eliminated in Egypt"
 EVHO_ottoman_events_2.51.d:0 "For centuries, the lands of Egypt have been governed by mamluks, foreign slaves who were originally used as soldiers, but then developed into a knightly ruling class in their own right. They have endured in Egypt through countless years of turmoil and conflict, but finally we have forced the mamluks to succumb, replacing their leadership with our administration and doing away with the inefficiency and corruption that characterized the old mamluk regime. Egypt now belongs to us."
 EVHO_ottoman_events_2.51.a:0 "Excellent."
 EVHO_ottoman_events_2.52.t:0 "Curtailed Mamluks"
 EVHO_ottoman_events_2.52.d:0 "In a great and sweeping series of administrative reforms, we have stripped the mamluks of their official powers and privileges in Egypt, theoretically reducing their status to nothing and eliminating them as a ruling class. However, the mamluks have not responded well to our bid to strip away their power, and as a result, an unimaginably tremendous rebellion has begun to brew in the Egyptian provinces. If we do not stop it, we may lose control of Egypt to the mamluks entirely."
 EVHO_ottoman_events_2.52.a:0 "Finish them!"
 mamluk_influences:0 "Mamluk Influences"
 desc_mamluk_influences:0 "The mamluks, a militarized slave caste that has historically ruled Egypt for centuries, continue to exercise a great deal of power in Egypt. As a result, it is extremely difficult for our governors to exercise proper control of this area."
 EVHO_ottoman_events_2.53.t:0 "The Great Plague of Egypt"
 EVHO_ottoman_events_2.53.d:0 "In 1430 and 1460, Egypt experienced two great and devastating plagues, which cemented the region's longstanding economic decline and effectively helped perpetuate a dark age in Egypt. It is estimated that 90,000 people died in Cairo in 1460, and moreover tens of thousands more people in other cities and rural areas. The catastrophic loss of population in Egypt to the plagues of the 15th century, which even rivaled the Black Death, resulted in the loss of much of Egypt's agricultural labor force. As the labor force dwindled, Egypt's irrigation systems began to decay from the lack of hands to maintain them, halving the area's agricultural production in comparison to its previous yields in the 14th century.\n\nNow, disease savages the city of Cairo, killing unfathomable numbers of people within the formerly bustling metropolis. Elsewhere, sickness and strife continue to spread, furthering chaos and anarchy throughout Egypt. With little way to stop the spread of disease, we will face hard times, for a long time."
 EVHO_ottoman_events_2.53.a:0 "This is an unforgiving era."
 the_decline_of_egypt:0 "The Decline of Egypt"
 desc_the_decline_of_egypt:0 "The indulgent rule of the Circassian Burji dynasty, the loss of a great part of the population to plague, and the demise of irrigation systems and the agriculture it supported led to a massive economic and demographic decline in Egypt from the 15th century onward."
 EVHO_ottoman_events_2.54.t:0 "Population Loss in Egypt"
 EVHO_ottoman_events_2.54.d:0 "Although Egypt had perhaps more than five million people before the onset of the 15th century, by the 1800s, the population had declined to a figure as low as two million. A variety of factors contributed to the general malaise of Egypt, but in particular a combination of plague and the neglect of agriculture ultimately led to the ruin of Egypt. As famine and disease continue to spread along the Nile, Egypt continues to suffer dearly."
 EVHO_ottoman_events_2.54.a:0 "It is a tragic time."

  ottoman_mamluk_war_events.1.t:0 "The Death of the Mamluk Sultan"
  ottoman_mamluk_war_events.1.d:0 "As it turns out, the Sultan of the Mamulkan Sultanate was leading his army into battle. Unfortunately for them, the battle ended in our victory, and the Sultan lay on the battlefield, right in front of a soldier. Reports have spread that the Sultan was beheaded. With this battle, all of Syria has fallen under our control. Whilst a successor has arisen to take control, the governance of the Mamluks lay in disorder due to our invasion with many being unsure as to the right of the new ruler to reign. If we seize the Caliph before the turmoil settles, we will be able to enforce our demands."
  ottoman_mamluk_war_events.1.a:0 "Onwards to Cairo!"
  tur_5_years:0 "We will have §Y5§! years to besiege Cairo. If we succeed, the event '§YCollapse of the Mamluk Sultanate§!' will happen. If we fail, §Rwe will never have this chance again.§!"

  ottoman_mamluk_war_events.2.t:0 "The Death of the Mamluk Sultan"
  ottoman_mamluk_war_events.2.d:0 "Disaster has struck! Reports of the beheading of the Sultan have reached Cairo, in the aftermath of a recent battle. In this aftermath, Syria has also fallen to the [From.GetAdjective]s! We must prevent the [From.GetAdjective] armies from seizing the Caliph, or we will be forced to accept their demands. However, should they not immediately seize this opportunity, we may be able to resolve the turmoil and mount a defensive."
  ottoman_mamluk_war_events.2.a:0 "Disastrous!"
  mam_5_years:0 "Should the hated enemy besiege Cairo in the next 20 years, the event '§YCollapse of the Mamluk Sultanate§!' will happen."
  mam_turmoil:0 "Turmoil within the Mamluk Sultanate"

  ottoman_mamluk_war_events.3.t:0 "Collapse of the Mamluk Sultanate"
  ottoman_mamluk_war_events.3.d:0 "To call the reign the Mamluk Sultanate has had in Egypt for centuries legitimate is a mockery, a false statement. The Mamluks seized power from the Ayyubid Sultanate by capturing the Abbasid Caliph and making him their puppethead. However, now, with our control over Cairo secured, we have captured the Caliph ourselves. With this, the central government of the Mamluk Sultanate has collapsed, leaving no resistance for whatever we may wish to do to them.\n\nNotably, the Mamluks still wish to retain power in Egypt, so seizing direct control may require a compromise that limits our control over the lands the Mamluks once ruled. We could also establish the Mamluks as an autonomous Eyalet state, but this would lead to lesser profits from their lands. Finally, we could attempt to seize the Mamluk lands by force without exerting our will here and now."
  ottoman_mamluk_war_events.3.a:0 "These lands belong to [Root.Monarch.GetTitle] [Root.Monarch.GetName]!"
  tur_direct_mamluk_integration:0 "The lands of the @MAM §YMamluk Sultanate§! will be ceded directly to us, whilst incurring §Rsignificant autonomy penalities§! due to the Mamluk institutions remaining intact. These penalities will remain until we get §G80§! absolutism."
  every_province_mamluks_own:0 "Every province that the @MAM §YMamluks§! own:"
  tur_mamluk_control:0 "Mamluk Institutions"
  until_80_absolutism:0 "until we have §G80§! absolutism"
  ottoman_mamluk_war_events.3.b:0 "Perhaps we and the Mamluks can work together..."
  tur_allowed_autonomy:0 "Permitted Mamlukean Autonomy"
  ottoman_mamluk_war_events.3.c:0 "Slow and steady wins the race..."
  tur_levantine_eyalets:0 "Levantine Eyalets"
 FEE_Education_Startup_Event.1.tt:0 "Heir Education"
 FEE_Education_Startup_Event.1.dd:0 "Heir Education is a system which revolves around sending your Heir to various prestigious institutions across the continent, or if tight on money and resources, a tutor could do great. Heir education allows you to pay certain amounts of Mana and Ducats for a chance at increasing the Skill of your heir, will your heir become a Respected Scholar of the realm? an Master of the Sword? or an Unfortunate Gambler. As the fact of uncertainty with no guarantee of good outcome, people have requested an option to enable or disable the education. \nIn order to keep things fair, you will not be able to turn this feature on and off without manually refiring this event."
 FEE_Education_Startup_Event.1.a:0 "I would like this education system!"
 FEE_Education_Startup_Event.1.b:0 "I would rather not"
 # Events:
 FEE_Advisor_Event.EVTNAME1:0 "A Pouch of Gold?"
 FEE_Advisor_Event.EVTDESC1:0 "$MASTER_OF_MINT$$TREASURER$ beams a smile at you while handing over a pouch of gold. He claims it contains the savings accumulated from hard work and donations from the richer families in your realm."
 FEE_Advisor_Event1.EVTOPT1:0 "Excellent News!"

 FEE_Advisor_Event.EVTNAME2:0 "Monumental Suggestions"
 FEE_Advisor_Event.EVTDESC2:0 "$MASTER_OF_MINT$$TREASURER$ approaches you: \"My Liege, I have a great idea for a monument. Something to raise our cultural status and make the people notice what a great ruler you are. I would require some gold and your patience, and the work would take a year to complete.\""
 FEE_Advisor_Event2.EVTOPT1:0 "So be it! Surprise me!"
 FEE_Advisor_Event2.EVTOPT2:0 "I don't think so ..."

 FEE_Advisor_Event.EVTNAME3:0 "A Monumental Reveal"
 FEE_Advisor_Event.EVTDESC3:0 "The monument $MASTER_OF_MINT$$TREASURER$ promised is finished. The shape of the statue seems a bit off, as it is unveiled some of the crowd seem confused. It is a giant ear with the inscription 'IT LISTENS'."
 FEE_Advisor_Event3.EVTOPT1:0 "At least it's original."
 FEE_Advisor_Event3.EVTOPT2:0 "Tear it down!"

 FEE_Advisor_Event.EVTNAME4:0 "A Monumental Reveal"
 FEE_Advisor_Event.EVTDESC4:0 "The monument $MASTER_OF_MINT$$TREASURER$ promised is finished. People have gathered to witness the unveiling of the new statue. It is a large portrait of [fee_statue_target.Monarch.GetName]."
 FEE_Advisor_Event4.EVTOPT1:0 "Surely, this will bring us their favour."

 FEE_Advisor_Event.EVTNAME5:0 "A Monumental Reveal"
 FEE_Advisor_Event.EVTDESC5:0 "The monument $MASTER_OF_MINT$$TREASURER$ promised is finished.  At the unveiling, the crowd gasps and some even scream. It's something that resembles a throne, with an eyeless horned creature on top. It smells like blood."
 FEE_Advisor_Event5.EVTOPT1:0 "I should have seen this coming."
 FEE_Advisor_Event5.EVTOPT2:0 "Climb on the throne."

 FEE_Advisor_Event.EVTNAME6:0 "A Monumental Reveal"
 FEE_Advisor_Event.EVTDESC6:0 "The monument $MASTER_OF_MINT$$TREASURER$ promised is finished. Upon unveiling, a statue of yourself is revealed and you notice the crowd smiling and giving you a round of applause."
 FEE_Advisor_Event6.EVTOPT1:0 "I have no words."
 FEE_Advisor_Event6.EVTOPT2:0 "It's too much, remove it."

 FEE_Advisor_Event.EVTNAME7:0 "A Monumental Reveal"
 FEE_Advisor_Event.EVTDESC7:0 "The monument $MASTER_OF_MINT$$TREASURER$ promised is finished. The statue is unveiled and it's just a bigger version of $MASTER_OF_MINT$$TREASURER$, only slightly better looking than the real $MASTER_OF_MINT$$TREASURER$."
 FEE_Advisor_Event7.EVTOPT1:0 "I don't know about this."
 FEE_Advisor_Event7.EVTOPT2:0 "Tear it down! $MASTER_OF_MINT$$TREASURER$ will be put in their place!"

 FEE_Advisor_Event.EVTNAME8:0 "A Monumental Reveal"
 FEE_Advisor_Event.EVTDESC8:0 "The monument $MASTER_OF_MINT$$TREASURER$ promised is finished. Some people in the crowd cover their children's eyes as the statue is unveiled. It's a couple in the middle of lovemaking, and not exactly presented tastefully."
 FEE_Advisor_Event8.EVTOPT1:0 "Children must learn this sooner or later."
 FEE_Advisor_Event8.EVTOPT2:0 "Tear it down!"

 FEE_Advisor_Event.EVTNAME9:0 "Courtly Loans"
 FEE_Advisor_Event.EVTDESC9:0 "A merchant approaches the court and carefully pleads to make a payment plan for the recent loan taken by $MASTER_OF_MINT$$TREASURER$. It seems the fruits of labour may have been exaggerated, and since the loan was made in your name, this reflects poorly on you too. What will the consequence be for $MASTER_OF_MINT$$TREASURER$?"
 FEE_Advisor_Event9.EVTOPT1:0 "Understandable, collecting taxes is tough work."
 FEE_Advisor_Event9.EVTOPT2:0 "He has overstepped his bounds."

 FEE_Advisor_Event.EVTNAME10:0 "A Full Days Work"
 FEE_Advisor_Event.EVTDESC10:0 "$MASTER_OF_MINT$$TREASURER$ smiles at you. \"My Liege, I have noticed your mind seems to drift off whenever we discuss monetary issues. I believe that to make things interesting, one must be introduced to the subject where it is directly relevant to oneself. Perhaps you would like to join me tomorrow on a full days work?\""
 FEE_Advisor_Event10.EVTOPT1:0 "Yes that would be interesting."
 FEE_Advisor_Event10.EVTOPT2:0 "Hah! You must be joking. I have better things to do."

 FEE_Advisor_Event.EVTNAME11:0 "A Full Days Work"
 FEE_Advisor_Event.EVTDESC11:0 "$MASTER_OF_MINT$$TREASURER$ starts the day off collecting taxes. Some People frown and complain when they give away their earnings, $MASTER_OF_MINT$$TREASURER$ calmly explains why taxes are collected and manages to appease the complainers."
 FEE_Advisor_Event11.EVTOPT1:0 "Earning trust is earning gold."
 FEE_Advisor_Event11.EVTOPT2:0 "Maybe we could squeeze them for some more?"

 FEE_Advisor_Event.EVTNAME12:0 "A Full Days Work"
 FEE_Advisor_Event.EVTDESC12:0 "Today, $MASTER_OF_MINT$$TREASURER$ brings you to the nearest construction site to evaluate progress, notices that the builders are lagging behind the agreed schedule and proceeds to question them. The builders complain about the weather and want more pay to cover the delays, look over your way, awaiting a response."
 FEE_Advisor_Event12.EVTOPT1:0 "We will hold our end of the deal when you hold yours."
 FEE_Advisor_Event12.EVTOPT2:0 "I guess one cannot predict the weather."
 FEE_Advisor_Event12.EVTOPT3:0 "Clear the site! You will never work again!"

 FEE_Advisor_Event.EVTNAME13:0 "A Full Days Work"
 FEE_Advisor_Event.EVTDESC13:0 "A friend has come to visit $MASTER_OF_MINT$$TREASURER$ this evening. The three of you have a good time discussing your experiences over a fine evening meal. The Visitor nods at you, saying to $MASTER_OF_MINT$$TREASURER$: \"How lucky you are, to have a liege that understands your work. This cooperation should benefit both of you.\""
 FEE_Advisor_Event13.EVTOPT1:0 "It's been interesting, more so than many other things I've tried."
 FEE_Advisor_Event13.EVTOPT2:0 "It wasn't for me, it feels like stealing."
 FEE_Advisor_Event13.EVTOPT3:0 "I hated it! We should just kill the peasants and take their money."

 FEE_Advisor_Event.EVTNAME14:0 "Student of Language?"
 FEE_Advisor_Event.EVTDESC14:0 "My Advisor $STATESMAN$$DIPLOMAT$$COLONIAL_GOVERNOR$ kindly suggests that it would be of benefit to the realm if I studied the languages spoken at foreign courts. He also offers himself to aid me in my studies."
 FEE_Advisor_Event14.EVTOPT1:0 "An excellent idea!"
 FEE_Advisor_Event14.EVTOPT2:0 "If they can't speak [Root.Culture.GetName], they are not important."

 FEE_Advisor_Event.EVTNAME15:0 "Student of Language"
 FEE_Advisor_Event.EVTDESC15:0 "Distractions seem to overwhelm you during your studies. The Simplest pleasures, and even plain and mundane chores, seem like time better spent than drowning in books all evening. How does one manage to keep focused when everything else is so much more appealing?"
 FEE_Advisor_Event15.EVTOPT1:0 "If I learn even a few phrases, it will be worth it!"
 FEE_Advisor_Event15.EVTOPT2:0 "I guess learning languages is not for everyone."

 FEE_Advisor_Event.EVTNAME16:0 "Student of Language"
 FEE_Advisor_Event.EVTDESC16:0 "Advisor $STATESMAN$$DIPLOMAT$$COLONIAL_GOVERNOR$ has a look of parental disappointment in his eyes, \"I believe you could have done this well if only you'd put your mind to it. Unfortunately, your disinterest is all too apparent in your absence from our meetings. With your permission, I will henceforth focus on more useful work instead of waiting for you, my Liege.\""
 FEE_Advisor_Event16.EVTOPT1:0 "You will watch your tongue or lost it!"
 FEE_Advisor_Event16.EVTOPT2:0 "Although I learned less than expected, I thank you for your time."

 FEE_Advisor_Event.EVTNAME17:0 "Student of Language"
 FEE_Advisor_Event.EVTDESC17.1:0 "Your determination and hard work have paid off. Studying with your advisor $STATESMAN$$DIPLOMAT$$COLONIAL_GOVERNOR$, you have learned several new languages to a decent level of fluency. This will surely increase your prestige at foreign courts!"
 FEE_Advisor_Event.EVTDESC17.2:0 "Your determination and hard work have paid off. Studying now alone, you focus hard, you have learned several new languages to a decent level of fluency. This will surely increase your prestige at foreign courts!"
 FEE_Advisor_Event17.EVTOPT1:0 "I knew I could do it!"

 FEE_Advisor_Event.EVTNAME18:0 "Student of Language"
 FEE_Advisor_Event.EVTDESC18:0 "Without the support of your advisor $STATESMAN$$DIPLOMAT$$COLONIAL_GOVERNOR$ your study sessions seem to be and far between. You increasingly feel that the challenge is just too great to tackle on your own."
 FEE_Advisor_Event18.EVTOPT1:0 "At least I made an effort."

 FEE_Advisor_Event.EVTNAME19:0 "Excessive Bureaucracy"
 FEE_Advisor_Event.EVTDESC19:0 "While walking down the corridor of your court, a local peasant runs up to you with panic in his eyes: \"I had come here to ask for aid since some of my sheep had got killed by wild animals,  but now I just need to get out of here! I've already paid a dozen fees and been stuck in different rooms for hours in supposed 'queues' but I saw no-one else there! Please help my poor soul!\""
 FEE_Advisor_Event19.EVTOPT1:0 "Put $STATESMAN$$DIPLOMAT$$COLONIAL_GOVERNOR$ in prison for his bureaucratic scheme."
 FEE_Advisor_Event19.EVTOPT2:0 "I'll let $STATESMAN$$DIPLOMAT$$COLONIAL_GOVERNOR$ scheme slip by for now and join the scheme."

 FEE_Advisor_Event.EVTNAME20:0 "Up and Coming Commander"
 FEE_Advisor_Event.EVTDESC20:0 "Your Marshal, $ARMY_REFORMER$$ARMY_ORGANISER$$COMMANDANT$$GRAND_CAPTAIN$$NAVAL_REFORMER$$QUARTERMASTER$$RECRUITMASTER$, has come to you with a suggestion: \"My Lord, it is my opinion that I have found someone who would make an excellent military commander. I suggest we make use of they're talents for the good of the realm.\""
 FEE_Advisor_Event20.EVTOPT1:0 "Very well."
 FEE_Advisor_Event20.EVTOPT2:0 "Our military studies are a better use of funds."

 FEE_Advisor_Event.EVTNAME21:0 "Untrustworthy Assistants"
 FEE_Advisor_Event.EVTDESC21:0 "You receive news of your Marshal's activities in [Root.Capital.GetName]. It appears he has been spreading ill words about your rule, encouraging disloyalty among the peasantry!"
 FEE_Advisor_Event21.EVTOPT1:0 "A traitor cannot be Marshal!"
 FEE_Advisor_Event21.EVTOPT2:0 "Ill tidings, but I still need him."

 FEE_Advisor_Event.EVTNAME22:0 "Abuse of Power"
 FEE_Advisor_Event.EVTDESC22:0 "Worrying reports have reached you regarding your Marshal $ARMY_REFORMER$$ARMY_ORGANISER$$COMMANDANT$$GRAND_CAPTAIN$$NAVAL_REFORMER$$QUARTERMASTER$$RECRUITMASTER$. It seems he has been using your soldiers to extort money from the peasantry in [Root.Capital.GetName]."
 FEE_Advisor_Event22.EVTOPT1:0 "He has forfeited his office!"
 FEE_Advisor_Event22.EVTOPT2:0 "I will deal with this later."

 FEE_Advisor_Event.EVTNAME23:0 "The Brilliant Inventor"
 FEE_Advisor_Event.EVTDESC23:0 "Your Marshal, $ARMY_REFORMER$$ARMY_ORGANISER$$COMMANDANT$$GRAND_CAPTAIN$$NAVAL_REFORMER$$QUARTERMASTER$$RECRUITMASTER$, has put forward a plan for experimentation with new military technology, inspired by a supposedly brilliant inventor and engineer that he has recently befriended. All that is needed is a little funding..."
 FEE_Advisor_Event23.EVTOPT1:0 "You shall have it."
 FEE_Advisor_Event23.EVTOPT2:0 "No, this is pointless."

 FEE_Advisor_Event.EVTNAME24:0 "The Armoured Chariot"
 FEE_Advisor_Event.EVTDESC24:0 "You receive a report from the outcome of the military experiments that your Marshal asked you to sponsor. A large steel-plated chariot was constructed, propelled by ten men inside pulling it forward, directed by a commander peering out from a revolving turret mounted on top. This vehicle also had several ballistas firing through arrow slits. Unfortunately, its weight caused a wooden bridge to collapse when crossing and the invention was lost in the river, also killing the engineer. The marshal himself barely escaped with his life."
 FEE_Advisor_Event24.EVTOPT1:0 "Oh no!"

 FEE_Advisor_Event.EVTNAME25:0 "Screaming Arrows"
 FEE_Advisor_Event.EVTDESC25:0 "You receive a report on the outcome of the military experiments that your Marshal asked you to sponsor. Apparently, a new kind of self-propelled arrow was tried out, based on Far Eastern models. Lit by fire, these arrows would scream and fly away leaving a trail of smoke and then explode on impact, killing several of the livestock used as practice targets. Though of dubious accuracy and prone to failure in rainy weather, these experiments have still provided some valuable lessons."
 FEE_Advisor_Event25.EVTOPT1:0 "Excellent."

 FEE_Advisor_Event.EVTNAME26:0 "Burning Sheep"
 FEE_Advisor_Event.EVTDESC26:0 "You receive a report from the outcome of the military experiments that your Marshal asked you to sponsor. The experiments consisted of drenching a large amount of sheep in oil and setting fire to them, then sending the terrified, screaming animals towards the enemy. Unfortunately, it proved impossible to control the direction of the sheep. The engineer was immolated in a ball of fire and your Marshal was a injured, we await to see if he will survive."
 FEE_Advisor_Event26.EVTOPT1:0 "It seems we'll be dining roast mutton..."

 FEE_Advisor_Event.EVTNAME27:0 "Trumpets of Doom"
 FEE_Advisor_Event.EVTDESC27:0 "You receive a report on the outcome of the military experiments that your Marshal asked you to sponsor. Apparently, the experiments consisted of training a large force of musicians to blow their trumpets in unison, thus deafening and stunning the enemy army in preparation for an attack. Attempts were also made to make castle walls tumble by marching around them blowing the trumpets. \n\nUnfortunately, while quite expensive, none of these experiments were successful."
 FEE_Advisor_Event27.EVTOPT1:0 "Trumpets? How much did I pay for this again?"

 # Tooltips:
 EVERY_OWNED_CORE_PROVINCE_MINUS_2_UNREST:0 "Every owned core province loses §G-2§! unrest."
 EVERY_OWNED_CORE_PROVINCE_PLUS_1_UNREST:0 "Every owned core province gains §R+1§! unrest."
 heir_education.1.t:0 "Heir Education?"
 heir_education.1.d:0 "It is always important for a country to have a competent leader and because of this it's important that $HEIR$ gets the best education $HEIR_S_PRONOUN$ can get. However, there are many options to choose from and while its everyone's hope that $HEIR$ will be a competent successor, no one will know if he can even succeed.\n\nEducating $HEIR$ is a vital role in his upbringing that may shape $HEIR_ADJ$ personality and skills."
 heir_education.1.a:0 "Only the most renowned of academics in these lands will teach our heir."
 heir_education.1.a.tt:0 "Heir will be taught most excellently, we shall send him to the best university around!"
 heir_education.1.b:0 "Our own scholars shall make great educators."
 heir_education.1.b.tt:0 "Heir will be taught the best WE have to offer"
 heir_education.1.c:0 "A humble tutor will do our heir just fine."
 heir_education.1.c.tt:0 "Heir will be decently taught, they will gain the basic life skills needed to rule and be taught a few specialities"
 heir_education.1.e:0 "My child needs hands-on lifeskills to effectively rule."
 heir_education.1.e.tt:0 "Heir will be taught from life-experience and occasionally advisors, this may be an cheaper option which has the chance of being great or bad"
 heir_education.1.f:0 "Our heir is a natural Genius, he has no need for Education!"
 heir_education.1.f.tt:0 "As our heir is at the max stat, it would be best to let not to waste the time and money."
 neglected_heir_education:0 "Heir Neglected"


 heir_education.2.t:0 "The Artist's Canvas"
 heir_education.2.d:0 "One day, $ARTIST$ approached your presence, \"Your majesty, I'm concerned about the upbringing of $HEIR$, I understand if you don't trust the schools to educate him but someone needs to teach him the ropes of running our country.\"\n\nAs expected, $ARTIST$ is offering themselves to become $HEIR$'s tutor, teaching $HEIR_O_PRONOUN$ about the sophistication of the arts and music. In fact, $ARTIST$ would like to teach $HEIR$ the ways of mastering the canvas and bring $HEIR_O_PRONOUN$ to meet many prestigious artists and poets."
 heir_education.2.a:0 "I count on you to make $HEIR$ a master of the arts."
 heir_education.2.b:0 "Now where was that portrait I asked?"

 heir_education.3.t:0 "The Scientist's Experiment"
 heir_education.3.d:0 "One day, $NATURAL_SCIENTIST$ approached your presence, \"Your majesty, I'm concerned about the upbringing of $HEIR$, I understand if you don't trust the schools to educate him but someone needs to teach him the ropes of running our country.\"\n\nAs expected, $NATURAL_SCIENTIST$ is offering themselves to become $HEIR$'s tutor, teaching $HEIR_O_PRONOUN$ about the laws of nature and mathematics. In fact, $NATURAL_SCIENTIST$ would like to expose $HEIR$ the wonders of science and bring $HEIR_O_PRONOUN$ to meet many esteemed scholars."
 heir_education.3.a:0 "I count on you to make $HEIR$ a beacon of knowledge."
 heir_education.3.b:0 "So how are those experiments going?"

 heir_education.4.t:0 "The Inquisitor's Apprentice"
 heir_education.4.d:0 "One day, $INQUISITOR$ approached your presence, \"Your majesty, I'm concerned about the upbringing of $HEIR$, I understand if you don't trust the schools to educate him but someone needs to teach him the ropes of running our country.\"\n\nAs expected, $INQUISITOR$ is offering themselves to become $HEIR$'s tutor, teaching $HEIR_O_PRONOUN$ about the scriptures and in all matters of the religious laws. In fact, $INQUISITOR$ would like to take $HEIR$ as their apprentice and show $HEIR_O_PRONOUN$ the truth about our beloved faith."
 heir_education.4.a:0 "I count on you to make $HEIR$ one of god's pious servant."
 heir_education.4.b:0 "There's an awful lot of heretics these days isn't there?"

 heir_education.5.t:0 "The Trader's Bargain"
 heir_education.5.d:0 "One day, $TRADER$ approached your presence, \"Your majesty, I'm concerned about the upbringing of $HEIR$, I understand if you don't trust the schools to educate him but someone needs to teach him the ropes of running our country.\"\n\nAs expected, $TRADER$ is offering themselves to become $HEIR$'s tutor, teaching $HEIR_O_PRONOUN$ about economics and the silver tongue of commerce. In fact, $TRADER$ would like to take $HEIR$ to various markets all over the continent and show $HEIR_O_PRONOUN$ the way business is done among men of wit."
 heir_education.5.a:0 "I count on you to make $HEIR$ the embodiment of wealth."
 heir_education.5.b:0 "How's the trade doing old friend?"

 heir_education.6.t:0 "The Spymaster's Secrets"
 heir_education.6.d:0 "One day, $SPYMASTER$ approached your presence, \"Your majesty, I'm concerned about the upbringing of $HEIR$, I understand if you don't trust the schools to educate him but someone needs to teach him the ropes of running our country.\"\n\nAs expected, $SPYMASTER$ is offering themselves to become $HEIR$'s tutor, teaching $HEIR_O_PRONOUN$ about deception and the game of espionage. In fact, $SPYMASTER$ would like to share $HEIR$ the secrets to be the best amongst the shadows and introduce $HEIR_O_PRONOUN$ to many spymasters and inspectors known for their cunning intelligence."
 heir_education.6.a:0 "I count on you to make $HEIR$ an elusive shadow."
 heir_education.6.b:0 "I wonder what those pesky rivals are up to..."

 heir_education.7.t:0 "The Governor's Expeditions"
 heir_education.7.d:0 "One day, $COLONIAL_GOVERNOR$ approached your presence, \"Your majesty, I'm concerned about the upbringing of $HEIR$, I understand if you don't trust the schools to educate him but someone needs to teach him the ropes of running our country.\"\n\nAs expected, $COLONIAL_GOVERNOR$ is offering themselves to become $HEIR$'s tutor, teaching $HEIR_O_PRONOUN$ about administrating a settlement and the politics of colonies. In fact, $COLONIAL_GOVERNOR$ would like to show $HEIR$ the tricks of running an efficient bureaucracy and introduce $HEIR_O_PRONOUN$ to the splendors of wealth from the new world."
 heir_education.7.a:0 "I count on you to make $HEIR$ a colonial mastermind"
 heir_education.7.b:0 "How are the colonies?" 

 heir_education.8.t:0 "The Reformer's Tactics"
 heir_education.8.d:0 "One day, $ARMY_REFORMER$ approached your presence, \"Your majesty, I'm concerned about the upbringing of $HEIR$, I understand if you don't trust the schools to educate him but someone needs to teach him the ropes of running our country.\"\n\nAs expected, $ARMY_REFORMER$ is offering themselves to become $HEIR$'s tutor, teaching $HEIR_O_PRONOUN$ about military strategies and tactics. In fact, $ARMY_REFORMER$ would like to show $HEIR$ the value of military strength on the battlefield and introduce $HEIR_O_PRONOUN$ to the thrilling world of warfare."
 heir_education.8.a:0 "I count on you to make $HEIR$ a tactical genius."
 heir_education.8.b:0 "I hope the troops are doing well..." 

 heir_education.9.t:0 "The Fortifier's Defence"
 heir_education.9.d:0 "One day, $FORTIFICATION_EXPERT$ approached your presence, \"Your majesty, I'm concerned about the upbringing of $HEIR$, I understand if you don't trust the schools to educate him but someone needs to teach him the ropes of running our country.\"\n\nAs expected, $FORTIFICATION_EXPERT$ is offering themselves to become $HEIR$'s tutor, teaching $HEIR_O_PRONOUN$ about the importance of preparation and how to create strategically excellent forts. In fact, $FORTIFICATION_EXPERT$ would like to encourage $HEIR$ on engineering $HEIR_O_PRONOUN$ own fortresses to get first hand experience and introduce $HEIR_O_PRONOUN$ to numerous renowned military engineers and architects."
 heir_education.9.a:0 "I count on you to make $HEIR$ a fortification expert."
 heir_education.9.b:0 "I hope the troops are doing well..." 

 heir_education.10.t:0 "The Grand Captain's Men"
 heir_education.10.d:0 "One day, $GRAND_CAPTAIN$ approached your presence, \"Your majesty, I'm concerned about the upbringing of $HEIR$, I understand if you don't trust the schools to educate him but someone needs to teach him the ropes of running our country.\"\n\nAs expected, $GRAND_CAPTAIN$ is offering themselves to become $HEIR$'s tutor, teaching $HEIR_O_PRONOUN$ about discipline and the qualities of a valiant fighter on the battlefield. In fact, $GRAND_CAPTAIN$ would like to encourage $HEIR$ on joining $HEIR_O_PRONOUN$ first military expedition facing the enemy and introduce $HEIR_O_PRONOUN$ to the most skilled and deadly men we have to offer, in hopes that he can learn from them too."
 heir_education.10.a:0 "I count on you to make $HEIR$ a fortification expert."
 heir_education.10.b:0 "I hope the troops are doing well..." 

 heir_education.11.t:0 "Heir's Excellent Education has Finished"
 heir_education.11.d:0 "After a decade of learning and studying from the best tutors money could find, $HEIR$ has finally finished their education in one of the most prestigious academies in $CAPITAL_CITY$. Despite learning calligraphy from the finest $CULTURE$ writers and taught etiquette by a famed governess, its still very unknown if $HEIR$ has learned much or anything at all, and we pray to the heavens that all the funds didn't go down the drain..."
 heir_education.11.a:0 "Let's see what you've learned."

 heir_education.12.t:0 "Heir's Good Education has Finished"
 heir_education.12.d:0 "After a decade of learning and studying from our most experienced educators, $HEIR$ has finally finished their education by graduating from a small yet well-known school in $CAPITAL_CITY$. Despite being able to talk, read and write fluently with special commendation from several teachers, its still very unknown if $HEIR$ has learned much or anything at all, and we pray to the heavens that all the funds didn't go down the drain..."
 heir_education.12.a:0 "Let's see what you've learned."

 heir_education.13.t:0 "Heir's Average Education has Finished"
 heir_education.13.d:0 "After a decade of learning and studying from a homeschooled curriculum, $HEIR$ has finally finished their education with their humble tutor in his home at $CAPITAL_CITY$. Despite only taught by a tutor with adequate expertise, $HEIR$ have learned much about our realm through his own experiences, its still very unknown if $HEIR$ has learned much or anything at all, and we pray to the heavens that all the funds didn't go down the drain..."
 heir_education.13.a:0 "Let's see what you've learned."

 heir_education.14.t:0 "Heir's Lack of Education has Finished"
 heir_education.14.d:0 "After a decade of learning and studying from arbitrary experiences and often first-hand accounts, $HEIR$ has finally finished their education scuttering and interacting with the various classes and people all over $CAPITAL_CITY$. Although our heir received no formal education and little tutoring throughout his young life, $HEIR$ have learned much by his own means, prodding his nose into others' business most of the time but its still very unknown if $HEIR$ has learned much or anything at all, and we pray to the heavens that all the funds didn't go down the drain..."
 heir_education.14.a:0 "Let's see what you've learned."

 heir_education.101.t:0 "Respected Scholar"
 heir_education.101.d:0 "Throughout the years of their youth, our heir has become a respected scholar. $HEIR$ has shown great interest in the arts, sciences and scripture since a very young age and has applied this greatly in his education, scoring exceptionally high-marks in examinations and winning numerous awards for $HEIR_ADJ$ cunningness and wit. Considered an excellent pupil by the teachers, $HEIR$ has done well throughout his education and has balanced the use of the pen and the sword, all while learning the intricacies of bureaucracy and beuaty of the arts. Our education has made $HEIR$ into a well-rounded heir fit for the throne."
 heir_education.101.a:0 "As expected from a child of mine."

 heir_education.102.t:0 "Shadow Mastermind"
 heir_education.102.d:0 "Throughout the years of their youth, our heir has become a shadow mastermind. $HEIR$ has been trained in intrigue and espionage since a young age, revealing a hidden talent that has been trained to its true potential. Always hidden in the shadows and always inventing new schemes, only few can get a glimpse into the secretive mind of $HEIR$ and even fewer can get the better end of the deal. However, our heir's affairs in the underground world has made $HEIR_O_PRONOUN$ overly reliant on networks and assassins and not so much in the face of actual danger. Our education has made $HEIR$ into a manipulative spymaster."
 heir_education.102.a:0 "Intriguing..."

 heir_education.103.t:0 "Military Mathematician"
 heir_education.103.d:0 "Throughout the years of their youth, our heir has become a military mathematician. $HEIR$ has proved themselves as both a man of brain and brawn, able to calculate precision and deadliness when presented with conflict and swift thinking in times when odds are not in their favor. Mastering the world of engineering, $HEIR$ has proved to be both a innovative yet dangereous general, coming up with new siege machines and weapons while predicting the enemy's next move. It looks like time spent in the study doesn't mean time is not spent in the fields. Our education has made $HEIR$ into a military mathematician."
 heir_education.103.a:0 "I didn't expect this from geometry lessons."

 heir_education.104.t:0 "Gullible Genius"
 heir_education.104.d:0 "Throughout the years of their youth, our heir has become a gullible genius. $HEIR$ possesses a mind and intellect like no other, able to solve complex algebraic equations in a flash and can recall pages upon pages of our country's history without hesitating. Our scholars has claimed him to be one of the most intelligent people in the realm and we wear it with pride. However, there is a downside. Despite $HEIR$ intelligence is unrivalled, his naivety and lack of practical skills is an issue, unable to engage in diplomatic conversation or make the right moves. This is expected from a royal who is both sheltered and counts too much. Our education has made $HEIR$ into a gullible genius."
 heir_education.104.a:0 "At least he's smarter than me."

 heir_education.105.t:0 "Master of the Sword"
 heir_education.105.d:0 "Throughout the years of their youth, our heir has become a master of the sword. $HEIR$ was a rough child, engaging in frequent fights with other pupils and often considered a bully to weaker children. However, thanks to his lively intiative, $HEIR$ was given special education in the arts of warfare and tactics at an early age with many of $HEIR_ADJ$ bad tendencies suppressed under strict guardians. In the end, this made our heir a person of great military skill, mastering the vast battlefield by day and strategising the next move at night. However, $HEIR$ focus on military skills means $HEIR_S_PRONOUN$ other subjects are suffering ad in turn, this makes $HEIR_ADJ$ ignorant to politics or bureaucracy. Our education has made $HEIR$ into a master of the sword."
 heir_education.105.a:0 "A fine addition to the dynasty."

 heir_education.106.t:0 "Pragmatic Jury"
 heir_education.106.d:0 "Throughout the years of their youth, our heir has become a pragmatic jury. $HEIR$ was one of the few pupils that had a keen interest in law & politics, to our courtier's relief. While just as confused as everyone after learning all about the intriciacies of the laws of our country, $HEIR$ took an initiative to dedicate $HEIR_ADJ$ education to the greater good of justice, attending many noisy debates and memorized pages upon pages about our realm's laws, politics and bureaucracy, making $HEIR_O_PRONOUN$ one of the few who have the privilege of knowing the in's and out's of the convoluted mess that is the $COUNTRY_ADJ$ government. Our education has made $HEIR$ into a pragmatic jury."
 heir_education.106.a:0 "Finally, someone who likes paperwork."

 heir_education.107.t:0 "Dim Pupil"
 heir_education.107.d:0 "Throughout the years of their youth, our heir has become a dim pupil. $HEIR$ was blessed to be born as a $DYNASTY$, unfortunately this doesn't mean that $HEIR_S_PRONOUN$ was blessed with wit or charm. Barely passing his classes, or what's left of it after his tutors were too frustrated, our heir has never been particularly good at anything and is in fact, quite dim. This has made $HEIR$ more careless and clumsy, some even think $HEIR_S_PRONOUN$'s' unable to fulfil $HEIR_ADJ$ expected duties as future monarch. Unable to do proper paperwork, horrible at negotiating and too cowardly to run an army, it seems that this isn't our finest moment in history. Our education has made $HEIR$ into a dim pupil."
 heir_education.107.a:0 "May god help us..."

 heir_education.108.t:0 "Merry Drunkard"
 heir_education.108.d:0 "Throughout the years of their youth, our heir has become merry drunkard. $HEIR$ could've been many things throughout his childhood, however out of all the paths of life, it seems that our heir has chosen no more than a common alcoholic. To the dismay of our courtiers, $HEIR$ has evolved from taking a few sips into whole bottles, often missing for days and found in pubs and brothels all over $CAPITAL_CITY$, squandering what little wealth $HEIR_S_PRONOUN$  had on wine and bear and mead. This has made $HEIR$ particularly unintelligent, unable to do the simplest of mathematics or even write properly in $CULTURE$ but to our surprise, $HEIR$ is extraordinarily talented at persuasion and diplomacy, owing his silver-tongue to spending time in the shady pubs. Furthermore, $HEIR_S_PRONOUN$ has connections in and out of $COUNTRY$ with large connections of friends in the more darker parts of politics, warfare and commerce."
 heir_education.108.a:0 "Last thing I need is a drunkard..."

 heir_education.109.t:0 "Not-so-Bright Warrior"
 heir_education.109.d:0 "Throughout the years of their youth, our heir has become a not-so-bright warrior. $HEIR$ is a very unique child. Growing up within the castle walls, our courtiers observe that $HEIR$ possesses a great talent for strength, even to a point that $HEIR_S_PRONOUN$ was able to lift and toss around objects more nearly twice his weight with ease. Our priests claim that this was a great gift from the heavens, but it would be a gift if $HEIR$ wasn't so incredibly slow. While our generals make use of $HEIR_ADJ$ strength by training $HEIR$ in the art of warfare, which $HEIR_S_PRONOUN$ succeeded with flying colors, little could be done about his dull intellect. Having trouble with even reading and slurring in his speech, our heir was never destined for knowledge. Our education has made $HEIR$ a not-so-bright warrior."
 heir_education.109.a:0 "Looks like it does run in the family."

 heir_education.110.t:0 "Pious Zealot"
 heir_education.110.d:0 "Throughout the years of their youth, our heir has become a pious zealot. $HEIR$ has been devoting $HEIR_ADJ$ life to religious duties and praying as the young royal sought to seek clarity, wisdom and guidance from the almighty heavens. Spending most of $HEIR_ADJ$ time in the temples and often discussing the scriptures with older priests, $HEIR$ is committed to be a pious servant for the heavens and unlike many youths around $HEIR_O_PRONOUN$, abstains from luxurious goods and alcohol, instead donating his time to charity and the lesser fortunate. Unfortunately, this has cause $HEIR$ to become sheltered and often naive to the more cruel world where deceit and lies exist, often choosing to do ambitiously impossible tasks in the name of god such as ending corruption. Our education has made $HEIR$ a pious zealot."
 heir_education.110.a:0 "We are truly blessed."

 heir_education.111.t:0 "Curious Skeptic"
 heir_education.111.d:0 "Throughout the years of their youth, our heir has become a curious skeptic. $HEIR$ was always considered to be a nosy child, often snooping around the courts and getting his nose into other people's business, to the dismay or pleasure of our subjects. Furthermore, as $HEIR$ get older, our assigned tutors and educators noticed that $HEIR$ is often quite stubborn and refuse to indulge in the scriptures, holy texts or stories that is presented, often asking too many questions and complaining of its credibility, earning him his skeptical attitude. This in turn however, has made $HEIR$ to be great at $HEIR_ADJ$ more materialistic subjects such as the sciences, philosophy and geometry as well as being more careful around our more zealous courtiers. Our education has made $HEIR$ a curious skeptic."
 heir_education.111.a:0 "Shush! Don't let the inquisitors know!"

 heir_education.112.t:0 "Unfortunate Gambler"
 heir_education.112.d:0 "Throughout the years of their youth, our heir has become a unfortunate gambler. Somewhere down the line, $HEIR$ was interested in the gambling and while it started out with a few peanuts, as they got older it spiralled as every coin turned from their hand into the opponents, never stopping to look whether the mirage of the 'jackpot' is real. Whether its bad parenting or bad supervision, its no doubt that this has led $HEIR$ to crave risks and often take careless decisions, some even nearly cost their life. Whether this was a product of failed education or the absence of it, our heir can be expected to gamble the treasury empty."
 heir_education.112.a:0 "I bet my coffers are already empty."

 heir_education.113.t:0 "Believer of the Occult"
 heir_education.113.d:0 "Throughout the years of their youth, our heir has become a believer of the occult. Whether it was by luck or destiny, $HEIR$ was always captivated in the mysteries and dark secrets of the world, never ending in $HEIR_ADJ$ pursuit towards immortality, god-like abilities or universal secrets. This has made our heir to join many secret cults, whether legal or illegal, their practices are mostly deemed heretical and some rumored satanic. Believing in witchcraft and sorcery, our heir has become a believer of the occult, whether it's just an elaborate scam or truly a hidden path in life, this was definitely not a phase." 
 heir_education.113.a:0 "This is horribly heretical!"

 heir_education.114.t:0 "Mercantile Maestro"
 heir_education.114.d:0 "Throughout the years of their youth, our heir has become a mercantile maestro. Through the stroke of genius or luck, $HEIR$ has always been fond of money and with it the great interest of commerce, trade and economies. Despite this, little was actually learned at schools or academies but $HEIR$ found a hidden talent for bartering and negotiating that lead $HEIR_O_PRONOUN$ to become a known maestro in all that shines. Our heir knows the markets, and $HEIR_S_PRONOUN$ knows it well, experiencing the trade first-hand by eye not by paper."
 heir_education.114.a:0 "Must've run in the family."

 heir_education.115.t:0 "Jolly Performer"
 heir_education.115.d:0 "Throughout the years of their youth, our heir has become a jolly performer. Never finding much talent in diplomatic, administrative or military tasks, $HEIR$ was a lost cause to many of our courtiers yet unknown at the time, $HEIR$ was gifted with the talent of pleasing patrons and entertaining crowds, able to entertain many with $HEIR_ADJ$ plays, tragedies and musical, as well as vocal, talent. Born to be on stage, $HEIR$ has mastered the art of acting and music, able to play several instruments and often finding joy in entertaining people with them. Due to this however, our heir is frowned upon our military, often seeing $HEIR$ as not fit for rule since a monarch do not play the lute or entertain the dull masses."
 heir_education.115.a:0 "I don't know whether I'm entertained or amused."
 
 heir_education.200.t:0 "Extra Lessons?"
 heir_education.200.d:0 "As our heir continues to grow into a stronger, more educated heir; some have suggested that we should place [Root.Heir.GetHerHimCap] into more lessons to learn some specialities. \nMany different classes would involve giving [Root.Heir.GetHerHimCap] more administrative duties to learn from, or we could task [Root.Heir.GetHerHimCap] with learning more proper Etiquette in a court of diplomats or even train [Root.Heir.GetHerHimCap] to be a better swordfighter with Fencing training."
 heir_education.200.a:0 "Administative classes."
 heir_education.200.b:0 "Teach [Root.Heir.GetHerHimCap] proper Diplomatic Etiquette."
 heir_education.200.c:0 "Fencing Classes for [Root.Heir.GetName]!"
 heir_education.200.e:0 "We should not overwork our heir, he is fine learning what he is."

