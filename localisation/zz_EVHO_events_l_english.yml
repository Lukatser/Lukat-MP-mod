 AE_events_charles_v.100.t:0 "The Habsburg dynasty in Castile"
 AE_events_charles_v.100.d:0 "The son of Maximillian I of Habsburg and Mary of Burgundy, Phillip I would succeed in winning the crown of Castille for the Habsburg dynasty. Already the ruler of the Austrian lowlands through his mother, in 1506 Phillip organized a coup and overthrew the acting king of Spain, Ferdinand II. Though he died mere months later, Philip's legacy would live on through his son Charles V, who would come to rule over one of the largest empires in history."
 AE_events_charles_v.100.a:0 "Charles should be the heir apparent."
 AE_events_charles_v.100.b:0 "We’d better concentrate on [Root.GetName]."

