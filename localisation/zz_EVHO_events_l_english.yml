 #Philippines Flavors
 flavor_MHKPHI.1.name:0 "Question of the Capital"
 flavor_MHKPHI.1.desc:0 "As we have united our brothers into one new nation, a problem came into our minds. Should are capital be located where it is right now, or should we move it to a more favorable spot."
 flavor_MHKPHI.1.a:0 "Move it to Manila where trade is high."
 flavor_MHKPHI.1.b:0 "Move it to Panay where it is in the middle of the nation."
 flavor_MHKPHI.1.c:0 "The capital stays at $CAPITAL_CITY$."
 flavor_MHKPHI.2.name:0 "Religious Policies"
 flavor_MHKPHI.2.desc:0 "As our nation grows, our people question our policies on religion. Are we to promote a tolerance to heathens and heretics or are we to ask them to convert?"
 flavor_MHKPHI.2.a:0 "We should allow them to live their lives peacefully."
 flavor_MHKPHI.2.a:0 "They have to follow our religion and beliefs."
 flavor_MHKPHI.3.name:0 "European Discovery"
 flavor_MHKPHI.3.desc:0 "As we explore westward, We have discovered countries with different cultures and tradtions. Their use of technology is intruiging as well. Should we incorporate their technology into good use or should we remain with our traditional ways."
 flavor_MHKPHI.3.a:0 "This is good step for the rise of our nation."
 flavor_MHKPHI.3.b:0 "We must uphold our traditional ways."
 
 #Pinoy Culture
 pinoy_culture.main.name:0 "Emergence of Pinoy Culture"
 pinoy_culture.main.desc:0 "After long years of occupation by our overlords, many of our fellow bretheren have united to stand against these oppressors. We must fight to unite our people!."
