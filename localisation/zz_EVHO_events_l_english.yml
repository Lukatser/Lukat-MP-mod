 EVHO_nordic_events.1.title:0 "Negotiation with the Swedish Noblemen"
 EVHO_nordic_events.1.desc:0 "Once again the Swedish noblemen are wishing for their independence. The current unrest in Sweden and with the union once again under threat, swift action is now warranted. The noblemen will be invited to come dine in Stockholm under the impression they will be negotiating with us about achieving a peaceful resolution. The reality is, this presents us with the opportunity to finally deal with these rebellious nobles. Say the word my §Y[DAN.Monarch.GetTitle]§! and they will be imprisoned, trialed and executed. With that being said, a minority of advisors within your council do advise that we release Sweden, as they will continue to be nothing but rebellious while within the union."
 EVHO_nordic_events.1.a:0 "The Kalmar Union must remain, kill the noblemen."
 EVHO_nordic_events.1.b:0 "It's time to release Sweden from the union."
 EVHO_nordic_events.2.title:0 "Stockholm Bloodbath"
 EVHO_nordic_events.2.desc:0 "That tyrant §Y[DAN.Monarch.GetTitle]§! §Y[DAN.Monarch.GetName]§! tricked us into thinking he was going to negotiate. He has unlawfully trialed and executed many of our noblemen on the grounds of treason and heresy. This is an act of which we cannot tolerate, we must take up the flames of rebellion once again and attempt to free ourselves from the tyranny of Danish rule."
 EVHO_nordic_events.2.a:0 "To arms, countrymen of Sweden!"
 EVHO_nordic_events.3.title:0 "End of the Kalmar Union"
 EVHO_nordic_events.3.desc:0 "The wise §Y[DAN.Monarch.GetTitle]§! §Y[DAN.Monarch.GetName]§! has agreed to peacefully release Sweden from the Kalmar Union. Now we may prosper and establish ourselves as a prestigious independent Kingdom once again."
 EVHO_nordic_events.3.a:0 "Free at last."
 EVHO_nordic_events.4.title:0 "The Gå-På Military Doctrine"
 EVHO_nordic_events.4.desc:0 "The Gå-På (literally "Go-On") method was based on shock tactics and was the standard combat technique used historically in the Swedish army during the 17th and 18th century. This very aggressive tactic often resulted in short-lived successful battles against superior numbers of the enemy. According to army regulations of 1694 and 1701, the infantry attack operated as follows: In four ranks with gaps, a Swedish battalion would march "smoothly and slowly" towards the enemy lines, braving enemy fire that often started at a distance of approximately 100 metres. The Swedish soldiers were told not to fire until "you could see the whites in the enemies eyes", a range of roughly 50 metres. When the marching drums stopped the two rear ranks would fill the gaps within the two foremost ranks and fire a salvo, then draw their swords. The two rear ranks would then move back to their previous position, and the two foremost ranks would close the gaps in their lines, after which the battalion would resume their attack. The two foremost ranks would discharge their muskets in a final volley when they were within range to charge—a distance of roughly 20 metres. At these ranges, the powerful muskets usually felled many enemy troops, having a great physical and psychological impact on opponents."
 EVHO_nordic_events.4.a:0 "Adopt the doctrine."
 EVHO_nordic_events.4.b:0 "We have no need for this doctrine."
 EVHO_nordic_events.5.title:0 "Conflict in Scandinavia"
 EVHO_nordic_events.5.desc:0 "The Kalmar Union has once again dissolved into conflict with Sweden now fighting for their independence from Denmark. This provides us with a great opportunity to extend our trade influence into the Baltic Sea by offering Sweden our assistance in the war for in-return expanded trading rights to their ports. This though will expose our nation to potential Danish retaliation should the war end with a decisive Swedish defeat."
 EVHO_nordic_events.5.a:0 "Send the proposal to Sweden."
 EVHO_nordic_events.5.b:0 "Perhaps it's best that we keep to our own affairs."
 EVHO_nordic_events.6.title:0 "The Proposal from Lubeck"
 EVHO_nordic_events.6.desc:0 "The traders of Lubeck have come to us with a intriguing proposal. They offer their full military assistance in the war, an alliance and some monetary subsidies for expanded trading rights and access to our ports. This will inevitably further increase the Hanseatic control and monopoly of trade within the Baltic region at the expense of our own. Should the war seem to be turning against us, this would be a good way to help secure our independence."
 EVHO_nordic_events.6.a:0 "We accept their terms."
 EVHO_nordic_events.6.b:0 "We have no need for their assistance."
 EVHO_nordic_events.8.title:0 "The Alexander of the North"
 EVHO_nordic_events.8.desc:0 "After the triumphant victory and utter defeat over the Tsar of Russia, your men come before you and hail you as the Alexander of the North. Sweden now stands uncontested and the path for a Swedish Empire to rise has been set. Your achievement will go down legendary in the history books and you will not be forgotten, the many Kings and Queens of Sweden who will come after you shall envy the legacy you have made for yourself."
 EVHO_nordic_events.8.a:0 "You will forever be known as the 'Alexander of the North'."
 EVHO_nordic_events.9.t:0 "The Danish Claim"
 EVHO_nordic_events.9.d:0 "The Danish have a claim to our throne, how do we proceed?"
 EVHO_nordic_events.9.a:0 "They'll have to fight us for it!"
 EVHO_nordic_events.9.b:0 "Invite their king to our court."
 EVHO_nordic_events.10.t:0 "The Swedish Claim"
 EVHO_nordic_events.10.d:0 "The Swedish have a claim to our throne, how do we proceed?"
 EVHO_nordic_events.10.a:0 "They'll have to fight us for it!"
 EVHO_nordic_events.10.b:0 "Invite their king to our court."
 EVHO_nordic_events.11.t:0 "Claims on the Balticum"
 EVHO_nordic_events.11.d:0 "The Valuable Seafaring lands of the Baltic are within the grasp of our realm and we should be doing everything within our power to bring these lands under our protection."
 EVHO_nordic_events.11.a:0 "And so it shall be."
 EVHO_nordic_events.12.t:0 "Sneak attack into Livonia"
 EVHO_nordic_events.12.d:0 "Lands of great strategic importance to our realm are held by enemies, or at least should be held by us. The Greatness of our realm is a near sure thing, but we must make this truth clear to the other powers of Europa. This is the most important step to controlling the Baltic sea. Shall we proceed?"
 EVHO_nordic_events.12.a:0 "For the [Root.GetAdjective] Realm!"
 EVHO_nordic_events.12.b:0 "The [Root.GetAdjective] have other concerns."
 EVHO_nordic_events.13.t:0 "The [From.GetAdjective]-[Root.GetAdjective] Wars"
 EVHO_nordic_events.13.d:0 "To the North lies the usurping realm of the [From.GetAdjective], who have, without provocation, seized Baltic territory held by our great kingdom. They expect war, they must, or else they lack some sense of self-preservation. In any case, we must remind them why our state is one which commands fear in the hearts of the people and rulers of Eastern Europe."
 EVHO_nordic_events.13.a:0 "They will have to pay for those lands in blood."
 EVHO_nordic_events.13.b:0 "They can enjoy their new holdings for now..."
 EVHO_nordic_events.14.t:0 "Advantage over the Swedes"
 EVHO_nordic_events.14.d:0 "The Ruler of Sweden is young and inexperienced in matter of both statecraft and warfare, and yet his kingdom holds lands in the Baltics and other territories that are the property of our Lord in the sight of God. Alone it's possible we could defeat them, but they have harrased and frustrated the armies of this realm for centuries, and we have learned the hard way that fighting them alone is not as easy as it may appear at first. Luckily, there may be other powers in Europe who might very much like to see this infamous "Lion from the North" tamed and in a cage once more..."
 EVHO_nordic_events.14.a:0 "Make the preparations..."
 EVHO_nordic_events.14.b:0 "War isn't on the [Root.GetAdjective] Agenda."
 EVHO_nordic_events.15.t:0 "[From.GetName] suggests Secret Alliance against Sweden"
 EVHO_nordic_events.15.d:0 "Our enemy to the North has harried our ambitions for a very long time. Until now there was no opportunity to take the lands they hold which are rightfully ours. [From.GetAdjective] diplomats have assured us that now, however, is the perfect time to strike against them. What do we tell them?"
 EVHO_nordic_events.15.a:0 "Tell the [From.GetAdjective]s we'll back them in an attack."
 EVHO_nordic_events.15.b:0 "Thell them we're not interested!"
 EVHO_nordic_events.16.t:0 "The Positive [From.GetAdjective] Response"
 EVHO_nordic_events.16.d:0 "The diplomatic corps of the [From.GetAdjective] have returned our notes regarding our planned action against the Northern menace..."
 EVHO_nordic_events.16.a:0 "They will stand with us..."
 EVHO_nordic_events.17.t:0 "The Great Northern War"
 EVHO_nordic_events.17.d:0 "Second Northern War, also called Great Northern War, (1700–21), military conflict in which Russia, Denmark-Norway, and Saxony-Poland challenged the supremacy of Sweden in the Baltic area. The war resulted in the decline of Swedish influence and the emergence of Russia as a major power in that region. Sweden’s expansion in the Baltic Sea coastlands during the 16th and 17th centuries had antagonized the neighbouring states: Russia’s access to the Baltic was blocked by Swedish-held Karelia, Ingria, Estonia, and Livonia; Denmark-Norway resented its loss to Sweden of provinces in the Scandinavian peninsula, especially Scania (Skåne), and was also aggrieved by Sweden’s alliance with the ducal house of Holstein-Gottorp, which contained Denmark from the south and prevented the Danish crown’s reabsorption of the duchies of Schleswig and Holstein; the German princes disliked Sweden’s power in the Holy Roman Empire, and Brandenburg in particular coveted Swedish Pomerania; and many magnates of the Polish republic still thought of Swedish Livonia as Polish by right. The death of the Swedish king Charles XI in 1697, when his heir, Charles XII, was but a boy of 14, became the signal for Denmark-Norway to organize an anti-Swedish coalition."
 EVHO_nordic_events.17.a:0 "This is where the fun begins!"
 cb_great_northern_war:0 "Great Northern War"
 cb_great_northern_war_desc:0 "The powers of Northern Europe smell the blood in the water and now circle around Stockholm."
 take_capital_great_northern_war:0 "Take Rightful Land"
 take_capital_great_northern_war_desc:0 "War goal is to take the capital. You will be able to force them to return rightful land to you after they fall."
 EVHO_GREAT_NORTHERN_WAR_NAME:0 "$ORDER$$FIRST$-$SECOND$ Great Northern War"
 EVHO_nordic_events.20.t:0 "[Root.GetAdjective] Finlands"
 EVHO_nordic_events.20.d:0 "Our eastern title has fallen astray as of late, is the duty of our realm to restore our former glory."
 EVHO_nordic_events.20.a:0 "For Sverge!"
 EVHO_nordic_events.21.t:0 "Inheritance of Pomerania-Stolp"
 EVHO_nordic_events.21.d:0 "Lord, your cousin in Stolp has perished and has named you his heir, this is an opportunity to escape the disadvantageous position you hold in Scandinavian politics, at least for a time."
 EVHO_nordic_events.21.a:0 "Make Stolp the new primary title"
 EVHO_nordic_events.21.b:0 "Remain in Gotland"
 EVHO_nordic_events.22.t:0 "Restore Control of Gotland?"
 EVHO_nordic_events.22.d:0 "The Usurpers of Gotland have decided to meddle themeslves into the affairs of other realms in order to gain a more advantageous position against us, this provides us with an oportunity to retake rightful clay in the north sea."
 EVHO_nordic_events.22.a:0 "Send a party."
 EVHO_nordic_events.22.b:0 "This is not a good time."
 EVHO_nordic_events.23.t:0 "The [From.GetAdjective] Seize Gotland"
 EVHO_nordic_events.23.d:0 "Our seat in Gotland has been seized by the usurping rulers of [From.GetName]. How do we proceed?"
 EVHO_nordic_events.23.a:0 "War is the only recourse!"
 EVHO_nordic_events.23.b:0 "The title simply isn't worth it..."
 EVHO_nordic_events.24.t:0 "End of Swedish Absolutism"
 EVHO_nordic_events.24.d:0 "Following devastating losses in war against powers we cannot hope to defeat, and in the face of a monarch who refuses to make peace with his enemies despite the pleas of his soldiers, nobility, and peasantry, the Nobility and Upper classes of Swedish Society have demanded the creation of a Parliament and the arrest of total political power from the hands of the Monarchy."
 EVHO_nordic_events.24.a:0 "Traitors!"
 EVHO_nordic_events.26.t:0 "Vår Stormaktstid Är Över"
 EVHO_nordic_events.26.d:0 "Sweden's time amongst the Great Powers of the world has come to an end as a result of our shameful defeat in this, our most recent and costly war against another of the Great Powers."
 EVHO_nordic_events.26.a:0 "The Great Days are over... Never to return."
 EVHO_nordic_events.27.t:0 "Treaty of Frederiksborg"
 EVHO_nordic_events.27.d:0 "Whilst the war marched on all around both us and our woe-begotten enemy, our diplomats were hard at work attempting to negotiate any peace at all from the Swedes. A deal has been struck that would earn us quite a sum in war restitution and our holdings in Denmark and Norway restored in exchange for peace. The offer needs to be approved by the government before it can be put into place."
 EVHO_nordic_events.27.a:0 "And what a noble peace it is."
 EVHO_nordic_events.27.b:0 "These terms are a joke!"
 EVHO_nordic_events.30.t:0 "The Treaties of Stockholm"
 EVHO_nordic_events.30.d:0 "Whilst the war marched on all around both us and our woe-begotten enemy, our diplomats were hard at work attempting to negotiate any peace at all from the Swedes. A deal has been struck that would earn us our hard-earned desired territories in Northern Germany in exchange for peace. The offer needs to be approved by the government before it can be put into place."
 EVHO_nordic_events.32.t:0 "Treaty of Riga"
 EVHO_nordic_events.32.d:0 "Whilst the war marched on all around both us and our woe-begotten enemy, our diplomats were hard at work attempting to negotiate any peace at all from the Swedes. A deal has been struck that would earn us our hard-earned restoration of rightful territories on the Baltics, Poland, and Ruthenia. The offer needs to be approved by the government before it can be put into place."
 EVHO_nordic_events.33.t:0 "Treaty of Nystad"
 EVHO_nordic_events.33.d:0 "Whilst the war marched on all around both us and our woe-begotten enemy, our diplomats were hard at work attempting to negotiate any peace at all from the Swedes. A deal has been struck that would earn us our hard-earned restoration of rightful territories on the Baltics, Russia, and Ruthenia. The offer needs to be approved by the government before it can be put into place."
 EVHO_nordic_events.34.t:0 "The Danish Claim"
 EVHO_nordic_events.34.d:0 "The Danish have a claim to our throne, how do we proceed?"
 EVHO_nordic_events.34.a:0 "They'll have to fight us for it!"
 EVHO_nordic_events.34.b:0 "Invite their king to our court."
 EVHO_nordic_events.35.t:0 "Alliance with [revolution_target_event.GetName]?"
 EVHO_nordic_events.35.d:0 "The great enemy of Europe has proven that he may very well be destined to be it's master, it may be time for us to allign ourselves with his interests, before our choice in the matter is removed from us. Besides, according to our diplmats, we may stand to regain some rightfully Danish lands as reward for our services!"
 EVHO_nordic_events.35.a:0 "Very well, then..."
 EVHO_nordic_events.35.b:0 "No peace with the Revolutionaries!"
 EVHO_nordic_events.37.t:0 "The [revolution_target_event.GetAdjective] Marshall"
 EVHO_nordic_events.37.d:0 "Following the embarassing loss of the Finnish lands to foreign powers the adequacy of the current reigning monarch was called into question by the Nobility and the Government at large. Through a series of circumstances, a Marshall of our Revolutionary foe has made himself known in our realm, and he and his progeny may make a fetching replacement for the current and clearly inept royal line..."
 EVHO_nordic_events.37.a:0 "Back the Marshall!"
 EVHO_nordic_events.37.b:0 "Back the King!"
 EVHO_nordic_events.38.t:0 "Treaty of Kiel"
 EVHO_nordic_events.38.d:0 "Following the defeat of allies of the Revolutionary Empire who own lands in Norway, a Treaty has been agreed upon by the diplomatic envoys of both parties that will see peace restored to Scandinavia. We are to aquire Norway and in exchange they are to break off all ties with the so-called Imperial power which has threatened the stability and peace in europe for nigh on two decades. In exchange, small parts of North Germany may be ceded to some interested parties on the other side of the negotiations."
 EVHO_nordic_events.38.a:0 "Sign the treaty."
 EVHO_nordic_events.38.b:0 "They deserve a more severe punishment!"
 EVHO_nordic_events.39.t:0 "The Peace of Travendal"
 EVHO_nordic_events.39.d:0 "Our traitorous fellow Scandinavians, having seen the might of our forces firsthand and concerned by the prospect of a one-sided peace against our realm, have sat down in the court of Travendal in Southern Denmark to hammer out an amiable peace which would free up our forces, allowing us to truly punish the other members of this godforsaken coalition."
 EVHO_nordic_events.39.a:0 "A Peace, for now."
 EVHO_nordic_events.39.b:0 "A one-sided peace is what they deserve!"
 EVHO_nordic_events.40.t:0 "Treaty of Altranstädt"
 EVHO_nordic_events.40.d:0 "We have cowed the Polish forces and their allies and now control large swaths of their land. Their current king is a stubborn man, but following his capture even he has seen that his pitiful efforts have been for naught and that he must now submit to our will. Given that we don't feel confident controlling territory beyond the reach of the Baltic Sea, we cannot hope to conquer large swaths of Polish land to which we have no claim. Therefore, a peace in which Poland will be given a new king, one picked out by our own, and will be made an independent Junior Partner in future affairs at least until the turmoil that surrounds our empire on all sides has come to an end."
 EVHO_nordic_events.40.a:0 "A puppet king it shall have, then!"
 EVHO_nordic_events.40.b:0 "Who says we cannot control Poland! I have bested greater odds!"
 EVHO_nordic_events.41.t:0 "The Treaty of Thorn"
 EVHO_nordic_events.41.d:0 "Following great losses in this, the Great Northern War, our old adversary has failed to gain the decisive advantage. As such, and with many of his dreaded forces having fled back to his country, now is the time for our old King to return."
 EVHO_nordic_events.41.a:0 "God Save the King!"
 EVHO_nordic_events.42.t:0 "An Advantage in the Great Northern War"
 EVHO_nordic_events.42.d:0 "The forces fighting to contain a much-too-powerful kingdom to the North of Europe, after facing many setbacks, has gained an advantage over their foe at last. This would be an ideal time to join in this conflict, so as not to miss out on the territory that would be due to us once peace talks begin and the carving up of this once-mighty Empire begins."
 EVHO_nordic_events.42.a:0 "Very well, to war we shall go!"
 EVHO_nordic_events.42.b:0 "There are more important matters plagueing Europe!"
 EVHO_nordic_events.45.t:0 "The Diplomatic Skill of [Root.Monarch.GetTitle] [Root.Monarch.GetName]"
 EVHO_nordic_events.45.d:0 "Following the entry of another great power in the Great Northern War whose interests are not in the least bit allingned with that of our foe, we have been stagnated in this conflict. Luckily, our ruler has a deft hand at diplomacy, among [Root.Monarch.GetHerHis] many other skills, and has managed to smooth over the issue with some minor territorial concessions."
 EVHO_nordic_events.45.a:0 "Finally, now we can focus on the true campaign."
 EVHO_nordic_events.45.b:0 "Are we but mice, or are we men?!"
 EVHO_nordic_events.46.t:0 "The Swedish Claim"
 EVHO_nordic_events.46.d:0 "The Swedish have a claim to our throne, how do we proceed?"
 EVHO_nordic_events.46.a:0 "They'll have to fight us for it!"
 EVHO_nordic_events.46.b:0 "Invite their king to our court."
 EVHO_nordic_events.47.t:0 "The Russian Claim"
 EVHO_nordic_events.47.d:0 "The Russians have a claim to our throne, how do we proceed?"
 EVHO_nordic_events.47.a:0 "They'll have to fight us for it!"
 EVHO_nordic_events.48.t:0 "Enforcing the Kalmar Union"
 EVHO_nordic_events.48.desc:0 "There is no other lion with which ours must compete in the North. The whole of the lands which once reaved as the terror of Europe and now serve as a bastion of Holy Righteousness are ours to do with as we please, we simply must prove this to be so to the other powers of Europe by eliminating what little resistance remains. Then, we can finally move on to the pressing matters at hand: Dominion over the Baltic Sea, and Exploration of the World at large!"
 EVHO_nordic_events.48.a:0 "The Nordlands are calling our names!"


 local_support:0 "Local Support"
 incidents_bur_inheritance.1.f:0 "The Southern Archduchy is up-and-coming..."
 marry_habsburg_tt:0 "We will fall under a §YPersonal Union§! with §Y[HAB.GetName]§!."
 EVHO_german_events.1.t:0 "The Duchy of Prussia"
 EVHO_german_events.1.d:0 "Peasants and Nobles alike in our territories in Prussia are dmanding more religious and administrative autonomy. The major nobles of the region have sent an ulitmatum to his majesty. Ignoring it will result in administrative chaos and likely rebellion."
 EVHO_german_events.1.a:0 "Fine, allow this Duchy its autonomy"
 EVHO_german_events.1.b:0 "No, crush them."
 EVHO_german_events.2.t:0 "The Prussian Succession"
 EVHO_german_events.2.d:0 "Prussia has been under the occupation of foreign powers for some time, though it has been under the adminitsration of fellow members of house Hohenzollern for several decades. Following the death of their current duke, we can opt to press our claim to Prussia. Unfortunately, as it is currently a vassal of a foreign power, we would have to bend the knee."
 EVHO_german_events.2.a:0 "We shall not be subjects for long!"
 EVHO_german_events.2.b:0 "We're doing well enough without Prussia."
 EVHO_german_events.3.t:0 "The Kingdom of Belgium"
 EVHO_german_events.3.d:0 "Foreign powers have intervened in order to create a buffer between the great powers in Western Europe. They demand that we cede our lands in order to establish a new state in the southern Lowlands."
 EVHO_german_events.3.a:0 "They have no right!"
 EVHO_german_events.4.t:0 "Defrenstration of Prague"
 EVHO_german_events.4.d:0 "In 1617 Roman Catholic officials in Bohemia closed Protestant chapels that were being constructed by citizens of the towns of Broumov and Hrob, thus violating the guarantees of religious liberty laid down in the Letter of Majesty of Emperor Rudolf II. In response, the defensors, appointed under the Letter of Majesty to safeguard Protestant rights, called an assembly of Protestants at Prague, where the imperial regents, William Slavata and Jaroslav Martinic, were tried and found guilty of violating the Letter of Majesty and, with their secretary, Fabricius, were thrown from the windows of the council room of Prague Castle on May 23, 1618. Although inflicting no serious injury on the victims, this act, known as the Defenestration of Prague, is the signal for a Bohemian revolt against their overlords. A war may be on the horizon."
 EVHO_german_events.4.a:0 "Crush them!"
 EVHO_german_events.4.b:0 "There is no need for war..."
 EVHO_german_events.5.t:0 "Protestant Bohemia calls for Aid"
 EVHO_german_events.5.d:0 "The Protestant-led Revolt of Bohemia has sent requests for aid to all Lutherans and other Protentant Princes across the Holy Roman Empire. We are among those who recieved said heralds. Bohemia calls for aid!"
 EVHO_german_events.5.a:0 "....And [Root.GetName] will answer. Muster our forces!"
 EVHO_german_events.5.b:0 "Where was Bohemia in any of our times of need?"
 EVHO_german_events.6.t:0 "Intervention against the Emperor"
 EVHO_german_events.6.d:0 "The Emperor or some other great power is intervening against our fellow princes of the Protestant faith within the Holy Roman Empire. We have an opportunity, while they are distracted, to strike against them and prevent their cruel treatment of our fellow German Protestants."
 EVHO_german_events.6.a:0 "To War!"
 EVHO_german_events.6.b:0 "If we prolong their war, it could last decades...."
 EVHO_german_events.6001.t:0 "Humiliating Loss for [Root.GetName]"
 EVHO_german_events.6001.d:0 "The intervention of a powerful realm of the Protestant faith against the Catholic Power of the Holy Roman Empire has seen stunning succcess, shocking the rulers of Christendom. [Root.GetName] must concede that it has suffered great losses at the hand of the Protestants and their Holy Roman Allies."
 EVHO_german_events.6001.a:0 "This only serves to destabilize Holy Rome..."
 EVHO_german_events.6002.t:0 "Embarassing Defeat of [Root.GetName]"
 EVHO_german_events.6002.d:0 "The [Root.GetAdjective] saw fit to wander into the Holy Roman Empire with the intent to liberate the protestant princes of that realm, defeat the forces of Catholicism, and win great prestige and glory. They instead must now make the long march back to their home, demoralized and defeated by said forces of Rome and the Emperor."
 EVHO_german_events.6002.a:0 "We only wished to stop the opression of the Protestants..."
 EVHO_german_events.7.t:0 "Join the [From.GetAdjective] Intervention?"
 EVHO_german_events.7.d:0 "The [From.GetAdjective] have requested the aid of our lord in their planned intervention against the Emperor and opressor of the Bohemian Protestants. Shall we join?"
 EVHO_german_events.7.a:0 "We fight!"
 EVHO_german_events.7.b:0 "We will not support a foreign invader!"
 EVHO_german_events.9.t:0 "The Secularization of Prussia"
 EVHO_german_events.9.d:0 "The Prussian branch of the Teutonic Order returned Pomerelia (the previously Polish regions of Chełmno Land and Gdańsk Pomerania) and ceded the western part of Prussia (Warmia, as well as parts of Pomesania and Pogesania) to Poland after the Peace of Thorn in 1466. The territories ceded to the Kingdom of Poland formed the Polish province of Royal Prussia, while the eastern part remained under Teutonic Order rule, known thereafter as the Monastic Prussia (Polish: Prusy zakonne) or Teutonic Prussia (Polish: Prusy krzyżackie), as a feudal fief and integral part of the Kingdom of Poland. The monastic state of the Order's main (Prussian) branch was secularized in 1525 during the Protestant Reformation to become the Duchy of Prussia ruled by the House of Hohenzollern, remaining a fiefdom of the Polish Crown and later the Polish–Lithuanian Commonwealth."
 EVHO_german_events.9.a:0 "Allow the Secularization."
 EVHO_german_events.9.b:0 "No, the current order must remain!"
 EVHO_german_events.11.t:0 "Claims on the Lowlands"
 EVHO_german_events.11.d:0 "Having established a solid foothold in the Low Countries, we may now proceed in the expansion of our influence in the region"
 EVHO_german_events.11.a:0 "What a lucrative opportunity."
 EVHO_german_events.12.t:0 "The Austrian Claim"
 EVHO_german_events.12.d:0 "The Austrians have a claim to our throne, how do we proceed?"
 EVHO_german_events.12.a:0 "They'll have to fight us for it!"
 EVHO_german_events.12.b:0 "Invite their king to our court."
 EVHO_german_events.14.t:0 "A.E.I.O.U."
 EVHO_german_events.14.d:0 "In German and Latin as "All the world is subject to Austria" (Alles Erdreich ist Österreich untertan or Austriae est imperare orbi universo). We are within our rights to claim Carpathia, Bohemia, Venzia, the Balkans and Beyond, the Turks and Prussians be damned!"
 EVHO_german_events.14.a:0 "It all belongs to me! Everything that I see!"
 EVHO_german_events.15.t:0 "The German Confederation Intervenes"
 EVHO_german_events.15.d:0 "Having declared war on a member of the German Confederation, all members are obliged to condemn the agressor and potentially go to the aid of their fellow German brothers, your foe."
 EVHO_german_events.15.a:0 "That is not ideal."
 EVHO_german_events.16.t:0 "End of the Holy Roman Empire"
 EVHO_german_events.16.d:0 "The Lack of any Power or Influence wielded by the Holy Roman Emperor within the sections of the Realm which are sill referred to as that empire founded by the Charlemagne some nearly thousand years ago has lead the current Emperor to declare that the Empire is to be dissolved. Hereafter, any and all territories which the Empire held some semblence of suzerity over no longer have to pretend that the territory held by the Man with the title Holy Roman Emperor is their sovereign, as said title has passed into the annuls of history."
 EVHO_german_events.16.a:0 "So ends an Empire and an Era."
 EVHO_german_events.17.t:0 "[Root.GetAdjective] Independence"
 EVHO_german_events.17.d:0 "The wars which surround our hated overlord on all sides present us with an opportunity to escape and forge our own destiny."
 EVHO_german_events.17.a:0 "Farewell!"
 EVHO_german_events.18.t:0 "North German Ambitions"
 EVHO_german_events.18.d:0 "We as a realm have now firmly established ourselves on the stage of diplomacy in North Germany. The time has come to take steps to eventually make ourselves the only player on the stage!"
 EVHO_german_events.18.a:0 "Glory to [Root.Monarch.GetTitle], General, and God!"
 EVHO_german_events.19.t:0 "Bavarian Ambitions"
 EVHO_german_events.19.d:0 "We have a stake as holders of land in the region in the potential of establishing a united Bavarian duchy."
 EVHO_german_events.19.a:0 "God is good."
 EVHO_german_events.20.t:0 "Hannoverian Ambitions"
 EVHO_german_events.20.d:0 "We have a stake as holders of land in the region in the potential of establishing a united Hannoverian duchy."
 EVHO_german_events.20.a:0 "God is good."
 EVHO_german_events.22.t:0 "Holy Rome and the Peace of Westphalia"
 EVHO_german_events.22.d:0 "The constitutional changes made by the Treaty that ended the most recent religious conflicts in the Empire has had far-reaching effects. For Germany, the settlement ended the century-long struggle between the monarchical tendencies of the Holy Roman emperors and the federalistic aspirations of the empire’s German princes. The Peace of Westphalia recognized the full territorial sovereignty of the member states of the empire. They were empowered to contract treaties with one another and with foreign powers, provided that the emperor and the empire suffered no prejudice. By this and other changes the princes of the empire became absolute sovereigns in their own dominions. The Holy Roman emperor and the Diet were left with a mere shadow of their former power."
 EVHO_german_events.22.a:0 "It's for the best."
 EVHO_german_events.24.t:0 "Death of the [Root.Monarch.GetTitle] of [From.GetName]"
 EVHO_german_events.24.d:0 "The [Root.Monarch.GetTitle] of [From.GetName] died without an heir and his territory now technically belongs to us through marriage."
 EVHO_german_events.24.a:0 "New lands for Brandenburg!"
 EVHO_german_events.24.b:0 "Just give the lands to a family member."
 EVHO_german_events.25.t:0 "Holy Roman Empress?"
 EVHO_german_events.25.d:0 "The heir to the Holy Roman Empire has never been a woman and the Electors will not break law nor tradition to elect our heiress to the throne. Perhaps the law needs to be changed? If for no other reason than to maintain our hold on the Empire."
 EVHO_german_events.25.a:0 "Fetch a quill and paper!"
 EVHO_german_events.25.b:0 "Resist the urge to break with tradition"
 EVHO_german_events.26.t:0 "Dispute the Female Empress"
 EVHO_german_events.26.d:0 "The Empress of the Holy Roman Reich sits upon her throne illegitimately, placed there by an overreaching father in a flagrant display against a milennium of tradition, or so we shall tell the masses to justify a future war. In reality the Empress holds territory that Prussia has a right and historic claim to."
 EVHO_german_events.26.a:0 "For Silesia and the Empire!"
 EVHO_german_events.26.b:0 "Soon, but not now..."
 EVHO_german_events.28.t:0 "War of the [From.GetAdjective] Succession"
 EVHO_german_events.28.d:0 "Forces within the Holy Roman Reich are disputing the election of a Woman to the throne. Now is an opportunity to press a claim, surely there are other kings abound to help is in our quest to claim the title of Emperor!"
 EVHO_german_events.28.a:0 "To [From.GetCapitalName]!"
 EVHO_german_events.28.b:0 "Now is not a good time for war!"
 EVHO_german_events.29.t:0 "[From.GetAdjective] Bid to Proclaim themselves Emperor"
 EVHO_german_events.29.d:0 "A powerful force in the Holy Roman Empire seeks to take advantage of the state of disrepair that having a woman as its head has caused by proclaiming themselves to be the rightful Emperor and bringing war to the current title holder. As said title holder is someone we hold in contempt, the [From.GetAdjective]s would see us lend them our military support in order to further weaken the House and Kingdom of our enemy."
 EVHO_german_events.29.a:0 "Another combatant in the fray!"
 EVHO_german_events.29.b:0 "I begin to grow weary of war..."
 EVHO_german_events.30.t:0 "Conversion of the Mayor of Geneva"
 EVHO_german_events.30.d:0 "Following the arrival of the Reformation in the areas surrounding Geneva, the mayor of the city and surrounding countryside has converted to the faith that is rapidly spreading among the people. As such he has gained much influence and now has a greater say in the political matters of our realm."
 EVHO_german_events.30.a:0 "Very well..."
 EVHO_german_events.31.t:0 "Potential Alignment with the Swiss Confederacy"
 EVHO_german_events.31.d:0 "The Great City of Geneva lies next to the Swiss Confederacy and would benefit greatly from joining the alliance of Cantons for mutual stability and safety."
 EVHO_german_events.31.a:0 "Send the request!"
 EVHO_german_events.31.b:0 "We're fine alone, thanks."
 EVHO_german_events.32.t:0 "Genevan Request"
 EVHO_german_events.32.d:0 "The Republic of Geneva has requested to be allowed to become alligned permanently with the interests of the Swiss Confederacy with the hope of eventually joining as a Canton of the Republic. How do we answer?"
 EVHO_german_events.32.a:0 "Always!"
 EVHO_german_events.32.b:0 "Now isn't a good time to admit new cantons"
 EVHO_german_events.33.t:0 "Genevan Betrayal"
 EVHO_german_events.33.d:0 "The Republic of Geneva has betrayed us and gone to the Swiss. How do we proceed with this turn of events?"
 EVHO_german_events.33.a:0 "They are rightful [Root.GetAdjective] clay!"
 EVHO_german_events.33.b:0 "War isn't in the interest of the state."
 EVHO_german_events.34.t:0 "House Hohenzollern"
 EVHO_german_events.34.d:0 "The humble and noble house of Hohenzollern has been around since the 10th century and came to rule Brandenburg in 1398 when Frederick I became the duchy's sovereign ruler. The dynasty was presumed to have died out but it now seems that there still exists a member, although their claim to the throne is considered weak. Since [Root.Monarch.GetName] currently lacks an heir, should we perhaps acknowledge this Hohenzollern as a legitimate heir?"
 EVHO_german_events.34.a:0 "Our House shall continue to rule!"
 EVHO_german_events.34.b:0 "The House of Hohenzollern must return!"
 EVHO_german_events.35.t:0 "Restoration of the Saxon Electorate"
 EVHO_german_events.35.d:0 "The Saxon Electorate has been an important duchy of Holy Rome, ensuring stability in the North-east of the Empire, for nearly three hundred years. Recently the duchy has become a minor title of another power in the Empire, and members of the electorate are quite uncomfortable with the paradigm shift taking place in Imperial Politics. They and many of the princes they are allied with have requested that the Electorate be restored, with the concession that we may place a relative with whom you are in good favor as Elector. Though we may deny this request, any say we may have in the electorate would likely be scorned in any future dealings, and most of the Empire would look upon our realm with no good will for quite some time..."
 EVHO_german_events.35.a:0 "The Electorate will be restored."
 EVHO_german_events.35.b:0 "The title was justly gained, how dare they!"
 EVHO_german_events.36.t:0 "The Union of Saxony and Thuringia"
 EVHO_german_events.36.d:0 "After inheriting and ruling the Thuringian duchy for a few generations, our House has officially incorporated the area into Saxony."
 EVHO_german_events.36.a:0 "So be it."
 EVHO_german_events.37.t:0 "Inheritance of Pomerania-Stolp"
 EVHO_german_events.37.d:0 "Lord, a relative ruling the Pommerianian ducal title of Stolp has perished, and left the lands and titles to you."
 EVHO_german_events.37.a:0 "One step closer to reuniting Pomerania."
 EVHO_german_events.38.t:0 "End of Ladislaus's Reign of Hungary"
 EVHO_german_events.38.d:0 "With the death of Ladislaus von Habsburg, the title of the Kingdom of Hungary will pass to the next-in-line designated by the previous King's will. The Personal Union has ended."
 EVHO_german_events.38.a:0 "Hungarian destiny is tied with our own..."
 EVHO_german_events.39.t:0 "Inheritance of Austria-below-the-Enns"
 EVHO_german_events.39.d:0 ""
 EVHO_german_events.39.a:0 "The Archduchy shall soon be restored."
 EVHO_german_events.40.t:0 "Inheritance of Northern Austria"
 EVHO_german_events.40.d:0 "The Realms of Northern Austria were held in seperate contracts to be given to Ladislaus von Habsburg to rule prior to his inheritance of the greater Archduchy and, assumedly, the Holy Roman Empire itself. Ladislaus has now come unto his inheritance."
 EVHO_german_events.40.a:0 "All the world belongs to Austria!"
 EVHO_german_events.41.t:0 "Press Ladislaus's Claim to Bohemia"
 EVHO_german_events.41.d:0 "Ladislaus von Habsburg's claim to Bohemia was considered to be of little importance until the current faith of the so-called Regent of the Kingdom of Bohemia came to be known by the Electorate and Princes of the Empire. [BOH.Monarch.GetHerHis] herecy cannot stand, and if we push for him to legitimize our Heir as also his own upon his death, he will either have to submit or be forced from his ungodly rule."
 EVHO_german_events.41.a:0 "Send the ultimatum."
 EVHO_german_events.42.t:0 "[From.GetName] Demands Recognition of Heir"
 EVHO_german_events.42.d:0 "[From.GetName] has sent an envoy to forcefully suggest that we see reason and recognize the primacy of the claim that their Heir has on the Kingdom of Bohemia by recognizing him as our heir as well. Such an action would result in the realm's subjugation for the duration of his life following the end of the current reign. We would be temporarily under the personal union of the Habsburgs. Should we refuse, they would most certainly attempt to press their claim by force."
 EVHO_german_events.42.a:0 "What a sick joke!"
 EVHO_german_events.42.b:0 "Very well..."
 EVHO_german_events.43.t:0 "Bohemia Declines"
 EVHO_german_events.43.d:0 ""
 EVHO_german_events.43.a:0 "We shall not be denied!"
 EVHO_german_events.43.b:0 "What's one more title?"
 EVHO_german_events.44.t:0 "Bohemia Acquiesces"
 EVHO_german_events.44.d:0 ""
 EVHO_german_events.44.a:0 "Glad to see we at least have their respect..."
 EVHO_german_events.45.t:0 "Inheritance of Bohemia"
 EVHO_german_events.45.d:0 "As per the agreement made, Upon such a time where Ladislaus is already landed as Emperor or Archduke and is also the ruler apparent of Bohemia, they shall be ruled jointly. This has now come to pass, for as long as his majesty reigns."
 EVHO_german_events.45.a:0 "God is with Ladislaus!"
 EVHO_german_events.46.t:0 "End of Ladislaus's Rule over Bohemia"
 EVHO_german_events.46.d:0 "With the death of Ladislaus von Habsburg, the title of the Kingdom-Electorate of Bohemia will pass to the next-in-line designated by the previous King's will. The Personal Union has ended."
 EVHO_german_events.46.a:0 "Bohemia, we shall meet again..."
 EVHO_german_events.4601.t:0 "End of Ladislaus's Rein Among the Princes"
 EVHO_german_events.4601.d:0 "With the death of Ladislaus von Habsburg, his various holdings which were pre-assigned as life-leases will pass to the next-in-line designated by the previous King's will. The Personal Unions have ended."
 EVHO_german_events.4601.a:0 "A sad day, very sad..."
 EVHO_german_events.47.t:0 "Other Austrians Seek Fellowship"
 EVHO_german_events.47.d:0 "Fellow Austrians and allies of a lesser kingom wish to serve us to the best of their abiliies"
 EVHO_german_events.47.a:0 "Welcome, Friends!"
 EVHO_german_events.47.b:0 "Not Necessary."
 EVHO_german_events.48.t:0 "The Hannoverian Branch"
 EVHO_german_events.48.d:0 "A Section of our family has come to power in Hannover, calling themselves the "von Hannovers". While it is within our right to reclaim this wayward territory, other powers may seek to prevent this, and, perhaps more importantly, the Emperor has already seen fit to declare these von Hannovers to be electors of the Empire."
 EVHO_german_events.48.a:0 "A rival branch? or a Familial Ally?"
 EVHO_german_events.49.t:0 "The Treaty of Karlowitz"
 EVHO_german_events.49.d:0 "The Treaty of Karlowitz was signed in Karlowitz, Military Frontier of Archduchy of Austria, on 26 January 1699, concluding the Great Turkish War of 1683–1697 in which the Ottoman Empire was defeated by the Holy League at the Battle of Zenta. It marks the end of Ottoman control in much of Central Europe, with their first major territorial losses, beginning the reversal of four centuries of expansion, and established the Habsburg monarchy as the dominant power of the region."
 EVHO_german_events.49.a:0 "A Day of Glory!"
 EVHO_german_events.49.b:0 "A different peace must be made!"
 EVHO_german_events.50.t:0 "Demanded Restoration of Bavaria"
 EVHO_german_events.50.d:0 "The other Great Powers of the world have demanded that, for the sake of mainaining the Balance of Power in Europe, the Electorate-Duchy of Bavaria must be restored from our lands, as we hold it, most of it, or it's most important holdings. We have the right to refuse, of course, however many will come to view our realm as a paraiah state should we take that course of diplomatic action."
 EVHO_german_events.50.a:0 "Very well, this 'Balance of Power' is irksome..."
 EVHO_german_events.50.b:0 "Who gives a damn what they think!?"
 EVHO_german_events.51.t:0 "An Alliance to Cut Prussia down to size"
 EVHO_german_events.51.d:0 "The Prussians of Northern Germany have been a regional power on the rise for the better part of the last century. Their expansion was barely tolerated as we, ourselves, and most other nations of note were busy dealing with more important matters, and felt that any conflict to contain them was beneath them. This has been a folly. They are a threat and will only continue to grow as one as long as they remain counted among the Great Powers. If we strike now against them, with an alliance structure of the other Great Powers who are in opposition to Prussia, we can stop this growing menace."
 EVHO_german_events.51.a:0 "We shall teach them how to fight a REAL war!"
 EVHO_german_events.51.b:0 "We are too weak to challenge them!"
 EVHO_german_events.52.t:0 "[From.GetName] suggests cutting Prussia down to size"
 EVHO_german_events.52.d:0 "Diplomats from another great power in Europe claim that Prussia has become an existential threat to the Balance of Power in Europe, and that for the sake of maintaining peace and stability among the great powers of the continent, they must be destroyed. It may be within our interests to join this growing coalition of powers..."
 EVHO_german_events.52.a:0 "It's good to be at war once again!"
 EVHO_german_events.52.b:0 "This proposal suggests a lack of wisdom."
 EVHO_german_events.53.t:0 "[revolution_target_event.GetName] Ends the North German Confederation"
 EVHO_german_events.53.d:0 ""
 EVHO_german_events.53.a:0 "...."
 EVHO_german_events.54.t:0 "[revolution_target_event.GetName] Ends the South German Confederation"
 EVHO_german_events.54.d:0 ""
 EVHO_german_events.54.a:0 "...."
 EVHO_german_events.55.t:0 "The Restoration of Northern Germany"
 EVHO_german_events.55.d:0 "The Revolutionary forces which have plagued Europe for the better part of three decades are scattered and in retreat, and the foul and totally illegitimate governments established in Northern Germany have all fallen to our might and the might of the Allied forces. The time has come re-draw the map of the region, and establish a peace which will hopefully last into this coming era of peace and innovation."
 EVHO_german_events.55.a:0 "Long live North Germany!"
 EVHO_german_events.56.t:0 "The Restoration of Southern Germany"
 EVHO_german_events.56.d:0 "The Revolutionary forces which have plagued Europe for the better part of three decades are scattered and in retreat, and the foul and totally illegitimate governments established in Southern Germany have all fallen to our might and the might of the Allied forces. The time has come re-draw the map of the region, and establish a peace which will hopefully last into this coming era of peace and innovation."
 EVHO_german_events.56.a:0 "Long live South Germany!"
 EVHO_german_events.57.t:0 "Congress of Vienna: The Kingdom of the Netherlands"
 EVHO_german_events.57.d:0 "The fate of the lands of the Low Countries, including the Hague, Amsterdam, Rotterdam, and Antwerp has been decided in the Congress of Vienna. These lands are to be returned in full to the Dutch, which is to become a parliamentary monarchy."
 EVHO_german_events.57.a:0 "Very well."
 EVHO_german_events.58.t:0 "A Neighbor Submits"
 EVHO_german_events.58.d:0 "A neighbor of smaller means but of the same faith and with a positive disposition towards our rule has submitted itself fully to our whims. It has been in our sphere of influence for some time, but with the growing threat looming over the entire region of foreign powers imposing a totally foreign rule and religion upon us all, they can see how important unity in Carpathia and the Alpine region is for safeguarding both our own collective security and the security of Europe as a whole."
 EVHO_german_events.58.a:0 "Excellent."
 EVHO_german_events.59.t:0 "House of von Hannover"
 EVHO_german_events.59.d:0 "The family of the lord of the new realm of Hanover is a powerful one with potential to do a many great things, but lacks proper legitimacy. If we were to seize greater power and rename our dynasty to reflect our primary title it would go a long way towards creating stability in our new domain."
 EVHO_german_events.59.a:0 "The current government must remain!"
 EVHO_german_events.59.b:0 "The family name will not change!"
 EVHO_german_events.59.c:0 "Long Live the von Hannovers!"
 EVHO_german_events.60.t:0 "The Union of Bohemia and Moravia"
 EVHO_german_events.60.d:0 "After inheriting and ruling the Moravian duchy for a few generations, our House has officially incorporated the area into Bohemia."
 EVHO_german_events.60.a:0 "So be it."
 EVHO_german_events.61.t:0 "The Union of Bohemia and Silesia"
 EVHO_german_events.61.d:0 "After inheriting and ruling the Silesian duchy for a few generations, our House has officially incorporated the area into Bohemia."
 EVHO_german_events.61.a:0 "So be it."
 EVHO_german_events.62.t:0 "Restoration of the Berlin Electorate"
 EVHO_german_events.62.d:0 "The Brandenburg Electorate has been an important duchy of Holy Rome, ensuring stability in the North-east of the Empire, for nearly two hundred years. Recently the duchy has become a minor title of another power in the Empire, and members of the electorate are quite uncomfortable with the paradigm shift taking place in Imperial Politics. They and many of the princes they are allied with have requested that the Electorate be restored, with the concession that we may place a relative with whom you are in good favor as Elector. Though we may deny this request, any say we may have in the electorate would likely be scorned in any future dealings, and most of the Empire would look upon our realm with no good will for quite some time..."
 EVHO_german_events.62.a:0 "The Electorate will be restored."
 EVHO_german_events.62.b:0 "The title was justly gained, how dare they!"
 EVHO_german_events.63.t:0 "Unification of the Northern Lowlands"
 EVHO_german_events.63.desc:0 "In order to achieve greatness, be it within the bounds of the Holy Roman Empire or not, it is the destiny of our realm to unite the Low Countries."
 EVHO_german_events.63.a:0 "A new chapter in history is being written."
 EVHO_german_events.64.t:0 "The Union of Brandenburg and Rupin"
 EVHO_german_events.64.d:0 "After inheriting and ruling the county of Rupin for a few generations, our House has officially incorporated the area into Brandenburg."
 EVHO_german_events.64.a:0 "So be it."
 EVHO_german_events.65.t:0 "Restoration of the Duchy of Bavaria"
 EVHO_german_events.65.desc:0 "In order to achieve greatness, especially within the bounds of the ever shifting political landscape of Holy Rome, it is the destiny of our realm to re-unite the Duchy of Bavaria."
 EVHO_german_events.65.a:0 "It is time for old wrongs to be corrected."
 EVHO_german_events.66.t:0 "The Union of Prussia and Silesia"
 EVHO_german_events.66.d:0 "After inheriting and ruling the Silesian duchy for a few generations, our House has officially incorporated the area into Brandenburg-Prussia."
 EVHO_german_events.66.a:0 "So be it."



 EVHO_eastern_roman_ottoman_events.1.t:0 "Depreciation of Mediterranean Trade"
 EVHO_eastern_roman_ottoman_events.1.desc:0 "As a result of the recent discovery and colonization of the New World, the Mediterranean is no longer the center of trade in the west, and its provinces inhabiting kingdoms have, therefore, lost much of its value."
 EVHO_eastern_roman_ottoman_events.1.a:0 "Damnation!" 
 EVHO_eastern_roman_ottoman_events.2.t:0 "Mediterranean Destiny"
 EVHO_eastern_roman_ottoman_events.2.desc:0 "Having captured the Jewel of the East, the former capital of the later Roman Empire, we have inherited a legacy of Imperium and Expansion along the most important sea in the world. There's an empire to be built, eminating from this spot, the heartland of modern civilization..."
 EVHO_eastern_roman_ottoman_events.2.a:0 "For God and [Root.Monarch.GetTitle]."
 EVHO_eastern_roman_ottoman_events.3.t:0 "Hungarian Collapse"
 EVHO_eastern_roman_ottoman_events.3.desc:0 "Following their failure to defend their realm, and their most recent and brutal defeat in the Battle of Mohács, the Hungarian Kingdom is in a state of total Chaos. Her king is dead, and her nobility is squabbling over who to choose as their new leader. Now is a perfect opportunity for the Emperor to insert himself fully into Hungarian affairs, and put an end to the meddlesome northern realm for good. The only flaw in this plan is that other powers would surely also benefit from the Lands left in the wake of this collapsing state."
 EVHO_eastern_roman_ottoman_events.3.a:0 "Seize Buda and claim suzerity over the rest!"
 EVHO_eastern_roman_ottoman_events.3.b:0 "Let them collapse on their own!"
 EVHO_eastern_roman_ottoman_events.4.t:0 "Collapse of the Ottoman Sultanate"
 EVHO_eastern_roman_ottoman_events.4.desc:0 "In 1515, Sultan Selim I began the war which led to the Ottoman conquest Egypt and its dependencies. Mamluk cavalry proved too much for the Ottoman artillery and Janissary infantry. On 24 August 1516, at the Battle of Ankara, the Ottoman Sultan killed. Anatolia passed into Egyptian possession, an event welcomed in many places as deliverance from the Ottomans. The Ottoman Sultanate survived in the Balkans until 1517, when the Mamluks captured Konstantinniyye. Although diminished in power, the Ottomans were retained by the Mamluks as an Anatolian ruling class, and the Osmanligu family succeeded in regaining much of its influence."
 EVHO_eastern_roman_ottoman_events.4.a:0 "We shall rule Anatolia directly."
 EVHO_eastern_roman_ottoman_events.4.b:0 "Leave the Ottomans in power - our focus is elsewhere."
 EVHO_eastern_roman_ottoman_events.5.t:0 "The Fall of Constantinople"
 EVHO_eastern_roman_ottoman_events.5.desc:0 "The attacking Ottoman army, which significantly outnumbered Constantinople's defenders, was commanded by the 21-year-old Sultan Mehmed II (later called "the Conqueror"), while the Byzantine army was led by Emperor Constantine XI Palaiologos. After conquering the city, Mehmed II made Constantinople the new Ottoman capital, replacing Adrianople."
 EVHO_eastern_roman_ottoman_events.5.a:0 "Sieze the Roman Laurels!"
 EVHO_eastern_roman_ottoman_events.5.b:0 "Leave the Byzantines be."
 EVHO_eastern_roman_ottoman_events.6.t:0 "Egyptian Autonomy"
 EVHO_eastern_roman_ottoman_events.6.desc:0 "Our enemy hounds us in every corner of our realm, and our armies are no longer able to meet him on the field in every township and city he raizes and burns. Egypt is under pressure from the Enemy and the padishah of the Province now wishes to raise his own armies of Egyptian make as an autonomous vassal of the Empire."
 EVHO_eastern_roman_ottoman_events.6.a:0 "It appears we have little choice..."
 EVHO_eastern_roman_ottoman_events.7.t:0 "Greek Revolution of 1821"
 EVHO_eastern_roman_ottoman_events.7.desc:0 "Greece came under Ottoman rule in the 15th century, in the decades before and after the fall of Constantinople. During the following centuries, there were sporadic but unsuccessful Greek uprisings against Ottoman rule. In 1814, a secret organization called Filiki Eteria (Society of Friends) was founded with the aim of liberating Greece, encouraged by the revolutionary fervor gripping Europe in that period. The Filiki Eteria planned to launch revolts in the Peloponnese, the Danubian Principalities, and Constantinople itself. The insurrection was planned for 25 March 1821 (on the Julian Calendar), the Orthodox Christian Feast of the Annunciation. However, the plans of Filiki Eteria were discovered by the Ottoman authorities, forcing the revolution to start earlier. The first revolt began on 6 March/21 February 1821 in the Danubian Principalities, but it was soon put down by the Ottomans. The events in the north urged the Greeks in the Peloponnese (Morea) into action and on 17 March 1821, the Maniots were first to declare war."
 EVHO_eastern_roman_ottoman_events.7.a:0 "Crush them!"
 EVHO_eastern_roman_ottoman_events.7.b:0 "Allow them their brief moment of Independence..."
 EVHO_eastern_roman_ottoman_events.8.t:0 "Greece Begs for help against the [From.GetAdjective]s"
 EVHO_eastern_roman_ottoman_events.8.desc:0 "The Greeks have begun a revolution against the tyrannical rule of the [From.GetAdjective]s. They have asked for our aid, but in truth, we have been considering helping them in their cause for some time before now. How do we proceed?"
 EVHO_eastern_roman_ottoman_events.8.a:0 "Are you kidding? I'd love to crush the [From.GetAdjective]s!"
 EVHO_eastern_roman_ottoman_events.8.b:0 "Perhaps some other time."
 EVHO_eastern_roman_ottoman_events.10.t:0 "The Albanian Conversion"
 EVHO_eastern_roman_ottoman_events.10.desc:0 "In order to avoid paying taxes, when we first conquered the Albanian regions, their overlords under our control converted to our faith. Since then our holy religion has become popular in the area."
 EVHO_eastern_roman_ottoman_events.10.a:0 "A blessing, and a curse?"
 EVHO_eastern_roman_ottoman_events.11.t:0 "The Bosnian Conversion"
 EVHO_eastern_roman_ottoman_events.11.desc:0 "In order to avoid paying taxes, when we first conquered the Bosnian regions, their overlords under our control converted to our faith. Since then our holy religion has become popular in the area."
 EVHO_eastern_roman_ottoman_events.11.a:0 "A blessing, and a curse?"
 EVHO_eastern_roman_ottoman_events.13.t:0 "The Treaty of Zuhab"
 EVHO_eastern_roman_ottoman_events.13.desc:0 "The treaty confirms the dividing of territories in West Asia priorly held by the Safavids, such as the permanent parting of the Caucasus between the two powers, in which East Armenia, eastern Georgia, Dagestan, and Azerbaijan stayed under the control of the Safavid Empire, while western Georgia and most of Western Armenia came fully under Ottoman rule. It also included all of Mesopotamia (including Baghdad) being irreversibly ceded to the Ottomans, as well as Safavid-controlled eastern Samtskhe (Meskheti), making Samtskhe in its entirety an Ottoman possession. With the Treaty of Zuhab, Eastern Armenia remained for more than eight decades under Safavid Rule, who separated it into two administrative regions: Erivan Province and Karabakh Province."
 EVHO_eastern_roman_ottoman_events.13.a:0 "Finally, an end to the war."
 EVHO_eastern_roman_ottoman_events.13.b:0 "A better peace must be sought for ourselves!"
 EVHO_eastern_roman_ottoman_events.14.t:0 "The Collapse of Turkish Anatolia"
 EVHO_eastern_roman_ottoman_events.14.desc:0 "The attacking Byzantine armies, which significantly outnumbered Anatolia's defenders, was commanded by the 21-year-old Emperor (later called "the Restorer"), while the Ottoman army was led by their Sultan. After conquering the region, the Byzantine emperor attempted to restore order in Ottoman asia, which had long since ceased to be Greek and Orthodox."
 EVHO_eastern_roman_ottoman_events.14.a:0 "Restore Asia Minor!"
 EVHO_eastern_roman_ottoman_events.14.b:0 "Leave the Turks be."
 EVHO_eastern_roman_ottoman_events.16.t:0 "Wallachian Autonomy"
 EVHO_eastern_roman_ottoman_events.16.desc:0 "Having occupied the turmoluous region of Wallachia, we are bound by the laws set in the [Root.GetAdjective] Code of Governance to grant this region some level of autonomy as it is held traditionally by Kufar Nobility. They will be loyal, but they cannot be integrated."
 EVHO_eastern_roman_ottoman_events.16.a:0 "I suppose it's better than administrating the region ourselves."
 EVHO_eastern_roman_ottoman_events.18.t:0 "Moldavian Autonomy"
 EVHO_eastern_roman_ottoman_events.18.desc:0 "Having occupied the turmoluous region of Moldavia, we are bound by the laws set in the [Root.GetAdjective] Code of Governance to grant this region some level of autonomy as it is held traditionally by Kufar Nobility. They will be loyal, but they cannot be integrated."
 EVHO_eastern_roman_ottoman_events.18.a:0 "I suppose it's better than administrating the region ourselves."
 EVHO_eastern_roman_ottoman_events.20.t:0 "Transylvanian Autonomy"
 EVHO_eastern_roman_ottoman_events.20.desc:0 "Having occupied the turmoluous region of Transylvania, we are bound by the laws set in the [Root.GetAdjective] Code of Governance to grant this region some level of autonomy as it is held traditionally by Kufar Nobility. They will be loyal, but they cannot be integrated."
 EVHO_eastern_roman_ottoman_events.20.a:0 "I suppose it's better than administrating the region ourselves."
 EVHO_eastern_roman_ottoman_events.23.t:0 "Abandon Our Holdings in Italy?"
 EVHO_eastern_roman_ottoman_events.23.desc:0 "My [Root.Monarch.GetTitle], many learned men in the ways of administration and warfare highly recommend that at this stage in the growth of your Empire, maintaining the holdings we currently possess in Italy would be folly. Bringing supplies to the forts in the region under your control has proven difficult, and the many minor Duchies and Republics of the peninsula tremble in fear of our might. While this would normally be seen as a good thing, it does mean they are likely preparing to set aside their local rivalries and band together in order to begin a war to banish your forces from the region. \n\nShould we abandon these holdings, we may return in order to solidify your claim to the title of Emperor of Rome by taking the ancient city itself sometime in the future, perhaps after expanding our bounds into Southern Germania or France, or waiting until after 1510 or so. By then we will no longer have such worries. Alternatively, we could double down on the administrative costs, and prepare for a fight over Italia."
 EVHO_eastern_roman_ottoman_events.23.a:0 "Very well, abandon the holdings."
 EVHO_eastern_roman_ottoman_events.23.b:0 "These forts are MINE! They shall have to pry them from my clutches as I PERISH!"

 #Events for Russia 

 EVHO_russia.300.t:0 "The Romanovs"
 EVHO_russia.300.desc:0 "The House of Romanov was the reigning royal house of Russia from 1613 to 1917.\nThe Romanovs achieved prominence as boyars in the Grand Duchy of Moscow and later the Tsardom of Russia under the reigning Rurikovich dynasty, which became extinct upon the death of Tsar Feodor I in 1598. The Time of Troubles was caused by the resulting succession crisis, where several pretenders and imposters (False Dmitris) fought for the crown during the Polish–Muscovite War. On 21 February 1613, Michael Romanov was elected Tsar of Russia by the Zemsky Sobor, establishing the Romanovs as Russia’s second reigning dynasty. Michael’s grandson Peter I established the Russian Empire in 1721, transforming the country into a great power through a series of wars and reforms. The direct male line of the Romanovs ended when Elizabeth of Russia died in 1762 leading the House of Holstein-Gottorp, a cadet branch of the German House of Oldenburg that reigned in Denmark, to ascend to the crown under Peter III. Officially known as the House of Romanov, descendants after Elizabeth are sometimes referred to as “Holstein-Gottorp-Romanov”. The abdication of Tsar Nicholas II on 15 March 1917 as a result of the February Revolution ended 304 years of Romanov rule, establishing the Russian Republic under the Russian Provisional Government in the lead up to the Russian Civil War. In 1918, the Tsar and his family were executed by the Bolsheviks and the 47 survivors of the House of Romanov’s 65 members went into exile abroad."
 EVHO_russia.300.a:0 "Bind our dynasty to theirs."
 EVHO_russia.300.b:0 "Keep the bloodline pure."
 
 EVHO_russia.301.t:0 "Michael Romanov"
 EVHO_russia.301.desc:0 "Michael I became the first Russian Tsar of the House of Romanov after the zemskiy sobor of 1613 elected him to rule the Tsardom of Russia. He was the son of Feodor Nikitich Romanov (later known as Patriarch Filaret). He was also a first cousin once removed of the last Rurikid Tsar Feodor I through his great-aunt Anastasia Romanovna, who was the mother of Feodor I, and through marriage, a great-nephew in-law with Tsar Ivan IV of Russia. His accession marked the end of the Time of Troubles. During his reign, Russia conquered most of Siberia, largely with the help of the Cossacks and the Stroganov family. Russia had extended to the Pacific Ocean by the end of Michael’s reign."
 EVHO_russia.301.a:0 "He will make a good ruler."
 EVHO_russia.301.b:0 "But we have an heir already!"
 
 the_romanovs_tt:0 "Members of House §YRomanov§! will be given right of succession."
 collector_of_russian_lands:0 "Collector of Russian Lands"
 tatar_yoke_broken:0 "Tatar Yoke Broken"
 
 EVHO_russia.1.t:0 "Other Orthodox Seek Fellowship"
 EVHO_russia.1.desc:0 "Fellow peoples of the Orthodox faith and allies of a lesser kingom wish to serve us to the best of their abiliies"
 EVHO_russia.1.a:0 "Welcome, Brother!"
 EVHO_russia.1.b:0 "Not Necessary."
 EVHO_russia.2.t:0 "The Settlement of the Mishary"
 EVHO_russia.2.desc:0 "Russian cultural traditions have diffused into the current residents of the Mishar areas. Between this, and the movement of Cossacks and sale of territory to Boyars who have brought their Serfs to the region, the area is now undoubtedly Russian."
 EVHO_russia.2.a:0 "Excellent."
 EVHO_russia.3.t:0 "The Settlement of the Urals"
 EVHO_russia.3.desc:0 "Russian cultural traditions have diffused into the current residents of the Ural areas. Between this, and the creation of settlements in the region by exiles who were sent to the distant Urals as punishment for crimes against the state, the area is now undoubtedly Russian."
 EVHO_russia.3.a:0 "Excellent."
 EVHO_russia.4.t:0 "Dissolution of the Great Horde"
 EVHO_russia.4.desc:0 "In 1480, Muscovy and Crimea formed an alliance against the Great Horde which in turn allied with the Grand Duchy of Lithuania under Casimir IV Jagiellon. In 1480, the Great Horde's attempt to invade Muscovy failed. In 1481, Akhmat Khan was killed by the Nogais. He was succeeded by his son Shaikh Akhmat. After this, the Horde was weakened by conflicts among Akhmat's sons."
 EVHO_russia.4.a:0 "Absorb the Muslim Hordelands."
 EVHO_russia.4.b:0 "We want nothing to do with these infidels."
 EVHO_russia.5.t:0 "Downfall of Kazan"
 EVHO_russia.5.desc:0 "In August 1552, forces of Ivan the Terrible, operating from the Russian castle of Sviyazhsk, laid siege to Kazan. The Russians defeated the Tatar inland troops, burnt Archa and some castles. On October 3, after two months of siege and destruction of the citadel walls, the Russians entered the city. Some defenders managed to escape but most were put to the sword. Yadegar Moxammad was imprisoned and the population was slaughtered."
 EVHO_russia.5.a:0 "Impose our will upon the Tatars."
 EVHO_russia.5.b:0 "We have other concerns."
 EVHO_russia.6.t:0 "The Fall of Muscovy"
 EVHO_russia.6.desc:0 "Throughout the 14th century, Lithuania and Muscovy fought intensely for control of Novgorod and its extravagant wealth, accrued from control of the lucrative fur trade in the Russian north. Muscovy's attempts at establishing it's northern hold never bore fruit and resulted in it's slow collapse. As Muscovy's strength failed, its princes became increasingly aware of the great threat of Novgorod. Thus, the Novgordians began to turn to the Polish-Lithuanian Commonwealth for security, pursuing an alliance in the 1470s. Should Novgorod seize the lands of Russia Proper?"
 EVHO_russia.6.a:0 "Bring the Muscovian domains into the Novgorodian fold!"
 EVHO_russia.7.t:0 "Raid into Lithuanian Lands of the Faith"
 EVHO_russia.7.desc:0 "Lands of the Faith and of the Russian kinship are held in hand by western heretics. Luckily, we are considered a fringe territory at the edge of their influence, and the border between us is viewed as vague and uninportant. They may view a regional incursion into their lands by our forces as not something worth calling the banners over. Shall we proceed?"
 EVHO_russia.7.a:0 "Glory! Sieze the Borderlands!"
 EVHO_russia.7.b:0 "The Rus have other concerns."
 EVHO_russia.8.t:0 "The Lithuanian Wars"
 EVHO_russia.8.desc:0 "Our Eastern Neighbors claim to be the inheritors of the Roman Empire, and of the Kievan Rus. They seem to have also inherited both former kingdom's ambition and potential for infamy. They have seized the border regions that seperate us between themselves and the trade city of Smolenskas. They have not declared war, but their armies have swept in and claimed the territory, and the local nobility is rapidly abandoning my lord in exchange for eastern suzerity. How do we respond to this naked agression?"
 EVHO_russia.8.a:0 "They will have to pay for those lands in blood."
 EVHO_russia.8.b:0 "They can enjoy their new holdings for now..."
 EVHO_russia.6.b:0 "Allow Moscow to remain free."
 EVHO_russia.9.t:0 "Claims on the Caucasus Mountains"
 EVHO_russia.9.desc:0 "The Caucasus are within the grasp of our realm and we should be doing everything within our power to bring these lands under our protection."
 EVHO_russia.9.a:0 "And so it shall be."
 EVHO_russia.10.t:0 "Claims on the Central Asian Steppe"
 EVHO_russia.10.desc:0 "The Steppe is within the grasp of our realm and we should be doing everything within our power to bring these lands under our protection."
 EVHO_russia.10.a:0 "And so it shall be."
 EVHO_russia.11.t:0 "The Livonian War"
 EVHO_russia.11.desc:0 "The Livonian War (1558–1583) was fought for control of Old Livonia (in the territory of present-day Estonia and Latvia), when the Tsardom of Russia faced a varying coalition of the Dano-Norwegian Realm, the Kingdom of Sweden, and the Union (later Commonwealth) of the Grand Duchy of Lithuania and the Kingdom of Poland."
 EVHO_russia.11.a:0 "Let it begin!"
 EVHO_russia.11.b:0 "It is not necessary."
 EVHO_russia.111.t:0 "[From.GetAdjective] invitation for Livonian Coalition"
 EVHO_russia.111.desc:0 "A war is beginning to end the total control of a baltic power over the entire of the war-warn Livonian territories. Shall we join the intervention?"
 EVHO_russia.111.a:0 "A war could do us some good!"
 EVHO_russia.111.b:0 "Now is not the time!"
 EVHO_russia.12.t:0 "Claims on Finland"
 EVHO_russia.12.desc:0 "The Finish region is within the grasp of our realm and we should be doing everything within our power to bring these lands under our protection."
 EVHO_russia.12.a:0 "And so it shall be."
 EVHO_russia.14.t:0 "House Romanov"
 EVHO_russia.14.desc:0 "The great and powerful house of the Romanovs has been around since the 15th century after the Tsarina, Anastasia Romanova, was married to the First Tsar of Russia, Ivan the Terrible. They came to rule Russia in 21 February 1613, when a Zemsky Sobor elected Michael Romanov as Tsar of Russia. The dynasty was presumed to have died out but it now seems that there still exists a member, although their claim to the throne is considered weak. Since [Root.Monarch.GetName] currently lacks an heir, should we perhaps acknowledge this Romanov as a legitimate heir?"
 EVHO_russia.14.a:0 "Our House shall continue to rule!"
 EVHO_russia.14.b:0 "The House of Romanov must return!"
 EVHO_russia.15.t:0 "End the Great Wrath?"
 EVHO_russia.15.desc:0 "The when last we fought the enemy forces from Scandinavia, a treaty was signed in which we were never granted the right to the territory we hold in Finland and the Scandinavian Peninsula. However, we occupied these lands anyways because there was no way for anyone to enforce our compliance with a section of a treaty we disagreed with. Now, for the sake of mainaining the Balance of Power in Europe, Our allies, rivals, and fellow Great Powers have begun to lean on us to pull out from these regions, at least for now. We have the right to refuse, of course, however many will come to view our realm as a paraiah state should we take that course of diplomatic action."
 EVHO_russia.15.a:0 "The land doesn't hold much value, anyways..."
 EVHO_russia.15.b:0 "They can try and STOP us from holding these lands!"
 EVHO_russia.16.t:0 "The Finnish Wars?"
 EVHO_russia.16.desc:0 "The chaos in Europe has seemingly come to an end, which affords us an opportunity to seize lands that have been at our periphery for some time. The lands of the Finns have been tossed back and forth for the last century, but we believe it is time for it to become permanently Russian."
 EVHO_russia.16.a:0 "It is ours!"
 EVHO_russia.16.b:0 "Now is not the time."
 EVHO_russia.17.t:0 "The Finnish Wars"
 EVHO_russia.17.desc:0 "The Russians, who else, have marched into our lands in Finland and proclaimed it to be among their many titles. Despite working with them in the recent conflicts of Europe, they seem dead set on acquiring these lands. We can contest this blanant but in-character violation of our sovreignity, or we can focus on the other issues plagueing our realm and the continent at large."
 EVHO_russia.17.a:0 "They will have to fight us for that clay."
 EVHO_russia.17.b:0 "The struggle has become tiresome..."
 EVHO_russia.18.t:0 "Vassalage of the Kazakhs"
 EVHO_russia.18.desc:0 "Having gained total control over Siberia, and therefore a monopoly on trade in the Northern Steppe, we are the ultimate economic power of that region. As such, the little territory we hold in the region is to be gifted to the Kazakhs in exchange for their total submission to Russia."
 EVHO_russia.18.a:0 "I suppose it's better than administrating the region ourselves."
 EVHO_russia.20.t:0 "The Don-Kuban Conversion"
 EVHO_russia.20.desc:0 "The various peoples living in the regions of the Don and the Kuban have, over time, either adopted some minor slavic cultural elements and forgotten their old languages or otherwise been supplanted by Slavs who adopted some elements of the old culture of the region and kept their language. They are now more alike ourselves than they were before."
 EVHO_russia.20.a:0 "What a rugged and strange land."
 NOV_evho_death_of_the_russian_yoke_modifier:0 "Death of the Russian Yoke"
 desc_NOV_evho_death_of_the_russian_yoke_modifier:0 "The rulers whose institutions in Russia were tainted by the exploitative nature of the Mongol and Tartar Yoke have been swept away. In its place there is a new bastion of Russian authority, one which perceives itself as a beacon of meritocracy and enlightened thought."
 EVHO_russia.21.t:0 "The Death of the Russian Yoke"
 EVHO_russia.21.desc:0 "Since the fall of Kiev at the hands of the Khan and his ilk some centuries ago, the lands of the Rus have had no unified cultural center which could rival the storied past of the Kievan Rus'. In the recent decades, marked by competition between the eastern slavic realms for dominance of the whole of greater Ruthenia, the vast majority of contenders, save ourselves, have been Princes beholden to none but their own whims. These Princes took after the habits of their former Mongol and Tartar overlords, running their lands less as lands under their responsible charge and more as giant personal estates to be exploited without end. Lacking a nobility capable of of challenging them, and possessing serfs in numbers unfathomable, had any one of them gained enough power to proclaim themselves as some sort of King or Emperor, the future of the Rus would surely be a bleak one. \n\nThankfully, the [Root.Culture.GetName] people have been spared this fate by the apparent ascendency of a centre of power that is interested in effective governance as opposed to absolue power, this power, of course, being our own. In recognition of this, the leadership and more learned citizens of our realm have begun to percieve said realm as a sort of beacon of enlightened thought, in contrast with the hypothetical dark pit of despotism that could have been their collective fates."
 EVHO_russia.21.a:0 "The future of [Root.GetName] seems bright, indeed."
 EVHO_russia.22.t:0 "House Rurikovich"
 EVHO_russia.22.desc:0 "The great and powerful house of the Rurikovichiy have been around since the Viking age and the dawn of the Rus People, since the Viking Lord Rurik I conquered the land now called Novgorod for his own. Over the centuries the power of his house has waxed and waned among the northern regions of the land known as Russia, but they've always remained prominent at least to some extent, until recently. The dynasty was presumed to have died out but it now seems that there still exists a member, although their claim to the throne is considered weak. Since [Root.Monarch.GetName] currently lacks an heir, should we perhaps acknowledge this Rurikovich as a legitimate heir?"
 EVHO_russia.22.a:0 "Our House shall continue to rule!"
 EVHO_russia.22.b:0 "The House of Rurikovich must return!"

 ev_france.1.t:0 "The French Claim"
 ev_france.1.d:0 "The French have a claim to our throne, how do we proceed?"
 ev_france.1.a:0 "They'll have to fight us for it!"
 ev_france.1.b:0 "Invite their king to our court."
 ev_france.3.t:0 "Other Frenchmen Seek Fellowship"
 ev_france.3.d:0 "Fellow Frenchmen and allies of a lesser kingom wish to serve us to the best of their abiliies"
 ev_france.3.a:0 "Welcome, Friends!"
 ev_france.3.b:0 "Not Necessary."
 ev_france.4.t:0 "The French Huguenots"
 ev_france.4.d:0 "The Huguenots are believed to have been concentrated among the population in the southern and western parts of the Kingdom of France. As Huguenots gained influence and more openly displayed their faith, Catholic hostility grew. A series of religious conflicts followed, known as the French Wars of Religion, fought intermittently from 1562 to 1598. The Huguenots were led by Jeanne d'Albret; her son, the future Henry IV (who would later convert to Catholicism in order to become king); and the princes of Condé. The wars ended with the Edict of Nantes, which granted the Huguenots substantial religious, political and military autonomy."
 ev_france.4.a:0 "Damned Heretics!"
 ev_france.5.t:0 "A Foothold in Britannia"
 ev_france.5.d:0 "With the lands we hold in Britannia we can now expand our influence on the region as a whole"
 ev_france.5.a:0 "Quite a claim!"
 ev_france.6.t:0 "Claims on Algeria"
 ev_france.6.d:0 "The Algerian Coast is within the grasp of our realm and we should be doing everything within our power to bring these lands under our protection."
 ev_france.6.a:0 "Sounds like an Adventure!"
 ev_france.7.t:0 "Claim to the English Throne"
 ev_france.7.d:0 "With our new holdings in the British Isles we can lay claim o the English throne."
 ev_france.7.a:0 "Yes!"
 ev_france.7.b:0 "Not now."
 ev_france.8.t:0 "Claims on Corsica"
 ev_france.8.d:0 "We have grown enough in power in the Mediterranean that the famed isle of Corsica is well within our reach. Why not reach out and grasp these new lands?"
 ev_france.8.a:0 "I hear it is a beautiful place!"
 ev_france.9.t:0 "Reclamation of Burgundian Lands"
 ev_france.9.d:0 "The long-rebellious Duchy of Burgundy has been inherited by some foreign ruler who is not of comparable standing to the great and ancient Kingdom of France. We are within our rights to reclaim our de-jure territory from this inheritor of a dynasty of usurpers."
 ev_france.9.a:0 "March on, then!"
 ev_france.9.b:0 "Pride is a sin."
 ev_france.10.t:0 "French Incursion into Burgundy"
 ev_france.10.d:0 "The French King claims that the rule of the dynasty from which your lordship inherited Burgundy was one of fraudulent usurpation. As such has seen fit to claim the lands as his own to be held personally ad infinitum. How do we proceed?"
 ev_france.10.a:0 "War!"
 ev_france.10.b:0 "We cannot challenge the might of France..."
 ev_france.11.t:0 "A Skirmish in America"
 ev_france.11.d:0 "A skirmish between ourselves and one of our colonial rivals in North America happened recently, and is the perfect justification for war. We are in an advantageous position diplomatically in Europe and this supposed defeat cannot be allowed to happen without consequence. Besides, it may be a good opportunity to finally defeat a rival abroad..."
 ev_france.11.a:0 "This cannot go unanswered!"
 ev_france.11.b:0 "Peace must be maintained."
 ev_france.12.t:0 "[From.GetName] invites us to war in North America"
 ev_france.12.d:0 "A war has broken out in North America between the Great Colonial Powers, and the injured party in the opening scirmish has invited us to partake in it, to perhaps expand our own holdings in the New World."
 ev_france.12.a:0 "Any chance to expand!"
 ev_france.12.b:0 "We are content to observe."
 ev_france.13.t:0 "Alliances with Native Americans"
 ev_france.13.d:0 "In order to achieve victory in war, we must distract and harass the enemy as much as possible, wherever possible. Given that our hated enemy has interests in North America, it would be wise to reach out to the natives of the New World, and to try and include them in our conflicts with the enemy."
 ev_france.13.a:0 "Send the diplomats!"
 ev_france.14.t:0 "Alliances with Princes of India"
 ev_france.14.d:0 "In order to achieve victory in war, we must distract and harass the enemy as much as possible, wherever possible. Given that our hated enemy has interests in the Indian Subcontinent, it would be wise to reach out to the rich and powerful princes of India, and to try and include them in our conflicts with the enemy."
 ev_france.14.a:0 "Send the diplomats!"
 ev_france.15.t:0 "An Alliance with the French?"
 ev_france.15.d:0 "The French, a power of Europe, can see that we are struggling to deal with the dangerous encroachment of a rival power from Europe in our home area. They seek alliacne and comradeship against our shared enemy."
 ev_france.15.a:0 "An alliance there shall be!"
 ev_france.15.b:0 "Why would we wish to antagonize the Europeans further?"
 ev_france.16.t:0 "The [Root.GetAdjective] Debt Crisis"
 ev_france.16.d:0 "After years of economic mismanagement by the upper classes, Poor spending by the rulers, and Poor taxing policies in [Root.GetName], the other shoe has dropped, and the government has been forced to admit that the nation is currently gripped by economic turmoil."
 ev_france.16.a:0 "Surely, we can recover!"
 ev_france.19.t:0 "A Greater Threat?"
 ev_france.19.d:0 "War, as is like to happen, has broken out between great powers of the continent. However, now may not be the best of times to bring war to our hated rivals, as Revolution has broken out among another of the Powers of Europe. Our resources might be better spent attempting to crush this existential threat than to bicker with our current foe..."
 ev_france.19.a:0 "A peace must be made, so the Revolution can be ended!"
 ev_france.19.b:0 "Peace? In our moment of Triumph?"
 ev_france.21.t:0 "Restoration of the Republic's Natural Borders"
 ev_france.21.d:0 "The lands in our home area are held either by brothers in arms who must be incorporated into the New Republic or who are enemies to be incorporated, whether they like it or not."
 ev_france.21.a:0 "Long live the Revolution!"
 ev_france.21.b:0 "We need more time, to restructure!"
 ev_france.22.t:0 "Pre-emptive Strike against the Monarchies"
 ev_france.22.d:0 "The Monarchies of Europe are mustering their forces to destroy our fledgeling Republic as we speak! In this state of relative stability and so-called peace, we must strike first to gain the upper hand!"
 ev_france.22.a:0 "The Monarchies shall be crushed!"
 ev_france.22.b:0 "This is just paranoia!"
 ev_france.23.t:0 "Incorporation of Occupied Regions"
 ev_france.23.d:0 "Regions have been occupied and won by us in our conflict to maintain the existence of the Republic from the jackal monarchies who would seek to restore the Old Ways in our mighty country. These lands must be integrated and the surrounding countries must be made into Sister Republics of the Revolution!"
 ev_france.23.a:0 "Glory to the Revolution!"
 ev_france.24.t:0 "New Lands granted by Overlord"
 ev_france.24.d:0 "Our new Revolutionary overlord has granted us lands won as spoils of war against our former allies."
 ev_france.24.a:0 "Huzzah."
 ev_france.25.t:0 "The Helvetic Republic"
 ev_france.25.d:0 "The areas of the former Swiss Cantons have been occupied and must be reorganized into a new Sister Republic."
 ev_france.25.a:0 "Excellent!"
 ev_france.25.b:0 "No, we have other plans for these lands..."
 ev_france.26.t:0 "The Roman Republic"
 ev_france.26.d:0 "The areas of the former Papal State have been occupied and must be reorganized into a new Sister Republic."
 ev_france.26.a:0 "Excellent!"
 ev_france.26.b:0 "No, we have other plans for these lands..."
 ev_france.27.t:0 "Occupation of Nearer Germany"
 ev_france.27.d:0 "The Powers that be in Central Europe have been forced to accept the peace we wished to impose upon them and have ceded their influence over a nearby section of Germany to us. They are no longer a part of this war, for now..."
 ev_france.27.a:0 "Glory, Glory!"
 ev_france.28.t:0 "The Ligurian Republic"
 ev_france.28.d:0 "The areas of the former Genoese Republic have been occupied and must be reorganized into a new Sister Republic."
 ev_france.28.a:0 "Excellent!"
 ev_france.28.b:0 "No, we have other plans for these lands..."
 ev_france.29.t:0 "Peace in exchange for North Italy"
 ev_france.29.d:0 "Our rival has been the dominant force in Northern Italy for some time, and while we believe this is now subject to change, some amount of concession might be necessary in order to sweeten the pot on a deal for peace against the monarchist agressors."
 ev_france.29.a:0 "Send the offer..."
 ev_france.29.b:0 "No! No peace with the enemy!"
 ev_france.30.t:0 "Peace for Northern Italy"
 ev_france.30.d:0 "Our hated Revolutionary Enemy has bested us, this is certain. They have offered a concilliatory peace, one in which they stand to gain a sphere of influence in Northern Italy, and in which, should it prove advantageous, we may recieve land in that region as a reconciliatory prize."
 ev_france.30.a:0 "Peace will buy us some time..."
 ev_france.30.b:0 "The fighting goes on!"
 ev_france.31.t:0 "[Root.GetAdjective] Invasion of Egypt"
 ev_france.31.d:0 "Our enemies in Europe have colonies in Eastern Asia. If we can control Egypt or the Middle East, we can limit their ability to conduct trade and send supplies to their asian colones."
 ev_france.31.a:0 "To Egypt we shall go!"
 ev_france.31.b:0 "Now is not the time for such an expedition."
 ev_france.33.t:0 "A Coalition against the Revolution"
 ev_france.33.d:0 "Revolution has come to a great power in Europe, and it is our duty to expell this false government and restore the rightful monarchy, and stability to Europe as a whole."
 ev_france.33.a:0 "They must be stopped!"
 ev_france.33.b:0 "Caution is best."
 ev_france.34.t:0 "[From.GetName] Request to Coalition against the Revolution"
 ev_france.34.d:0 "Revolution has come to a great power in Europe, and it is our duty to expell this false government and restore the rightful monarchy, and stability to Europe as a whole."
 ev_france.34.a:0 "They must be stopped!"
 ev_france.34.b:0 "Caution is best..."
 ev_france.35.t:0 "Occupation of Savoy"
 ev_france.35.d:0 "The areas of Savoy have been occupied and must be integrated into our state."
 ev_france.35.a:0 "Excellent!"
 ev_france.35.b:0 "No, that would set a bad precedent."
 ev_france.35.b:0 "Grant the lands to Italy!"
 ev_france.36.t:0 "Occupation of Tuscany"
 ev_france.36.d:0 "The areas of Tuscany have been occupied and must be integrated into our state."
 ev_france.36.a:0 "Excellent!"
 ev_france.36.b:0 "No, that would set a bad precedent."
 ev_france.36.b:0 "Grant the lands to Italy!"
 ev_france.37.t:0 "The Treaty of [amiens_treaty_province.GetCapitalName]"
 ev_france.37.d:0 "The Treaty of Amiens temporarily ended hostilities between France and the United Kingdom at the end of the War of the Second Coalition. It marked the end of the French Revolutionary Wars; after a short peace it set the stage for the Napoleonic Wars. Britain gave up most of its recent conquests; France was to evacuate Naples and Egypt. Britain retained Ceylon and Trinidad. It was signed in the city of Amiens on 25 March 1802 (4 Germinal X in the French Revolutionary calendar) by Joseph Bonaparte and Marquess Cornwallis as a "Definitive Treaty of Peace". The consequent peace lasted only one year (18 May 1803) and was the only period of general peace in Europe between 1793 and 1814."
 ev_france.37.a:0 "Peace at last?"
 ev_france.37.b:0 "The fighting must continue!"
 ev_france.38.t:0 "The Parthenopean Republic"
 ev_france.38.d:0 "The areas of the former Kingdom of Naples have been occupied and must be reorganized into a new Sister Republic."
 ev_france.38.a:0 "Excellent!"
 ev_france.38.b:0 "No, we have other plans for these lands..."
 ev_france.39.t:0 "Liberation of Southern Germany"
 ev_france.39.d:0 "The Powers that be in Central Europe have been forced to accept the peace we wished to impose upon them and have ceded their influence over a nearby section of Germany to us. They are no longer a part of this war, for now..."
 ev_france.39.a:0 "All in the name of Nationalism!"
 ev_france.40.t:0 "Liberation of Northern Germany"
 ev_france.40.d:0 "The Powers that be in Central Europe have been forced to accept the peace we wished to impose upon them and have ceded their influence over a nearby section of Germany to us. They are no longer a part of this war, for now..."
 ev_france.40.a:0 "All in the name of Nationalism!"
 ev_france.41.t:0 "The Treaties of Tilsit"
 ev_france.41.d:0 "The Revolutionaries have gained total control over Central Europe and our armies, though mighty, seem unable to stop their advance, through use of tactics unseen in the annals of history. We are presented with a choice: Continue to fight now that the enemy is at our doorstep or make peace and tow the enemy's line."
 ev_france.41.a:0 "Tow the line..."
 ev_france.41.b:0 "[Root.GetAdjective] do not surrender!"
 ev_france.42.t:0 "Occupation of Dalmatia"
 ev_france.42.d:0 "The areas of Dalmatia have been occupied and must be integrated into our state."
 ev_france.42.a:0 "Excellent!"
 ev_france.42.b:0 "No, that would set a bad precedent."
 ev_france.42.b:0 "Grant the lands to Italy!"
 ev_france.43.t:0 "The King of Italy"
 ev_france.43.d:0 "Among his many new titles as Emperor, the scourge of Europe has now proclaimed himself to be the King of Italy and Duke of Rome. As such, these regions must now be re-organized."
 ev_france.43.a:0 "Vivat Roma!"
 ev_france.43.b:0 "No, Vivat Italia!"
 ev_france.44.t:0 "The Treaty of Schönbrunn"
 ev_france.44.d:0 "The Treaty of Schönbrunn, sometimes known as the Peace of Schönbrunn or Treaty of Vienna, was signed between France and Austria at Schönbrunn Palace near Vienna on 14 October 1809. The treaty ended the Fifth Coalition during the Napoleonic Wars, after Austria had been defeated at the decisive Battle of Wagram on 5–6 July."
 ev_france.44.a:0 "Finally, Peace in Central Europe!"
 ev_france.44.b:0 "No! They must submit to the Revolution!"
 ev_france.45.t:0 "Demand Portuguese withdrawal from War"
 ev_france.45.d:0 "The Portuguese have long since been an ally to the forces of Great Britain, who seek to impede our expansion of the Revolution. We shall demand that they submit to being an "ally", someone alligned with our interests by force and unable to join any further Coalitions against us. If not they shall be banished from Europe and their lands seized."
 ev_france.45.a:0 "Send the demand!"
 ev_france.45.b:0 "They must submit to more than just an alliance!"
 ev_france.46.t:0 "Demand from the Revolutionary Occupiers"
 ev_france.46.d:0 "The enemy has demanded that we either submit to their will as a subject in all but name, unable to contest their futher expansion, or else be occupied and have our European titles stripped from us for the remaining duration of these Revolutionary Wars."
 ev_france.46.a:0 "We'd rather be occupied than submit!"
 ev_france.46.b:0 "It seems we have little choice..."
 ev_france.47.t:0 "Reaction to Peninsular War"
 ev_france.47.d:0 "The Peninsular War seems to be definitive proof that the Empire which currently dominates European Politics cannot be trusted as an ally."
 ev_france.47.a:0 "Wash our hands of them."
 ev_france.47.b:0 "Continue to tow the line..."
 ev_france.48.t:0 "The Invasion of [1812_victim.GetName]"
 ev_france.48.d:0 "The [1812_victim.GetAdjective] have defied our will by withdrawing from the Continental System we are endeavoring to establish, and therefore undermining the order we seek to maintain in the wake of the Revolutions and Wars that have rocked Europe, albeit due to our own actions. We must, therefore, bring them back into the fold by force, and if that process entails removing the current rulers and establishing a new Republic in those lands then so be it!"
 ev_france.48.a:0 "[1812_victim.Capital.GetCapitalName] shall fall!"
 ev_france.48.b:0 "We already have too many enemies!"
 ev_france.49.t:0 "Occupation of Catalonia"
 ev_france.49.d:0 "The areas of Catalonia have been occupied and must be integrated into our state."
 ev_france.49.a:0 "Excellent!"
 ev_france.49.b:0 "No, that would set a bad precedent."
 ev_france.50.t:0 "Inheritance of the Early Conquests"
 ev_france.50.d:0 "In the early years of the Revolution, we attacked a neighboring region with the intent of securing it from being used as a base from which to invade our fledgeling Republic by the Monarchist forces which beset us from all sides. We now exist among those monarchies, though still in contention with them. This region remains, however, in turmoil against us, and is a distraction from shoring up our conquests in other regions. It is, therefore, in the interest of the Empire if we end the pretense of their autonomy."
 ev_france.50.a:0 "So grows the Empire."
 ev_france.51.t:0 "Betrayal by Politians forces Abdication"
 ev_france.51.d:0 "Forces which once were alligned with our interests within the government have come to the conclusion that this war is forfeit and that our nation must capitulate to the allied powers in order to survive. They have done so without the concent of the leadership. It will be over soon."
 ev_france.51.a:0 "There is nothing we can do..."
 ev_france.52.t:0 "The Return from Exile"
 ev_france.52.d:0 "The Emperor of Old, the hero who led the nation to victory in many a battle in a bid to dominate the whole of Europe, has returned from his exile. He arrived via boat from the remote island upon which he was placed by the victorious Allied forces following our defeat. Every force we send to have him arrested is switching to his side, and joining the congregation which seems to be escorting him to the Capital. How do you wish to respond?"
 ev_france.52.a:0 "Long Live the Emperor!"
 ev_france.52.b:0 "We must stop him! Even if it means war!"
 ev_france.53.t:0 "The Emperor Victorious"
 ev_france.53.d:0 "The Emperor returned with the hope that the country would rally behind him and he could continue on his percieved path of inevitable glory. What happened instead was a brutal civil war which saw support from the old enemies in the Continent against the Emperor. Nonetheless, he has emerged victorious, but the Revolutionary spirit has died. There are none now who seek too see further bloodshed, for the nation has been bled nearly dry. There will be no more great conquests in the name of Revolution or Empire, and the Great Leader must resign himself to the title of King."
 ev_france.53.a:0 "What was it all for?..."
 ev_france.54.t:0 "The Final Defeat"
 ev_france.54.d:0 "The allies have returned once more and made it clear to the nation that the Revolution has ended, once and for all. After a crushing defeat in battle, the Emperor old regime established after the second to last Coalition is to return. The former Emperor of Europe is to be imprisoned on some remote island, never to see the outside world again, and very likely to die there, old and without legacy."
 ev_france.54.a:0 "Viva la Vida."

 lost_land_and_bad_ruler_tooltip:0 "Lost control of England due to poor leadership"
 controls_england_tooltip:0 "Has full control of England"
 EVHO_anglo_british_events.1.t:0 "The Union of the Crowns"
 EVHO_anglo_british_events.1.d:0 "The English have a solid stake to throne, how do we proceed?"
 EVHO_anglo_british_events.1.a:0 "They'll have to fight us for it!"
 EVHO_anglo_british_events.1.b:0 "Unite the Isles."
 EVHO_anglo_british_events.2.t:0 "[Root.GetAdjective] South Africa"
 EVHO_anglo_british_events.2.d:0 "Our Advantageous Position in Naval matters and several lucky aquisitions have lead to increased influence in the South African Cape from our state. We should organize the coastal regions that have fallen into our laps from enterprising Pirates, Companies, and other fellow countrymen."
 EVHO_anglo_british_events.2.a:0 "Hope we won't have to fight anyone for the rest!"
 EVHO_anglo_british_events.3.t:0 "[Root.GetAdjective] India"
 EVHO_anglo_british_events.3.d:0 "Our Advantageous Position in Naval matters and several lucky aquisitions have lead to increased influence in the Indian Subcontinent from our state. We should organize the coastal regions that have fallen into our laps from enterprising Pirates, Companies, and other fellow countrymen."
 EVHO_anglo_british_events.3.a:0 "A New Colony?"
 EVHO_anglo_british_events.5.t:0 "Application to join [USA.GetName]"
 EVHO_anglo_british_events.5.d:0 "A Union of American states that is poised to forever change the destiny of the virgin continent is forming and we would do well to make ourselves a part of this great experiment."
 EVHO_anglo_british_events.5.a:0 "Send the petition!"
 EVHO_anglo_british_events.5.b:0 "We'll do well enough on our own!"
 EVHO_anglo_british_events.6.t:0 "The [boston_massacre_province.GetCapitalName] Massacre"
 EVHO_anglo_british_events.6.d:0 "The Boston Massacre was a deadly riot that occurred on March 5, 1770, on King Street in Boston. It began as a street brawl between American colonists and a lone British soldier, but quickly escalated to a chaotic, bloody slaughter. The conflict energized anti-British sentiment and paved the way for the American Revolution."
 EVHO_anglo_british_events.6.a:0 "What the bloody hell!"
 EVHO_anglo_british_events.7.t:0 "The [boston_tea_party_province.GetCapitalName] Tea Party"
 EVHO_anglo_british_events.7.d:0 "The Boston Tea Party was a political protest that occurred on December 16, 1773, at Griffin’s Wharf in Boston, Massachusetts. American colonists, frustrated and angry at Britain for imposing “taxation without representation,” dumped 342 chests of tea, imported by the British East India Company into the harbor. The event was the first major act of defiance to British rule over the colonists. It showed Great Britain that Americans wouldn’t take taxation and tyranny sitting down, and rallied American patriots across the 13 colonies to fight for independence."
 EVHO_anglo_british_events.7.a:0 "Into the water it goes!"
 EVHO_anglo_british_events.8.t:0 "Punish the Rebellious Colony?"
 EVHO_anglo_british_events.8.d:0 "A rebellious group known as the "Sons of Liberty" have seen fit to throw several dozen crates of perfectly good Tea from the East Indian Company's reserves in their capital port back into the sea. It has cost us money and resoruces, and more importantly, is a sign that we may be losing our grip on the region. How do we proceed?"
 EVHO_anglo_british_events.8.a:0 "Blockade the Port and impose martial law on the colony!"
 EVHO_anglo_british_events.8.b:0 "Leave them be, a softer hand is needed in America."
 EVHO_anglo_british_events.9.t:0 "The Intolerable Acts"
 EVHO_anglo_british_events.9.d:0 "The Intolerable Acts (passed/Royal assent March 31–June 22, 1774) were punitive laws passed by the British Parliament in 1774 after the Boston Tea Party. The laws were meant to punish the Massachusetts colonists for their defiance in the Tea Party protest in reaction to changes in taxation by the British Government. In Great Britain, these laws were referred to as the Coercive Acts. The acts took away self-governance and rights that Massachusetts had enjoyed since its founding, triggering outrage and indignation in the Thirteen Colonies. They were key developments in the outbreak of the American Revolutionary War in April 1775."
 EVHO_anglo_british_events.9.a:0 "Damn them to hell!"
 EVHO_anglo_british_events.10.a:0 "Well, that doesn't solve anything!"
 EVHO_anglo_british_events.11.t:0 "First Continental Congress"
 EVHO_anglo_british_events.11.d:0 "The First Continental Congress was a meeting of delegates from 12 of the 13 British colonies that became the United States. It met from September 5 to October 26, 1774, at Carpenters' Hall in Philadelphia, Pennsylvania, after the British Navy instituted a blockade of Boston Harbor and Parliament passed the punitive Intolerable Acts in response to the December 1773 Boston Tea Party. During the opening weeks of the Congress, the delegates conducted a spirited discussion about how the colonies could collectively respond to the British government's coercive actions, and they worked to make a common cause."
 EVHO_anglo_british_events.11.a:0 "Ask for a repeal of the Punitive actions."
 EVHO_anglo_british_events.11.b:0 "Declare Independence!"
 EVHO_anglo_british_events.12.t:0 "An American Request"
 EVHO_anglo_british_events.12.d:0 "The Americans have requested that we end the so-called "Intolerable Acts" that we have supposedly enforced upon them unjustly in one of the colonies. For some reason they all feel threatened by our desire to ensure security in North America. How do we proceed?"
 EVHO_anglo_british_events.12.a:0 "We can't back down now!"
 EVHO_anglo_british_events.12.b:0 "This situation is becoming strained..."
 EVHO_anglo_british_events.13.t:0 "Intolerable Acts Reinforced!"
 EVHO_anglo_british_events.13.d:0 "Our lords in the mother country have seen fit to deem their actions against the north american colonies as justified."
 EVHO_anglo_british_events.13.a:0 "Our anger grows..."
 EVHO_anglo_british_events.14.t:0 "Intolerable Acts Repealed!"
 EVHO_anglo_british_events.14.d:0 "Our gracious overseers from the homeland have finally relented and loosened their brief but unacceptably strong grip upon our home region."
 EVHO_anglo_british_events.14.a:0 "As well they should!"
 EVHO_anglo_british_events.15.t:0 "The Shot Heard 'Round the World"
 EVHO_anglo_british_events.15.d:0 "The phrase comes from the opening stanza of Ralph Waldo Emerson's "Concord Hymn" (1837) and refers to the first shot of the American Revolution at the Old North Bridge in Concord, Massachusetts, where the first British soldiers fell in the battles of Lexington and Concord on April 19, 1775. At dawn on April 19, some 700 British troops arrived in Lexington and came upon 77 militiamen gathered on the town green. A British major yelled, "Throw down your arms! Ye villains, ye rebels." The heavily outnumbered militiamen had just been ordered by their commander to disperse when a shot rang out. To this day, no one knows which side fired first. Several British volleys were subsequently unleashed before order could be restored. When the smoke cleared, eight militiamen lay dead and nine were wounded, while only one Redcoat was injured."
 EVHO_anglo_british_events.15.a:0 "So it begins."
 EVHO_anglo_british_events.16.t:0 ""Join, or Die""
 EVHO_anglo_british_events.16.d:0 "Join, or Die. is a political cartoon attributed to Benjamin Franklin. The original publication by The Pennsylvania Gazette on May 9, 1754, is the earliest known pictorial representation of colonial union produced by an American colonist in Colonial America. It is a woodcut showing a snake cut into eighths, with each segment labeled with the initials of one of the American colonies or regions. New England was represented as one segment, rather than the four colonies it was at that time. Delaware was not listed separately as it was part of Pennsylvania. Georgia, however, was omitted completely. Thus, it has eight segments of a snake rather than the traditional 13 colonies. The poster focused solely on the colonies that claimed shared identities as Americans. The cartoon appeared along with Franklin's editorial about the "disunited state" of the colonies and helped make his point about the importance of colonial unity. It later became a symbol of colonial freedom during the American Revolutionary War."
 EVHO_anglo_british_events.16.a:0 "We have suffered under their yoke long enough."
 EVHO_anglo_british_events.16.b:0 "We will take no part in this folly!"
 EVHO_anglo_british_events.17.t:0 "Second Continental Congress"
 EVHO_anglo_british_events.17.d:0 "The Second Continental Congress was a meeting of delegates from the Thirteen Colonies in America that united in the American Revolutionary War. It convened on May 10, 1775, with representatives from 12 of the colonies in Philadelphia, Pennsylvania, shortly after the Battles of Lexington and Concord, succeeding the First Continental Congress which met in Philadelphia from September 5 to October 26, 1774. The Second Congress functioned as a de facto national government at the outset of the Revolutionary War by raising armies, directing strategy, appointing diplomats, and writing petitions such as the Declaration of the Causes and Necessity of Taking Up Arms and the Olive Branch Petition. All thirteen colonies were represented by the time the Congress adopted the Lee Resolution which declared independence from Britain on July 2, 1776, and the congress agreed to the Declaration of Independence two days later."
 EVHO_anglo_british_events.17.a:0 "Unity is in our best interest."
 EVHO_anglo_british_events.18.t:0 "[Root.GetName] Joins the Confederation"
 EVHO_anglo_british_events.18.d:0 "Our delegates in the Second Continental Congress agreed to sign the Declaration of Independence and properly join in the fight against our opressive former mother country."
 EVHO_anglo_british_events.18.a:0 "United we stand."
 EVHO_anglo_british_events.19.t:0 "Seek Foreign Aid"
 EVHO_anglo_british_events.19.d:0 "We have been putting a strong resistance up against our former overlords but this war is dragging on and we need help if we want to bring it to a swift end."
 EVHO_anglo_british_events.19.a:0 "Send the delegations!"
 EVHO_anglo_british_events.20.t:0 "Catholics in the Colonies"
 EVHO_anglo_british_events.20.d:0 "Catholic minorities from the home country have made their way to a colony in North America and have settled or converted locals or other settlers to their religion."
 EVHO_anglo_british_events.20.a:0 "Not Ideal."
 EVHO_anglo_british_events.21.t:0 "Quakers in the Colonies"
 EVHO_anglo_british_events.21.d:0 "Reformed minorities from the home country have made their way to a colony in North America and have settled or converted locals or other settlers to their religion."
 EVHO_anglo_british_events.21.a:0 "Not Ideal."
 EVHO_anglo_british_events.22.t:0 "Puritans in the Colonies"
 EVHO_anglo_british_events.22.d:0 "Protestant minorities from the home country have made their way to a colony in North America and have settled or converted locals or other settlers to their religion."
 EVHO_anglo_british_events.22.a:0 "Not Ideal."
 EVHO_anglo_british_events.23.t:0 "Episcopalians in the Colonies"
 EVHO_anglo_british_events.23.d:0 "Anglican minorities from the home country have made their way to a colony in North America and have settled or converted locals or other settlers to their religion."
 EVHO_anglo_british_events.23.a:0 "Not Ideal."
 EVHO_anglo_british_events.24.t:0 "Statutes of Iona"
 EVHO_anglo_british_events.24.d:0 "The Statutes of Iona, passed in Scotland in 1609, required that Highland Scottish clan chiefs send their heirs to Lowland Scotland to be educated in English-speaking Protestant schools. As a result, some clans, such as the MacDonalds of Sleat and the MacLeods of Harris, adopted the new religion. Other Clans, notably the MacLeans of Morvern & Mull, MacDonalds of Clanranald, Keppoch, Glengarry, and Glencoe, remained resolutely Roman Catholic."
 EVHO_anglo_british_events.24.a:0 "They aren't a bother to anyone."
 EVHO_anglo_british_events.24.b:0 "The Gaels will have to fall in line."
 EVHO_anglo_british_events.25.t:0 "The Highland Clearances"
 EVHO_anglo_british_events.25.d:0 "Highland Clearances, the forced eviction of inhabitants of the Highlands and western islands of Scotland, beginning in the mid-to-late 18th century and continuing intermittently into the mid-19th century. The removals cleared the land of people primarily to allow for the introduction of sheep pastoralism. The Highland Clearances resulted in the destruction of the traditional clan society and began a pattern of rural depopulation and emigration from Scotland."
 EVHO_anglo_british_events.25.a:0 "It's for the best."
 EVHO_anglo_british_events.27.t:0 "Succession of Prince James"
 EVHO_anglo_british_events.27.d:0 "Prince James, the brother of the King, has been named the heir apparent to the King of England following the excitement of the previous decades. This decision was made by the king at the behest of powers within the realm due to the King's never having had any legitimate children."
 EVHO_anglo_british_events.27.a:0 "So be it."
 EVHO_anglo_british_events.28.t:0 "Princess Mary"
 EVHO_anglo_british_events.28.d:0 "The Daughter of the King, Pincess Mary, is a figure of influence and shares the protestant leanings of the Realm. She is also married to the Lord of the Dutch Republic, who, though usually a great rival of our kingdom, has now extended the hand of friendship in light of this famillial bond."
 EVHO_anglo_british_events.28.a:0 "Interesting."
 EVHO_anglo_british_events.29.t:0 "The Glorious Revolution in Scotland"
 EVHO_anglo_british_events.29.d:0 "The traditionally protestant nobility of Scotland is chafing under the rule of the current king, whose policies of tolerance towards Catholics is seen as unwise and distasteful."
 EVHO_anglo_british_events.29.a:0 "The Scots will learn their place."
 EVHO_anglo_british_events.30.t:0 "The Glorious Revolution in England"
 EVHO_anglo_british_events.30.d:0 "James Scott, the Duke of Monmouth, is the eldest bastard son of the former king of England, and has now raised an army in a bid to take for himself the throne of England amid the disquiet caused by the reign of King James."
 EVHO_anglo_british_events.30.a:0 "This is becoming tiresome."
 EVHO_anglo_british_events.31.t:0 "Support the Glorious Revolutions?"
 EVHO_anglo_british_events.31.d:0 "There is growing unrest in the realm of the Lord of the Netherlands' Rival and Father-in-Law, the King of England, over his support for lenience against the Catholics of his kingdom. We would be amiss not to support these rebellions in order to destabilize a long-time rival and to potentially seed the possibility of his Lordship gaining power over this cursed land."
 EVHO_anglo_british_events.31.a:0 "It is in our interest to destabilize England!"
 EVHO_anglo_british_events.31.b:0 "Our priorities must remain elsewhere."
 EVHO_anglo_british_events.32.t:0 "A Catholic Heir"
 EVHO_anglo_british_events.32.d:0 "King James has had a son, who he intends to raise as a fellow Catholic. As such he is now attempting to realign the Church of England to Catholic doctrine."
 EVHO_anglo_british_events.32.a:0 "An ambitious move..."
 EVHO_anglo_british_events.33.t:0 "Dutch Protection of English Protestantism"
 EVHO_anglo_british_events.33.d:0 "Not only have the English been thorns in the sides of our Trade Empire for nearly a century, but they have recently spurned the wife of the current [Root.Monarch.GetTitle] of our realm as heir, replacing her with a Catholic Son, and attempting to restore Catholic doctrine in England. An intervention would have seemed prudent, even without the requests from within England itself that we intervene on behalf of Protestants everywhere, and to restore a rightful claim."
 EVHO_anglo_british_events.33.a:0 "The English welcome us with Open Arms!"
 EVHO_anglo_british_events.33.b:0 "Now is not a good time."
 EVHO_anglo_british_events.35.t:0 "King James flees England"
 EVHO_anglo_british_events.35.d:0 "Having been defeated by his countrymen and the Dutch in what is being called the Glorious Revolution, King James has fled England for the safety of the place he called home in his youth, and the source of his original conversion to Catholicism, France. His protestant daughter, Queen Mary, has succeeded him."
 EVHO_anglo_british_events.35.a:0 "Good Riddance!"
 EVHO_anglo_british_events.36.t:0 "Inheritance of England"
 EVHO_anglo_british_events.36.d:0 "Following the tragic death of the wife of the current ruler of the Netherlands, the Queen of England, the title of the English Throne has passed into the hands of the Dutch. At least, for a time."
 EVHO_anglo_british_events.36.a:0 "A force to be reckoned with."
 EVHO_anglo_british_events.37.t:0 "Queen Anne of England"
 EVHO_anglo_british_events.37.d:0 "Following the death of the Lord of the Netherlands, who succeeded the throne of England after the death of his wife, Queen Mary, her sister, Queen Anne, has ascended, as was the wish of her sister in her will after the death of her husband."
 EVHO_anglo_british_events.37.a:0 "Finally"
 EVHO_anglo_british_events.38.t:0 "Prince George von Hannover"
 EVHO_anglo_british_events.38.d:0 "Queen Anne of the Stuart Dynasty failed to produce an heir, so the throne of England passed to her nephew, the Heir to the Electorate of Hanover."
 EVHO_anglo_british_events.38.a:0 "Very well."
 EVHO_anglo_british_events.39.t:0 "The Inheritance of Hanover"
 EVHO_anglo_british_events.39.d:0 "Having succeeded both to the title of Elector of Hannover and of King of Great Britain, George I now holds both titles in personal union."
 EVHO_anglo_british_events.39.a:0 "What a way into continental politics!"
 EVHO_anglo_british_events.40.t:0 "The Ulster Protestants"
 EVHO_anglo_british_events.40.d:0 "The Ulster Protestant community emerged during the Plantation of Ulster. This was the colonisation of Ulster with loyal English-speaking Protestants from Great Britain under the reign of King James. Those involved in planning the plantation saw it as a means of controlling, anglicising, and "civilising" Ulster. The province was almost wholly Gaelic, Catholic and rural, and had been the region most resistant to English control. The plantation was also meant to sever Gaelic Ulster's links with the Gaelic Highlands of Scotland."
 EVHO_anglo_british_events.40.a:0 "So, they CAN be reasoned with!"
 EVHO_anglo_british_events.41.t:0 "Death of Queen Mary"
 EVHO_anglo_british_events.41.d:0 "In late 1694, Queen Mary contracted smallpox. She sent away anyone who had not previously had the disease, to prevent the spread of infection. Anne, who was once again pregnant, sent Mary a letter saying she would run any risk to see her sister again, but the offer was declined by Mary's groom of the stool, the Countess of Derby. Several days into the course of her illness, the smallpox lesions reportedly disappeared, leaving her skin smooth and unmarked, and Mary said that she felt improved. Her attendants initially hoped she had been ill with measles rather than smallpox, and that she was recovering. But the rash had "turned inward", a sign that Mary was suffering from a usually fatal form of smallpox, and her condition quickly deteriorated. Mary died at Kensington Palace shortly after midnight on the morning of 28 December, at the young age of 32."
 EVHO_anglo_british_events.41.a:0 "'I am going to be the most miserable creature on earth.'"
 EVHO_anglo_british_events.42.t:0 "Death of the Lord of the Netherlands"
 EVHO_anglo_british_events.42.d:0 ""
 EVHO_anglo_british_events.42.a:0 "What a tragedy!"
 EVHO_anglo_british_events.43.t:0 "British Custodianship of Dutch Colonies"
 EVHO_anglo_british_events.43.d:0 "The Dutch have fallen to revolutionary yoke and their admittedly lucrative holdings abroad cannot be allowed to fall into the hands of the Revolutionaries. Until such a time that the Dutch have attained freedom once more, we should hold their colonial lands for them."
 EVHO_anglo_british_events.43.a:0 "So be it."
 EVHO_anglo_british_events.43.b:0 "That would be unseemly!"
 EVHO_anglo_british_events.44.t:0 "The Anglo-Dutch Treaty of [GetYear]"
 EVHO_anglo_british_events.44.d:0 "The Dutch have attained their freedom once more, and, as we promised the Public and the International Community, we are beholden to return their colonies to them."
 EVHO_anglo_british_events.44.a:0 "Returned, as promised."
 EVHO_anglo_british_events.44.b:0 "No-one said we had to return ALL of their colonies!"
 EVHO_anglo_british_events.44.c:0 "Why not? Why shouldn't I keep them..."
 EVHO_anglo_british_events.45.t:0 "Seizure of [UK_colony_victim.GetAdjective] Colonies in the East"
 EVHO_anglo_british_events.45.d:0 "Colonies that are lucrative and within striking distance of our own in East Asia and Africa belong to governments that are either in exile or have fallen to the Revolution. It is within the bounds and national interests of the British people to seize these colonies in order to prevent them from impeding the war effort in Europe."
 EVHO_anglo_british_events.45.a:0 "Very well."
 EVHO_anglo_british_events.45.b:0 "This might be seen as further provocation!"
 EVHO_anglo_british_events.46.t:0 "Congress of Vienna: The Eastern Mediterraen"
 EVHO_anglo_british_events.46.d:0 "Some coastal regions or isles of the Eastern Mediterranean, an area of great interest to our burgeoning Empire, have fallen into the hands of the Revolutionaries and their ilk. Given that their armies are currently scattered and in retreat, now would be an excellent time to seize those lands for ourselves!"
 EVHO_anglo_british_events.46.a:0 "Hail, [Root.GetName]!"
 EVHO_anglo_british_events.47.t:0 "The Re-Integration of the Pale"
 EVHO_anglo_british_events.47.d:0 "The County of the Pale, a name given by the Anglo-Scottish settlers in Dublin and the nearby towns who were prominent from the 14th century onwards, has been re-integrated by the surrounding Irish population after centuries of being a powerful minority population of the county. Those of British descent are now essencially indestinguishable from the average Irishman."
 EVHO_anglo_british_events.47.a:0 "Very well."
 EVHO_anglo_british_events.48.t:0 "The Markets of Glasgow"
 EVHO_anglo_british_events.48.d:0 "The newly-relevant city of Glasgow prospers as a market centre because it is well situated between Highland and Lowland Scotland and also between Edinburgh—the capital, 45 miles east—and the west. With the new development and growth of trade with colonies in the Americas, Glasgow is exporting coal, plaid (wool cloth), and herring to Europe. Trade in the Americas’ tropical produce (tobacco, sugar, and rum) is also making fortunes for the Glasgow merchants, and the Clyde has been dredged and deepened and will soon be made navigable to the heart of the city."
 EVHO_anglo_british_events.48.a:0 "Braw!"
 EVHO_anglo_british_events.49.t:0 "The Growth of Cardiff"
 EVHO_anglo_british_events.49.d:0 "In 1793, John Crichton-Stuart, 2nd Marquess of Bute was born. He would spend his life building the Cardiff docks and would later be called "the creator of modern Cardiff". In 1815, a boat service between Cardiff and Bristol was established, running twice weekly. In 1821, the Cardiff Gas Works was established. The town grew rapidly from the 1830s onwards, when the Marquess of Bute built a dock which eventually linked to the Taff Vale Railway."
 EVHO_anglo_british_events.49.a:0 "Iechyd da!"
 EVHO_anglo_british_events.50.t:0 "Submission to Great Britain"
 EVHO_anglo_british_events.50.d:0 "A neighbor of smaller means and with a positive disposition towards our rule has submitted itself fully to our whims. It has been in our sphere of influence for some time, but with the growing threat looming over the entire region of foreign powers imposing a totally foreign rule and religion upon us all, they can see how important unity in Britannia is for safeguarding both our own collective security and the security of Europe as a whole."
 EVHO_anglo_british_events.50.a:0 "Excellent."
 EVHO_rough_wooing.a:0 "The Scots will see that an alliance will be great for Britain!"
 EVHO_rough_wooing.b:0 "Hadrian was right to build his wall! The Scots are animals!"
 EVHO_anglo_british_events.51.t:0 "England Desires a Royal Marriage"
 EVHO_anglo_british_events.51.desc:0 "The King of England has made overtures to our court, expressing his desire for a royal marriage beteween our nations, who have long been at odds. While it would be beneficial to see an end to the hostilities which seem to be an ever present stress from the south on the whole of Scotland, there are many in court who see this as nothing more than a ruse by the English in order to further exert influence upon Scotland. \n\nThere is also the matter of the pride of the English. Should we flatly refuse the offered olive branch, it is quite likely they will percieve it as an insult, and take the oppurtunity to once again make war upon the clans of Alba."
 EVHO_anglo_british_events.51.a:0 "Very well, to Peace in Britain!"
 EVHO_anglo_british_events.51.b:0 "An alliance, perhaps. A marriage? No."
 EVHO_anglo_british_events.51.c:0 "No marriage, No alliance, No mercy for our enemy!"
 EVHO_anglo_british_events.52.t:0 "The English Wooing of the Sots"
 EVHO_anglo_british_events.52.desc:0 "The Scots have seen the wisdom of unity between the Great Kingdoms of this Isle. The continent serves as a greater threat to us both, and with our mutual defense secured from both the potential threats of each other and the real threats of our religious and political rivals on the mainlands of Europe, we are free to pursue our ambitions in the Continent and the Americas with a renewed vigor!"
 EVHO_anglo_british_events.52.a:0 "To Unity in Britain!"
 EVHO_anglo_british_events.53.t:0 "The Flawed Wooing of England and the Scots"
 EVHO_anglo_british_events.53.desc:0 "Recoginizing that it's in their interest to stabilize relations between England and Scotland, the Scots have agreed to a mutual and amicable exchange of territory and a mutual defensive alliance against threats who may come from outside Britannia. However, on the matter of a royal marriage binding our two houses together, they are incredibly hesistant. While our intentions were primarily to secure peace in Britain to ensure our northern flank is safe whilst our armies adventure elsewhere, the lack of influence and no personal binding of our realms ensuring everlasting peace may be something we cannot permit."
 EVHO_anglo_british_events.53.a:0 "Very well, there shall be a peace."
 EVHO_anglo_british_events.53.b:0 "This will never do, quietly call up the banners!"
 EVHO_anglo_british_events.54.t:0 "The Rough Wooing of England and the Scots"
 EVHO_anglo_british_events.54.desc:0 "The Scots have made it clear, in a manner that is frankly insulting enough to genuinely be a cause for war due to loss of face, that they have no interest in friendship with the 'likes of us'. There is no other recourse but to prepare to force our benevolence upon them, regardless of whether or not they wish it!"
 EVHO_anglo_british_events.54.a:0 "This is too much effort. The Scots deserve only to be crushed by English Sabatons!"
 EVHO_anglo_british_events.54.b:0 "Northward bound we are, in the name of the [Root.Monarch.GetTitle]!"
 EVHO_ENG_will_have_10_years_to_occupy_scotland_to_force_an_alliance_on_them_tt:0 "@[ENG.GetTag] §Y[ENG.GetName]§! will have a §Y10 year§! window in which it has the opportunity to occupy @[SCO.GetTag] §Y[SCO.GetName]§!, forcing it into becoming a §YProtected Ally§! of @[ENG.GetTag] §Y[ENG.GetName]§!."
 EVHO_anglo_british_events.55.t:0 "Devastation of the Rough Wooing"
 EVHO_anglo_british_events.55.desc:0 "England has effectively demonstrated that they would make a better ally than an enemy by putting much of Scotland to the torch. This devastation may have hardened some hearts further against the southward foe, but many others still are simply tired and wish to see any sort of end to the conflict. Should we give word to England that we are willing to be their ally in name, and subject in practice? Or shall we fight on and take whatever nasty treaty the English may be like to force upon us should they prevail in their endevour to dominate the Isles?"
 EVHO_anglo_british_events.55.a:0 "Send word to the English..."
 EVHO_anglo_british_events.55.b:0 "The spirit of Scotia reigns fearless and free!"
 EVHO_anglo_british_events.56.t:0 "Scotland Caves to the Rough Wooing"
 EVHO_anglo_british_events.56.desc:0 "The devastation of Scotland by the armies of England and the clear simultaneous showcasing of the instability of the Scottish realm, the untennability of its borders, and the sheer relative prowess of the Royal Army of England has forced the Scots to come to terms with the fact that they must allow themselves to become a junior ally of the English."
 EVHO_anglo_british_events.56.a:0 "Together, England and Scotland will achieve great things!"
 EVHO_anglo_british_events.56.b:0 "They are not even worthy of being a junior ally!"
 EVHO_anglo_british_events.57.t:0 "Press the Claim to Angevin Lands?"
 EVHO_anglo_british_events.57.desc:0 "Our centuries-old conflict with the French has seen more than its fair share of pauses and truces, but both sides know the ultimate truth: Our kingdoms are locked in a state of perpetual war, until either England shines victorious, as is God's will, over the Valois and their false claim to the Kingdom of France, or the final Angevin holdings are swept up by said tainted dynasty, and the era of English domination of the Continent comes to an end. \n\nNow, many in our court are anxious. It has been some time since the campagins began anew, and now seems to be the best time in recent living memory to strike! There are those among the court that whisper that the current rulership is too weak to act. Should they be proven right, it would hinder the legitimacy of our reign significantly. However, should we do glorious battle with the French, and, crucially, secure victory against them, we shall be remembered throughout the annals of history as the Restorators of the Angevin Empire!"
 EVHO_anglo_british_events.57.a:0 "To [FRA.Capital.GetCapitalName] we shall go!"
 EVHO_anglo_british_events.57.b:0 "The court whispers the mutterings of fools!"

 EP_spanish_inbreeding:0 "Spanish Inbreeding"
 EVHO_spain_and_portugal_events.1.t:0 "The Union of the Crowns"
 EVHO_spain_and_portugal_events.1.d:0 "The Castillians have a solid stake to throne, how do we proceed?"
 EVHO_spain_and_portugal_events.1.a:0 "They'll have to fight us for it!"
 EVHO_spain_and_portugal_events.1.b:0 "Unite Iberia."
 EVHO_spain_and_portugal_events.2.t:0 "[Root.GetAdjective] Filipinas"
 EVHO_spain_and_portugal_events.2.d:0 "Our Advantageous Position in Naval matters and several lucky aquisitions have lead to increased influence in the Philippines from our state. We should organize the coastal regions that have fallen into our laps from enterprising Pirates, Companies, and other fellow countrymen."
 EVHO_spain_and_portugal_events.2.a:0 "Hope we won't have to fight anyone for the rest!"
 EVHO_spain_and_portugal_events.3.t:0 "[Root.GetName] gains De-facto Independence"
 EVHO_spain_and_portugal_events.3.d:0 "With the political unseating of the overlord in the mother country, [Root.GetName] sees no other option than to accept that it must fend for itself, at least until their overlords see fit to reimpose their rule."
 EVHO_spain_and_portugal_events.3.a:0 "Huzzah?"
 EVHO_spain_and_portugal_events.4.t:0 "War of Portuguese Succession"
 EVHO_spain_and_portugal_events.4.d:0 "The War of the Portuguese Succession, a result of the extinction of the Portuguese royal line after the Battle of Alcácer Quibir and the ensuing Portuguese succession crisis of 1580, was fought from 1580 to 1583 between the two main claimants to the Portuguese throne: António, Prior of Crato, proclaimed in several towns as King of Portugal, and his first cousin Philip II of Spain, who eventually succeeded in claiming the crown, reigning as Philip I of Portugal."
 EVHO_spain_and_portugal_events.4.a:0 "The Spaniard dynasty will have to do."
 EVHO_spain_and_portugal_events.4.b:0 "An old ally would be preferable."
 EVHO_spain_and_portugal_events.5.t:0 "War of Portuguese Restoration"
 EVHO_spain_and_portugal_events.5.d:0 "The Portuguese Restoration War (Portuguese: Guerra da Restauração) was the war between Portugal and Spain that began with the Portuguese revolution of 1640 and ended with the Treaty of Lisbon in 1668, bringing a formal end to the Iberian Union. The period from 1640 to 1668 was marked by periodic skirmishes between Portugal and Spain, as well as short episodes of more serious warfare, much of it occasioned by Spanish and Portuguese entanglements with non-Iberian powers. Spain was involved in the Thirty Years' War until 1648 and the Franco-Spanish War until 1659, while Portugal was involved in the Dutch–Portuguese War until 1663."
 EVHO_spain_and_portugal_events.5.a:0 "Free at last!"
 EVHO_spain_and_portugal_events.6.t:0 "[Root.GetAdjective] Inbreeding"
 EVHO_spain_and_portugal_events.6.d:0 "The kings of the Spanish Habsburg dynasty (1516-1700) frequently married close relatives in such a way that uncle-niece, first cousins and other consanguineous unions were prevalent in that dynasty. In the historical literature, it has been suggested that inbreeding was a major cause responsible for the extinction of the dynasty when the king Charles II, physically and mentally disabled, died in 1700 and no children were born from his two marriages, but this hypothesis has not been examined from a genetic perspective."
 EVHO_spain_and_portugal_events.6.a:0 "This is suboptimal."
 EVHO_spain_and_portugal_events.7.t:0 "New Dynasty in Spain"
 EVHO_spain_and_portugal_events.7.d:0 "The Ruling dynasty of Spain is nearing extinction and it is time for a new, more vigorous ruling dynasty to take control"
 EVHO_spain_and_portugal_events.7.a:0 "The French are our friends."
 EVHO_spain_and_portugal_events.7.b:0 "One of our allies will take charge."
 EVHO_spain_and_portugal_events.7.c:0 "New blood is needed in Spain."
 EVHO_spain_and_portugal_events.8.t:0 "War of the [Root.GetAdjective] Succession"
 EVHO_spain_and_portugal_events.8.d:0 "Our realm has formed a permanent alliance with another great state, and the mighty nations of this continent cannot stand for this upset in the balance of powers in Europe."
 EVHO_spain_and_portugal_events.8.a:0 "There will be bloodshed."
 EVHO_spain_and_portugal_events.9.t:0 "A War of Succession"
 EVHO_spain_and_portugal_events.9.d:0 "A new and great alliance of powerful states is forming to end the permanent alliance between the [From.GetAdjective] and another great power in Europe, we must be the spearhead of this coalition."
 EVHO_spain_and_portugal_events.9.a:0 "Ready our men."
 EVHO_spain_and_portugal_events.9.b:0 "There is no need for war!"
 EVHO_spain_and_portugal_events.10.t:0 "A War of Succession"
 EVHO_spain_and_portugal_events.10.d:0 "A new alliance is forming to stop the union between two great powers in Europe, shall we take part in this coalition?"
 EVHO_spain_and_portugal_events.10.a:0 "Ready our men."
 EVHO_spain_and_portugal_events.10.b:0 "We shall take no part."
 EVHO_spain_and_portugal_events.11.t:0 "End of the Permanent Alliance"
 EVHO_spain_and_portugal_events.11.d:0 "Due to our losses in the war, the Permanent Alliance that was established has come to an end."
 EVHO_spain_and_portugal_events.11.a:0 "A new path shall be forged."
 EVHO_spain_and_portugal_events.13.t:0 "The Iberian Opportunity"
 EVHO_spain_and_portugal_events.13.d:0 "With the establishment of our dynasty in the kingdoms of Iberia, we have an opportunity to enforce a more permanent diplomatic relationship with them."
 EVHO_spain_and_portugal_events.13.a:0 "We shall, with iron and smoke!"
 EVHO_spain_and_portugal_events.13.b:0 "Diplomacy always wins!"
 EVHO_spain_and_portugal_events.15.t:0 "End of the [Root.GetAdjective] Netherlands"
 EVHO_spain_and_portugal_events.15.d:0 "The realm of the Low Countries was bequethed to us by our Austrian kin who held it when our realm fell under the control of their dynasty and it's progeny. Now that we are no longer ruled by the once-mighy house of Von Habsburg, we must return it to it's rightful suzerine overlord."
 EVHO_spain_and_portugal_events.15.a:0 "Nothing good lasts."
 EVHO_spain_and_portugal_events.16.t:0 "Grant Lands to holder of Lowlands Title?"
 EVHO_spain_and_portugal_events.16.d:0 "Though our great and mighty house shares the domain of the lowlands, a family member who, while our amiable partner, has his own interests seperate from our own, is the pimary title holder of the Low Countries. It would be prudent if we bequethed our territory to him."
 EVHO_spain_and_portugal_events.16.a:0 "Very well."
 EVHO_spain_and_portugal_events.16.b:0 "Perhaps it's best if we broke ties, then!"
 EVHO_spain_and_portugal_events.17.t:0 "The Union of the Crowns"
 EVHO_spain_and_portugal_events.17.d:0 "The Aragonese have a solid stake to throne, how do we proceed?"
 EVHO_spain_and_portugal_events.18.t:0 "Other Iberians Seek Fellowship"
 EVHO_spain_and_portugal_events.18.d:0 "Fellow Iberians and allies of a lesser kingom wish to serve us to the best of their abiliies"
 EVHO_spain_and_portugal_events.18.a:0 "Welcome, Friends!"
 EVHO_spain_and_portugal_events.18.b:0 "Not Necessary."
 EVHO_spain_and_portugal_events.19.t:0 "The Habsburg Netherlands pass to [Root.GetName]"
 EVHO_spain_and_portugal_events.19.d:0 "Through advantageous marriages the House Habsurg has obtained power in much of Europe, and most especially in parts of France and in the Low Countries. In order to ensure that the Holy Roman sections of the Habsburg Domain can be ruled without distraction, it has been decided that the Westernmost parts of the Habsburg Domains should be held by the [Root.GetAdjective] Habsburgs."
 EVHO_spain_and_portugal_events.19.a:0 "A wise decision indeed."
 EVHO_spain_and_portugal_events.20.t:0 "Habsburg Italy passes to [Root.GetName]"
 EVHO_spain_and_portugal_events.20.d:0 "Through advantageous marriages the House Habsurg has obtained power in much of Europe, and most especially in parts of the Italian Peninsula. In order to ensure that the Holy Roman sections of the Habsburg Domain can be ruled without distraction, it has been decided that the Southernmost parts of the Habsburg Domains should be held by the [Root.GetAdjective] Habsburgs."
 EVHO_spain_and_portugal_events.20.a:0 "How lucrative."
 EVHO_spain_and_portugal_events.21.t:0 "The Winning Side"
 EVHO_spain_and_portugal_events.21.d:0 "This fledgeling Republic that the other powers of Europe seek to destroy has proven itself to be a formidable force on the battlefield despite its apparent lack of stability. By happenstance, they are also weakening the power of many of our longtime rivals. If we were to appease them, and promise them support in their endeavors in Europe, perhaps we can use their power to restore ourselves to a place of great glory in the Continent!"
 EVHO_spain_and_portugal_events.21.a:0 "An alliance there shall be!"
 EVHO_spain_and_portugal_events.21.b:0 "No, the Revolution must be destroyed!"
 EVHO_spain_and_portugal_events.22.t:0 "Succession Crisis in [peninsular_war_victim.GetName]"
 EVHO_spain_and_portugal_events.22.d:0 "The inept ruling dynasty of [peninsular_war_victim.GetName] has been a barely adequate ally in our endeavors on the continent, but as of late their internal dynastic bickering has become downright intolerable. Their King has asked us to arbistrate in a dispute that could erupt into a civil war between him and his heir."
 EVHO_spain_and_portugal_events.22.a:0 "Tell the [peninsular_war_victim.GetAdjective] to solve their own problems."
 EVHO_spain_and_portugal_events.22.b:0 "You wish me to choose your king, why not my brother?!"
 EVHO_spain_and_portugal_events.22.c:0 "You wish me to choose your king, why not myself?!"
 EVHO_spain_and_portugal_events.23.t:0 "The Peninsular War"
 EVHO_spain_and_portugal_events.23.d:0 "The [revolution_target_event.GetAdjective] have unjustly and traitorously placed themselves as our overlords, without the consent of our neither our former rulers nor the people of [Root.GetName]. Revolution against this has come at last. A decision must be made."
 EVHO_spain_and_portugal_events.23.a:0 "Side with the new King"
 EVHO_spain_and_portugal_events.23.b:0 "Side against the [revolution_target_event.GetAdjective]!"
 EVHO_spain_and_portugal_events.24.t:0 "Restoration of Portugal"
 EVHO_spain_and_portugal_events.24.d:0 "Following an unjust occupation, the Portuguese capital of Lisbon has been liberated by Allied forces. The Portuguese government can now be restored."
 EVHO_spain_and_portugal_events.24.a:0 "Long live Portugal!"
 portugal_brazil_tooltip:0 "Brazil will be released as a junior partner in a Personal Union under Portugal."
 brz_return_to_portugal_title:0 "Return to Portugal"
 brz_return_to_portugal_desc:0 "Brazil has served as an excellent court during our exile. However, Portugal has been restored to it's former place in Iberia, and as such we would be remiss not to return and restore the seat of our Kingdom. A dual monarchy shall be formed between ourselves and our new title in Brazil"
 guerilla_warfare:0 "Guerilla Warfare"
 EVHO_spain_and_portugal_events.26.t:0 "Congress of Vienna: The Kingdom of Spain"
 EVHO_spain_and_portugal_events.26.d:0 "The fate of the lands of Inner Iberia, including Madrid, Barcelona, Valencia, and Cordoba has been decided in the Congress of Vienna. These lands are to be returned in full to the Castillians, which is to become a parliamentary monarchy."
 EVHO_spain_and_portugal_events.26.a:0 "Very well."
 EVHO_spain_and_portugal_events.27.t:0 "Congress of Vienna: The Kingdom of Portugal"
 EVHO_spain_and_portugal_events.27.d:0 "The fate of the lands of Outer Iberia, including Porto and Lisboa has been decided in the Congress of Vienna. These lands are to be returned in full to the Portuguese, which is to become a parliamentary monarchy."
 EVHO_spain_and_portugal_events.27.a:0 "Very well."
 EVHO_spain_and_portugal_events.28.t:0 "Unification of España"
 EVHO_spain_and_portugal_events.28.desc:0 "In order to achieve greatness, be it within the bounds of the Europe or not, it is the destiny of our realm to unite the region the Romans once called the Province of Hispania."
 EVHO_spain_and_portugal_events.28.a:0 "A new chapter in history is being written."
 EVHO_spain_and_portugal_events.29.t:0 "The Fall of Granada"
 EVHO_spain_and_portugal_events.29.d:0 "From 1250 onward, the Emirate of Granada was the last part of the Iberian Peninsula ruled by the Muslims, who had been forced southward after hundreds of years of clashing with the Christians during the Reconquista. The Nasrid dynasty governed the Emirate from their seat of power at the Alhambra palace complex in the capital city of Granada, which was a cultural gemstone of the Islamic world, flourishing on the trade route between Europe and sub-Saharan Africa. However, now Christian forces have seized control of the city, defeating the armies beyond it, overwhelming its walls, and swarming in through the gates. It is the end of an era in Iberia, and the fall of al-Andalus will be matched by the rise of Spain."
 EVHO_spain_and_portugal_events.29.a:0 "Seize control of the Emirate!"
 EVHO_spain_and_portugal_events.29.b:0 "Let us be merciful to the inhabitants of Granada."

 EP_perpetual_neutrality:0 "Perpetual Neutrality"
 EVHO_commonwealth.2.t:0 "End of the Foreign Union"
 EVHO_commonwealth.2.d:0 "The reign of our last king, who held other primary titles abroad, was contentious to say the least. However the former King was respected and his death comes as a loss for the people of [Root.GetName]. Now the Monarch Electorate must look ahead and elect among the nobility a new king from among the ranks of our countrymen."
 EVHO_commonwealth.2.a:0 "Long live the king!"
 EVHO_commonwealth.3.t:0 "Demand Polish Neutrality?"
 EVHO_commonwealth.3.d:0 "The Polish kingdom remains at our borders, a potential wild card in the war that we find ourselves embroiled in. Should they join on the side of the dreaded enemy they may prove to be quite the foe. Even those who proclaim unto their last breath that the Polish state is weak cannot deny that it has potential. This may serve as an opportunity to cut off the Poles from the diplomatic channels of Europe."
 EVHO_commonwealth.3.a:0 "Send the demand!"
 EVHO_commonwealth.3.b:0 "Why would we antagonize the Poles?"
 EVHO_commonwealth.4.t:0 "[From.GetAdjective] Demands our Neutrality"
 EVHO_commonwealth.4.d:0 "Our mighty neighbours demand that we do not partake in the wars that have set the continent aflame. Their reasons are just as unknown to us as their wits. How do we respond to this provocative attempt to control the foreign policies of Poland?"
 EVHO_commonwealth.4.a:0 "We are truly not interested in warfare."
 EVHO_commonwealth.4.b:0 "Ha! Go and prepare our Cavalry!"
 EVHO_commonwealth.5.t:0 "A Scheme Against Poland"
 EVHO_commonwealth.5.d:0 "Empires that once were mighty powers in Europe are now beginning to wane, and Kingdoms that started humbly are taking a new place in the world. Some of the old powers may seek to prevent the inevitable rise of our realm, but It is possible for us to placate them. The so-called "Balance of Power" means everything to the Kings and Diplomats of Europe, and there is one realm whose lands are being poorly managed. Perhaps an arrangement can be made so that said lands can find themselves brought under the tender control of a more politically astute power."
 EVHO_commonwealth.5.a:0 "Southward and Eastward our diplomats go...."
 EVHO_commonwealth.5.b:0 "Such underhandedness is below us."
 EVHO_commonwealth.6.t:0 "[From.GetAdjective] Plan to Invade Poland"
 EVHO_commonwealth.6.d:0 "Sleuthy [From.GetAdjective] diplomats have found their way into the court of the Lord of all the [Root.GetAdjective]s. They claim that their King and Army is making preparations in the coming years to attack the woebegotten state of Poland, and to seize it's lands for their own. They are aware, however, that we consider them to be a protectorate or buffer of sorts, and are inclined to offer a solution as to our lack of a willingness to their expansion into our sphere of influence: They suggest, in hushed and backwards terms of course, that we partake in our own adventure into the Polish realm at the same time as their invasion. Such an offer could greatly expand our power as a nation.\n\nThe [From.GetAdjective] plan once the Poles have been cowed by our combined strength is to make them a subject in all but name, beholden to the wishes of them, and of us, as we can exert our influence over [From.GetName]. From there, any conflict between us and the fellow partitioners or with the peoples of Poland itself can be resolved simply by occupying more of Poland."
 EVHO_commonwealth.6.a:0 "Very well, Prepare our forces... quietly!"
 EVHO_commonwealth.6.b:0 "What a terrible proposal this is!"
 EVHO_commonwealth.7.t:0 "The [From.GetAdjective] Agree"
 EVHO_commonwealth.7.d:0 "Everything is proceeding as planned."
 EVHO_commonwealth.7.a:0 "Excellent"
 EVHO_commonwealth.8.t:0 "Joint Invasion of Poland"
 EVHO_commonwealth.8.d:0 "In February 1772, the agreement of partition was signed in Vienna. Early in August, Russian, Prussian and Austrian troops occupied the provinces agreed upon among themselves. Nevertheless, several battles and sieges took place, as Bar confederation troops and French volunteers refused to lay down their arms (most notably, in Tyniec, Częstochowa and Kraków)."
 EVHO_commonwealth.8.a:0 "There is only Victory!"
 EVHO_commonwealth.8.b:0 "Now is not the time!"
 EVHO_commonwealth.9.t:0 "First Partition of Poland"
 EVHO_commonwealth.9.d:0 "On August 5, 1772, the occupation manifesto was issued, much to the consternation of a country too exhausted by the endeavors of the Confederation of Bar to offer successful resistance; The partition treaty was ratified by its signatories on September 22, 1772. Frederick II of Prussia was elated with his success; Prussia took most of Royal Prussia (without Danzig) that stood between its possessions in the Kingdom of Prussia and the Margraviate of Brandenburg, as well as Ermland (Warmia), northern areas of Greater Poland along the Noteć River (the Netze District), and parts of Kuyavia (but not the city of Toruń). Despite token criticism of the partition from Empress Maria Theresa, Austrian statesman Wenzel Anton, Prince of Kaunitz-Rietberg, was proud of wresting as large a share as he did, with the rich salt mines of Bochnia and Wieliczka. To Austria fell Zator and Auschwitz (Oświęcim), part of Lesser Poland embracing parts of the counties of Kraków and Sandomir and the whole of Galicia, less the city of Kraków."
 EVHO_commonwealth.9.a:0 "Is this truly the end?"
 EVHO_commonwealth.10.t:0 "Polish-Russian War of [GetYear]"
 EVHO_commonwealth.10.d:0 "By 1790 the First Polish Republic had been weakened to such a degree that it was forced into an unnatural and terminal alliance with its enemy, Prussia. The Polish–Prussian Pact of 1790 was signed. The conditions of the Pact contributed to the subsequent final two partitions of Poland–Lithuania. The May Constitution of 1791 enfranchised the bourgeoisie, established the separation of the three branches of government, and eliminated the abuses of the Repnin Sejm. Those reforms prompted aggressive actions on the part of its neighbours, wary of the potential renaissance of the Commonwealth. Arguing that Poland had fallen prey to the radical Jacobinism then at high tide in France, Russian forces invaded the Commonwealth in 1792."
 EVHO_commonwealth.10.a:0 "We are rescuing this rebellious land."
 EVHO_commonwealth.11.t:0 "Second Partition of Poland?"
 EVHO_commonwealth.11.d:0 "Abandoned by their Prussian allies, Polish pro-constitution forces, faced with Targowica units and the regular Russian army, were defeated. Prussia signed a treaty with Russia, agreeing that Polish reforms would be revoked, and both countries would receive chunks of Commonwealth territory. In 1793, deputies to the Grodno Sejm, last Sejm of the Commonwealth, in the presence of the Russian forces, agreed to Russian territorial demands."
 EVHO_commonwealth.11.a:0 "Musn't be too greedy!"
 EVHO_commonwealth.11.b:0 "This was not sanctioned!"
 EVHO_commonwealth.12.t:0 "Third Partition of Poland"
 EVHO_commonwealth.12.d:0 "Kosciuszko's ragtag insurgent armies won some initial successes, but they eventually fell before the superior forces of the Russian Empire. The partitioning powers, seeing the increasing unrest in the remaining Commonwealth, decided to solve the problem by erasing any independent Polish state from the map. On 24 October 1795, their representatives signed a treaty, dividing the remaining territories of the Commonwealth between their three countries."
 EVHO_commonwealth.12.a:0 "It is good to be rid of them!"
 EVHO_commonwealth.13.t:0 "Restoration of Polish Lands"
 EVHO_commonwealth.13.d:0 "The Revolution has come to the recently partition lands of Poland, and there are old political elements who would seek to see some Polish government restored to these lands. How do we proceed?"
 EVHO_commonwealth.13.a:0 "Long live the Poles!"
 EVHO_commonwealth.13.b:0 "This seems unnecessary."
 EVHO_commonwealth.14.t:0 "The Throne of Poland"
 EVHO_commonwealth.14.d:0 "The Revolution saw the restoration of a government in Poland to spite the wishes of those who took place in it's partition several years ago, but now the Revolutionaries are in retreat. As the bastion of the East and the Savior of Europe, we feel indebted to claiming this title for ourselves."
 EVHO_commonwealth.14.a:0 "Finally, the Poles are subjugated."
 EVHO_commonwealth.15.t:0 "Demand Adherence to the Congress of Vienna?"
 EVHO_commonwealth.15.d:0 "A comrade nation who participated with us in the Partition of Poland several years ago has claimed, following the illegal restoration of Poland and the routing of it's benefactor, the title of King of Poland for themselves. This, however, is an affront to our inerests, as Poland still holds lands that we have claim to. However, in the interest of not being insulting and greasing the wheels of diplomacy, we shall reduce the scale of our claims."
 EVHO_commonwealth.15.a:0 "Send the demand!"
 EVHO_commonwealth.15.b:0 "Let them enjoy their spoils."
 EVHO_commonwealth.16.t:0 "Congress of Vienna: The Fate of Poland"
 EVHO_commonwealth.16.d:0 "The other Great Powers who took part in the joint Partition of Poland have requested some small concessions from our new Polish holding as per the agreement made in the Congress of Vienna. Should we refuse their request war will surely follow."
 EVHO_commonwealth.16.a:0 "Peace in Europe!"
 EVHO_commonwealth.16.b:0 "I shall teach them how to war!"
 EVHO_commonwealth.17.t:0 "The November Uprising"
 EVHO_commonwealth.17.d:0 "The November Uprising (1830–31), also known as the Polish–Russian War or the Cadet Revolution, was an armed rebellion in the heartland of partitioned Poland against the Russian Empire. The uprising began on 29 November 1830 in Warsaw when young Polish officers from the military academy of the Army of Congress Poland revolted, led by Lieutenant Piotr Wysocki. Large segments of the peoples of Lithuania, Belarus, and the Right-bank Ukraine soon joined the uprising. Although the insurgents achieved local successes, a numerically superior Imperial Russian Army under Ivan Paskevich eventually crushed the uprising."
 EVHO_commonwealth.17.a:0 "We shall fight to the bitter end!"
 EVHO_commonwealth.17.b:0 "It will only end badly."
 EVHO_commonwealth.18.t:0 "Uprising in Poland"
 EVHO_commonwealth.18.d:0 "There is a general revolt in the Kingdom of Poland, which was once an autonomous kingdom ruled by you majesty. How do we respond?"
 EVHO_commonwealth.18.a:0 "Crush them once and for all."
 EVHO_commonwealth.18.b:0 "The Poles are not so important."

 EVHO_italian_events.1.t:0 "Incorporation of Sardinia into Savoy"
 EVHO_italian_events.1.d:0 "After inheriting and ruling the Sardinian duchy for a few generations, our House has officially incorporated the area into Savoia."
 EVHO_italian_events.1.a:0 "So be it."
 EVHO_italian_events.4.t:0 "Petition for a new Holy League"
 EVHO_italian_events.4.d:0 "A vicious enemy hailing from the evil infidelity of Islam is at our doorstep. We are besieged and though all search everywhere, hope of victory is scarce to be found. We must peition his holiness to call upon fellow nations of the faith of God to assist in routing the forces of evil, before our time runs short...."
 EVHO_italian_events.4.a:0 "Quickly! Send word to [PAP.Capital.GetCapitalName]!"
 EVHO_italian_events.5.t:0 "[From.GetAdjective] Requests for a Holy League"
 EVHO_italian_events.5.d:0 "The [From.GetAdjective] are beset on all sides by the evil enemies of the faith that have harrassed Europe for centuries. They have requested that we create a new Holy League of the powerful states of Christendom to put an end to this conflict with a victory on the side of the light, lest their realm falls into the hands of darkness..."
 EVHO_italian_events.5.a:0 "Call the Banners and the Kings!"
 EVHO_italian_events.5.b:0 "We cannot help..."
 EVHO_italian_events.6.t:0 "A New Holy League"
 EVHO_italian_events.6.d:0 "His Holiness the Pope of Catholicism has called upon us to join a new Holy League against a most evil enemy of all good christians. How do we respond?"
 EVHO_italian_events.6.a:0 "We shall take up the sword and cross!"
 EVHO_italian_events.6.b:0 "We have other matters to attend to."
 EVHO_italian_events.9.t:0 "A New Pope"
 EVHO_italian_events.9.d:0 "From our cardinals, one stands out above the rest as an excellent orator and a fresh but unprovacative perspective on the faith of God. He is young, and opinioned, but will make a good Holy Pope. Shall we vote him in?"
 EVHO_italian_events.9.a:0 "I say let him."
 EVHO_italian_events.9.b:0 "What of the brothels?"
 EVHO_italian_events.11.t:0 "Papal Betrayal"
 EVHO_italian_events.11.d:0 "His holiness and his lackey bishops in his circle have seen fit to do away with the long standing alliance between him and ourselves in favor of one of our hated rivals. Will there be consequences for his actions?"
 EVHO_italian_events.11.a:0 "I say we go and have a little chat with His Holiness..."
 EVHO_italian_events.11.b:0 "It would be unwise to upset fellow nations of the faith."
 EVHO_italian_events.12.t:0 "The [GetYear] Sack of Rome"
 EVHO_italian_events.12.a:0 "Will the Holy City ever recover?"
 EVHO_italian_events.13.t:0 "John Calvin"
 EVHO_italian_events.13.d:0 "Calvin was originally trained as a humanist lawyer. He broke from the Roman Catholic Church around 1530. After religious tensions erupted in widespread deadly violence against Protestant Christians in France, Calvin fled to Basel, Switzerland, where in 1536 he published the first edition of the Institutes. In that same year, Calvin was recruited by Frenchman William Farel to join the Reformation in Geneva, where he regularly preached sermons throughout the week. However, the governing council of the city resisted the implementation of their ideas, and both men were expelled. At the invitation of Martin Bucer, Calvin proceeded to Strasbourg, where he became the minister of a church of French refugees. He continued to support the reform movement in Geneva, and in 1541 he was invited back to lead the church of the city."
 EVHO_italian_events.13.a:0 "He had better not cause any trouble."
 EVHO_italian_events.14.t:0 "Captain Sforza"
 EVHO_italian_events.14.d:0 "After Filippo Maria Visconti, duke of Milan, died without a male heir in 1447, fighting broke out to restore the so-called Ambrosian Republic. The name Ambrosian Republic takes its name from St. Ambrose, the patron saint of Milan. Agnese del Maino, his wife's mother, convinced the condottiero who held Pavia to restore it to him. He also received the seigniory of other cities of the duchy, including Lodi, and started to carefully plan the conquest of the ephemeral republic, allying with William VIII of Montferrat and (again) Venice. In 1450, after years of famine, riots raged in the streets of Milan and the city's senate decided to entrust to him the duchy. Sforza entered the city as duke on 26 February. It was the first time that such a title was handed over by a lay institution. While the other Italian states gradually recognized Sforza as the legitimate Duke of Milan, he was never able to obtain official investiture from the Holy Roman Emperor. That did not come to the Sforza Dukes until 1494, when Emperor Maximilian formally invested Francesco's son, Ludovico, as duke of Milan."
 EVHO_italian_events.14.a:0 "For the good of Milano, he may have power"
 EVHO_italian_events.14.b:0 "Absolutely not!"
 EVHO_italian_events.15.t:0 "A Claim on the Duchy of Milan"
 EVHO_italian_events.15.d:0 "The Duchy of Milan, by right of a claim made known to us by our priests and scholars, was the rightful title of your father and is therefore a rightful claim of yours, your lordship."
 EVHO_italian_events.15.a:0 "Opprotunity!"
 EVHO_italian_events.17.t:0 "Succession of North Sicily"
 EVHO_italian_events.17.d:0 "The Northern half of the Kingdom of Sicily has been functionally independent for the last few decades, though the current ruler, a relative of the Spaniard dynasty, has a very tenuious hold over his titles. He is also a relative of your lordship, though the Spaniards are currently staking the greater claim."
 EVHO_italian_events.17.a:0 "I hold no interest in Southern Italia"
 EVHO_italian_events.17.b:0 "Contest the claim at once!"
 EVHO_italian_events.18.t:0 "House of Savoy"
 EVHO_italian_events.18.d:0 "The humble and noble family of di Savoia has been around since the 10th century and came to rule Savoy after Otto of Savoy succeeded to the title in 1051 following the death of his elder brother Amadeus I of Savoy and married the Marchioness Adelaide of Turin, passing the Marquessate of Susa, with the towns of Turin and Pinerolo, into the House of Savoy's possession. The dynasty was presumed to have died out but it now seems that there still exists a member, although their claim to the throne is considered weak. Since [Root.Monarch.GetName] currently lacks an heir, should we perhaps acknowledge this di Savoia as a legitimate heir?"
 EVHO_italian_events.18.a:0 "Our House shall continue to rule!"
 EVHO_italian_events.18.b:0 "The di Savoias must return!"
 EVHO_italian_events.19.t:0 "The Savoyard Claim"
 EVHO_italian_events.19.d:0 "The Savoyards have a claim to our throne, how do we proceed?"
 EVHO_italian_events.19.a:0 "They'll have to fight us for it!"
 EVHO_italian_events.19.b:0 "Invite their king to our court."
 EVHO_italian_events.20.t:0 "War for the Restoration of Hose Sforza"
 EVHO_italian_events.20.d:0 "An oppportunity has arisen to restore the House of Sforza to the rule of the Duchy of Milan. However, we do not possess the strength to overthrow our current Duke without the help of his rivals, and the lord we would be replacing him with in question, while competent, is ill often and seems unlikely to be able to produce an heir. We shall promise that the Holy Roman Empire will inherit the Duchy should Lord Sforza die without an heir apparent."
 EVHO_italian_events.20.a:0 "A chance for freedom!"
 EVHO_italian_events.21.t:0 "The Death of Francesco Sforza"
 EVHO_italian_events.21.d:0 "Without an heir, Francesco Sforza, Duke of Milan, perished. Now a war shall begin between the forces of the dynasty of our former Duke, another power in europe, and his rival, who is now the recognized Duke of Milan."
 EVHO_italian_events.21.a:0 "Yet another war in Italy!"
 EVHO_italian_events.22.t:0 "Demanded Restoration of Naples"
 EVHO_italian_events.22.d:0 "The other Great Powers of the world have demanded that, for the sake of mainaining the Balance of Power in Europe, the Kingdom of Naples must be restored from our lands, as we hold it, most of it, or it's most important holdings. We have the right to refuse, of course, however many will come to view our realm as a paraiah state should we take that course of diplomatic action."
 EVHO_italian_events.22.a:0 "At least they will be held by allies and family..."
 EVHO_italian_events.22.b:0 "How dare they!?"
 EVHO_italian_events.23.t:0 "Congress of Vienna: The South of Italy"
 EVHO_italian_events.23.d:0 "The fate of the South of Italy, including Sicila, Napoli, and Apulia has been decided by the joint diplomatic corps of the Congress of Vienna, which has been tasked with restoring a peace and status quo, hopefully to last, in the lands of Europe."
 EVHO_italian_events.23.a:0 "Very well."
 EVHO_italian_events.24.t:0 "Congress of Vienna: The Former Papal States"
 EVHO_italian_events.24.d:0 "The fate of the former holds of the Papacy in Central Italy, including Roma, Urbino, and Ravenna has been decided in the Congress of Vienna. These lands are to be returned in full to the Papacy in exile."
 EVHO_italian_events.24.a:0 "Very well."
 EVHO_italian_events.25.t:0 "Congress of Vienna: Tuscany"
 EVHO_italian_events.25.d:0 "The famed Renaissance lands of Tuscany, including the old cities of Florencia and Pisa has been decided by the joint diplomatic corps of the Congress of Vienna, which has been tasked with restoring a peace and status quo, hopefully to last, in the lands of Europe."
 EVHO_italian_events.25.a:0 "Very well."
 EVHO_italian_events.26.t:0 "Congress of Vienna: Piedmont and Savoy"
 EVHO_italian_events.26.d:0 "The fate of the old Lombardic realms of Savoia and Piedmonta, including Genova and Savoia has been decided by the joint diplomatic corps of the Congress of Vienna, which has been tasked with restoring a peace and status quo, hopefully to last, in the lands of Europe."
 EVHO_italian_events.26.a:0 "Very well."
 EVHO_italian_events.27.t:0 "Congress of Vienna: Lombardia and Venetia"
 EVHO_italian_events.27.d:0 "The fate of the old Byzantian realms of Lombardia and Venetia, including Mantua and Serene Venice has been decided by the joint diplomatic corps of the Congress of Vienna, which has been tasked with restoring a peace and status quo, hopefully to last, in the lands of Europe."
 EVHO_italian_events.27.a:0 "Very well."
 EVHO_italian_events.28.t:0 "Congress of Vienna: The Kingdom of Italy"
 EVHO_italian_events.28.d:0 "The fate of the lands of the Italian Peninsula, including Roma, Urbino, Napoli, Venetia, Genova, and Lombardia has been decided in the Congress of Vienna. These lands are to be returned in full to the Italia, which is to become a parliamentary monarchy."
 EVHO_italian_events.28.a:0 "Very well."
 EVHO_italian_events.29.t:0 "End the Italian Wars with the Papacy?"
 EVHO_italian_events.29.d:0 "The Pope appears to be at war with us in order to restore his supposedly rightful rule over parts of Central Italy currently under my lord's guardianship. Perhaps if we withrdaw from these lands the Papacy will be willing to let bygones be bygones."
 EVHO_italian_events.29.a:0 "It's worth a try."
 EVHO_italian_events.29.b:0 "Those lands are MINE!"

 EVHO_near_east_and_india.1.t:0 "A Unified Burma"
 EVHO_near_east_and_india.1.desc:0 "Burma currently exists as a series of tributaries or is otherwise shattered, which is not ideal, because it is well situated to be the center of a great empire. It may be the destiny of this dynasty to change that!"
 EVHO_near_east_and_india.1.a:0 "We must go forth and conquer!"
 conquest_of_home_area_buff:0 "Conquest of a New Empire"
 EVHO_near_east_and_india.2.t:0 "Conquest of Shan"
 EVHO_near_east_and_india.2.desc:0 "The Shan people of the northern hills have been divided by many squabbling dynasties for long enough! It is time they were unified by a Great Conqueror!"
 EVHO_near_east_and_india.2.a:0 "To war!"
 EVHO_near_east_and_india.2.b:0 "Internal stability must always come first!"
 EVHO_near_east_and_india.3.t:0 "A Burmese Kingdom"
 EVHO_near_east_and_india.3.desc:0 "The region of Burma would be an excellent place for a unified Empire!"
 EVHO_near_east_and_india.3.a:0 "We must be the great unifiers!"
 EVHO_near_east_and_india.3.b:0 "We have other priorities."
 EVHO_near_east_and_india.4.t:0 "The End of Steppe Ambitions"
 EVHO_near_east_and_india.4.desc:0 "Having carved out an Empire in the Indian Subcontinent, and with plenty of room and very valuable land surrounding us to profit from, our interest in the Steppe of old has been greatly diminished. As such we are vacating our holdings in these lands so as to avoid distractions. Perhaps, in some cases, we may leave relatives in charge."
 EVHO_near_east_and_india.4.a:0 "Very well."
 EVHO_near_east_and_india.5.t:0 "A Neighbor Submits to Our Empire"
 EVHO_near_east_and_india.5.desc:0 "Seeing that Our Empire is growing to dominate the whole of India, one of our many loyal allies has sworn fealty to you, my Lord, with the hope that they can become a loyal part of the Great Empire which every citizen works tirelessly to build."
 EVHO_near_east_and_india.5.a:0 "Wider, ever wider."
 EVHO_near_east_and_india.6.t:0 "The End of Steppe Ambitions"
 EVHO_near_east_and_india.6.desc:0 "Having usurped the Ancient Empire of Persia and claimed its thrown for our own Peoples and Dynasty, and with plenty of room and very valuable land surrounding us to profit from, our interest in the Steppe of old has been greatly diminished. As such we are vacating our holdings in these lands so as to avoid distractions. Perhaps, in some cases, we may leave relatives in charge."
 EVHO_near_east_and_india.6.a:0 "Very well."
 EVHO_near_east_and_india.7.t:0 "The Timurid Dynasty"
 EVHO_near_east_and_india.7.desc:0 "The origin of the Timurid dynasty goes back to the Mongol tribe known as Barlas, who were remnants of the original Mongol army of Genghis Khan, founder of the Mongol Empire. Having moved from the vast northeastern steppes into the central steppes, and having mingled with the local turkic populations for many generations, a great warrior of the old dynasty founded a new one, and his name was Timur. Timur went on to conquer all of Persia and Mesopotamia. He killed the Ottoman Sultan and sent them home to embroil themselves into a civil war. He seeded his dynasty as lords throughout the lands he conquered, and was revered and feared by all from the Steppe to the lands of the Europeans. Following his death his empire splintered and his descendants have been trying to find their place in the world as lords ever since. The dynasty was presumed to have died out but it now seems that there still exists a member, although their claim to the throne is considered weak. Since [Root.Monarch.GetName] currently lacks an heir, should we perhaps acknowledge this Descenant of Timur as a legitimate heir?"
 EVHO_near_east_and_india.7.a:0 "Our House shall continue to rule!"
 EVHO_near_east_and_india.7.b:0 "The Timurid Dynasty must return!"
 EVHO_near_east_and_india.8.t:0 "Restoration of Iran: Gain the Upper Hand"
 EVHO_near_east_and_india.8.desc:0 "The people of Persia and the region of Iran are in disarray. The title of Shahanshah is either held currently by weak hands or does not functionally exist at all. There will be much bloodshed, but for the sake of the true faith of the land, and the preservation of the ancient lineage and history of Iran, our dynasty must put forth every effort towards re-unification, by any means necessary."
 EVHO_near_east_and_india.8.a:0 "Braa Aaran!"
 EVHO_near_east_and_india.9.t:0 "Restoration of Iran: Dominate the Region"
 EVHO_near_east_and_india.9.desc:0 "We have placed ourselves in a position where the throne of Shahanshah is within reach. However, we must fully crush all remaining opposition before we can truly say that we are the rulers of Iran, and some still yet remain..."
 EVHO_near_east_and_india.9.a:0 "Not for long!"
 EVHO_near_east_and_india.10.t:0 "Hindustani Empire: Gain the Upper Hand"
 EVHO_near_east_and_india.10.desc:0 "Hindustan has always waxed and waned through periods of unity, then stagnation, then shattering, and repeat. The current era of shattered powers vying for dominance over the subcontinent is soon to reach its end, as many centrallized powers have already begun jockeying over territory and influence. Ours must be the first to gain a serious upper hand if we do not wish to be swept away by the tides of history!"
 EVHO_near_east_and_india.10.a:0 "Our legacy will be the [Root.GetAdjective] Empire!"
 EVHO_near_east_and_india.11.t:0 "Hindustani Empire: Dominate the Region"
 EVHO_near_east_and_india.11.desc:0 "We have placed ourselves in a position where the throne of of a new Hindustani Empire is within reach. However, we must fully crush all remaining opposition before we can truly say that we are the rulers of Iran, and some still yet remain..."
 EVHO_near_east_and_india.11.a:0 "Not for long!"
 EVHO_near_east_and_india.12.t:0 "A Neighbor Submits to the Shahanshah"
 EVHO_near_east_and_india.12.desc:0 "Seeing that the title of Shah of Shahs in Iran has been restored, a lesser noble of the region, reluctantly or no, has bent the knee to you, my Lord, with the hope that they can become a loyal part of the Great Empire which every citizen works tirelessly to build."
 EVHO_near_east_and_india.12.a:0 "Praise be to the faith and realm!"
 EVHO_near_east_and_india.12.b:0 "We are not interested in their submission, only their demise."
 EVHO_near_east_and_india.13.t:0 "The Rise of [Root.Monarch.GetDynasty] Morocco"
 EVHO_near_east_and_india.13.desc:0 "The current ruling dynasty of Morocco has failed to maintain it's strength, and thus is being picked apart by forces from both without and within. As one of the forces from within, it is our duty to use the strength of will and arms at our disposal to seize the throne of Morocco for ourselves, in order to protect it from being destroyed forever and occupied by the foreign vultures that beset it at all sides."
 EVHO_near_east_and_india.13.a:0 "Inshallah!"
 EVHO_near_east_and_india.14.t:0 "Offer Our Services to the [ottoman_or_equivalent_empire.GetAdjective]s?"
 EVHO_near_east_and_india.14.desc:0 "There is a great state to the east of our faith that styles itself as the successors to the Roman Empire of Antiquity. Given our most recent loss of presige and land at the hands of heathens from some other evil den in Europe, it is in our own interest to seek protection, and our best bet for such an endeavor is the court of that great Empire of the Faith in the East."
 EVHO_near_east_and_india.14.a:0 "We will retain our suzerainty!"
 EVHO_near_east_and_india.14.b:0 "Send word to [ottoman_or_equivalent_empire.Capital.GetCapitalName]."
 EVHO_near_east_and_india.15.t:0 "[From.GetName] Offers Itself as Our March"
 EVHO_near_east_and_india.15.desc:0 "The rulers of [From.GetName] have recently been harrassed by enemies to the faith in Europe, and are therefore deeply concerned with retaining their lands in the name of the faith. In that interest they have come to us and offered to be our protectorate, a military march who will help us in our wars in exchange for a promise of our protection. What shall we tell their diplomats?"
 EVHO_near_east_and_india.15.a:0 "We graciously accept."
 EVHO_near_east_and_india.15.b:0 "We have no need of their service."
 EVHO_near_east_and_india.16.t:0 "Rebellion of the Saadi Dynasty"
 EVHO_near_east_and_india.16.desc:0 "The Saadi family of Tafilalt has bode their time for years and, apparently, decided that now is the time to strike for the throne of Morocco. Their leadership is charismatic, but they lack legitimacy. In any case, whoever wins this conflict will enjoy an era of stability and perhaps even growth of territory when the fighting is over."
 EVHO_near_east_and_india.16.a:0 "Support ths Saadi Dynasty!"
 EVHO_near_east_and_india.16.b:0 "Strike down the Saadi Dynasty!"
 EVHO_near_east_and_india.17.t:0 "End of the Saadi Rebellion"
 EVHO_near_east_and_india.17.desc:0 "The conflict between the old dynasty of Morocco and the Saadi Dynasty has reached its conclusion. Now, the victors can reap the rewards."
 EVHO_near_east_and_india.17.a:0 "Victory is ours!"
 EVHO_near_east_and_india.18.t:0 "Rebellion of the Alaouite Dynasty"
 EVHO_near_east_and_india.18.desc:0 "The Alaouite family of Tafilalt has bode their time for years and, apparently, decided that now is the time to strike for the throne of Morocco. Their leadership is charismatic, but they lack legitimacy. In any case, whoever wins this conflict will enjoy an era of stability and perhaps even growth of territory when the fighting is over."
 EVHO_near_east_and_india.18.a:0 "Support ths Alaouite Dynasty!"
 EVHO_near_east_and_india.18.b:0 "Strike down the Alaouite Dynasty!"
 EVHO_near_east_and_india.19.t:0 "End of the Alaouite Rebellion"
 EVHO_near_east_and_india.19.desc:0 "The conflict between the old dynasty of Morocco and the Alaouite Dynasty has reached its conclusion. Now, the victors can reap the rewards."
 EVHO_near_east_and_india.19.a:0 "Victory is ours!"

 EVHO_east_asian_events.1.t:0 "Uniting the Jurchen Tribes"
 EVHO_east_asian_events.1.desc:0 "We have greater ambitions than these petty squabbles and minor raids into Korea or upon each other. As the greatest of the Jurchen tribes, the whole of the Jurchen people must one day ride under our banners."
 EVHO_east_asian_events.1.a:0 "Onwards go the Jurchen Horsemen!"
 EVHO_east_asian_events.2.t:0 "Imperial Power Vacuum: Gain the Upper Hand"
 EVHO_east_asian_events.2.desc:0 "The Empire of China has begun to crumble. This leaves the local governors who now function independently from the capital, and even some nations at the fringe of the empire who are considered foreigners by the Han, an opportunity to swoop in and seize all of China for themselves, forging a new dynasty by Blood and Sword."
 EVHO_east_asian_events.2.a:0 "The Empire, long united, must divide..."
 EVHO_east_asian_events.3.t:0 "Imperial Power Vacuum: Domination"
 EVHO_east_asian_events.3.desc:0 "With our state having proven itself to be the most relevant amid the miriad of rulers claiming to be the one true emperors of China, we now have the chance to agressively press forward, cowing those who dare still claim that we are do not possess the Mandate of Heaven!"
 EVHO_east_asian_events.3.a:0 "The Empire, long divided, must unite..."

 ev_africa.1.t:0 "Imperial Destiny"
 ev_africa.1.d:0 "There is a destiny of our nation. We shall bring all of the Horn of Africa to heel."
 ev_africa.1.a:0 "For Solomon and Christ!"
 ev_africa.2.t:0 "The Solomonid Dynasty"
 ev_africa.2.d:0 "The great and ancient Dynasty of the Solomonids has been around since the 11th century and claims descent from King Solomon and the Queen of Sheba, who is said to have given birth to the traditional first king Menelik I after her Biblically described visit to Solomon in Jerusalem. The dynasty was presumed to have died out but it now seems that there still exists a member, although their claim to the throne is considered weak. Since [Root.Monarch.GetName] currently lacks an heir, should we perhaps acknowledge this Solomonid as a legitimate heir?"
 ev_africa.2.a:0 "Our House shall continue to rule!"
 ev_africa.2.b:0 "The Solomonid Dynasty must return!"


 ev_americas.1.t:0 "An Andean Empire"
 ev_americas.1.d:0 ""
 ev_americas.1.a:0 "For our ancestors!"
 ev_americas.2.t:0 "Successors to the Maya"
 ev_americas.2.d:0 ""
 ev_americas.2.a:0 "For the Earth and Sky Gods!"
 ev_americas.3.t:0 "The Hodinoshoni move West"
 ev_americas.3.d:0 ""
 ev_americas.3.a:0 "We must follow the setting sun."
 ev_americas.5.t:0 "The Baptist and Methodist Churches"
 ev_americas.5.d:0 "The history of Methodism in the United States dates back to the mid-18th century with the ministries of early Methodist preachers such as Laurence Coughlan and Robert Strawbridge. Following the American Revolution most of the Anglican clergy who had been in America came back to England. John Wesley, the founder of Methodism, sent Thomas Coke to America where he and Francis Asbury founded the Methodist Episcopal Church, which was to later establish itself as the largest denomination in America during the 19th century. American Baptists, Southern Baptists and all the scores of other Baptist bodies in the U.S. and around the world grew out of a common tradition begun in the early 17th century. That tradition has emphasized the Lordship and atoning sacrifice of Jesus Christ, believers’ baptism, the competency of all believers to be in direct relationship with God and to interpret Scripture, the influence of the Holy Spirit on individual lives and ministries, and the need for autonomous congregations free from government interference or hierarchical polity."
 ev_americas.5.a:0 "God bless America!"
 north_and_territories_slavery_prohibited:0 "Slaves Prohibited by Missouri Compromise"
 ev_americas.6.t:0 "The Missouri Compromise"
 ev_americas.6.d:0 "The Missouri Compromise was United States federal legislation that balanced desires of northern states to prevent expansion of slavery in the country with those of southern states to expand it. It admitted Missouri as a slave state and Maine as a free state and declared a policy of prohibiting slavery in the remaining Louisiana Purchase lands north of the 36°30′ parallel.[1] The 16th United States Congress passed the legislation on March 3, 1820, and President James Monroe signed it on March 6, 1820."
 ev_americas.6.a:0 "Abolish slavery above the Mason-Dixon line."
 ev_americas.6.b:0 "Let states in the North decide for themselves."
 ev_americas.7.t:0 "The Culture of the South"
 ev_americas.7.d:0 "A new culture has emerged from the American English-speaking Identity that is distinct from the more familliar one that has existed in the Americas for some time. These Dixie Americans are, like their estranged brothers from Europe, tea-loving and interested in maintaining order and common decency. They are strong supporters of the institution of slavery, as it drives commerce in the plantation-heavy parts of the Americas, and their tendency to have a generally friendly disposition is referred to by many as good ol' "Southern Hospitality"."
 ev_americas.7.a:0 "I wish I was in Dixie!"
 ev_americas.8.t:0 "Assimilation of the American Dutch"
 ev_americas.8.d:0 "Dutch people have had a continuous presence in New York City for nearly 400 years, being the earliest European settlers. New York City traces its origins to a trading post founded on the southern tip of Manhattan Island by Dutch colonists in 1624. The settlement was named New Amsterdam in 1626 and was chartered as a city in 1653. Because of the history of Dutch colonization, Dutch culture, politics, law, architecture, and language played a formative role in shaping the culture of the city. The Dutch were the majority in New York City until the early 1700s and the Dutch language was commonly spoken until the mid to late-1700s."
 ev_americas.8.a:0 "Tot ziens!"
 ev_americas.9.t:0 "Assimilation of the American French"
 ev_americas.9.d:0 "French immigration continued in the 19th century until the start of the American Civil War, bringing large numbers of francophones speaking something more similar to today's Metropolitan French to Louisiana. Over time, through contact between different ethnic groups, the various dialects converged to produce what we know as Louisiana French. The 1845 Louisiana constitution permitted any legislator to address the body in either English or French, and the 1845 and 1852 constitutions required all laws to be written in both English and French."
 ev_americas.9.a:0 "Au revoir!"
 ev_americas.10.t:0 "Expansion of [event_city.GetCapitalName]"
 ev_americas.10.d:0 "[event_city.GetCapitalName] has become a large population center and very important hub of commerce in North America"
 ev_americas.10.a:0 "Jolly Good!"
 hispaniola_slavery:0 "Slavery in Hispaniola"
 ev_americas.13.t:0 "Slavery in Hispaniola"
 ev_americas.13.d:0 "The production of goods in our colony on the island of Hispaniola is already lucrative, but if we were to expand the charter of the colonial government to allow and provide more labour for the planations on the island we could turn a great profit."
 ev_americas.13.a:0 "Things are acceptable as they are."
 ev_americas.13.b:0 "Expand! Expand! Expand!"
 ev_americas.14.t:0 "Slave Uprising in [Root.GetName]"
 ev_americas.14.d:0 "The history of slavery in this new nation while it was still a colony is long and full of death and darkness. The average slave brought to this place suffered more so than even his kin in other surrounding nations who grew wealthy off of labour from the Trans-Atlantic trade. Death whilst journeying to this colony was the most likely outcome, and upon arrival a slave is more likely than not worked to death within a year. Despite all of this, for decades the vast, vast majority of the population of [Root.GetName] has been made up of the enslaved blacks. Now, with revolutionary turmoil brewing in the Continent and this old Colony, the Slaves have risen up and the factions who are in support of the continuation of slavery are too busy fighting amongst themselves to restore the institution that has proven to be their doom."
 ev_americas.14.a:0 "Long Live [Root.GetName]!"
 ev_americas.15.a:0 "C'est Magnifique!"
 ev_americas.16.t:0 "[Root.GetAdjective] Reaction to the Haitian Revolution"
 ev_americas.16.d:0 "A primarily slave-led revolution has taken place in a colony in Hispaniola which now styles itself under the name Haiti, which comes from the old Taino name for the land of Hispaniola before the arrival of European colonists. The non-african portion of the population has fled to their home countries or neighboring colonies. The former slaves have taken up arms and claim that they shall defend their so-called sovereignty to the very last. How shall our diplomats proceed in relation to this fledgeling state?"
 ev_americas.16.a:0 "A nation led by the formerly-enslaved cannot be allowed to succeed!"
 ev_americas.16.b:0 "It is no concern of ours."
 ev_americas.17.t:0 "Unification of Hispaniola"
 ev_americas.17.d:0 "Following the wars to secure the independence of a Haiti free from foreign rule and enslavement we have captured all the enemy bases on the isle of Hispaniola. A peace in all but name can be made."
 ev_americas.17.a:0 "Finally!"
 ev_americas.17.b:0 "Our ambitions must be greater than this!"
 revolution_buff:0 "Vigor of Revolution"
 ev_americas.18.t:0 "The Port of [event_city.GetCapitalName]"
 ev_americas.18.d:0 "In our efforts to civilize this region of the world, the Port of [event_city.GetCapitalName] has proven to be the most reliable place of commerce in the area, and therefore has also grown to be the largest population centre."
 ev_americas.18.a:0 "¡Muy bien!"

 cemented_culture:0 "Cemented Culture"
 local_religious_difficulties:0 "Greater Religious Seperatism"
 desc_local_religious_difficulties:0 "The negative effects of this can be removed by enacting the nobility privilege §YPlacate Regional Religious Seperatism§!\nConversion of this province will be possible by enacting the church privilege §YGrant Inquisition Rights in Seperatist Regions§!"
 local_religious_difficulties_lesser:0 "Lesser Religious Seperatism"
 desc_local_religious_difficulties_lesser:0 "The negative effects of this can be removed by enacting the nobility privilege §YPlacate Regional Religious Seperatism§!\nConversion of this province will be possible by enacting the church privilege §YGrant Inquisition Rights in Seperatist Regions§!"
 ev_religion.1.t:0 "Religious Seperatism in Ireland"
 ev_religion.1.d:0 "We have taken provinces in the Emerald Isle, but the locals seem none too keen on neither our rule nor our religion."
 ev_religion.1.a:0 "Unfortunate."
 ev_religion.5.t:0 "Religious Seperatism in Central Asia"
 ev_religion.5.d:0 "We have taken provinces in the central steppelands, but the locals seem none too keen on neither our rule nor our religion."
 ev_religion.5.a:0 "Unfortunate."
 ev_religion.9.t:0 "Religious Seperatism in Livonia"
 ev_religion.9.d:0 "We have taken provinces in the balticum regions, but the locals seem none too keen on neither our rule nor our religion."
 ev_religion.9.a:0 "Unfortunate."
 ev_religion.14.t:0 "Religious Seperatism in Poland"
 ev_religion.14.d:0 "We have taken provinces in the region of the ancient realm once called Poland, but the locals seem none too keen on neither our rule nor our religion."
 ev_religion.14.a:0 "Unfortunate."
 ev_religion.18.t:0 "Religious Seperatism in the Balkans"
 ev_religion.18.d:0 "We have taken provinces in the great and accursed old realm of the Balkans, but the locals seem none too keen on neither our rule nor our religion."
 ev_religion.18.a:0 "Unfortunate."
 ev_religion.22.t:0 "Religious Seperatism in Ruthenia"
 ev_religion.22.d:0 "We have taken provinces in the Slavic Steppe, but the locals seem none too keen on neither our rule nor our religion."
 ev_religion.22.a:0 "Unfortunate."
 ev_religion.26.t:0 "Religious Seperatism in Scandinavia"
 ev_religion.26.d:0 "We have taken provinces in the great and frigid North, but the locals seem none too keen on neither our rule nor our religion."
 ev_religion.26.a:0 "Unfortunate."
 ev_religion.26.t:0 "Religious Seperatism in the Far East"
 ev_religion.26.d:0 "We have taken provinces in the great and frigid lucrative and distant lands of the East for God and for Country, however the natives do not seem keep on our Lord, who they view as foreign and even, to some, a symbol of oppression!"
 ev_religion.26.a:0 "Preposterous!"

 #Fall of Empires
 
 EVHO_events_fall_of_empires.100.t:0 "Decline of Ming — Unguarded Frontier"
 EVHO_events_fall_of_empires.100.d:0 "Powerful hordes on the frontier have been a constant threat to the Empire of China throughout history. Our people are doubting that we will be able to protect them. Can the [Root.Monarch.GetTitle] that does not keep the Hordes in control truly possess the Mandate of Heaven? Will new Mongols conquer China?\nOnly time will tell."
 EVHO_events_fall_of_empires.100.a:0 "OK"
 
 EVHO_events_fall_of_empires.101.t:0 "Decline of Ming — Western Devils"
 EVHO_events_fall_of_empires.101.d:0 "The influx of foreign goods onto the Chinese market has caused suffering for the Ming economy. Our people are losing faith in [Root.Monarch.GetName] and [Root.Monarch.GetHerHis] ability to protect China from the western devils. The Chinese tributaries are staring to look away from [Root.Capital.GetName]. Dire times are ahead of us."
 EVHO_events_fall_of_empires.101.a:0 "OK"

 EVHO_events_fall_of_empires.102.t:0 "Decline of Ming — Rise of Qing"
 EVHO_events_fall_of_empires.102.d:0 "The last decades of the Ming saw famines, floods, economic chaos, rebellions, and invasions. In 1618, the upstart Jianzhou Jurchen leader Nurhaci united the tribes of Manchuria and declared war on the Ming. After the Fushun garrison within the Liaodong Wall surrendered to Nurhaci the next year, the Ming court assembled a Chinese–Korean army numbering above 100,000 men to contain him, but they were catastrophically defeated at the Battle of Sarhu. Nurhaci made substantial progress in his conquest of Liaodong until he was mortally wounded at the 1626 Battle of Ningyuan by Yuan Chonghuan. He was succeeded by his son Hung Taiji, who worked to undermine Yuan Chonghuan by spreading rumours of Yuan’s collaboration with the Jurchens. To drive the point home, Hung Taiji sent an army around Ningyuan through Mongol territories to breach the Great Wall pass at Xifengkou in the fall of 1629, taking advantage of a rift in the Ming ranks due to Yuan Chonghuan’s execution of his fellow commander Mao Wenlong. This breach, known as the Jisi Incident, was the first time the Jurchens had broken through the Great Wall into China proper since the troubles in the northeast began. Yuan Chonghuan hastily sent an army to drive off the raiders from the walls of Beijing, but political damage had already been done. Yuan Chonghuan was accused of treason for letting this happen, and in 1630 he was executed by slow dismemberment while his family were exterminated or exiled."
 EVHO_events_fall_of_empires.102.a:0 "OK"

 EVHO_events_fall_of_empires.103.t:0 "Mending what’s Broken"
 EVHO_events_fall_of_empires.103.d:0 "The hard times of [Root.GetName] have passed, creating strong men and grooming them to once again claim the lost glory. The tributaries shall be re-gathered and the Mandate of Heaven shall return to [Root.GetAdjective] hands!"
 EVHO_events_fall_of_empires.103.a:0 "OK"
 
 
 EVHO_events_fall_of_empires.200.t:0 "Decline of the Ottoman Empire"
 EVHO_events_fall_of_empires.200.d:0 "In the second half of the sixteenth century, the Ottoman Empire came under increasing strain from inflation and the rapidly rising costs of warfare that were impacting both Europe and the Middle East. These pressures led to a series of crises around the year 1600, placing great strain upon the Ottoman system of government. Only time would tell if the Ottomans could shrug off these crises."
 EVHO_events_fall_of_empires.200.a:0 "OK"

 EVHO_events_fall_of_empires.203.t:0 "Mending what’s Broken"
 EVHO_events_fall_of_empires.203.d:0 "In the second half of the sixteenth century, the Ottoman Empire came under increasing strain from inflation and the rapidly rising costs of warfare that were impacting both Europe and the Middle East. These pressures led to a series of crises around the year 1600, placing great strain upon the Ottoman system of government. The empire underwent a series of transformations of its political and military institutions in response to these challenges, enabling it to successfully adapt to the new conditions of the seventeenth century and remain powerful, both militarily and economically."
 EVHO_events_fall_of_empires.203.a:0 "OK"
 
 
 EVHO_events_fall_of_empires.300.t:0 "Decline of the Spanish Empire"
 EVHO_events_fall_of_empires.300.d:0 "Habsburg Spain was at the height of its power and cultural influence at the beginning of the 17th century, but military, political, and economic difficulties were already being discussed within Spain. In the coming decades these difficulties grew and saw France gradually taking Spain’s place as Europe’s leading power through the later half of the century. Many different factors, including the decentralized political nature of Spain, inefficient taxation, a succession of weak kings, power struggles in the Spanish court and a tendency to focus on the American colonies instead of Spain’s domestic economy, all contributed to the decline of the Habsburg rule of Spain. Despite proving themselves as somewhat competent administrators, the Bourbons did not manage to save the Spanish Empire from its complete dismemberment, which left only Spain proper under Bourbon rule."
 EVHO_events_fall_of_empires.300.a:0 "OK"

 EVHO_events_fall_of_empires.303.t:0 "Mending what’s Broken"
 EVHO_events_fall_of_empires.303.d:0 "The Kingdom of Spain entered a new era with the death of Charles II, the last Spanish Hapsburg monarch, who died childless in 1700. The War of the Spanish Succession was fought between proponents of a Bourbon prince, Philip of Anjou, and an Austrian Hapsburg claimant. With the Bourbon victory, Philip V’s rule began in 1715. Spain entered a period of reform and renewal, as well as continued decline."
 EVHO_events_fall_of_empires.303.a:0 "OK"
 
 #Events for ZAZ
 
 EVHO_cossacks.100.t:0 "Zaporozhian Sicz"
 EVHO_cossacks.100.d:0 "The Zaporozhian Sicz was created by Cossacks and for Cossacks." 
 EVHO_cossacks.100.a:0 "OK"
 
 EVHO_cossacks.101.t:0 "First Cossacks"
 EVHO_cossacks.101.d:0 "The steppe of Lower Dnieper has long been an asylum for roamers and vagabonds of diverse ethnic, religious and cultural backgrounds. While since the Early Middle Ages the region had been mostly populated, albeit quite sparsely, by nomadic tribes of Turkic origin, there is evidence of Slavic people, primarily Ruthenians, as well settling in the “Wild Fields” — often to escape opression or criminal pursuit — since at least the 12th century. As the time went on, this influx of runaway serfs, townsmen and lower nobility wrought a new society with its distinctive lifestyle and customs, which eventually received a demonym of Cossacks — that is, free people in Turkic, — and by the end of the 15th century had morphed into a discrete polity."
 EVHO_cossacks.101.a:0 "They shall be left alone."
 EVHO_cossacks.101.b:0 "The Wild Fields must stay under [Root.GetAdjective] contol."
 
 EVHO_cossacks.102.t:0 "Zaporozhian Sicz"
 EVHO_cossacks.102.d:0 "Ruthenian pioneers had mostly settled the Dnieper Rapids by the first half of the 16th century. However, the colonization had still been quite haphazard and impermanent, as most Cossacks would leave the Wild Fields for their homes and families during winters. “Cossackery” was still a part-time job of a kind, not a lifelong occupation. It would take time for Cossacks to develop into an organized military force, becoming a full-fledged estate in the Polish-Lithuanian social hierarch and forming a self-sustaining democratic polity in the Wild Fields."
 EVHO_cossacks.102.a:0 "Cossacks shall be independent."
 EVHO_cossacks.102.b:0 "We should exercise control of our lands."
 EVHO_cossacks.102.c:0 "A Cossack’s life for me!"
 
 EVHO_cossacks.103.t:0 "Cossack rebellion of [GetYear]"
 EVHO_cossacks.103.d:0 "In the year of our Lord [GetYear] the [zaporozhie_overlord_rebellion.GetAdjective] authorities have once again broken the promises given to the Zaporozhian Host, having forgotten of the terms on which our vassalage was arranged and acting contrary to our agreements with the [zaporozhie_overlord_rebellion.Monarch.GetTitle] of [zaporozhie_overlord_rebellion.GetName] made before. The Cossack Host therefore shall declare the independence of the Cossack State and revolt against the [zaporozhie_overlord_rebellion.GetAdjective] magnates and [zaporozhie_overlord_rebellion.Monarch.GetName]."
 EVHO_cossacks.103.a:0 "No Russian, no Jew and no Pole!"
 EVHO_cossacks.103.b:0 "The cost might be too high."
 
 EVHO_cossacks.200.t:0 "Chmielnicki Uprising of 1648"
 EVHO_cossacks.200.d:0 "By the middle of the 17th centruty, the Ukrainian lands of the Polish realm had long been subject to systematic economical and cultural opresssion. Polish magnates, accompanied by a few Ruthenian dynasties now assimilated into the Polish nobility after the Union of Lublin, had transformed Ukraine into a collection of vast latifundia, which time to time could encompass entire regions of the country. Rapid toughening of serfdom under noble rule went hand in hand with religious oppression reinforced by the ecclesiastical Union of Brest (1596). Maltreated, the Ruthenian population increasingly turned to the Cossacks, seeing them as defenders of common folk. Such a state of affairs had sparked several rather insignificant Cossack insurrections, most of which were viciously crushed. Moreover, the Polish authorities retaliated after each rebellion by further amplyfing the oppression.\nEventually though, a series of events led to a major uprising in 1648 under the command of a minor landowner and Cossack lieutenant, Bogdan Chmielnicki. The rebellion saw enormous success and engulfed huge swaths of Ukrainian lands, encompassing all stratas of Ruthenian society, in no small part due to Chmielnicki’s successfull cooperation with the Crimean Khanate. The Chmielnicki Uprising continued for nine years and irrevocably molded the Cossack Host into an self-sufficient state. The rebellion culminated with the Treaty of Perejaslav, which saw an establishment of Russian protectorate over the Cossacks."
 EVHO_cossacks.200.a:0 "For honor, for freedom."
 EVHO_cossacks.200.b:0 "Not today."

 EVHO_cossacks.201.t:0 "Chmielnicki’s Moldavian campaign"
 EVHO_cossacks.201.d:0 "Timothy Chmielnicki was born on September 16, 1632 in Subotov. In 1648 he took part in his father’s insurrection against the Polish-Lithuanian Commonwealth, being the military governor of Czyhyryn and successfully partaking in the battles at Zborow, Beresteczko and Batog. After Chmielnicki’s forces took the Moldavian capital of Iasi, an alliance was created between the Cossacks and the Moldavian voivode Basil Lupu, secured by a marriage of his daughter Rosanda and Timothy."
 EVHO_cossacks.201.a:0 "Ally the Moldavians."
 EVHO_cossacks.201.b:0 "We cannot trust the Moldavian ruler."

 EVHO_cossacks.202.t:0 "Perejaslav Council"
 EVHO_cossacks.202.d:0 "The Perejaslav Council was an official meeting that convened for ceremonial pledge of allegiance by Cossacks to the Tsar of Russia in the town of Perejaslav in January 1654. The ceremony took place concurrently with ongoing negotiations that started on the initiative of Hetman Bogdan Chmielnicki to address the issue of Cossack Hetmanate with the ongoing Chmielnicki Uprising against Polish-Lithuanian Commonwealth and which concluded the Treaty of Perejaslav. The treaty itself was finalized in Moscow in April 1654. \nAccording to the Russian historiography, Chmielnicki secured the military protection of the Tsardom of Russia in exchange for allegiance to the Tsar. An oath of allegiance to the Russian monarch from the leadership of Cossack Hetmanate was taken, shortly thereafter followed by swearing allegiance by other officials, clergy and inhabitants of the Hetmanate. The exact nature of the relationship stipulated by the agreement between the Hetmanate and Russia is a matter of scholarly controversy. The council of Perejaslav was followed by exchange of official documents the March Articles (from Cossack Hetmanate) and the Tsar’s Declaration (from Russia). \nThe Council was attended by a delegation from Moscow headed by Vasiliy Buturlin. The event was soon thereafter followed by the adoption in Moscow of the so-called March Articles that stipulated an autonomous status of the Hetmanate within the Russian state. The agreement precipitated the Russo-Polish War (1654–67). The definitive legal settlement was effected under the Eternal Peace Treaty of 1686 concluded by Russia and Poland that re-affirmed Russia’s sovereignty over the lands of Zaporozhian Sicz and left-bank Ukraine, as well as the city of Kiev."
 EVHO_cossacks.202.a:0 "Approach Russia."
 EVHO_cossacks.202.b:0 "Trust nobody, even yourself."
 
 EVHO_cossacks.2021.t:0 "Perejaslav Council"
 EVHO_cossacks.2021.d:0 "The Perejaslav Council was an official meeting that convened for ceremonial pledge of allegiance by Cossacks to the Tsar of Russia in the town of Perejaslav in January 1654. The ceremony took place concurrently with ongoing negotiations that started on the initiative of Hetman Bogdan Chmielnicki to address the issue of Cossack Hetmanate with the ongoing Chmielnicki Uprising against Polish-Lithuanian Commonwealth and which concluded the Treaty of Perejaslav. The treaty itself was finalized in Moscow in April 1654. \nAccording to the Russian historiography, Chmielnicki secured the military protection of the Tsardom of Russia in exchange for allegiance to the Tsar. An oath of allegiance to the Russian monarch from the leadership of Cossack Hetmanate was taken, shortly thereafter followed by swearing allegiance by other officials, clergy and inhabitants of the Hetmanate. The exact nature of the relationship stipulated by the agreement between the Hetmanate and Russia is a matter of scholarly controversy. The council of Perejaslav was followed by exchange of official documents the March Articles (from Cossack Hetmanate) and the Tsar’s Declaration (from Russia). \nThe Council was attended by a delegation from Moscow headed by Vasiliy Buturlin. The event was soon thereafter followed by the adoption in Moscow of the so-called March Articles that stipulated an autonomous status of the Hetmanate within the Russian state. The agreement precipitated the Russo-Polish War (1654–67). The definitive legal settlement was effected under the Eternal Peace Treaty of 1686 concluded by Russia and Poland that re-affirmed Russia’s sovereignty over the lands of Zaporozhian Sicz and left-bank Ukraine, as well as the city of Kiev."
 EVHO_cossacks.2021.a:0 "Accept the Cossack petition."
 EVHO_cossacks.2021.b:0 "We are too busy at the moment."

 EVHO_cossacks.300.t:0 "Vassalization of the Don Steppe"
 EVHO_cossacks.300.d:0 "The Steppe of old no longer holds any interest to us at all. To lessen the administrative burden on our realm, we should leave the administration of much of the non-coastal areas in these wilds above the Black Sea to local hordes in the area, who are beholden to our whims and wishes."
 EVHO_cossacks.300.a:0 "Very well."
 EVHO_cossacks.300.b:0 "It's ours now. It shall remain ours."
 
