 flavor_eng.RHdesc3:0 "We should secure the Cape Colony to prevent it from falling the hands of our rivals."
 flavor_eng.RHans5:0 "Yes, this is important"
 flavor_eng.RHans6:0 "No, it's not worth the trouble"
 
