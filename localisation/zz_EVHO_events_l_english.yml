 flavor_rh.10006.RHtit:0 "[Root.variable_name.GetName] joins the German Confederation"
 flavor_rh.10006.RHdesc:0 "Rather than to succumb to oppressors from outside Germany, [Root.variable_name.GetName] has decided to join together with it's fellow German States."
 flavor_rh.10006.RHans1:0 "A wise choice"
 
 flavor_rh.10007.RHtit:0 "[From.variable_name.GetName] join the German Confederation"
 flavor_rh.10007.RHdesc:0 "Rather than to face risk of extinction, [From.variable_name.GetName] has requested to join our Confederation."
 flavor_rh.10007.RHans1:0 "Excellent!"
 
