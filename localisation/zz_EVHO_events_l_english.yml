EVHO_east_india_company.1.t:0 "The Indian Rebellion"
EVHO_east_india_company.1.d:0 "In response to our oppressive policies and general disatisfaction with the Company's government, many groups in India have rebelled and even some of our own Sepoy regiments have mutinied."
EVHO_east_india_company.1.a:0 "Mutiny!"

EVHO_east_india_company.2.t:0 "Province Revolts!"
EVHO_east_india_company.2.d:0 "Unrest has boiled to a high point in one of our provinces, prompting the locals to rise up in rebellion, seeking to push out the Company from their lands."
EVHO_east_india_company.2.a:0 "Slaughter them all!"

EVHO_east_india_company.3.t:0 "A Last Stand"
EVHO_east_india_company.3.d:0 "In one of our provinces, a group of rebels began to come together and siege the largest town there, hoping to break into the weapon stores we have left there and seize the tools for themselves. In a last ditch attempt at stopping this tide, one of the brave loyalist soldiers there set the gunpowder alight and blew the storehouse to pieces."
EVHO_east_india_company.3.a:0 "Brave."

EVHO_east_india_company.4.t:0 "Sepoys Revolt"
EVHO_east_india_company.4.d:0 "The Company recruits the vast majority of its soldiers from the local Hindu and Muslim populace. As a result of recent unrest, many have mutinied and now fight against their former comrades and the Company as a whole."
EVHO_east_india_company.4.a:0 "They will pay in blood and fire and tears!"

EVHO_east_india_company.5.t:0 "Sepoys Refuse to Fight"
EVHO_east_india_company.5.d:0 "Many of our Sepoys now refuse to fight their revolting comrades, even if they do not support the rebellion themselves."
EVHO_east_india_company.5.a:0 "Force them out onto the field!"
EVHO_east_india_company.5.b:0 "Make concessions."

EVHO_east_india_company.6.t:0 "Help From Militia"
EVHO_east_india_company.6.d:0 "Many local militia forces have seized the opportunity and now offer their services in helping put down the Indian Rebellion to us."
EVHO_east_india_company.6.a:0 "Rely on the professional soldiers."
EVHO_east_india_company.6.b:0 "Militia could be useful."

EVHO_east_india_company.7.t:0 "End of the Indian Rebellion"
EVHO_east_india_company.7.d:0 "At last, major resistance to Company rule in India has faded. Many of the mutineers and other revolters have been executed and their strongholds captured. Such a victory has made the other Indian princedoms fearful of our power, and they may now seek closer diplomacy and be willing to make greater compromises. It seems that at least for now, our rule in India is secure."
EVHO_east_india_company.7.a:0 "But what was the price?"

EVHO_east_india_company.8.t:0 "Local Leader Rises"
EVHO_east_india_company.8.d:0 "A local man in one of our provinces has risent to fame recently, through his preachings of resistance against our forces and of the supposed evils of the [Root.GetAdjective] people. What should we do with this traitor?"
EVHO_east_india_company.8.a:0 "Let him preach."
EVHO_east_india_company.8.b:0 "Have him murdered!"

EVHO_east_india_company.9.t:0 "Trouble with Weapon Cartridges"
EVHO_east_india_company.9.d:0 "Many of the new brands of gun are terribly useful for us, serving as an effective supremacy over the weapons the Indian Princes are using. However, many of the Muslim and Hindu Sepoys have expressed deep anger at the decision to grease the cartridges of these weapons with various animal fats, claiming it goes against their faith."
EVHO_east_india_company.9.a:0 "Put up or shut up."
EVHO_east_india_company.9.b:0 "Make concessions."

EVHO_east_india_company.10.t:0 "Mounting Company Debts"
EVHO_east_india_company.10.d:0 "In recent years, our finances have struggled immensely and our administrators have continually failed at their job of keeping our books balanced. As a result, we have had to withdraw a hefty sum of money from foreign banks, most commonly the Bank of England. Our close relationship to Britain may yet afford us certain privileges in our loanage."
EVHO_east_india_company.10.a:0 "Petition Parliament for aid."
EVHO_east_india_company.10.b:0 "We can solve this ourselves."

EVHO_east_india_company.11.t:0 "Debts of the East India Company"
EVHO_east_india_company.11.d:0 "The company of English merchants trading in the East Indies has run into financial trouble in recent years. Citing their close ties with the mother country and the fate of the shares that many MPs have in the Company, they request that we offer them some concessions on their debt to the Bank of England."
EVHO_east_india_company.11.a:0 "Allow them to delay the repayment of their loans."
EVHO_east_india_company.11.b:0 "Send them direct monetary aid."
EVHO_east_india_company.11.c:0 "We owe nothing to this rowdy group of merchants!"

EVHO_east_india_company.12.t:0 "Parliament Offers Delayed Repayments"
EVHO_east_india_company.12.d:0 "In response to our plea, Parliament have allowed an extension to the date of repayment of many of our loans to the Bank of England."
EVHO_east_india_company.12.a:0 "Rule Britannia!"

EVHO_east_india_company.13.t:0 "Parliament Offers Financial Aid"
EVHO_east_india_company.13.d:0 "In response to our plea, Parliament have offered a lump sum of financial aid straight from the British treasury to ours. It appears their livelihoods are too tied to the Company to let it go under."
EVHO_east_india_company.13.a:0 "God Save the [Root.Monarch.GetTitle]!"

EVHO_east_india_company.14.t:0 "No Aid from Parliament"
EVHO_east_india_company.14.d:0 "Our request for leniancy and perhaps forgiveness from Parliament has been denied in the bluntest of terms."
EVHO_east_india_company.14.a:0 "Do they not remember how they made their fortunes?"

EVHO_east_india_company.15.t:0 "Corrupt Practices in the Company Administration"
EVHO_east_india_company.15.d:0 "Many have made accusations of deep-rooted corruption in the Company administration."
EVHO_east_india_company.15.a:0 "If it produces results, let it be."
EVHO_east_india_company.15.b:0 "Every effort must be spent to combat this menace."
EVHO_east_india_company.15.c:0 "Name your price to not reveal this information to the press."

EVHO_east_india_company.16.t:0 "The Black Hole of Calcutta"
EVHO_east_india_company.16.d:0 "In 1756, the threat of war with France was growing all across the British Empire. As a result, the EIC was ordered to fortify its holdings in anticipation of a French attack in India. While the French conceded to Bengali demands to dismantle their fortifications, the British did not. The Nawab of Bengal, fearing the fortification of Calcutta would undermine his rule, layed siege to their prize city in an attempt to evict the English from the subcontinent. Fort William, the defenses of the city, fell quickly with surprisingly little resistance, as this attack was a surprise to Company officials too caught in their own successes. The fall of Calcutta resulted in a number of the former defenders of the city being caught and imprisoned. 64 prisoners were locked in a British cell designed for just six people overnight. Despite the best efforts of the desparate prisoners and some sympathetic guards, by sunrise 43 people had died of suffocation and heat exhaustion. The survivors were given little respite, with the Nawab as cold and unapologetic as ever. Nicknamed the 'Black Hole of Calcutta', the events that happened in this cell ignited the ire of the Company and British public, who demanded revenge for this war crime. Subsequently, the Company sent back the hero of Madras, Robert Clive, to Bengal, this time with the goal of waging total war on the Nawab. After a long campaign Clive won a decisive victory at the Battle of Plassey with the help of Indian defectors, and the Nawab was executed and replaced with a grateful co-conspirator, placing Bengal under the control of a Company puppet."
EVHO_east_india_company.16.a:0 "Revenge will be won for these poor men!"

EVHO_east_india_company.17.t:0 "Clive of India"
EVHO_east_india_company.17.d:0 "Originally from a clerk for the British East India Company, Robert Clive was born relatively well-off in England in 1725. He distinguished himself in military leadership on behalf of the Company in India when he was still young, allowing him to forge a powerful legacy, instrumental in the history of India. When the War of the Austrian Succession resulted in renewed tensions with France, Clive fled the besieged Fort St. David and led the Company's Madras army into a brave stand in the Siege of Pondicherry. He also led a force that forcibly recaptured Tanjore as part of the same First Carnatic War theatre. Serving again in the Second Carnatic War, he led the successful defence at the Siege of Arcot in 1751. His retirement back to England allowed him to use his riches to purchase a rotten borough in Cornwall, making him an MP and a member of the House of Lords. Recounting his legacy, the Company once again called him into action in India after an attack by the Nawab of Bengal on Calcutta, during which Clive retook the city and led a campaign resulting in the victory at Plassey and the deposition of the Nawab entirely. Later, he negotiated the Treaty of Allahabad, which granted the Company effective direct control over Bengal to levy and collect taxes. A Mughal Firman confirmed later granted Clive himself Bengal, starting British sovereign rule in India. When Clive finally departed from India he had around three-hundred thousand pounds and was hence able to provide for himself and his family generously. A Parliamentary inquiry into his and the EIC's actions presented an opportunity for his enemies to launch their attacks on him, but his rousing defence and perceived good deeds resulted in the case against him being dropped. Despite this, the East India Company faced scrutiny for its handling of the ongoing Bengal Famine, and was subject to a limiting Act in 1773 as a result.\nHis legacy is unrivalled in the period, and clearly seen even to this day. Clive's victories prevented the loss of India to the French, the eviction of the English from the subcontinent, and also allowed for centralised Company rule over the richest province of India, Bengal. Many also accuse him of setting up the institutions and promoting the greed that led to the 1770-1 Bengal Famine, in which harsh Company taxation and crop demands resulted in the deaths of perhaps a million Bengalis."
EVHO_east_india_company.17.a:0 "Make this man a Commander!"
EVHO_east_india_company.17.b:0 "He will serve as Governor and Chief Military Advisor!"

EVHO_east_india_company.18.t:0 "Fort William"
EVHO_east_india_company.18.d:0 "The prize of the East India Company, the thriving city of Calcutta, is constantly under threat from those jealous of the riches held within. Be they the French, our other colonial rivals, or the native Indians themselves, it is clear that efforts must be made to protect the settlement."
EVHO_east_india_company.18.a:0 "Set aside funds for a new fortification there."
EVHO_east_india_company.18.b:0 "Arming the populace would be enough, we will not attract any unwanted ire."

EVHO_east_india_company.19.t:0 "The Merchant State"
EVHO_east_india_company.19.d:0 "The grow of the [Root.GetName] has resulted in a sharp shift in the governing bodies of our organisation away from trading and towards administration. How should we address this change?"
EVHO_east_india_company.19.a:0 "We are chiefly merchants."
EVHO_east_india_company.19.b:0 "We are a Country now."

EVHO_east_india_company.20.t:0 "East India Company goes Bankrupt"
EVHO_east_india_company.20.d:0 "The recent bankruptcy of the British East India Company has resulted in a severe lack of trust from investors, only adding to sharply declining company finances."
EVHO_east_india_company.20.a:0 "I am so sorry about your investment. It lines my pockets nicely."

EVHO_east_india_company.21.t:0 "The Diwani"
EVHO_east_india_company.21.d:0 "At the request and negotiation of the rulers of Bengal Subah, the power of Diwani has been transferred from native authorities to that of the East India Company, allowing us to levy and collect the taxes of our choice on the richest province in all of India."
EVHO_east_india_company.21.a:0 "This will be a great boost to our income."

EVHO_east_india_company.22.t:0 "The Bengal Famine of $YEAR$"
EVHO_east_india_company.22.d:0 "A succession of poor harvests and bad weather, combined with harsh and meticulously enforced Company taxation, has resulted in perhaps the worst famine ever experienced in Bengal. People are dying on the streets, the hungry crawl up to our officials' residences begging, and corpses fill the rivers, forcing our people to eat only mutton instead of fish. Many blame the EIC for its part in this famine, including the majority of the public and Parliament back in Britain. The scale of devastation and death is so vast it is feared that the Bengali economy may never recover."
EVHO_east_india_company.22.a:0 "My God."

EVHO_east_india_company.23.t:0 "The Regulating Act of $YEAR$"
EVHO_east_india_company.23.d:0 "In recent years concerns have been raised over the government of the East India Company, with some claiming it is straying too far from its roots and is a liability to British society. To address these issues, allowing with the crippling finances they are currently experiencing, a Regulating Act has been proposed in Parliament."
EVHO_east_india_company.23.a:0 "Pass the act."
EVHO_east_india_company.23.b:0 "The Company is doing fine on its own."

EVHO_east_india_company.24.t:0 "The Regulating Act of $YEAR$"
EVHO_east_india_company.24.d:0 "Concerned about Company indulgence and a supposed lack of administrative efficiency, our homeland has issued a Regulating Act restricting the activities of our Company and requiring constant oversight of our actions."
EVHO_east_india_company.24.a:0 "Curse those stuck-up bastards that passed this blatant attack on our freedom!"

EVHO_east_india_company.25.t:0 "Rise in Stock Value"
EVHO_east_india_company.25.d:0 "Recently the value of EIC stocks, usually stable, has sharply risen, granting great profits to our investors."
EVHO_east_india_company.25.a:0 "Invest this money back into the Company."
EVHO_east_india_company.25.b:0 "This is testament to our trading power."

EVHO_east_india_company.26.t:0 "The Capture of Delhi"
EVHO_east_india_company.26.d:0 "With the capture of the prestigious nominal capital of India, the old Delhi Sultanate has nowhere to hide from our forces. It is now clear that we have assumed direct control over the Sultanate."
EVHO_east_india_company.26.a:0 "India will soon be ours..."

EVHO_east_india_company.27.t:0 "Sepoys Demand Extra Pay"
EVHO_east_india_company.27.d:0 "Natives Indians make up the bulk of our armies, known as the sepoys. Recently, sparked by the relevation that their British counterparts are paid significantly more than them for in some cases less service, unrest has spread throughout army camps. A group of sepoys has come together and demands better pay, else they say they will refuse to serve."
EVHO_east_india_company.27.a:0 "Heed their demands."
EVHO_east_india_company.27.b:0 "This is ridiculous. Have them court martialled!"

EVHO_east_india_company.28.t:0 "Maratha Raids"
EVHO_east_india_company.28.d:0 "Recently the vicious mounted warriors of the Maratha Confederacy have launched a devastating raid into our territory."
EVHO_east_india_company.28.a:0 "There's nothing we can do."
EVHO_east_india_company.28.b:0 "Pursue these vile demons!"

EVHO_east_india_company.29.t:0 "Shake-Up of Company Administration"
EVHO_east_india_company.29.d:0 "Perhaps as a result of poor government by the [Root.Monarch.GetTitle], the administration of the Company has fallen into disrepair and is becoming increasingly disfunctional."
EVHO_east_india_company.29.a:0 "Time for a shake up!"

EVHO_east_india_company.30.t:0 "Growing Company Port"
EVHO_east_india_company.30.d:0 "The massive amount of trade drawn in by the Company has created new demand and new places of import in areas never before developed to such an extent. As a result of this policy, the port of [good_port.GetName] has seen a rapid growth in importance as a major trade center."
EVHO_east_india_company.30.a:0 "Merchants will come from far and wide..."

EVHO_east_india_company.31.t:0 "Debate over Mercantilism"
EVHO_east_india_company.31.d:0 "The monopoly the Company holds over the trade of the East Indies and its routes back to the British Isles have come under increasing fire, perceived as unfair to independent merchants and encouraging exploitation and permanent damage to the territories of the hegemonic corporation. While this is clearly rubbish, allowing a little more competition just may help us increase profits in the long run."
EVHO_east_india_company.31.a:0 "We must maintain the Monopoly."
EVHO_east_india_company.31.b:0 "Perhaps a slight loosening of policy is the answer..."
EVHO_east_india_company.31.c:0 "Why are we wasting time on this, we should be preparing for war!"

EVHO_east_india_company.32.t:0 "Claim of Judicial Bias in [judge_province.GetName]"
EVHO_east_india_company.32.d:0 "Ever since the introduction of the Cornwallis Code, a judicial body has been separate from Company affairs, meant to represent Englishmen and Indians alike. However, a local Indian man convicted of a minor crime in [judge_province.GetName] claims that the system is biased against the natives yet still, and demands reform and compensation."
EVHO_east_india_company.32.a:0 "Concede to his demands."
EVHO_east_india_company.32.b:0 "Ignore him."
EVHO_east_india_company.32.c:0 "See to it his sentence is lengthened!"

EVHO_east_india_company.33.t:0 "The Company of Merchants"
EVHO_east_india_company.33.d:0 "This great nation is actually a Company. Such a future none of our ancestors would have dreamt has become reality. We, a great Company of Merchants, have acquired for ourselves an Empire."
EVHO_east_india_company.33.a:0 "Long live the [Root.Monarch.GetTitle]!"

EVHO_east_india_company.34.t:0 "A Factory in [factory_province.GetName]"
EVHO_east_india_company.34.d:0 "Several Company employees have come to us seeking funding for a proper factory to be built in [factory_province.GetName]. While this area is under our jurisdiction, they believe its profitability has not been harnessed to its fullest potential."
EVHO_east_india_company.34.a:0 "Set aside funds for a factory here."
EVHO_east_india_company.34.b:0 "Invest in local infrastructure instead."

EVHO_east_india_company.41.t:0 "The Company Raj"
EVHO_east_india_company.41.d:0 "With the unification of much of India, the British East India Company has certainly outgrown its origins. Perhaps it is term for us to choose a new name to continue to operate under."
EVHO_east_india_company.41.a:0 "We are at our core a company of Honourable merchants."
EVHO_east_india_company.41.b:0 "The corporation consumes all."
EVHO_east_india_company.41.c:0 "This is a new Raj."

anarchy.1.t:0 "The Great Anarchy"
anarchy.1.d:0 "A time of great trouble and disturbance has come to the Mughal Empire. In the past, our empire was an unrivalled hegemon, but with the coming of new years the fates have not been kind to us. Bitter succession disputes, corruption in the highest ranks and lack of unity between Hindus and Muslims has resulted in a tense domestic political situation our enemies on all sides have taken advantage of. To the south, the conquered Hindu Marathi are preparing for a great rising to throw off our oppression, to the west, the reunited Persian and Afghani forces both seem keen to claim a slice of India, and to the east the ambitious band of pesky European merchants has become to make its own claims of authority. If we fail to recentralise control and prove the empire is not fragmenting, we may crumble just like all Indian Empires before us."
anarchy.1.a:0 "This day was always coming..."

anarchy.2.t:0 "Order Restored"
anarchy.2.d:0 "The crumbling Mughal Empire has at least been brought peace. Foreign forces once again retreat from our recognised borders, and the political situation at home has at last calmed. This was but a passing storm, it seems, but a destructive one nonetheless."
anarchy.2.a:0 "Allah have mercy upon my soul!"

anarchy.3.t:0 "[Root.Monarch.GetTitle] Assassinated"
anarchy.3.d:0 "A far-reaching plot against the life of [Root.Monarch.GetTitle] [Root.Monarch.GetName] has come to its conclusion with [Root.Monarch.GetHerHis] assassination."
anarchy.3.a:0 "This is a sad day."

anarchy.4.t:0 "Unrest in [unrest_province.GetName]"
anarchy.4.d:0 "Tensions between Mughal authorities and local practicers has resulted in a movement towards rebellion in [unrest_province.GetName]."
anarchy.4.a:0 "Kill them. Kill them all."

anarchy.5.t:0 "Lack of Faith in the [Root.Monarch.GetTitle]"
anarchy.5.d:0 "The constant rebellion and sorry state of the empire has raised questions over the legitimacy of [Root.Monarch.GetName]."
anarchy.5.a:0 "Traitors!"

anarchy.6.t:0 "European Incursions"
anarchy.6.d:0 "The arrival of Europeans on our shores has brought forth both opportunities for great riches and a profound danger to our way of life. While they came first as mere merchants, they now fancy themselves king-makers and use of lands as a battleground for their homelands' petty disputes. The failure of our administration to keep these merchants in check by restricting them from land ownership has led to doubts being raised about the ability of the [Root.Monarch.GetTitle] to keep the people safe."
anarchy.6.a:0 "Something has to be done!"

anarchy.7.t:0 "Revolt of the Marathas"
anarchy.7.d:0 "Tired of heavy taxation and political subservience under Mughal rule, the Marathi peoples have risen up and declared an independent state. The famed horsemen of the Deccan rally behind their banner, as it has become clear that this betrayal means war."
anarchy.7.a:0 "The Marathas will be slain where they stand!"
anarchy.7.b:0 "I support their cause."

anarchy.8.t:0 "The Nawab of Bengal"
anarchy.8.d:0 "In this time of crisis, Mughal authority appears to be slipping back up the sub-continent to Delhi. Bengal, the riches subah of the Empire, has partially fallen to foreign incursion and stands at risk of separating from us forever if changes are not made. The appoitment of a new Nawab of Bengal will surely reduce tensions and further solidify Mughal control of the province."
anarchy.8.a:0 "Appoint a Nawab."
anarchy.8.b:0 "Bengal is ours!"

EVHO_east_india_company.42.t:0 "The Honorable East India Company"
EVHO_east_india_company.42.d:0 "With [Root.GetName]'s influence in the Indian subcontinent growing, a group of entrepreneuring merchants have approached [Root.Monarch.GetTitle] [Root.Monarch.GetName], asking for a Royal Sanction of monopoly over [Root.GetAdjective] activities in the East Indies."
EVHO_east_india_company.42.a:0 "Grant the Sanction."
EVHO_east_india_company.42.b:0 "Play as the EIC!"
EVHO_east_india_company.42.c:0 "Go back."

dissolve_eic_decision_title:0 "Abolish the East India Company"
dissolve_eic_decision_desc:0 "The establishment and success of the EIC was a remarkable feat and a true show of the strength of modern capitalism and imperialism, but its rise was not without failure. Brutal famines, oppression, constant deficit, mass corruption and finally widespread rebellion proved to be the death nail of the Company rule in India."
form_eic_decision_title:0 "Charter the Honorable East India Company"
form_eic_decision_desc:0 "The acquisition of suitable territories in India has allowed us to establish an autonomous company of merchants there for the sole purpose of friendly trade relations with our Indian partners. Nothing more. Promise."
form_carnatic_title:0 "Carnatic Sultanate"
form_carnatic_desc:0 "Since the fall of Delhi and the Mughals the Carnatic has lived under Hindu hegemony. The time has come to establish a Sultanate here."

 barangay_vassalization.0.name:0 "Independence"
 barangay_vassalization.0.desc:0 "No longer shall we be oppressed by our overlord and we shall declare independence from them."
 barangay_vassalization.0.a:0 "Kalayaan!"
 
 barangay_vassalization.1.name:0 "Laguna offers vassalization"
 barangay_vassalization.1.desc:0 "The Barangays of Laguna offered their loyalty in exchange for security of their lands. This is a great opportunity to unite our bretheren."
 barangay_vassalization.1.a:0 "We welcome them with open arms!"
 
