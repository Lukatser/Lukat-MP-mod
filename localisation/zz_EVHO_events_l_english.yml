 #Luzon Flavors
 flavor_pre.1.name:0 "Union of Tondo"
 flavor_pre.1.desc:0 "Our Family have controlled Tondo and Maynila for a very long time but It was splitted appart when Lontok Solliman took over the throne. Now that he is gone, we can reunite the two lands under one rule."
 flavor_pre.1.yes:0 "We shall reunite our lands back!"
 flavor_pre.2.name:0 "Union of Tondo."
 flavor_pre.2.desc:0 "Our Family have controlled Tondo and Maynila for a very long time but It was splitted appart when Lontok Solliman took over the throne. Now that he is gone, we can reunite the two lands under one rule."
 flavor_pre.2.yes:0 "We shall reunite our lands back!"
 flavor_pre.3.name:0 "Purchase of Palawan"
 flavor_pre.3.desc:0 "The Sultanate of Brunei has offered us Palawan for 250 ducats. Although quite expensive, this might be good for us in the future."
 flavor_pre.3.yes:0 "Purchase it!"
 flavor_pre.3.no:0 "We have no need for such price."
 flavor_pre.4.name:0 "Weird Peace Deal"
 flavor_pre.4.desc:0 "As we are winning our conquest of Maynila and Tondo, they proposed an interesting peace deal which makes them our vassal and gives us 200 Ducats in total."
 flavor_pre.4.a:0 " We'll take it!"
 flavor_pre.4.b:0 "We prefer our own peace deal."
 EVHO_ottoman_events_2.1.t:0 "The Allegiance of Wallachia"
 EVHO_ottoman_events_2.1.d:0 "Before the Battle of Varna, Wallachia was a subject of the Ottoman Empire, obligated to send troops and tribute in order to aid in the conquests of the Sultan. However, since the Battle of Varna, Wallachia has become a practically independent state teetering between the Hungarian and Ottoman spheres of influence, fearing invasion from one or the other. The time has come to deal with the difficult question of Wallachian allegiance."
 EVHO_ottoman_events_2.1.a:0 "Demand that the Wallachians pay homage."
 EVHO_ottoman_events_2.1.b:0 "We have no need for Wallachia."
 EVHO_ottoman_events_2.2.t:0 "Demands from the Sublime Porte"
 EVHO_ottoman_events_2.2.d:0 "Before the Battle of Varna, Wallachia was a subject of the Ottoman Empire, obligated to send troops and tribute in order to aid in the conquests of the Sultan. However, since the Battle of Varna, Wallachia has become a practically independent state teetering between the Hungarian and Ottoman spheres of influence, fearing invasion from one or the other. It appears that the Ottomans have now sent a demand that we acknowledge them again as our suzerain, or risk the invasion and destruction of our country."
 EVHO_ottoman_events_2.2.a:0 "Very well, we will accede to their demands."
 EVHO_ottoman_events_2.2.b:0 "Impale their wretched ambassadors!"
 EVHO_ottoman_events_2.3.t:0 "Wallachia Submits!"
 EVHO_ottoman_events_2.3.d:0 "Wallachia has submitted to the authority of the Sultan once again, becoming a subject of the Ottoman Empire. It is to be hoped that there will be no more issues with their allegiance."
 EVHO_ottoman_events_2.3.a:0 "Excellent."
 EVHO_ottoman_events_2.4.t:0 "Ambassadors Impaled!"
 EVHO_ottoman_events_2.4.d:0 "The Voivode of Wallachia, enraged at our demands for suzerainty, ordered that the Ottoman diplomats be impaled and displayed their bodies outside his castle as a defiant sign of Wallachia's continued independence. It appears that if we are to take over Wallachia once again, we must resort to the use of force."
 EVHO_ottoman_events_2.4.a:0 "Uncivilized brutes!"
 EVHO_ottoman_events_2.5.t:0 "The Crisis of Moldavia"
 EVHO_ottoman_events_2.5.d:0 "For many years now, the Principality of Moldavia has been a state on the frontiers of two burgeoning realms, the Kingdom of Poland to the north and the Ottoman Empire to the south. These two fated enemies have clashed intermittently throughout the years, and much of the fighting has taken place on Moldavian soil. Despite their pledge to defend the lands of Moldavia from foreign invaders, the Ottomans have made headway into the country and conquered some of its provinces, spreading fear and terror far and wide.\n\nWith the Poles utterly incapable of stopping the Ottoman threat, some of the Moldavian nobles are now asking $MONARCHTITLE$ $MONARCH$ to abandon the Polish cause, and instead declare Moldavian suzerainty to the Ottoman Empire so that the country will no longer have to bear the brunt of the Ottoman invasions. With Poland so weak, they reason, it is better to fight them than the Ottomans.\n\nWe can negotiate with the Ottomans for their protection, but they may not necessarily accept our proposition. We will not be able to keep our negotiations secret from Poland, so if we do not manage to secure the suzerainty of the Ottomans, we will be left utterly defenseless."
 EVHO_ottoman_events_2.5.a:0 "A compelling suggestion. Let us try and join the Ottomans."
 EVHO_ottoman_events_2.5.b:0 "It is not worth the risk. We must stick together with Poland."
 EVHO_ottoman_events_2.6.t:0 "Moldavia Offers its Submission"
 EVHO_ottoman_events_2.6.d:0 "For many years now, the Principality of Moladvia, as a consequence of its suzerainty to Poland, has been ravaged by the troops of the Ottoman Empire. It appears that the conquest of some of the Moldavian lands and the weakness of Poland have led the Moldavian nobles to abandon Poland as an ally, for they now seek protection from us. While we could accept Moldavia as a subject, we may have to return some of their conquered lands to them in order to keep relations cordial."
 EVHO_ottoman_events_2.6.a:0 "Let us defend Moldavia from the Polish menace!"
 EVHO_ottoman_events_2.6.b:0 "We do not accept traitors."
 EVHO_ottoman_events_2.7.t:0 "The Moldavian Betrayal"
 EVHO_ottoman_events_2.7.d:0 "The Moldavian nobility, citing Poland's weakness in its conflicts against the Ottomans, have pledged their suzerainty to their empire and abandoned the Kingdom of Poland as an ally. This perfidy greatly threatens the security of the Polish state and now brings the Ottoman sphere of influence onto the very edge of our realm."
 EVHO_ottoman_events_2.7.a:0 "The fools! They will soon see the might of Poland."
 EVHO_ottoman_events_2.8.t:0 "A Venetian Queen of Cyprus?"
 EVHO_ottoman_events_2.8.d:0 "$MONARCHTITLE$ $MONARCH$ is without a wife, and has sent dignitaries far and wide in search of one to accompany him in his rule. One potential candidate to be Queen of Cyprus is Catarina Corner, the daughter of a Venetian patrician. If we allow $MONARCHTITLE$ $MONARCH$ to wed Catarina, we could greatly improve our relations with the Republic of Venice. However, at the same time, arranging such a marriage could cause unforeseen complications regarding our political independence."
 EVHO_ottoman_events_2.8.a:0 "Let us take a Venetian bride!"
 EVHO_ottoman_events_2.8.b:0 "We cannot trust the likes of Venice..."
 EVHO_ottoman_events_2.9.t:0 "The Inheritance of Cyprus"
 EVHO_ottoman_events_2.9.d:0 "The death of our King has brought Venetian ambassadors and warships to the shores of Cyprus. The Venetian represetnatives announced to us today that the Queen Catarina Corner has sold them Cyprus, and that it is now therefore a possession of the Republic. Whether Corner sold Cyprus willfully or under coercion is unknown, but whatever the case, the independence of our island is at stake."
 EVHO_ottoman_events_2.9.a:0 "Allow the Venetians to take over Cyprus."
 EVHO_ottoman_events_2.9.b:0 "Ward off these vultures!"
 EVHO_ottoman_events_2.10.t:0 "The Inheritance of Cyprus"
 EVHO_ottoman_events_2.10.d:0 "Following the death of the last Cypriot king, his Venetian wife Catarina Corner bequeathed control of the island of Cyprus to us. We now have another foothold in the Eastern Mediterranean, from which we can continue to expand our control of regional commerce."
 EVHO_ottoman_events_2.10.a:0 "A generous gift from a fine Venetian lady."
 EVHO_ottoman_events_2.11.t:0 "The Cypriots Declare Independence!"
 EVHO_ottoman_events_2.11.d:0 "Although the death of the last Cypriot king was supposed to herald the beginning of a new era of Venetian rule, as promised by his Venetian wife Catarina Corner, the Cypriots have apparently had enough of Venetian influences and are openly taking up arms on the island. With the island in armed tumult, it will be impossible for us to take control of Cyprus by peaceful and nonviolent means. It appears that if we are to protect our interests in these parts of the Mediterranean, we must do so by way of force."
 EVHO_ottoman_events_2.11.a:0 "Ready the warships!"
 EVHO_ottoman_events_2.12.t:0 "The Great Aq Qoyunlu"
 EVHO_ottoman_events_2.12.d:0 "For years now, we have been at odds with the Ottoman Empire, but a curious power has arisen to their empire's east. The Aq Qoyunlu, or White Sheep Turkomans, have become a significant Middle Eastern power, overcoming their ancient rivals, the Qara Qoyunlu, or Black Sheep Turkomans, and are now a real threat to the rule of the Ottoman Empire in Anatolia. Although an alliance with the Aq Qoyunlu will not guarantee the safety of our domains in the Adraitic from Ottoman incursion, it could provide a worthwhile distraction that allows us to shore up our own defenses."
 EVHO_ottoman_events_2.12.a:0 "Propose an alliance with the Aq Qoyunlu."
 EVHO_ottoman_events_2.12.b:0 "There is little to be gained from befriending such a far-off state."
 EVHO_ottoman_events_2.13.t:0 "Ambassadors from Venice"
 EVHO_ottoman_events_2.13.d:0 "The great maritime state of Venice has sent ambassadors to our lands, hoping to procure an alliance against the formidable Ottoman threat to our west. While we have overcome many foes, the Ottomans are perhaps the mightiest who have yet to be conquered, and an alliance with Venice may go a long way toward ensuring the long-term secure of our nation."
 EVHO_ottoman_events_2.13.a:0 "Very well. Let us ally Venice."
 EVHO_ottoman_events_2.13.b:0 "They are too far away to be of use."
 EVHO_ottoman_events_2.14.t:0 "The Aq Qoyunlu Accept the Alliance with Venice"
 EVHO_ottoman_events_2.14.d:0 "The tribesmen of the Aq Qoyunlu have accepted an alliance with Venice, and promise that sometime in the future, there will be a triumphant war against the Ottomans. It is an important development in our battles with the Turks."
 EVHO_ottoman_events_2.14.a:0 "Very good."
 EVHO_ottoman_events_2.15.t:0 "The Aq Qoyunlu Reject the Alliance with Venice"
 EVHO_ottoman_events_2.15.d:0 "The tribesmen of the Aq Qoyunlu have rejected an alliance with Venice, as they say we are too far to be of meaningful use to them. This may be a grave mistake given the growing Ottoman threat."
 EVHO_ottoman_events_2.15.a:0 "We will have to move alone."
 EVHO_ottoman_events_2.16.t:0 "The Ottomans Accept Moldavian Suzerainty"
 EVHO_ottoman_events_2.16.d:0 "The Ottomans have accepted our request to become their subjects, and will now protect us in all future conflicts with Poland. It is a good day in the history of our country."
 EVHO_ottoman_events_2.16.a:0 "Down with Poland!"
 EVHO_ottoman_events_2.17.t:0 "The Ottomans Reject Moldavian Suzerainty"
 EVHO_ottoman_events_2.17.d:0 "The Ottomans have rejected our request to become their subjects. As a result, we now have no allies in our future conflicts, and both the Ottoman Empire and Kingdom of Poland now pose colossal threats to our independence. The future is extremely uncertain."
 EVHO_ottoman_events_2.17.a:0 "Dark times draw near."
 EVHO_ottoman_events_2.18.t:0 "Venice Sends Aid!"
 EVHO_ottoman_events_2.18.d:0 "The Republic of Venice has sent generous economic aid to our humble kingdom, perhaps because of the improved relations which have come about from $MONARCHTITLE$ $MONARCH$'s marriage to the daughter of a Venetian partrician. The Venetians have pledged to take a keen interest in the affairs of our island, promising that they will continue to protect and help our country in the future."
 EVHO_ottoman_events_2.18.a:0 "God bless the Doge of Venice!"
