 #Events for POL
 
 flavor_pol.18.t:0 "Successor of Wladyslaw III"
 flavor_pol.18.desc:0 "The death of the childless King Wladyslaw III on the battlefield of Varna split the union between Poland and Hungary and left Poland in an interregnum. His brother Kazimierz, the Grand Duke of Lithuania, was asked by the Polish nobility to assume the throne but found their conditions unacceptable. In 1447, after three years of negotiations, Kazimierz was finally crowned King of Poland on his own terms and ruled both kingdoms as a union."
 flavor_pol.18.a:0 "We need a Jagiellon!"
 flavor_pol.18.b:0 "Approach the [BRA.Monarch.Dynasty.GetName]s of [BRA.GetName]."
 flavor_pol.18.c:0 "Unite Poland and Mazovia under [MAZ.Monarch.Dynasty.GetName] rule."
 flavor_pol.18.e:0 "Invite a [eligible_for_POL_throne.Monarch.Dynasty.GetName]."
 flavor_pol.18.f:0 "Let us appoint a local noble instead."
 
 wladyslaw_tooltip:0 "Other pretenders might claim the Polish throne for themselves later."
 lit_denied_birthright:0 "Succession of Wladyslaw III"
 
 EVHO_polish_interregnum.100.a:0 "They need a [Root.Monarch.Dynasty.GetName]!"
 EVHO_polish_interregnum.100.b:0 "[Root.Monarch.GetName] shall rule both nations from [Root.Capital.GetName]."
 EVHO_polish_interregnum.100.c:0 "Move the [Root.Monarch.GetTitle]’s court to [POL.Capital.GetName]."
 EVHO_polish_interregnum.100.e:0 "Send the ambassadors back."
 
 EVHO_polish_interregnum.101.t:0 "Another monarch ascends to the Polish throne!"
 EVHO_polish_interregnum.101.d:0 "Negotiations regarding the succession of Wladyslaw III, the late King of Poland, have resulted in [POL.Monarch.GetName] of [POL.Monarch.GetDynasty] dynasty taking the Polish throne by previous agreement with the realm’s nobility. This has sparked outrage in the higher echelons of [Root.GetAdjective] society, as [Root.Monarch.GetHerHisCap] Majesty [Root.Monarch.GetName] has had a substantial chance to claim the Crown of Poland [Root.Monarch.GetHerselfHimself]."
 EVHO_polish_interregnum.101.a:0 "Lay claim to the Polish realm."
 EVHO_polish_interregnum.101.b:0 "We have more important matters to bother with."
 
 #Gunpowder Empires
 EVHO_events_gunpowder_empires.100.t:0 "Safavid conquest of Persia"
 EVHO_events_gunpowder_empires.100.d:0 "In 1499, Ismail, the young leader of the Safavi order, left Lahijan for Ardabil to make a bid for power. By the summer of 1500, about 7,000 supporters from the local Turcoman tribes of Asia Minor (Anatolia), Syria, and the Caucasus – collectively called “Qizilbash” by their enemies – rallied to his support in Erzincan. Leading his troops on a punitive campaign against the Shirvanshah, he sought revenge for the death of his father and his grandfather in Shirvan. After defeating the Sharvanshah Farrukh Yassar and incorporating his kingdom, he moved south into Azerbaijan, where his 7,000 Qizilbash warriors defeated a force of 30,000 Aq Qoyunlu under Alwand Mirza and conquered Tabriz. This was the beginning of the Safavid state.\nBy 1510, Ismail and his Qizilbash had conquered the whole of Iran and Azerbaijan, southern Dagestan (with its important city of Derbent), Mesopotamia, Armenia, Khorasan, Eastern Anatolia, and had made the Georgian kingdoms of Kartli and Kakheti his vassals."
 EVHO_events_gunpowder_empires.100.a:0 "He shall lead us to new heights!"
 EVHO_events_gunpowder_empires.100.b:0 "He should lead our armies!"
 EVHO_events_gunpowder_empires.100.c:0 "He must be silenced."
 
 ismail_I_safavid_ai:0 "Safavid conquest of Persia"
 ismail_I_safavid:0 "Safavid conquest of Persia"
 
 EVHO_events_gunpowder_empires.200.t:0 "Babur"
 EVHO_events_gunpowder_empires.200.d:0 "Babur was the founder of the Mughal Empire and first Emperor of the Mughal dynasty (r. 1526–1530) in the Indian subcontinent. He was a descendant of Timur and Genghis Khan through his father and mother respectively.\nBabur was born in Andijan in the Fergana Valley. He was a great-great grandson of Timur. Babur ascended the throne of Fergana in its capital Akhsikent in 1494 at the age of twelve and faced rebellion. He conquered Samarkand two years later, only to lose Fergana soon after. In his attempt to reconquer Fergana, he lost control of Samarkand. In 1501 his attempt to recapture both the regions failed when Muhammad Shaybani Khan defeated him. In 1504 he conquered Kabul, which was under the putative rule of Abdur Razaq Mirza, the infant heir of Ulugh Beg II. Babur formed a partnership with the Safavid ruler Ismail I and reconquered parts of Turkistan, including Samarkand, only to again lose it and the other newly-conquered lands to the Sheybanids.\nAfter losing Samarkand for the third time, Babur turned his attention to India. At that time, the Indo-Gangetic Plain of the Indian subcontinent was ruled by Ibrahim Lodi of the Afghan Lodi dynasty, whereas Rajputana was ruled by a Hindu Rajput Confederacy, led by Rana Sanga of Mewar. Babur defeated Ibrahim Lodi at the First Battle of Panipat in 1526 CE and founded the Mughal empire. He faced opposition from Rana Sanga, who at first promised to help Babur defeat Ibrahim Lodi; however he later backed out upon realising that Babur had plans to stay in India. The Rana prepared an army of Rajputs and Afghans to force Babur out of India, however the Rana was defeated in the Battle of Khanwa (1527) after which he was poisoned to death (1528) by his own men."
 EVHO_events_gunpowder_empires.200.a:0 "We shall win this game of chess."
 EVHO_events_gunpowder_empires.200.b:0 "There are matters far more important than India."
 
 babur_timurid_ai:0 "Formation of the Mughal Empire"
 babur_timurid:0 "Formation of the Mughal Empire"
 
 EVHO_events_gunpowder_empires.300.t:0 "Ottoman conquest of the Mamluk Sultanate"
 EVHO_events_gunpowder_empires.300.d:0 "The defeat of the Mamluks in the Ottoman–Mamluk War of 1516–1517 led to the fall of the Mamluk Sultanate and the incorporation of the Levant, Egypt, and the Hejaz as provinces of the Ottoman Empire. The war transformed the Ottoman Empire from a realm at the margins of the Islamic world, mainly located in Anatolia and the Balkans, to a huge empire encompassing much of the traditional lands of Islam, including the cities of Mecca, Cairo, Damascus, and Aleppo. Despite this expansion, the seat of the empire's political power remained in Constantinople."
 EVHO_events_gunpowder_empires.300.a:0 "So conquer we must, in our case it is just."
 
 conquer_mamluks_tt:0 "The entire territory of Mamluk state will come under Ottoman control."
 conquer_mamluks_tt2:0 "Ottomans should peace out the Mamluks within the next month, fully annexing their posessions in Egypt, Levant, Maghreb and Hejaz. For the next seven days, province warscore cost will be greately reduced. If successful, the player will recieve an additional reward."
 conquer_mamluks:0 "Ottoman conquest of the Mamluks"
 
 EVHO_events_gunpowder_empires.301.t:0 "Ottoman conquest of the Mamluk Sultanate"
 EVHO_events_gunpowder_empires.301.d:0 "The conquest of the Mamluks was the largest military venture any Ottoman Sultan had ever attempted. In addition, the conquest put the Ottomans in control of two of the largest cities in the world at the time- Constantinople and Cairo. Not since height of the Roman Empire had the Black, Red, Caspian, and Mediterranean seas been governed by a single empire – the Ottomans.\nThe conquest of Egypt proved extremely profitable for the empire as it produced more tax revenue than any other Ottoman territory and supplied about 25% of all food consumed. However, Mecca and Medina were the most important of all the cities conquered since it officially made Selim and his descendents the Caliphs of the entire Muslim world until the early 20th century."
 EVHO_events_gunpowder_empires.301.a:0 "Nice."
 
