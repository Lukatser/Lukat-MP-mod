 ev_poland.18.a:0 "Invite a Foreign Noble"

 mamluk.title:0 "Collapse of the Mamluk Sultanate"
 mamluk.desc:0 "In 1515, Sultan Selim I began the war which led to the Ottoman conquest Egypt and its dependencies. Mamluk cavalry proved no match for the Ottoman artillery and Janissary infantry. On 24 August 1516, at the Battle of Marj Dabiq, Mamluk Sultan Al-Ghawri was killed. Syria passed into Turkish possession, an event welcomed in many places as deliverance from the Mamluks. The Mamluk Sultanate survived in Egypt until 1517, when Selim captured Cairo. Although diminished in power, the Mamluks were retained by the Ottomans as an Egyptian ruling class, and the Burji family succeeded in regaining much of its influence.\n\nThe Mamluks are incredibly corrupted, and leaving them in privilege will do naught for Egypt. Nonetheless, without their support, we will be unable to rule this region as easily. What should we do?"
 mamluk.a:0 "We shall rule Egypt directly."
 mamluk.b:0 "Leave the Mamluks in power - our focus is elsewhere."
 mamluks_rebels:0 "Angered Mamluks"
 desc_mamluks_rebels:0 "The Mamluks are displeased at the onset of Ottoman rule, and yearn to have their former powers restored."
 mamluk_influence:0 "Mamluk Influence"
 desc_mamluk_influence:0 "Even after the fall of the Mamluk Sultanate, the Mamluks continue to possess influence in Ottoman Egypt. Their power makes it difficult for rulers to exert direct control over Egypt."
 novgorod_fall.title:0 "The Fall of Novgorod"
 novgorod_fall.desc:0 "Throughout the 14th century, Lithuania and Muscovy fought intensely for control of Novgorod and its extravagant wealth, accrued from control of the lucrative fur trade in the Russian north. As Muscovy grew in strength, its princes became an increasingly greater threat to Novgorod. Thus, the Novgordians began to turn to the Polish-Lithuanian Commonwealth for security, pursuing an alliance in the 1470s. However, this encouraged the wrath of Muscovy, and so Grand Prince of Moscow Ivan III went to war with Novgorod and took the city in 1478 - he destroyed the Veche bell, the ancient symbol of Novgorod's republican traditions, and ended the independence of Novgorod. \n\nA Muscovite onslaught has the potential to instill incredible fear, horror, and anger among the once free and prosperous Novgorodian people. Should Muscovy seize the lands of the north?"
 novgorod.a:0 "Bring the Novgorodian domains into the Muscovite fold!"
 novgorod.b:0 "Allow the Novgorodians to remain free."
 novgorod_rebels:0 "The Fall of Novgorod"
 desc_novgorod_rebels:0 "The Novgorodians are incensed by the destruction of their republic and its symbols, and seek earnestly to overthrow Muscovite rule."
 qara.title:0 "Collapse of the Qara Qoyunlu"
 qara.desc:0 "Born from the ruins of the Timurid Empire, the Aq Qoyunlu and Qara Qoyunlu were rival hordes known respectively as the White Sheep and Black Sheep Turkomans. For many decades, they competed for control of the Middle East and dominance over Timur's former domains. In 1467, Uzun Hasan, the Shahanshah of the Aq Qoyunlu, defeated Jahan Shah, the Sultan of the Qara Qoyunlu at the Battle of Chapakchur. Jahan Shah was slain in battle and the Qara Qoyunlu promptly collapsed, with their lands being rapidly subsumed by their rivals. \n\nShould we seize the territories of our enemies?"
 qara.a:0 "Yes, let the White Sheep Turkomans rule the Middle East!"
 qara.b:0 "No, be merciful to the Black Sheep Turkomans."
 qara_rebels:0 "Middle Eastern Upheaval"
 desc_qara_rebels:0 "With the rise and fall of regimes in the Middle East comes great unrest, as uncertainty grows."
 qara_2.title:0 "Collapse of the Qara Qoyunlu"
 qara_2.desc:0 "For centuries, the rulers of Ardabil have controlled a humble domain in the region of Azerbaijan, beneath the shadows of great empires such as the Timurids and the Qara Qoyunlu. However, now the Qara Qoyunlu, with their capital at Tabriz sacked, are set to fall. Consequently, the rulers of Ardabil have an opportunity to expand their influence unlike ever before. \n\nShould we seize the territories of our enemies?"
 qara_2.a:0 "Yes, let us become the new rulers of the Middle East!"
 qara_2.b:0 "No, we must be merciful in our conduct."
 aq.title:0 "Collapse of the Aq Qoyunlu"
 aq.desc:0 "For centuries, the rulers of Ardabil have controlled a humble domain in the region of Azerbaijan, beneath the shadows of great empires such as the Timurids and the Qara Qoyunlu. However, now the Aq Qoyunlu, with their capital at Diyarbakir sacked, are set to fall. Consequently, the rulers of Ardabil have an opportunity to expand their influence unlike ever before. \n\nShould we seize the territories of our enemies?"
 aq.a:0 "Yes, let us become the new rulers of the Middle East!"
 aq.b:0 "No, we must be merciful in our conduct."
 aq_rebels:0 "Middle Eastern Upheaval"
 desc_aq_rebels:0 "With the rise and fall of regimes in the Middle East comes great unrest, as uncertainty grows."
 qara_dies.title:0 "Collapse of the Qara Qoyunlu"
 qara_dies.desc:0 "Born from the ruins of the Timurid Empire, the Aq Qoyunlu and Qara Qoyunlu were rival hordes known respectively as the White Sheep and Black Sheep Turkomans. For many decades, they competed for control of the Middle East and dominance over Timur's former domains. In 1467, Uzun Hasan, the Shahanshah of the Aq Qoyunlu, defeated Jahan Shah, the Sultan of the Qara Qoyunlu at the Battle of Chapakchur. Jahan Shah was slain in battle and the Qara Qoyunlu promptly collapsed, with their lands being rapidly subsumed by their rivals. \n\nLet us seize the territories of our enemies."
 qara_dies.a:0 "Yes, let us become the new rulers of the Middle East!"
 annexation.7.t:0 "The Conquest of Ajam"
 annexation.7.d:0 "For many years, the lands of Ajam were under the rule of a branch of the Timurid dynasty. However, in recent times, the rulers of Ajam broke away from the Timurid sphere of influence, thus depriving themselves of the protection provided by their former overlords. Amid this power vacuum, we have seized the capital of Ajam, and now have the option to seize the country's lands and begin our mission to form a new Persian Empire."
 annexation.7.a:0 "Seize the lands of Ajam!"
 annexation.7.b:0 "We should not inflict such a humiliation on our enemies."
 annexation.8.t:0 "The Conquest of Multan"
 annexation.8.d:0 "In 1398, the city of Multan was captured by the Timurids, and later that year, Delhi was also sacked by the forces of Timur. Eventually, the city of Multan gained its independence afterward, becoming the center of the Langah Sultanate. Now, Timurid armies have finally returned to India, seizing the lands of Multan once again. Perhaps it is time to bring a new era of Timurid rule in India..."
 annexation.8.a:0 "These are the beginnings of a new great empire."
 annexation.8.b:0 "We do not need the lands of India."
 annexation.9.t:0 "The Conquest of Sirhind"
 annexation.9.d:0 "Our forces have fallen upon the lands of Sirhind in the Punjab, and seized the capital of the country. Shall we incorporate Sirhind into our new domains in the subcontinent of India?"
 annexation.9.a:0 "Yes, Sirhind will be ours!"
 annexation.9.b:0 "Let the people of Punjab be."
 annexation.10.t:0 "The Fall of Delhi"
 annexation.10.d:0 "In 1398, the great conqueror Timur sacked the city of Delhi, but did not stay, leaving the great metropolis and capital of the Delhi Sultanate in ruins. However, we, the sons of Timur, have defeated the Delhi Sultanate once again, and now have the option to now permanently incorporate its lands into our rising empire. What will be the fate of the lands of Delhi?"
 annexation.10.a:0 "Let us be the new rulers of this region!"
 annexation.10.b:0 "There is no need for taking this land."
 annexation.11.t:0 "The Fall of Jaunpur"
 annexation.11.d:0 "In 1394, the Jaunpur Sultanate achieved its independence from the declining Delhi Sultanate. The Sharqi dynasty then ruled the Gangetic plains for decades, one of the richest and most fertile regions in all of India. Nonetheless, our mighty forces have managed to seize the capital of this formerly grand sultanate, and we now can seize this land's tremendous wealth for ourselves."
 annexation.11.a:0 "The lands of Jaunpur are ours!"
 annexation.11.b:0 "Let us withdraw from these floodplains."
 annexation.15.t:0 "The Last of the Mushasha"
 annexation.15.d:0 "Since the middle of the 15th century, the Mushasha, a Shia millenarian sect, controlled Khuzestan and the southern parts of Iraq. They long feuded with our order, the Safaviya, over questions of religious doctrine. However, we have now come to conquer the lands of the Mushasha, and as such, have proven the veracity of our interpretation of the Islamic faith by means of force. Now how shall we treat the conquered?"
 annexation.15.a:0 "Annex their lands into our rising empire."
 annexation.15.b:0 "Let us not inflame old feuds."
 annexation.18.t:0 "The Conquest of Iraq"
 annexation.18.d:0 "Our forces have marched on the lands of Iraq, and seized the capital of the country. Iraq has long been the beating heart of the Shia world, being a site of pilgrimage for so many Shia Muslims from all over the region. Incorporating these lands into our realm would increase our prestige greatly."
 annexation.18.a:0 "We will rule Iraq!"
 annexation.18.b:0 "Leave the Iraqis to their own devices."
 annexation.20.t:0 "The Fall of Delhi"
 annexation.20.d:0 "Bahlul Lodi has long been the ambitious governor of Sirhind, and conspired constantly to conquer the Delhi Sultanate. Although he failed in his attempt to take Delhi in 1443, this time the Lodi dynasty has emerged victorious, seizing the lands of its inept overlords and becoming the new master of this part of northern India. The surrounding powers should fear the rise of a new great power from Delhi."
 annexation.20.a:0 "Delhi will rise again!"
 annexation.21.t:0 "The Fall of the Shirvanshahs"
 annexation.21.d:0 "For centuries, the Shirvanshahs have governed Azerbaijan, enduring all manner of invasions from Arabs, Mongols, Timurids and still other forces. However, $MONARCHTITLE$ $MONARCH$ has finally defeated the Shirvanshahs in battle, and seized the capital of their country. Perhaps it is time to end the independence of the Shirvanshahs and begin the rise of a new Shia empire."
 annexation.21.a:0 "Shirvan is ours!"
 annexation.21.b:0 "Let us not disgrace the Shirvanshahs."

 FEE_mediterranean_depreciation:0 "Mediterranean Depreciation"
 FEE_mediterranean_depreciation_desc:0 "As a result of the recent discovery and colonization of the New World, the Mediterranean is no longer the center of trade in the west, and its provinces inhabiting kingdoms have, therefore, lost much of its value."
 
 EVHO_misc_events.1.t:0 "[From.variable_name.GetName] Calls for Aid"
 EVHO_misc_events.1.d:0 "A poor, tired messenger from [From.variable_name.GetName] rode through the gates of the keep yesterday. Without waiting for a rest or watering his horse he prostrated himself before you, our beloved [Root.Monarch.GetTitle]. He tells of the dire need in his country of allies, for they face a foe they cannot hope to defeat alone. He claims his lord is aware that he and you have a shared interest, the downfall of a common enemy. He would ask you to join in his holy struggle."
 EVHO_misc_events.1.a:0 "Take up the Sword!"
 EVHO_misc_events.1.b:0 "We have more pressing concerns..."
 EVHO_misc_events.15.t:0 "The Conversion of [Root.Monarch.GetName]"
 EVHO_misc_events.15.d:0 "Against the judgement of more than a few of [Root.Monarch.GetHerHis] nobility and advisors, our Gracious Lord, [Root.Monarch.GetName], has seen the light of the new antipapal herecy that is spreading throughout Europe. Shall we back him in [Root.Monarch.GetHerHis] newfound desire to convert the peasantry, or shall we seek support from others within the state?"
 EVHO_misc_events.15.a:0 "Protestantism, it is!"
 EVHO_misc_events.15.b:0 "Surely, this is a flight of fancy!"
 EVHO_misc_events.16.t:0 "Betrayal by Papal Citizenry"
 EVHO_misc_events.16.d:0 "The countryside of the Papacy has betrayed [Root.Monarch.GetHerHis] holiness to the Italian nation."
 EVHO_misc_events.16.a:0 "Excommunicate the lot of them!"
 EVHO_misc_events.17.t:0 "The Polish Claim"
 EVHO_misc_events.17.d:0 "The Polish have a claim to our throne, how do we proceed?"
 EVHO_misc_events.17.a:0 "They'll have to fight us for it!"
 EVHO_misc_events.17.b:0 "Invite their king to our court."
 EVHO_misc_events.18.t:0 "The Internal Affects of Nationalism"
 EVHO_misc_events.18.d:0 "With the new and liberal-minded philosophy of nationalism, or the call to create states based upon a region in which people share a similar culture and/or roughly speak the same language, Our State has a potential to lay claims to territory that are rightfully hers. That being said, there may yet be peoples within our realm that feel that we are occupying them, and that they deserve a state of their very own. These elements are not likely to improve stability within the realm."
 EVHO_misc_events.18.a:0 "God Save [Root.GetName]!"
 EVHO_misc_events.19.t:0 "The Proliferation of [Root.Culture.GetName] Culture"
 EVHO_misc_events.19.d:0 "Following our recently acquired Independence, the Spirit of our Fledgling, Freedom-loving Culture has taken hold all across the nation."
 EVHO_misc_events.19.a:0 "God Bless [Root.GetName]!"
 EVHO_misc_events.199.t:0 "The Loyalists Assimilate"
 EVHO_misc_events.199.d:0 "Loyalists from the Mother Country can now see the way in which the tide is turning, and have decided either to flee to the Homeland or to assimilate to the newborn culture of our fledgeling state."
 EVHO_misc_events.199.a:0 "They had better!"
 EVHO_misc_events.40.t:0 "The Conversion of [Root.Monarch.GetName]"
 EVHO_misc_events.40.d:0 "Against the judgement of more than a few of [Root.Monarch.GetHerHis] nobility and advisors, our Gracious Lord, [Root.Monarch.GetName], has decided to decry the 'ultimate evil of the antipapal herecy' that is spreading throughout Europe. Shall we back him in [Root.Monarch.GetHerHis] newfound desire to convert the peasantry, or shall we seek support from others within the state?"
 EVHO_misc_events.40.a:0 "Catholicism, it is!"
 EVHO_misc_events.40.b:0 "Surely, this is a flight of fancy!"

 #Revolutionary Thought
 revolutionary_thought:0 "Revolutionary Thought"
 revolutionary_thought_date:0 "1789"
 desc_revolutionary_thought:0 "Revolutions and rebellions have been a constant feature of the history of the late modern age. Examples abound from the Glorious and the Industrial to the French and the American Revolutions; from the Haitian to the Greek Revolution and the Revolutions of 1848. As moments of rupture and radical change, revolutions accelerate historical time, challenge existing hierarchies and mark the advent of new social, political and cultural formations and constellations; they unite and divide. Revolutions also constitute critical processes for the reconfiguration of conceptions of Europe. Ideas about Europe can be discovered at the intersection of political discourses, structures of power, geopolitical perspectives and identity projects. The history of modern revolutions offers a prime opportunity to re-examine and re-think European historical realities and recover the making of ideas about Europe in the modern age; revolutions have been central to discussions about Europe’s pasts and futures, and have shaped the continent’s political and cultural heritage."
