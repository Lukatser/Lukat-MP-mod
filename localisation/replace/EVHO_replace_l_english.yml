 ev.1.t:0 "[From.variable_name.GetName] Calls for Aid"
 ev.1.d:0 "A poor, tired messenger from [From.variable_name.GetName] rode through the gates of the keep yesterday. Without waiting for a rest or watering his horse he prostrated himself before you, our beloved [Root.Monarch.GetTitle]. He tells of the dire need in his country of allies, for they face a foe they cannot hope to defeat alone. He claims his lord is aware that he and you have a shared interest, the downfall of a common enemy. He would ask you to join in his holy struggle."
 ev.1.a:0 "Take up the Sword!"
 ev.1.b:0 "We have more pressing concerns..."

