 random_event.EVTDESC2:0 "As time goes by the ties between the our former homeland and the colonies grow weaker. The settlers in [american_province.GetName] barely associate themselves with their ancestral home any more. They now prefer to think of themselves as Yankees, and this sentiment is beginning to spread throughout [american_province.GetAreaName]."
 random_event.EVTOPTA2:0 "Yankee Doodle went to Boston, riding on a pony!"
 random_event.EVTDESC2C:0 "As time goes by the ties between the our former homeland and the colonies grow weaker. The settlers in [mexican_province.GetName] barely associate themselves with their ancestral home any more. They now prefer to think of themselves as Méxicanos, and this sentiment is beginning to spread throughout [mexican_province.GetAreaName]."
 random_event.EVTOPTE2:0 "¡Arriba con los Méxicanos!"

 usa_dlc.EVTDESC65:0 "In 1803 Napoleon of France was hard pressed for cash as he was set on a dream of European hegemony. He therefore offered the Louisiana Territory, a vast region between the Mississippi and the Rockies against a lump sum of 15 million dollars. The President and the Senate agreed and the United States nearly doubled its size. Sire, you would only get the province that France presently owns for a lump sum of 12000 ducats. How will you choose, Mr. President?"

