 ae_restricted_expansion.100.t: "Africa: Inhospitable Interior"
 ae_restricted_expansion.100.d: "Despite our best efforts, it must be recognized that [Root.GetName] cannot hold onto its recently acquired possessions in Africa. Local diseases, inhospitable terrain and hostile tribes make any futher control of the interior impossible. If the [Root.GetAdjective] are still determined to stay in Africa, their only viable option might therefore be to keep to their trade factories near the coast."
 ae_restricted_expansion.100.a: "An unfortunate development." 
 ae_restricted_expansion.101.t: "Africa: Inhospitable Interior"
 ae_restricted_expansion.101.d: "The recently conquered African lands beyond the established [Root.GetAdjective] realm are showing growing signs of dissent and unrest against the new rulership. Moreover, [Root.GetAdjective] troops and settlers are being ever more plagued with malaria and other local diseases. It would therefore only be wise to retreat from the African interior and stay at the established foothold at the maritime coast."
 ae_restricted_expansion.102.t: "The Treacherous Desert"
 ae_restricted_expansion.102.d: "The recent [Root.GetAdjective] attempt to expand into the Arabian interior has largely shown itself to be a failure. Inhospitable terrain, hostile tribes and lacking infrastructure means it will be long between the desert might be conquered again. In any case, not today."
 ae_restricted_expansion.1021.t: "The Treacherous Desert"
 ae_restricted_expansion.1021.d: "The recent [Root.GetAdjective] attempt to expand into the Arabian interior has largely shown itself to be a failure. Inhospitable terrain, hostile tribes and lacking infrastructure means it will be long between the desert might be conquered again. In any case, not today."
 ae_restricted_expansion.103.t: "Asian expansion - a failure"
 ae_restricted_expansion.103.d: "Recent developments show that [Root.GetName] is yet too weak of a state to effectively project its power inside the Asian continent. The ancient local institutions are simply too entrenched to be reformed or replaced by the new system of [Root.GetAdjective] governance. This does not, however, mean that the [Root.GetAdjective] are to be completely expelled from the region. Their navy might still allow minor trade factories and charters along the coast."
 ae_restricted_expansion.104.t: "Failed inland expansion"
 ae_restricted_expansion.104.d: "Recent developments show that the power [Root.GetName], however mighty, is too centralised and too thalassocratic to be effectively projected into continental hinterland without contingent access to it. While out fleet still may take care of and protect our coastal colonies, it cannot serendipitously grow limbs or wheels to go inland. Therefore it is only rational to keep ourselves to the sea. After all, that's where the money is."
 ae_restricted_expansion.105.t: "Failed European expansion"
 ae_restricted_expansion.105.d: "Recent developments show that the [Root.GetAdjective] realm is yet too weak of a state to effectively project its power inside the European continent. The local institutions are simply too entrenched to be reformed or replaced by the new system of [Root.GetAdjective] governance. Therefore it is only wise for us to retreat to the more established frontiers."
