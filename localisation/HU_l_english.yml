 ae_historical_unions.100.t: "Anglo-Scottish union"
 ae_historical_unions.100.d: "With the royal line now extinguished and no direct heir to the throne, English politicians conducted semi-secret talks with [SCO.Monarch.GetName], [SCO.Monarch.GetTitle] of Scots, as a potential successor. As the health of the last Tudor monarch waned, preparations were quietly made to secure critical locations and ensure a smooth transition of power. Following the monarch's passing, discussions turned to inviting [SCO.Monarch.GetName] to assume the English throne, uniting both realms under [SCO.Monarch.GetHerHis] rule."
 ae_historical_unions.100.a: "Our crowns shall be united."
 ae_historical_unions.101.t: "Franco-Breton Union"
 ae_historical_unions.101.d: "With the passing of the last sovereign ruler of Brittany, the Duchy's independent sovereignty began to diminish. The ducal title was inherited by the ruler's daughter, who faced pressure from the King of France to annul her current marriage and marry him instead. As a result, the French monarch acquired the title of Duke of Brittany jure uxoris, effectively merging the duchy with the Kingdom of France. This integration was formalized in [GetYear] when the Estates of Brittany voted to unify with France after the death of the last sovereign duchess. The subsequent rulers, from the duchy and France respectively, cemented a personal union upon the French monarch's death."
 ae_historical_unions.101.a: "So be it."
 ae_historical_unions.1011.t: "Franco-Provençal union"
 ae_historical_unions.1011.d: "In the 15th century, a series of conflicts erupted between the kings of Aragon and the counts of Provence. These hostilities culminated in 1423 when Alphonse of Aragon's forces captured Marseille and in 1443 when they seized Naples, forcing King René I of Naples into exile. René settled in Provence, where he ruled until his death in 1480, after which his title passed to his nephew Charles du Maine. When Charles died in 1481, the title transferred to Louis XI of France. Provence was formally integrated into the French royal domain in 1486, solidifying its status within the realm."
 ae_historical_unions.1011.a: "Vive le Roi!"
 ae_historical_unions.102.t: "Brandenburg-Prussia"
 ae_historical_unions.102.d: "In 1525, the Treaty of Krakow secularized the Teutonic Order's territory into the Duchy of Prussia, a fief of Polish monarchs governed initially by Duke Albert of Prussia from the Hohenzollern family's cadet branch. The Brandenburgian Hohenzollerns secured succession rights in 1563, leading to Albert Frederick's accession as duke in 1568 after Albert's death. Albert Frederick's daughter, Anna, married John Sigismund of Hohenzollern-Brandenburg in 1594, ensuring the continuity of Prussian and Cleves succession. Upon John Sigismund's incapacitation in 1616 and subsequent death in 1619, Anna governed Prussia until its integration into Brandenburg upon Albert Frederick's death in 1618, retaining its status as a Polish fief until 1656."
 ae_historical_unions.102.a: "So be it."
 ae_historical_unions.103.t: "Austro-Hungarian Union"
 ae_historical_unions.103.d: "With the passing of the previous ruler, the Hungarian nobility has convened to elect the next monarch amidst political tensions and competing claims to the throne. Amidst deliberations, the estates have elected the Archduke of Austria, [HAB.Monarch.GetName], as the new king of Hungary."
 ae_historical_unions.103.a: "Indivisibiliter ac inseparabiliter."
 ae_historical_unions.1031.t: "Austro-Bohemian union"
 ae_historical_unions.1031.d: "With the passing of the previous ruler, the Bohemian nobility has convened to elect the next monarch amidst political tensions and competing claims to the throne. Amidst deliberations, the estates have elected the Archduke of Austria, [HAB.Monarch.GetName], as the new king of Bohemia."
 ae_historical_unions.1031.a: "Indivisibiliter ac inseparabiliter."
 ae_historical_unions.104.t: "Polish-Lithuanian union"
 ae_historical_unions.104.d: "The death of the childless King Wladyslaw III on the battlefield of Varna split the union between Poland and Hungary and left Poland in an interregnum. His brother Kazimierz, the Grand Duke of Lithuania, was asked by the Polish nobility to assume the throne but found their conditions unacceptable. In 1447, after three years of negotiations, Kazimierz was finally crowned King of Poland on his own terms and ruled both kingdoms as a union."
 ae_historical_unions.104.a: "Our realms shall be further united."
 ae_historical_unions.105.t: "Second Peace of Thorn"
 ae_historical_unions.105.d: "The Peace of Thorn of 1466 concluded the Thirteen Years' War, the longest of the Polish–Teutonic Wars, which had begun in February 1454 with the revolt of the Prussian Confederation, led by the cities of Danzig, Elbing, Kulm and Thorm, and the Prussian gentry against the rule of the Teutonic Knights in the Monastic State, in order to join the Kingdom of Poland. In the treaty, the Teutonic Order renounced any claims to the territories of Eastern Pomerania which were reintegrated with Poland, as well as to the region of Elbing and Marienburg, and the Bishopric of Warmia, which were also recognized as part of the Polish realm."
 ae_historical_unions.105.a: "Thalassa! Thalassa!"
 ae_historical_unions.106.t: "Iberian Wedding"
 ae_historical_unions.106.d: "Ferdinand II, king of Aragon, was married to the princess Isabella of Castile in Valladolid in October 1469. This was a marriage of political opportunism, not romance. The court of Aragon dreamed of a return to Castile, and Isabella needed help to gain succession to the throne. The marriage initiated a dark and troubled life, in which Ferdinand fought on the Castilian and Aragonese fronts in order to impose his authority over the noble oligarchies, shifting his basis of support from one kingdom to the other according to the intensity of the danger. Despite the political nature of the union, he loved Isabella sincerely. Many considered Ferdinand the savior of his kingdoms, a bringer of unity. Others despised him for having oppressed them. Machiavelli attributed to him the objectionable qualities of the Renaissance prince."
 ae_historical_unions.106.a: "Let us bind their Dynasty to ours."
 
 
 
 
 ae_historical_expansion.100.t: "Conquest of Granada"
 ae_historical_expansion.100.d: "The Granada War was a series of military campaigns between 1482 and 1492 during the reign of the Catholic Monarchs, Isabella I of Castile and Ferdinand II of Aragon, against the Nasrid dynasty's Emirate of Granada. It ended with the defeat of Granada and its annexation by Castile, ending the last remnant of Islamic rule on the Iberian peninsula."
 ae_historical_expansion.100.a: "So ends the Reconquista."
 ae_historical_expansion.1011.t: "Ottoman conquest of the Balkans"
 ae_historical_expansion.1011.d: "The Ottoman Empire of the Classical Age experienced dramatic territorial growth. The period opened with the conquest of Constantinople by Mehmed II in 1453. Mehmed II went on to consolidate the empire's position in the Balkans and Anatolia, conquering Serbia in 1454–55, the Peloponnese in 1458–59, Trebizond in 1461, and Bosnia in 1463. Many Venetian territories in Greece were conquered during the 1463–1479 Ottoman-Venetian War. By 1474 the Ottomans had conquered their Anatolian rival, the Karamanids, and in 1475 conquered Kaffa on the Crimean Peninsula, establishing the Crimean Khanate as a vassal state."
 ae_historical_expansion.1011.a: "Their lands belong to Sultan [Root.Monarch.GetName]!"
 ae_historical_expansion.1012.t: "Partition of Hungary"
 ae_historical_expansion.1012.d: "The Battle of Mohács, was fought on 29 August 1526 between the forces of the Kingdom of Hungary and its allies, led by Louis II, and those of the Ottoman Empire, led by Suleiman the Magnificent. The Ottoman victory led to the partition of Hungary for several centuries between the Ottoman Empire, the Habsburg monarchy, and the Principality of Transylvania. Further, the death of Louis II as he fled the battle marked the end of the Jagiellonian dynasty in Hungary and Bohemia, whose dynastic claims passed to the House of Habsburg."
 ae_historical_expansion.1012.a: "Their lands belong to Sultan [Root.Monarch.GetName]!"
 ae_historical_expansion.101.t: "The Ottoman–Mamluk War"
 ae_historical_expansion.101.d: "The second major conflict between the Egypt-based Mamluk Sultanate and the Ottomans led to the Fall of the Mamluk Sultanate and the incorporation of the Levant, Egypt, and the Hejaz as provinces of the Ottoman Empire. The war transformed the Ottomans from a realm at the margins of the Islamic world, mainly located in Anatolia and the Balkans, to a huge empire encompassing much of the traditional lands of Islam, including the cities of Mecca, Cairo, Damascus, and Aleppo."
 ae_historical_expansion.101.a: "Their lands belong to Sultan [Root.Monarch.GetName]!"
 ae_historical_expansion.102.t: "Last vestiges of Novgorod"
 ae_historical_expansion.102.d: "By the 14th century, the prince of Moscow was usually the prince of Novgorod as well. As Moscow grew in power in the 15th century, Novgorod began to lose its autonomy. In a 1471 peace treaty with Moscow following the Battle of Shelon, Novgorod pledged allegiance to Moscow, with its system of government temporarily left intact. The end of the republic and the veche came in 1478 when Ivan III once again invaded and seized the city as part of his campaign to annex all other Russian states."
 ae_historical_expansion.102.a: "Our [Root.Monarch.GetTitle] is merely collecting Russian lands."
 ae_historical_expansion.103.t: "Partition of Livonia"
 ae_historical_expansion.103.d: "Under the 1582 Truce of Jam Zapolski, which ended the Livonian War between Russia and the Polish-Lithuanian Commonwealth, Russia lost all of its former holdings in Livonia and Polotsk to Poland–Lithuania. The following year, Sweden and Russia signed the Truce of Plussa, with Sweden gaining most of Ingria and northern Livonia while retaining the Duchy of Estonia."
 ae_historical_expansion.103.a: "This should keep the Muscovites out of the Baltic region."
 
 ae_historical_expansion.104.t: "The Wild Fields"
 ae_historical_expansion.104.d: "The historical term Wild Fields (Dzike Pole) refers to the parts of the Pontic Steppe which came under the Polish-Lithuanian control around the 15th century. As the enserfment of Ruthenian peasants in the more developed regions up the Dnieper river became more prominent, the vast grasslands of the Wild Fields provided a safe haven for vagabonds of different sorts who would eventually become known as the Cossacks."
 ae_historical_expansion.104.a: "They might help us defend against the nomads."
 ae_historical_expansion.1041.t: "Ottoman forts in Yedisan"
 ae_historical_expansion.1041.d: "The core of Özü (Ochakov) fortress probably dates back to the military fortification built by the Crimean Khanate in the 1490s. This small Tatar castle, called Cankirman, must have definitely come under Ottoman rule after the Karaboğdan expedition of Suleiman the Magnificent in 1538. In some sources, it is stated that this place was built by Meñli I Giray in 1492 on an ancient Greek city called Alektor and was named Karakerman. After coming under Ottoman rule, the castle and the small settlement began to be mentioned in official Ottoman documents as "Cankirman also known as Özi". In Ottoman sources, Özü was used as the name of both the region and the Dnieper river."
 ae_historical_expansion.1041.a: "At this pace, the Black Sea will become a lake."
 ae_historical_expansion.10411.t: "The Danubian Duchies"
 ae_historical_expansion.10411.d: "Under Stephen the Great of Moldavia, who took the throne and subsequently came to an agreement with Casimir IV of Poland in 1457, the state reached its most glorious period. Stephen blocked Hungarian interventions in the Battle of Baia, invaded Wallachia in 1471, and dealt with Ottoman reprisals in a major victory. However, he had to surrender Chilia and Cetatea Albă, the two main fortresses in the Budjak, to the Ottomans in 1484, and in 1498 he had to accept Ottoman suzerainty, when he was forced to agree to continue paying tribute to Sultan Bayezid II."
 ae_historical_expansion.10411.a: "At this pace, the Black Sea will become a lake."
 ae_historical_expansion.1042.t: "Muscovite-Lithuanian Wars"
 ae_historical_expansion.1042.d: "The Second Lithuanian War had ended with devastating terms for Lithuania. The Grand Duchy of Lithuania lost approximately 81 000 square miles, or a third of its territory: Chernigov, Novgorod-Seversk, Starodub, and lands around the upper Oka River, which amounted to 70 volosts, 22 towns, and 13 villages."
 ae_historical_expansion.1042.a: "An unfortunate development."
 ae_historical_expansion.1043.t: "Zaporozhian Sicz"
 ae_historical_expansion.1043.d: "The Zaporozhian Sicz emerged as a method of defence by Slavic colonists against the frequent and devastating raids of Crimean Tatars, who captured and enslaved hundreds of thousands of Ukrainians, Belarusians and Poles to supply the Crimean slave trade in operations called "the harvesting of the steppe". The Ukrainians created a self-defence force, the Cossacks, fierce enough to stop the Tatar hordes, and built fortified camps that were later united to form a central fortress, the Zaporozhian Sich on the island of Small Khortitza, founded by prince Dmytro Wisniowiecki in 1552."
 ae_historical_expansion.1043.a: "For the good pastor turneth back the wolf from his flock."
 ae_historical_expansion.10431.t: "Cossack colonization of the steppe"
 ae_historical_expansion.10431.d: "Our new conquests have turned out to be prime real estate for our Cossack subjects. It is only wise to append these steppe provinces to their statelet."
 ae_historical_expansion.10431.a: "Soldier illustrous of Host Transrapidian, beareth his arms to keep guard of his homeland."
 ae_historical_expansion.1044.t: "Treaty of Andruszow"
 ae_historical_expansion.1044.d: "The Truce of Andrusovo established a thirteen-and-a-half year truce, signed on 9 February 1667 between the Tsardom of Russia and the Polish–Lithuanian Commonwealth, which had fought the Russo-Polish War since 1654 over the territories of modern-day Ukraine and Belarus. In secured the Russian overlordship over the Left Bank Ukraine, together with the city of Kiev, as well over Smolensk, and declared the Zaporozhian Sich to be a Russian-Polish condominium."
 ae_historical_expansion.1044.a: "O sweet Ukrainian land, the dark hour hath come and is thine."
 ae_historical_expansion.1045.t: "Dissolution of the Commonwealth"
 ae_historical_expansion.1045.d: "The Commonwealth will be dissolved."
 ae_historical_expansion.1045.a: "Play as Poland."
 ae_historical_expansion.1045.b: "Play as Lithuania."
 
