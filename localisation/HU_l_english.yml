 ae_restricted_expansion.200.t: "[ae_province_receiver.GetAdjective] Reconsolidation"
 ae_restricted_expansion.200.d: "The recent attempt to incorporate core [ae_province_receiver.GetAdjective] lands into [Root.GetName] has proven itself a failure. The local institutions are simply too entrenched to overcome, and the [ae_province_receiver.GetAdjective] elites are not even hiding their loyalties to their former sovereigns. The only wise thing to do would therefore be to recognize the [ae_province_receiver.GetAdjective] autonomy and let history take its natural course."
 ae_restricted_expansion.200.a: "Cede the contested provinces to [ae_province_receiver.GetName]."
 
 ae_restricted_expansion.300.t: "Restructuring of Conquest"
 ae_restricted_expansion.300.d: "Our most recent conquests have been directly incorporated into our state. However, our vassals lying inbetween are breaking the contingency of the [Root.GetAdjective] realm. To ensure loyalty and stability in the new lands it is only rational to restructure them through adjunction to whichever our subject is nearest to them."
 ae_restricted_expansion.300.a: "Let it be, then."
 
 ae_historical_formables.100.t: "Rise of Safavid Persia"
 ae_historical_formables.100.d: "The Qizilbash tribes stemming from the Azerbaijan mountains, led by sheikhs of the Safavid family, have eventually consolidated Persia under their rule. Their undertaking has not, however, ended in a simple unification of the region. In an attempt to centralize and further subjugate their new dominions, the Safavids have also embarked on a journey to convert the country into Twelver Shiism - if needed, by force."
 ae_historical_formables.100.a: "Long live [ARL.Monarch.GetName]!"
 ae_historical_formables.101.t: "Rise of the Mughal Empire"
 ae_historical_formables.101.d: "[Root.Monarch.GetTitle] [Root.Monarch.GetName] of the illustrous Gurkani dynasty's easternmost branch, based in [Root.Capital.GetName], has embarked on a mission to cross the treacherous Khyber Pass and establish a new empire in Hindusthan - even if this would mean abandoning [Root.Monarch.GetHerHis] original dominions in Persia."
 ae_historical_formables.101.a: "Long live [Root.Monarch.GetName]!"
 ae_historical_formables.102.t: "Unification of Manchu tribes"
 ae_historical_formables.102.d: "In [GetYear], [Root.Monarch.GetTitle] [Root.Monarch.GetName] of the [Root.Dynasty.GetName] tribe, had consolidated all other Jurchen polities around [Root.Capital.GetName]. After the ensuing proclamation of the Later Jin dynasty, [Root.Monarch.GetSheHe] began the process of reorganizing the Manchu army according to the so-called Eight Banners system, which would eventually allow [Root.Monarch.GetHerHim] to directly challenge [ae_emperor_of_china.GetName]'s emperorship over China a decade later." 
 ae_historical_formables.102.a: "Consolidate the tribes."
 ae_historical_formables.1021.t: "Seven Grievances"
 ae_historical_formables.1021.d: "In [GetYear], [Root.Monarch.GetName] of the Later Jin dynasty, in an attempt to exploit an ongoing crisis in the Middle Kingdom, had issued a seven-part manifesto against the [ae_emperor_of_china.GetName] Empire, in effect declaring war on it. The ensuing conquest of [ae_emperor_of_china.GetName] by the Manchus was swift, facilitated by high levels of defection and collaboration with the invaders. Having claimed the Mandate of Heaven after [Root.Monarch.GetHerHis] resounding victory, [Root.Monarch.GetName] proclaimed the Great Qing Dynasty which would rule China until 1911."
 ae_historical_formables.1021.a: "The Mandate of Heaven is ours."
 ae_historical_formables.103.t: "Dutch Independence"
 ae_historical_formables.103.d: "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."
 ae_historical_formables.103.a: "Ils maintiendront."
