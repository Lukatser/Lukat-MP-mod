 ae_historical_colonization.100.t: "Spanish conquest of Mexico"
 ae_historical_colonization.100.d: "The Spanish conquest of the Aztec Empire was a pivotal event in the history of the Americas, marked by the collision of the Aztec Triple Alliance and the Spanish Empire. Taking place between 1519 and 1521, this event saw the Spanish conquistador Hernán Cortés, and his small army of European soldiers and numerous indigenous allies, overthrowing one of the most powerful empires in Mesoamerica. \n\nA combination of factors including superior weaponry, strategic alliances with oppressed or otherwise dissatisfied or opportunistic indigenous groups, and the impact of European diseases contributed to the downfall of the short rule of the Aztec civilization. \n\nThe invasion of Tenochtitlán, the capital of the Aztec Empire, marked the beginning of Spanish dominance in the region and the establishment of New Spain. This conquest had profound consequences, as it led to the cultural assimilation of the Spanish culture, while also paving the way for the emergence of a new social hierarchy dominated by Spanish conquerors and their descendants."
 ae_historical_colonization.100.a: "We shall conquer these distant lands."
 ae_historical_colonization.101.t: "Spanish conquest of Peru"
 ae_historical_colonization.101.d: "After years of preliminary exploration and military skirmishes, 168 Spanish soldiers under conquistador Francisco Pizarro, along with his brothers in arms and their indigenous allies, captured the last Sapa Inca, Atahualpa, at the Battle of Cajamarca in 1532. It was the first step in a long campaign that took decades of fighting but ended in Spanish victory in 1572 and colonization of the region as the Viceroyalty of Peru. The conquest of the Inca Empire led to spin-off campaigns into present-day Chile and Colombia, as well as expeditions to the Amazon Basin and surrounding rainforest."
 ae_historical_colonization.101.a: "We shall conquer these distant lands."
 ae_historical_colonization.102.t: "[Root.GetAdjective] colony on Cuba"
 ae_historical_colonization.102.d: "After first landing on an island then called Guanahani on 12 October 1492, Christopher Columbus landed on Cuba on 27 October 1492, and landing in the northeastern coast on 28 October. Columbus claimed the island for the new Kingdom of Spain and named it Isla Juana ("John's Island") after John, Prince of Asturias. In 1511, the first Spanish settlement was founded by Diego Velázquez de Cuéllar at Baracoa. Other settlements soon followed, including San Cristobal de la Habana, founded in 1514, which later became the capital of the island."
 ae_historical_colonization.200.a: "Ok."
 
 ae_historical_colonization.200.t: "[Root.GetAdjective] colony at the Gold Coast"
 ae_historical_colonization.200.d: "In 1471, Portuguese explorers encountered fishing villages rich with ivory and gold along the Atlantic coast of modern-day Ghana, which the Portuguese called the Gold Coast. The prospect of trade in the Gold Coast region helped spur the construction of the fortress São Jorge da Mina in 1482. From it, the Portuguese commanded a vast internal slave trade, creating a slave network that would expand even after the end of Portuguese colonialism in the region."
 ae_historical_colonization.201.t: "[Root.GetAdjective] Hormuz"
 ae_historical_colonization.201.d: "The Kingdom of Hormuz was located in the eastern side of the Persian Gulf and extended as far as Bahrain in the west at its zenith. The Kingdom was established in the 11th century initially as a dependency of the Kerman Seljuk Sultanate, and later as an autonomous tributary of the Salghurid Turkmens and the Ilkhanates. In its last phase Hormuz became a client state of the Portuguese Empire in the East."
 ae_historical_colonization.202.t: "[Root.GetAdjective] Goa"
 ae_historical_colonization.202.d: "On February 16, 1510, the Portuguese armada sailed into the deep waters of the Mandovi River. The Portuguese landed troops commanded by Dom António de Noronha and assaulted the fort of Pangim, defended by a Turkish mercenary Yusuf Gurgij and a force of 400 men. Yusuf was wounded and retreated to the city and the Portuguese captured the fort along with several iron artillery pieces. At Pangim, Albuquerque received envoys from the most important figures of Goa, and proposed religious freedom and lower taxes if they accepted Portuguese sovereignty. Thereafter they declared their full support for Portugal and Albuquerque formally occupied Goa the next day with no resistance."
 ae_historical_colonization.2021.t: "[Root.GetAdjective] Socotra"
 ae_historical_colonization.2021.d: "In 1507, a Portuguese fleet commanded by Tristão da Cunha with Afonso de Albuquerque landed at Suq on the island of Socotra and captured the port after a stiff battle against the Mahra Sultanate. Their objective was to set a base in a strategic place on the route to India. The lack of a proper harbor and the infertility of the land led to famine and sickness in the garrison, and the Portuguese abandoned the island in 1511. The Mahra sultans took back control of the island, and the inhabitants were converted to Islam."
 ae_historical_colonization.203.t: "[Root.GetAdjective] Malacca"
 ae_historical_colonization.203.d: "In April 1511, Afonso de Albuquerque set sail from Goa to Malacca with a force of some 1,200 men and seventeen or eighteen ships. They conquered the city around four months later. After seizing the city Afonso de Albuquerque spared the Hindu, Chinese and Burmese inhabitants but had the Muslim inhabitants massacred or sold into slavery.\n\nIt soon became clear that Portuguese control of Malacca did not also mean that they controlled the Asian trade centred there. The Malaccan rule was severely hampered by administrative and economic difficulties. Rather than achieving their ambition of dominating Asian trade, the Portuguese had disrupted the organised network that had existed. The centralised port of exchange of Asian wealth was now gone, as was a Malay state to police the Strait of Malacca which had made it safe for commercial traffic. Trade was now scattered over a number of ports that fought amongst each other."
 ae_historical_colonization.204.t: "[Root.GetAdjective] Moçambique"
 ae_historical_colonization.204.d: "In 1507, the Portuguese established a port and naval base on the island of Moçambique and built the Chapel of Nossa Senhora de Baluarte in 1522, now considered the oldest European building in the Southern Hemisphere. During the 16th century, the Fort São Sebastião was built on the island, and the Portuguese settlement became the capital of Portuguese East Africa."
 ae_historical_colonization.205.t: "[Root.GetAdjective] Diu"
 ae_historical_colonization.205.d: "Several colonies were also acquired by the Portugues from the Sultan of Gujarat in the north Konkan region: Daman was sacked in 1531 and ceded in 1539; Salsette, the seven islands of Bombay, Chaul and Bassein in 1534; and Diu, in 1535. These would jointly come to be known as the Northern Province of Portuguese India. \n\nThe Ottoman Empire carried out the Siege of Diu in 1538, with a strong fleet under the command of the Ottoman governor of Egypt Sulaiman Pasha for four months, with the aid of a large army provided by the Sultan of Guzerat; however they were ultimately forced to retreat with considerable losses. The successful defence of Dio by captain António da Silveira against overwhelming odds was a battle of annihilation, is one of the most celebrated exploits in Portuguese history, and frequently compared to the Great Siege of Malta."
 ae_historical_colonization.300.t: "[Root.GetAdjective] colony at Roanoke"
 ae_historical_colonization.300.d: "The Roanoke Colony (was an attempt by Sir Walter Raleigh to found the first permanent English settlement in North America. The colony was founded in 1585, but when it was visited by a ship in 1590, the colonists had inexplicably disappeared. It has come to be known as the Lost Colony, and the fate of the 112 to 121 colonists remains unknown." 
 ae_historical_colonization.301.t: "[Root.GetAdjective] colony at Jamestown"
 ae_historical_colonization.301.d: "The Jamestown settlement in the Colony of Virginia was the first permanent English settlement in the Americas. It was located on the northeast bank of the James River and was established by the London Company as "James Fort" on May 4, 1607. It followed failed attempts, including the Roanoke Colony, established in 1585. Despite the dispatch of more supplies, only 60 of the original 214 settlers survived the 1609–1610 Starving Time. In mid-1610, the survivors abandoned Jamestown, but they returned after meeting a resupply convoy in the James River."
 ae_historical_colonization.302.t: "The Mayflower Voyage"
 ae_historical_colonization.302.d: "The Pilgrims, also known as the Pilgrim Fathers, were the English settlers who travelled to North America on the ship Mayflower and established the Plymouth Colony at what now is Plymouth, Massachusetts, United States. John Smith had named this territory New Plymouth in 1620, sharing the name of the Pilgrims' final departure port of Plymouth, Devon, England. The Pilgrims' leadership came from religious congregations of Brownists or Separatists who had fled religious persecution in England for the tolerance of 17th-century Holland in the Netherlands."
 ae_historical_colonization.303.t: "[Root.GetAdjective] colonization of Newfoundland"
 ae_historical_colonization.303.d: "Bernard Drake's Newfoundland Expedition in 1585 landed at Saint John's, re-establishing England's claim on the area. St. John's became a base for his operations, where his ships gathered supplies and fresh water. This expedition virtually wiped out the Spanish and Portuguese fishing industries in the area, and so set the stage for subsequent English and French influence in the region. By 1620, the fishermen of England's West Country controlled most of Newfoundland's east coast. Sometime after 1630, the town of St. John's was established as a permanent community."
 ae_historical_colonization.400.t: "[Root.GetAdjective] colony of New Amsterdam"
 ae_historical_colonization.400.d: "A permanent European presence near New York Harbor was established in 1624, making it the 12th-oldest continuously occupied European-established settlement in the region, with the founding of a Dutch fur trading settlement on Governors Island. In 1625, construction was started on a citadel and Fort Amsterdam, later called New Amsterdam, on present-day Manhattan Island."
 ae_historical_colonization.401.t: "[Root.GetAdjective] Brazil"
 ae_historical_colonization.401.d: "From 1630 onward, the Dutch Republic conquered almost half of Brazil's settled European area at the time, with its capital in Recife. The Dutch West India Company (GWC) set up its headquarters in Recife. The governor, John Maurice of Nassau, invited artists and scientists to the colony to help promote Brazil and increase immigration. However, the tide turned against the Dutch when the Portuguese won a significant victory at the Second Battle of Guararapes in 1649. On 26 January 1654, the Dutch surrendered and signed the capitulation, but only as a provisional pact. By May 1654, the Dutch Republic demanded that New Holland be given back. On 6 August 1661, New Holland was formally ceded to Portugal through the Treaty of The Hague."
 ae_historical_colonization.402.t: "[Root.GetAdjective] India"
 ae_historical_colonization.402.d: "In 1606, a Dutch ship stopped on the shores of the Pulicat Lagoon, requesting water. Local Muslims offered food and help to the Dutch. They struck a trade partnership to procure and supply local merchandise to the Dutch for trade in the East Indies. Soon the Dutch East India Company was given permission to build a fort and do trading. They built a fort named Geldria at Pulicat as a defense from local kings and the Portuguese, from where they soon monopolized the lucrative textiles trade with the East Indies and other countries in the region."
 ae_historical_colonization.403.t: "[Root.GetAdjective] Guiana"
 ae_historical_colonization.403.d: "Surinam became a Dutch colony on 26 February 1667, when Dutch forces captured Francis Willoughby's English colony during the Second Anglo-Dutch War. The status quo of Dutch sovereignty over Surinam, and English sovereignty over New Netherland, which it had conquered in 1664, was kept in the Treaty of Breda of 31 July 1667, and again confirmed in the Treaty of Westminster of 1674."
 ae_historical_colonization.500.t: "Quebec City"
 ae_historical_colonization.500.d: "Quebec City, founded by Samuel de Champlain, a French explorer and diplomat, on 3 July 1608, became one of the oldest European settlements in North America. Champlain, who came to be called "The Father of New France", served as its administrator for the rest of his life."
 ae_historical_colonization.501.t: "[Root.GetAdjective] Guiana"
 ae_historical_colonization.501.d: "The first French establishment in the Guiana was recorded in 1503, but France did not establish a durable presence until colonists founded Cayenne in 1643. Guiana was developed as a slave society, where planters imported Africans as enslaved labourers on large sugar and other plantations."
 ae_historical_colonization.600.t: "Nya Sverige"
 ae_historical_colonization.600.d: "New Sweden was a colony of the Swedish Empire between 1638 and 1655 along the lower reaches of the Delaware River in what is now Delaware, Maryland, New Jersey, and Pennsylvania. Established during the Thirty Years' War when Sweden was a great power, New Sweden formed part of the Swedish efforts to colonize the Americas. Settlements were established on both sides of the Delaware River. Fort Christina, located in what is now Wilmington, Delaware, was the first settlement, named after Christina, Queen of Sweden. The settlers were Swedes, Finns, and a number of Dutch. New Sweden was conquered by the Dutch Republic in 1655 and incorporated into the Dutch colony of New Netherland."
 
 
