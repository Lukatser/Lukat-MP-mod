 ae_charlesV.100.t: "Habsburg Dynasty in Iberia"
 ae_charlesV.100.d: "The son of Maximillian I von Habsburg and Mary of Burgundy, Phillip I would succeed in winning the crown of Castille for the Habsburg dynasty. Already the ruler of the Austrian lowlands through his mother, in 1506 Phillip organized a coup and overthrew the acting king of Spain, Ferdinand II. Though he died mere months later, Philip's legacy would live on through his son Charles, who would come to rule over one of the largest empires in history."
 ae_charlesV.100.a: "Interesting..."
 ae_charlesV.100.b: "He doesn't seem to be fit."  
 ae_charlesV.200.t: "Death of Charles Habsburg"
 ae_charlesV.200.d: "Following the untimely death of Charles, the promising heir to both the Spanish and Austrian thrones, the Habsburg dominions find themselves at a crossroads. Charles' anticipated rule, which was expected to unite and strengthen his vast inherited realms, now leaves a significant void. His death not only disrupts the plans for a unified Habsburg empire but also raises pressing questions about the future succession in both Spain and Austria."
 ae_charlesV.200.a: "Notify the other realms' estates..." 
 ae_charlesV.201.d: "Word has come from [From.GetName] with sorrowful tidings. Charles, the chosen successor to both our crowns and the symbol of a new era for the Habsburg dynasty, has died unexpectedly, failing to ascend to the both thrones. As we mourn, the [Root.GetAdjective] estates must now turn their attention to the pressing issue of succession and the path forward without our destined ruler."
 ae_charlesV.201.a: "In the arms of the Lord, I find solace."
 ae_charlesV.201.b: "In the arms of the maid, I find solace."
 ae_charlesV.201.c: "A terrible day."
 ae_charlesV.300.t: "Charles Habsburg Ascends to the Throne"
 ae_charlesV.300.d: "With his father having died in 1506, when Charles V came of age in 1515 he aquired the title of Duke of Burgundy, which brought with it rulership over the Netherlands. A year later,the death of his grandfather Maximillian I made him ruler of all the Habsburg posessions in Germany, including the Archduchy of Austria.That same year, the death of Ferdinand II left the crowns of Aragon, Castile, and Leon to his mother Joanna. With Joanna being unsound of mind, Charles was declared co-ruler of each kingdom, and assumed de facto rulership over his mother's posessions. Finally, Charles was crowned Holy Roman Emperor in 1530. Taken altogether, Charles V's dominion encompassed most of Iberia, large portions of Western and Central Europe, as well as the Spanish colonies in Asia and the Americas. This arrangement, however, did not sit well with France, who felt cornered by their Habsburg enemies and were eager to reverse their fortunes. Nor did it please the other nations of Europe, who did not take kindly to Charles's dream of a universal Christian empire."
 ae_charlesV.300.a: "Long may he reign, with his court in Spain!"
 ae_charlesV.300.b: "Long may he reign, with his court in Germany!"
 ae_charlesV.400.t: "Abdication of Charles Habsburg"
 ae_charlesV.400.d: "Abdicate?"
 ae_charlesV.400.a: "Abdicate."
 ae_charlesV.400.b: "Do not abdicate."
 ae_move_court_spain_title: "Move Court to Spain"
 ae_move_court_spain_desc: "Move the imperial and royal court to our Iberian holdings."
 ae_move_court_austria_title: "Move Court to Germany"
 ae_move_court_austria_desc: "Move the imperial and royal court to our German holdings."
 ae_charlesV.500.t: "Court moves to Spain"
 ae_charlesV.500.d: "At the height of his reign Charles V ruled over almost 28 million people, 40 per cent of the population of Europe. It has been said that his was 'an empire on which the sun never set' [...] To administer this vast empire necessitated frequent travel, and [...] it has been estimated that he spent approximately a quarter of the period 1517 to 1555 on the road. As Charles traveled, he left regents, often members of the royal family, in charge. Governance conducted by correspondence was hampered both by the time lapse in communication between such widely dispersed territories and by his reluctance to relinquish decision-making to others. That the only palace Charles built - in the Alhambra at Granada - was left undinished at his death, is often cited as evidence of the peripatetic nature of his reign.\nCharles did not travel alone. Paylists for his household emanate from Zaragoza, Mainz, Toledo, Burgos and Madrid as well as from Brussels and Valladolid. His entourage included advisors, secretaries, servants, and his chapel..."
 ae_charlesV.500.a: "Gather the entourage!"
 ae_charlesV.500.b: "We shall stay at [Root.Capital.GetName] for now..."
 ae_charlesV.501.t: "Court moves to Germany"  
 ae_move_to_spain_tt: "All §Y[HAB.GetAdjective]§! personal unions, allies, royal marriages and guarantees will be transferred over to §Y[ae_move_spain.GetName]§!."
 ae_move_to_austria_tt: "All §Y[ae_move_spain.GetAdjective]§! personal unions, allies, royal marriages and guarantees will be transferred over to §Y[HAB.GetName]§!."
 ae_no_more_moving_tt: "We §Rwill not be able§! to §Ymove our court§! anymore. It will stay in §Y[Root.Capital.GetName]§! and the possible divisions of the Universal Empire will play out from a §Y[Root.GetAdjective]§! perspective."
 
 
 universal_empire.11.t: "Dissolution of the Universal Empire"
 universal_empire.11.d.1: "With the passing of the Imperial title onto [Root.Monarch.GetName], the time has come to fulfill the promises given by us to the Electors considering the division of our vast realms in Europe and beyond."
 universal_empire.11.d.2: "With the passing of the Imperial title onto [Root.Heir.GetName], the time has come to fulfill the promises given by us to the Electors considering the division of our vast realms in Europe and beyond."
 universal_empire.11.a: "The time has come indeed."
 ae_when_ruler_dies: "Should [Root.Monarch.GetName] die or abdicate, the following will happen:"
 ae_break_union: "The personal union between §Y[ae_austria.GetName]§! and §Y[ae_spain.GetName]§! will be dissolved. Both countries, ruled onwards by different branches of the house of §YHabsburg§!, will stay allied and married to each other."
 ae_transfer_unions: "Our personal unions and direct holdings will be divided. Our realms in §YGermany§! and further east will stay under §YAustrian§! rule, while other holdings, including the §YLow Countries§!, will become part of the §Y[ae_spain.GetAdjective]§! realm.\n\nOld rulers will withhold their respective claims on the transferred holdings.. Therefore, should the two realms ever attack each other, they will be able to use the §YTransfer Subject§! peace deal option on each other at half the cost - as long as they hold onto their current capital cities, §Y[ae_austria.Capital.GetName]§! and §Y[ae_spain.Capital.GetName]§!, respectively."
 ae_empire: "The emperorship will be further held by the §YGerman§! branch of the §YHabsburgs§!. Should §Y[ae_spain.GetName]§! have entered the Holy Roman Empire in the meantime, it will leave the Empire."
 
 
