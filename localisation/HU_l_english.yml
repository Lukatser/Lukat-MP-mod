 ae_historical_expansion.105.t: "The Aftermath of the Hundred Years War"
 ae_historical_expansion.105.d: "The long truces that marked the war gave Charles time to centralise the French state and reorganise his army and government, replacing his feudal levies with a more modern professional army that could put its superior numbers to good use. A castle that once could only be captured after a prolonged siege would now fall after a few days from cannon bombardment. The French artillery developed a reputation as the best in the world.\n\nBy 1449, the French had retaken Rouen. In 1450 the Count of Clermont and Arthur de Richemont, Earl of Richmond, of the Montfort family (the future Arthur III, Duke of Brittany), caught an English army attempting to relieve Caen and defeated it at the Battle of Formigny in 1450. Richemont's force attacked the English army from the flank and rear just as they were on the verge of beating Clermont's army.\n\nAfter Charles VII's successful Normandy campaign in 1450, he concentrated his efforts on Gascony, the last province held by the English. Bordeaux, Gascony's capital, was besieged and surrendered to the French on 30 June 1451."
 ae_historical_expansion.105.a: "Mauldite en soit trestoute la lignée!"
 
 ae_historical_expansion.106.t: "The Fall of the Great Horde"
 ae_historical_expansion.106.d: "From 1486 to 1491, a conflict raged between the Sarai-based Great Horde and the Crimean Khanate, which had become a vassal state of the Ottoman Empire in 1475. The Muscovite prince Ivan III sided with Crimean khan Mengli I Giray, while Casimir IV Jagiellon of Lithuania and Poland allied himself with the Great Horde. From 1500 to 1502, the two alliances fought a war after several Lithuanian princes defected to Muscovy. Meanwhile, the Crimean Khanate subjugated what remained of the Great Horde, sacking Sarai in 1502. The Great Horde finally dissipated, and Lithuania thus lost its ally against Moscow."
 ae_historical_expansion.106.a: "So ends the Tatar yoke? Right?"
 
 
