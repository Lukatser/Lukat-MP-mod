 ae_partition_of_poland.100.a: "Hurrah!"
 
 ae_partition_of_poland.101.t: "First Partition of Poland"
 ae_partition_of_poland.101.d: "As the defeat of the Ottomans at the hands of the Russians tipped the scale of the power balance in Eastern Europe, king Frederick II of Prussia proposed to adjust it again by annexing parts of the Polish-Lithuanian Commonwealth. The partition agreement was signed in Vienna in early 1772, and by August, the respective territories agreed upon were effectively annexed into Prussia, Russia and the Habsburg Monarchy. The Sejm was forced to recognize the First Partition the next year. The Commonwealth lost around a third of its territory, a half of its population, and a staggering 80% of its foreign trade, preparing ground for the consecutive partitions and the eventual demise of the Commonwealth."
 ae_partition_of_poland.101.a: "Let them choke on it."
 ae_partition_of_poland.101.b: "I'd rather die than be [plc_partition_russia.GetAdjective]!"

 ae_partition_of_poland.102.t: "Second Partition of Poland"
 ae_partition_of_poland.102.d: "After the shock of the First Patrition, it had become imperative to the Polish-Lithuanian Commonwealth to reform itself into a modern state which would be able to resist its neighbors' growing appetites. In order to be able to undertake the necessary measures in peace, it even sought out an alliance with Prussia. The shaky agreement, however, quickly broke down as the Prussians only felt threatened by the Polish reforms. Thus, when Russia invaded again in 1792, Berlin did not only refuse to honour its alliance with Warsaw, but eventually joined St. Petersburg in the suppression of the Kosciuszko Uprising and the consequent Second Partition of Poland."
 ae_partition_of_poland.102.a: "Let them choke on it."
 ae_partition_of_poland.102.b: "I'd rather die than be [plc_partition_russia.GetAdjective]!"
 ae_partition_of_poland.103.t: "Third Partition of Poland"
 ae_partition_of_poland.103.d: "Even after the Russian armies pacified Poland during the Second Partition, unrest and resentment in the remaining rump state which the Commonwealth had become only continued to boil. To solve the "question" once and for all, Russia, Prussia and Austria eventually agreed to attack the Commonwealth once again - this time erasing any Poland to speak of off the map. The respective treaty was signed in late 1795 and the Polish-Lithuanian Commonwealth ceased to exist, as its remaining lands were annexed into the three states."
 ae_partition_of_poland.103.a: "Let them choke on it."
 ae_partition_of_poland.103.b: "I'd rather die than be [plc_partition_russia.GetAdjective]!"
 
 ae_partition_of_poland.104.t: "Kosciuszko Uprising"
 ae_partition_of_poland.104.d: "In 1789, Tadeusz Kosciuszko came back to Poland after having fought in the War of American Independence. Upon his return, he was promoted to major general and proceded to lead an uprising against the occupying powers in wake of the Second Partition, the defeat of which eventually led to the complete disassembly of the Polish-Lithuanian Commonwealth in 1796."
 ae_partition_of_poland.104.a: "Will he defeat our tormentors?" 
 
 ae_partition_of_poland.1011.a: "Join the conspiracy."
 ae_partition_of_poland.1011.b: "We'll pass."
 
 ae_polish_deluge: "The Deluge"
 ae_polish_deluge_desc: "A major, prolonged crisis of the Commonwealth, characterized by Cossack uprisings and foreign invasions."
 
 ae_polish_deluge.100.t: "Chmielnicki Uprising"
 ae_polish_deluge.100.d: "In 1648, Poland-Lithuania was ravaged by a major revolt of Cossacks and disgruntled Ruthenian peasantry led by the nobleman Bogdan Chmielnicki. The rebellion ushered in the Deluge - a prolonged crisis of the Commonwealth which it wouldn't escape for the following two decades. After the Chmielnicki Uprising resulted in a pact between the Cossacks and the Tsardom of Russia, the Commonwealth was subsequently invaded by Russians and then by the Swedish Empire, coming under a complete occupation by the two powers. Nevertheless, the Commonwealth eventually managed to fend off the invaders and secure its relative sovereignty for the upcoming years - even if losing a large percentage of its pre-Deluge territory in the process."
 ae_polish_deluge.100.a: "Oh no."
 
 ae_polish_deluge.102.t: "Treaty of Pereyaslav"
 ae_polish_deluge.102.d: "After a series of failed settlements with the Polish-Lithuanian Commonwealth, the Cossack authorities gathered in the Left Bank town of Pereyaslav in 1654 to discuss a possibility of an alliance between the war-weakened Cossack state and the Tsardom of Russia. The resulting treaty recognized Moscow's superiority but not necessarily its sovereignty over the Cossacks, as the Zaporozhian Host was to remain virtually independent from Russia in its internal politics and foreign relations. However, this did not prevent the Russian hierarchy from chipping off the Cossack autonomy whenever possible throughout the following century, by the end of which any semblance of a Zaporozhian statehood was effectively liquidated."
 ae_polish_deluge.102.a: "Oh no."
 ae_polish_deluge.1021.d: "After a series of failed settlements with the Polish-Lithuanian Commonwealth, the Cossack authorities gathered in the Left Bank town of Pereyaslav in 1654 to discuss a possibility of an alliance between the war-weakened Cossack state and the Tsardom of Russia. The resulting treaty recognized Moscow's superiority over the Cossacks; the Zaporozhian Host would remain autonomous but would be reincorporated into the Russian state by the end of the following century."
 ae_polish_deluge.1021.a: "We will accept the Cossack proposal."
 ae_polish_deluge.1021.b: "Politely decline."
 
 ae_polish_deluge.103.t: "The Swedish Deluge"
 ae_polish_deluge.103.d: "In 1655, Charles X Gustav of Sweden invaded and occupied western Poland–Lithuania, the eastern half of which was already occupied by Russia. The rapid Swedish advance became known in Poland as the Swedish Deluge. The Grand Duchy of Lithuania became a Swedish protectorate, the Polish–Lithuanian regular armies surrendered and the Polish king John II Casimir Vasa fled to the Habsburgs. Frederick William, Elector of Brandenburg and Duke of Prussia initially supported the estates in Royal Prussia, but allied with Sweden in return for receiving the Duchy of Prussia as a Swedish fief. Exploiting the hurt religious feelings of the Roman Catholic population under Protestant occupation and organizing Polish–Lithuanian military leaders in the Tyszowce Confederation, John II Casimir Vasa managed to regain ground in 1656. Russia took advantage of the Swedish setback, declared war on Sweden and pushed into Lithuania and Swedish Livonia.
 ae_polish_deluge.103.a: "Oh no."
 ae_polish_deluge.1031.d: "In 1655, Charles X Gustav of Sweden invaded and occupied western Poland–Lithuania, the eastern half of which was already occupied by Russia. The rapid Swedish advance became known in Poland as the Swedish Deluge. The Grand Duchy of Lithuania became a Swedish protectorate, the Polish–Lithuanian regular armies surrendered and the Polish king John II Casimir Vasa fled to the Habsburgs."
 ae_polish_deluge.1031.a: "Declare war on the Commonwealth!"
 ae_polish_deluge.1031.b: "We'll wait it out."
 
 
 
 
 
 
 
 
 
 
 
